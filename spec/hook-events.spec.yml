# OrchestKit Hook Event Spec — single source of truth for M141-2 (#1864).
#
# Codegen reads this and emits npm + (future) PyPI hook-contract output.
# CI parity gate fails if either side drifts from this file.
#
# Payload field shapes (M141-2 step 3) are sourced from
# src/hooks/src/types.ts. Fields already on the envelope (event, timestamp,
# session_id, cwd) are NOT repeated in payload — only event-specific fields.
# Supported payload field types (see scripts/codegen.mjs): string, number,
# boolean, object, string[], unknown.

spec_version: 2
last_updated: '2026-05-18'

metadata:
  name: '@orchestkit/hook-contract'
  description: 'Hook event contract for OrchestKit'
  source_repo: 'https://github.com/yonatangross/orchestkit'
  source_file: 'spec/hook-events.spec.yml'

envelope:
  required:
    - name: event
      type: string
      description: 'Discriminator — equals the event name'
  optional:
    - name: timestamp
      type: string
      description: 'ISO-8601 UTC timestamp'
    - name: session_id
      type: string
      description: 'Correlation ID across hook fires in one CC session'
    - name: cwd
      type: string
      description: 'Project working directory at fire time'
    - name: payload
      type: object
      description: 'Per-event variant fields — see events[].payload below'

events:
  - name: SessionStart
    since_cc: '2.1.0'
    description: 'Fired when a CC session starts. Async hooks observe project state before the first prompt.'
    payload:
      optional:
        - name: plugin_root
          type: string
          description: 'Absolute path to the plugin root (injected by run-hook.mjs)'
        - name: permissionMode
          type: string
          description: 'Permission mode (default | acceptEdits | dontAsk | auto)'

  - name: UserPromptSubmit
    since_cc: '2.1.9'
    description: 'Fires when the user submits a prompt — used to inject additionalContext.'
    payload:
      required:
        - name: prompt
          type: string
          description: 'The user prompt text being submitted'

  - name: PreToolUse
    since_cc: '2.1.0'
    description: 'Before any tool invocation — gate or transform tool input.'
    payload:
      required:
        - name: tool_name
          type: string
          description: 'The tool being invoked (e.g. Bash, Write, Read)'
        - name: tool_input
          type: object
          description: 'Tool-specific input parameters'
      optional:
        - name: tool_use_id
          type: string
          description: 'CC 2.1.69 correlation ID for matching with PostToolUse'

  - name: PostToolUse
    since_cc: '2.1.0'
    description: 'After a successful tool invocation — observe result.'
    payload:
      required:
        - name: tool_name
          type: string
          description: 'The tool that was invoked'
        - name: tool_input
          type: object
          description: 'Tool input passed to the invocation'
      optional:
        - name: tool_output
          type: unknown
          description: 'Tool output (type varies by tool)'
        - name: tool_error
          type: string
          description: 'Tool error message if one was produced'
        - name: exit_code
          type: number
          description: 'Tool exit code where applicable'
        - name: tool_use_id
          type: string
          description: 'CC 2.1.69 correlation ID'
        - name: duration_ms
          type: number
          description: 'Tool execution duration in milliseconds'

  - name: PostToolUseFailure
    since_cc: '2.1.7'
    description: 'After a failed tool invocation — observe error.'
    payload:
      required:
        - name: tool_name
          type: string
          description: 'The tool that failed'
        - name: tool_input
          type: object
          description: 'Tool input passed to the failed invocation'
        - name: tool_error
          type: string
          description: 'Error message from the tool'
      optional:
        - name: exit_code
          type: number
          description: 'Tool exit code'
        - name: tool_use_id
          type: string
          description: 'CC 2.1.69 correlation ID'

  - name: PermissionRequest
    since_cc: '2.1.0'
    description: 'Fires when a tool needs permission approval.'
    payload:
      required:
        - name: tool_name
          type: string
          description: 'The tool requesting permission'
        - name: tool_input
          type: object
          description: 'Tool input that triggered the permission request'
      optional:
        - name: permission_suggestions
          type: object
          description: 'CC 2.1.69 suggested "always allow" options'

  - name: SubagentStart
    since_cc: '2.1.0'
    description: 'Fires when a subagent begins execution.'
    payload:
      optional:
        - name: subagent_type
          type: string
          description: 'Subagent type (CC 2.1.0+ field name)'
        - name: agent_type
          type: string
          description: 'Alternative agent type field name'
        - name: agent_id
          type: string
          description: 'Agent ID'
        - name: parent_agent_id
          type: string
          description: 'Parent agent ID for trace stitching (CC 2.1.139)'

  - name: SubagentStop
    since_cc: '2.1.0'
    description: 'Fires when a subagent finishes (success or error).'
    payload:
      optional:
        - name: agent_type
          type: string
          description: 'Agent type'
        - name: agent_id
          type: string
          description: 'Agent ID'
        - name: agent_output
          type: string
          description: 'Final agent output text'
        - name: output
          type: string
          description: 'Alternative output field name'
        - name: error
          type: string
          description: 'Error from subagent if it failed'
        - name: duration_ms
          type: number
          description: 'Total subagent execution duration'
        - name: agent_transcript_path
          type: string
          description: 'Path to subagent transcript (CC 2.1.69)'
        - name: last_assistant_message
          type: string
          description: 'Final assistant message text (CC 2.1.47+)'

  - name: Stop
    since_cc: '2.1.0'
    description: 'Fires when the assistant finishes a turn.'
    payload:
      optional:
        - name: last_assistant_message
          type: string
          description: 'Final assistant message text (CC 2.1.47+)'
        - name: stop_hook_active
          type: boolean
          description: 'Whether a stop hook is currently active (prevents re-entry)'

  - name: SessionEnd
    since_cc: '2.1.7'
    description: 'Fires when a CC session ends — final flush.'

  - name: Setup
    since_cc: '2.1.0'
    description: 'Fires during setup (--init / --maintenance).'

  - name: Notification
    since_cc: '2.1.0'
    description: 'Fires on user-facing notifications.'
    payload:
      required:
        - name: message
          type: string
          description: 'Notification message text'
      optional:
        - name: notification_type
          type: string
          description: 'Notification type discriminator'

  - name: PreCompact
    since_cc: '2.1.76'
    description: 'Fires before automatic context compaction.'
    payload:
      optional:
        - name: compaction_count
          type: number
          description: 'Number of compactions in this session so far'
        - name: context_size_after
          type: number
          description: 'Estimated context size after compaction (tokens)'

  - name: TeammateIdle
    since_cc: '2.1.33'
    description: 'Fires when a teammate agent has been idle past a threshold.'
    payload:
      required:
        - name: teammate_id
          type: string
          description: 'Teammate agent ID'
        - name: teammate_type
          type: string
          description: 'Teammate agent type'
        - name: idle_duration_ms
          type: number
          description: 'How long the teammate has been idle'

  - name: TaskCompleted
    since_cc: '2.1.33'
    description: 'Fires when a TaskCreate task is marked completed.'
    payload:
      required:
        - name: task_id
          type: string
          description: 'Completed task ID'
      optional:
        - name: task_subject
          type: string
          description: 'Task subject'
        - name: task_status
          type: string
          description: 'Task result status'
        - name: token_count
          type: number
          description: 'Tokens consumed by the task (CC 2.1.30)'
        - name: tool_uses
          type: number
          description: 'Tool invocations in the task (CC 2.1.30)'

  - name: InstructionsLoaded
    since_cc: '2.1.69'
    description: 'Fires when project/user instructions (CLAUDE.md/rules) are loaded.'

  - name: WorktreeCreate
    since_cc: '2.1.50'
    description: 'Fires when a git worktree is created via EnterWorktree.'

  - name: WorktreeRemove
    since_cc: '2.1.50'
    description: 'Fires when a git worktree is removed via ExitWorktree.'

  - name: ConfigChange
    since_cc: '2.1.50'
    description: 'Fires when settings.json / settings.local.json is modified.'
