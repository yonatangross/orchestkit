<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CC 2.1.169/170 Adoption Explorer — OrchestKit</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--panel2:#1c2230;--border:#30363d;--fg:#e6edf3;--dim:#8b949e;--accent:#58a6ff;--green:#3fb950;--orange:#d29922;--red:#f85149;--mono:ui-monospace,Menlo,monospace}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,sans-serif;height:100vh;display:flex;flex-direction:column}
  header{padding:10px 18px;border-bottom:1px solid var(--border);background:var(--panel)}
  h1{font-size:15px}h1 span{color:var(--accent)}
  main{display:flex;flex:1;min-height:0}
  #controls{width:300px;border-right:1px solid var(--border);background:var(--panel);padding:14px;overflow-y:auto}
  .group h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin:12px 0 8px}
  .feat{display:flex;gap:8px;align-items:flex-start;border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:8px;background:var(--panel2);cursor:pointer}
  .feat input{margin-top:3px;accent-color:var(--green)}
  .feat b{font-size:12.5px}.feat small{color:var(--dim);font-size:11px;display:block}
  .badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:4px}
  .b-break{background:#67060c;color:#ffb3ad}.b-cmd{background:#1f3a5f;color:#a5cfff}.b-evt{background:#12351f;color:#7ee2a8}
  #preview{flex:1;overflow-y:auto;background:var(--panel);margin:14px;border:1px solid var(--border);border-radius:8px;padding:16px}
  #preview h2{font-size:14px;margin-bottom:8px}
  .note{border-left:3px solid var(--accent);background:var(--panel2);padding:10px 12px;border-radius:0 8px 8px 0;margin-bottom:10px;font-size:12.5px}
  .note .where{font-family:var(--mono);font-size:11px;color:var(--orange)}
  #prompt-bar{border-top:1px solid var(--border);background:var(--panel);padding:10px 18px;display:flex;gap:12px}
  #prompt{flex:1;font-family:var(--mono);font-size:11.5px;color:#b8c2cc;white-space:pre-wrap;max-height:110px;overflow-y:auto;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px}
  #copy{background:#238636;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-weight:600;cursor:pointer}
  .stat{font-family:var(--mono);font-size:12px;color:var(--green)}
</style>
</head>
<body>
<header><h1>🧭 <span>CC 2.1.169/170</span> adoption — floor bump + 5 features <span class="stat" id="stat"></span></h1></header>
<main>
  <div id="controls">
    <div class="group"><h3>Floor</h3>
      <div class="feat"><span><b>2.1.168 → 2.1.170</b><small>strict override (floor=latest, expires 2026-09-07); 116 compat decls + fixture + 5 pinned tests + 10 in-body mentions restamped</small></span></div>
    </div>
    <div class="group"><h3>2.1.169 features in prompt</h3><div id="feats"></div></div>
  </div>
  <div id="preview"></div>
</main>
<div id="prompt-bar"><div id="prompt"></div><button id="copy">Copy Prompt</button></div>
<script>
const FEATS=[
 {id:"otel",badge:["breaking","b-break"],name:"OTEL cert-path trust",issue:2341,
  short:"untrusted project settings can't set OTEL client-cert paths without trust confirmation",
  where:"monitoring-observability · security-patterns · configure",
  doc:"Telemetry silently not flowing after 2.1.169 is usually the new trust gate, not the collector. Cloned repos can no longer point telemetry at attacker certs."},
 {id:"mcp",badge:["breaking","b-break"],name:"Managed MCP enforcement",issue:2342,
  short:"allowedMcpServers/deniedMcpServers now enforced on reconnect, IDE configs, --mcp-config, cold starts",
  where:"mcp-patterns · security-patterns · configure",
  doc:"Treat pre-2.1.169 managed-MCP audits as incomplete on those four paths. A server that stops connecting may be (correctly) policy-blocked."},
 {id:"cd",badge:["new command","b-cmd"],name:"/cd",issue:2343,
  short:"move session to a new working directory WITHOUT breaking the prompt cache",
  where:"help · chain-patterns · checkpoint-resume",
  doc:"Chains that hop between repos/worktrees should /cd instead of restarting — the next phase doesn't re-pay full context ingest."},
 {id:"safe",badge:["new command","b-cmd"],name:"--safe-mode",issue:2344,
  short:"start CC with ALL customizations disabled (CLAUDE.md, plugins, skills, hooks, MCP)",
  where:"doctor · errors · configure · help",
  doc:"The one-step bisect separating 'ork/hook/MCP bug' from 'CC bug'. Also CLAUDE_CODE_SAFE_MODE=1."},
 {id:"post",badge:["new event","b-evt"],name:"post-session hook",issue:2345,
  short:"self-hosted runner lifecycle hook after session end, before workspace deletion",
  where:"configure · chain-patterns · checkpoint-resume",
  doc:"Snapshot uncommitted work or export .claude/chain/ handoffs before the workspace is destroyed. SIGTERM→SIGKILL window now configurable (default 5s)."}
];
const sel=new Set(FEATS.map(f=>f.id));
const $=id=>document.getElementById(id);
function render(){
  $("feats").innerHTML=FEATS.map(f=>`<label class="feat"><input type="checkbox" data-f="${f.id}" ${sel.has(f.id)?"checked":""}><span><b>${f.name}</b><span class="badge ${f.badge[1]}">${f.badge[0]}</span><small>${f.short}</small></span></label>`).join("");
  $("preview").innerHTML="<h2>📚 Documentation added per feature (closes #2341–#2345)</h2>"+FEATS.filter(f=>sel.has(f.id)).map(f=>`<div class="note"><b>${f.name}</b> · <span class="where">${f.where}</span><br>${f.doc}</div>`).join("");
  $("stat").textContent=` · ${sel.size}/5 features selected`;
  const lines=FEATS.filter(f=>sel.has(f.id)).map(f=>`- ${f.name} (#${f.issue}): verify the note in ${f.where.split(" · ")[0]}/SKILL.md matches how my team uses it`);
  $("prompt").textContent=lines.length?`In the OrchestKit repo on CC 2.1.170, review the adopted 2.1.169 features:\n${lines.join("\n")}\nFloor is 2.1.170 (strict override); run bash tests/manifests/test-cc-version-floor.sh to confirm coherence.`:"(select at least one feature)";
  document.querySelectorAll("[data-f]").forEach(cb=>cb.onchange=()=>{cb.checked?sel.add(cb.dataset.f):sel.delete(cb.dataset.f);render();});
}
$("copy").onclick=()=>navigator.clipboard.writeText($("prompt").textContent).then(()=>{$("copy").textContent="Copied!";setTimeout(()=>$("copy").textContent="Copy Prompt",1200)});
render();
</script>
</body>
</html>
