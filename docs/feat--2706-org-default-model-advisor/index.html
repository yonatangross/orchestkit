<title>#2706 · model-cost-advisor default-model resolution</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --line:#30363d; --fg:#e6edf3; --dim:#8b949e; --accent:#d2a8ff; --ok:#3fb950; --warn:#d29922; }

  body { margin:0; padding:2rem; background:var(--bg); color:var(--fg); font:15px/1.55 ui-monospace,Menlo,monospace; }
  .wrap { max-width:760px; margin:0 auto; }
  h1 { font-size:1.4rem; margin:0 0 .25rem; }
  .sub { color:var(--dim); margin:0 0 1.5rem; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:1rem 1.25rem; margin-bottom:1rem; }
  h2 { font-size:.8rem; text-transform:uppercase; letter-spacing:.08em; color:var(--accent); margin:0 0 .75rem; }
  label { display:block; margin:.6rem 0 .2rem; color:var(--dim); font-size:.82rem; }
  select, input { width:100%; background:#0d1117; color:var(--fg); border:1px solid var(--line); border-radius:6px; padding:.4rem .5rem; font:inherit; }

<body>
<div class="wrap">
  <h1>#2706 · effective-model resolution for <code>inherit</code> agents</h1>
  <p class="sub">How model-cost-advisor now decides what model an <code>inherit</code> agent actually runs · interactive playground</p>

  <div class="card">
    <h2>Inputs</h2>
    <label>settings.json <code>model</code> (managed → user → project)</label>
    <select id="settings">
      <option value="">— unset —</option>
      <option value="opus">opus</option>
      <option value="claude-opus-4-8">claude-opus-4-8 (full ID)</option>
      <option value="claude-sonnet-5">claude-sonnet-5</option>
      <option value="haiku">haiku</option>
    </select>
    <label><code>CLAUDE_MODEL</code> env</label>
    <select id="env">
      <option value="">— unset —</option>
      <option value="opus">opus</option>
      <option value="sonnet">sonnet</option>
    </select>
    <label>org "Org default" (org console, CC 2.1.196)</label>
    <select id="org">
      <option value="">— unset —</option>
      <option value="opus">opus (set server-side)</option>
    </select>
    <label>task complexity</label>
    <select id="cx"><option>low</option><option selected>medium</option><option>high</option></select>
  </div>

  <div class="card">
    <h2>Resolution</h2>
    <div class="out chain" id="chain"></div>
    <div class="verdict" id="verdict"></div>
  </div>

<script>
  const $ = id => document.getElementById(id);
  function tier(s){ s=(s||"").toLowerCase().replace(/\[1m\]$/,"").trim();
    for(const t of ["fable","opus","sonnet","haiku"]) if(s===t||s.startsWith("claude-"+t+"-")) return t; return s; }
  function render(){
    const settings=$("settings").value, env=$("env").value, org=$("org").value, cx=$("cx").value;
    const steps=[
      ["settings.json model", settings],
      ["CLAUDE_MODEL env", env],
      ["'sonnet' default", "sonnet"],
    ];
    let chosen=null, html="";
    for(const [name,val] of steps){
      if(chosen===null && val){ chosen=val; html+=`<div class="step hit">✔ ${name}: ${val} → used</div>`; }
      else if(chosen===null){ html+=`<div class="step skip">✗ ${name}: unset</div>`; }
      else { html+=`<div class="step skip">  ${name}: ${val||"unset"}</div>`; }
    }
    html+=`<div class="step warn">⚠ org default (${org||"unset"}) is server-side — not hook-readable, never consulted</div>`;
    $("chain").innerHTML=html;
    const eff=tier(chosen);
    const premium=eff==="opus"||eff==="fable";
    let v=`Effective tier: <code>${eff}</code>. `;
    if(premium && cx==="low") v+="Low-complexity on premium → <span class='hit'>emit downgrade-to-sonnet advice</span>.";
    else if(premium && cx==="medium") v+="Medium on premium → emit conservative downgrade advice.";
    else if(eff==="haiku" && cx==="high") v+="High-complexity on haiku → <span class='warn'>suggest upgrade</span>.";
    else v+="No advice — model fits the task.";
    if(org && !settings && !env) v+="<br><span class='warn'>Note: only an org default is set → advisor falls back to 'sonnet' and may misjudge. Best-effort by design.</span>";
    $("verdict").innerHTML=v;
  }
  for(const id of ["settings","env","org","cx"]) $(id).addEventListener("change",render);
  render();
</script>
</div>
</body>
