<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CC 2.1.110 Compatibility Update — OrchestKit</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0b1a;--surface:#1a1428;--surface2:#241e34;--border:#3d2e5c;--text:#e8e0f0;--muted:#9b8eb8;--accent:#7c3aed;--accent2:#a855f7;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--blue:#3b82f6;--font:system-ui,-apple-system,sans-serif;--mono:'SF Mono',Consolas,monospace}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.header h1{font-size:15px;font-weight:600;color:var(--accent2)}
.header .badge{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--accent);color:#fff;font-weight:500}
.main{flex:1;display:flex;overflow:hidden}
.controls{width:280px;min-width:280px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:16px}
.preview{flex:1;overflow-y:auto;padding:20px}
.group{margin-bottom:16px}
.group-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;font-weight:600}
.presets{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.preset{font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;transition:.15s}
.preset:hover{border-color:var(--accent);color:var(--accent2)}
.preset.active{background:var(--accent);border-color:var(--accent);color:#fff}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
.toggle-row label{font-size:13px;color:var(--text)}
.toggle{width:36px;height:20px;border-radius:10px;background:var(--border);cursor:pointer;position:relative;transition:.2s;border:none}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.2s}
.toggle.on::after{left:18px}
.section{margin-bottom:24px}
.section-head{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--accent2);display:flex;align-items:center;gap:8px}
.section-head .count{font-size:11px;background:var(--surface2);padding:1px 7px;border-radius:8px;color:var(--muted)}
.matrix-grid{display:grid;gap:6px}
.feat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;transition:.2s}
.feat-card.highlight{border-color:var(--accent);background:var(--surface2)}
.feat-card .feat-name{font-family:var(--mono);font-size:12px;color:var(--accent2);margin-bottom:4px}
.feat-card .feat-desc{font-size:11px;color:var(--muted);line-height:1.4}
.feat-card .feat-ver{font-size:10px;color:var(--green);margin-top:4px;font-family:var(--mono)}
.skill-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.skill-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.skill-card .skill-name{font-size:13px;font-weight:600;margin-bottom:6px}
.skill-card .changes{font-size:11px;color:var(--muted);line-height:1.5}
.skill-card .changes .tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;margin:1px 2px;font-family:var(--mono)}
.tag-push{background:#7c3aed22;color:var(--accent2);border:1px solid #7c3aed44}
.tag-recap{background:#22c55e22;color:var(--green);border:1px solid #22c55e44}
.tag-focus{background:#3b82f622;color:var(--blue);border:1px solid #3b82f644}
.tag-tui{background:#eab30822;color:var(--yellow);border:1px solid #eab30844}
.tier-table{width:100%;border-collapse:collapse;font-size:12px}
.tier-table th{text-align:left;padding:8px;border-bottom:2px solid var(--border);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.tier-table td{padding:8px;border-bottom:1px solid var(--border)}
.tier-table tr.recommended td{color:var(--accent2);font-weight:600}
.tier-table tr.old-rec td{color:var(--muted);text-decoration:line-through;opacity:.6}
.tier-table .tier-badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600}
.tier-rec{background:var(--accent);color:#fff}
.tier-full{background:var(--surface2);color:var(--muted)}
.tier-min{background:#eab30833;color:var(--yellow)}
.stats-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;flex:1;min-width:100px;text-align:center}
.stat .val{font-size:24px;font-weight:700;color:var(--accent2)}
.stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.prompt-bar{background:var(--surface);border-top:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px}
.prompt-text{flex:1;font-family:var(--mono);font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.copy-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--accent);background:transparent;color:var(--accent2);font-size:12px;cursor:pointer;transition:.15s;white-space:nowrap}
.copy-btn:hover{background:var(--accent);color:#fff}
.arrow{color:var(--green);font-size:14px;margin:0 4px}
.dim{opacity:.4}
</style>
</head>
<body>
<div class="header">
<h1>OrchestKit — CC 2.1.110 Compatibility Update</h1>
<span class="badge">PR #1349</span>
<span class="badge" style="background:#22c55e">16 new features</span>
</div>
<div class="main">
<div class="controls">
<div class="group">
<div class="group-title">Presets</div>
<div class="presets">
<button class="preset active" onclick="setPreset('overview')">Overview</button>
<button class="preset" onclick="setPreset('matrix')">Matrix</button>
<button class="preset" onclick="setPreset('skills')">Skills</button>
<button class="preset" onclick="setPreset('tiers')">Tiers</button>
<button class="preset" onclick="setPreset('breaking')">Breaking</button>
</div>
</div>
<div class="group">
<div class="group-title">Show Sections</div>
<div class="toggle-row"><label>Stats Overview</label><button class="toggle on" id="t-stats" onclick="tog(this,'stats')"></button></div>
<div class="toggle-row"><label>Feature Matrix</label><button class="toggle on" id="t-matrix" onclick="tog(this,'matrix')"></button></div>
<div class="toggle-row"><label>Skill Updates</label><button class="toggle on" id="t-skills" onclick="tog(this,'skills')"></button></div>
<div class="toggle-row"><label>Tier Changes</label><button class="toggle on" id="t-tiers" onclick="tog(this,'tiers')"></button></div>
<div class="toggle-row"><label>Breaking Changes</label><button class="toggle on" id="t-breaking" onclick="tog(this,'breaking')"></button></div>
<div class="toggle-row"><label>Audit Results</label><button class="toggle on" id="t-audit" onclick="tog(this,'audit')"></button></div>
</div>
<div class="group">
<div class="group-title">Filter Features</div>
<div class="toggle-row"><label>New Tools</label><button class="toggle on" id="f-tools" onclick="togF(this,'tools')"></button></div>
<div class="toggle-row"><label>Commands</label><button class="toggle on" id="f-cmds" onclick="togF(this,'cmds')"></button></div>
<div class="toggle-row"><label>Config</label><button class="toggle on" id="f-config" onclick="togF(this,'config')"></button></div>
<div class="toggle-row"><label>Behavior</label><button class="toggle on" id="f-behavior" onclick="togF(this,'behavior')"></button></div>
<div class="toggle-row"><label>Fixes</label><button class="toggle on" id="f-fixes" onclick="togF(this,'fixes')"></button></div>
</div>
</div>
<div class="preview" id="preview"></div>
</div>
<div class="prompt-bar">
<div class="prompt-text" id="prompt">CC 2.1.110 adds 16 features. Recommended tier bumped from 2.1.108 to 2.1.110. 6 skills updated with PushNotification.</div>
<button class="copy-btn" onclick="copyPrompt()">Copy</button>
</div>

<script>
const FEATURES=[
{name:'tui_command',desc:'/tui command — switch to flicker-free fullscreen TUI mid-conversation',cat:'cmds'},
{name:'push_notification_tool',desc:'PushNotification built-in tool — mobile push via Remote Control',cat:'tools'},
{name:'focus_command',desc:'/focus command for condensed view (replaces Ctrl+O focus toggle)',cat:'cmds'},
{name:'ctrl_o_transcript_only',desc:'Ctrl+O now only toggles normal/verbose transcript',cat:'behavior'},
{name:'auto_scroll_enabled_config',desc:'autoScrollEnabled config to disable auto-scroll in fullscreen',cat:'config'},
{name:'editor_commented_context',desc:'External editor (Ctrl+G) shows Claude response as commented context',cat:'config'},
{name:'bash_max_timeout_enforced',desc:'Bash tool enforces documented max timeout — large values hard-fail',cat:'behavior'},
{name:'write_user_edit_signal',desc:'Write tool tells model when user edits proposed diff',cat:'behavior'},
{name:'resume_scheduled_tasks',desc:'--resume/--continue resurrects unexpired scheduled tasks',cat:'behavior'},
{name:'session_recap_default_on',desc:'Session recap enabled by default even with telemetry disabled',cat:'behavior'},
{name:'remote_control_commands',desc:'/autocompact, /context, /exit, /reload-plugins from Remote Control',cat:'cmds'},
{name:'sdk_traceparent_tracestate',desc:'TRACEPARENT/TRACESTATE auto-read in SDK/headless for OTEL',cat:'config'},
{name:'plugin_favorites_sorting',desc:'/plugin Installed tab: favorites sort to top, disabled hidden',cat:'cmds'},
{name:'doctor_mcp_duplicate_warn',desc:'/doctor warns on duplicate MCP servers across config scopes',cat:'fixes'},
{name:'mcp_hang_fix',desc:'MCP tool call hang fixes and connection hardening',cat:'fixes'},
{name:'open_in_editor_security',desc:'Security hardening for "Open in editor" — command injection protection',cat:'fixes'},
];

const SKILLS=[
{name:'brainstorm',changes:['PushNotification','session recap default-on','v4.8.0 → v4.9.0'],tags:['push','recap']},
{name:'implement',changes:['PushNotification','Ctrl+O → /focus','session recap default-on'],tags:['push','focus','recap']},
{name:'cover',changes:['PushNotification','session recap default-on'],tags:['push','recap']},
{name:'fix-issue',changes:['PushNotification','session recap default-on'],tags:['push','recap']},
{name:'verify',changes:['PushNotification','session recap default-on'],tags:['push','recap']},
{name:'setup',changes:['/tui fullscreen rec.','autoScrollEnabled','/focus recommendation'],tags:['tui','focus']},
{name:'doctor',changes:['MCP duplicate warn','Recommended → 2.1.110','version check updated'],tags:['focus']},
{name:'chain-patterns',changes:['Scheduled task recovery','session recap default-on'],tags:['recap']},
];

const state={stats:true,matrix:true,skills:true,tiers:true,breaking:true,audit:true,filters:{tools:true,cmds:true,config:true,behavior:true,fixes:true},preset:'overview'};

function tog(el,key){state[key]=!state[key];el.classList.toggle('on');render();}
function togF(el,key){state.filters[key]=!state.filters[key];el.classList.toggle('on');render();}

function setPreset(p){
state.preset=p;
document.querySelectorAll('.preset').forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');
const all=p==='overview';
const keys={stats:all||p==='overview',matrix:p==='matrix'||all,skills:p==='skills'||all,tiers:p==='tiers'||all,breaking:p==='breaking'||all,audit:all};
Object.entries(keys).forEach(([k,v])=>{state[k]=v;const t=document.getElementById('t-'+k);if(t)t.classList.toggle('on',v);});
render();
}

function render(){
const filtered=FEATURES.filter(f=>state.filters[f.cat]);
let h='';
if(state.stats){
h+=`<div class="stats-row">
<div class="stat"><div class="val">16</div><div class="lbl">New Features</div></div>
<div class="stat"><div class="val">294</div><div class="lbl">Total Matrix</div></div>
<div class="stat"><div class="val">6</div><div class="lbl">Skills + Push</div></div>
<div class="stat"><div class="val">42</div><div class="lbl">Tests Pass</div></div>
<div class="stat"><div class="val">12/12</div><div class="lbl">Security</div></div>
</div>`;
}
if(state.matrix){
h+=`<div class="section"><div class="section-head">Feature Matrix <span class="count">${filtered.length} shown</span></div><div class="matrix-grid">`;
filtered.forEach(f=>{
const hl=f.cat==='tools'||f.cat==='cmds'?'highlight':'';
h+=`<div class="feat-card ${hl}"><div class="feat-name">${f.name}</div><div class="feat-desc">${f.desc}</div><div class="feat-ver">2.1.110</div></div>`;
});
h+=`</div></div>`;
}
if(state.skills){
h+=`<div class="section"><div class="section-head">Skill Updates <span class="count">${SKILLS.length} skills</span></div><div class="skill-grid">`;
SKILLS.forEach(s=>{
let tags='';
s.tags.forEach(t=>{
if(t==='push')tags+=`<span class="tag tag-push">PushNotification</span>`;
if(t==='recap')tags+=`<span class="tag tag-recap">recap default-on</span>`;
if(t==='focus')tags+=`<span class="tag tag-focus">/focus</span>`;
if(t==='tui')tags+=`<span class="tag tag-tui">/tui</span>`;
});
h+=`<div class="skill-card"><div class="skill-name">${s.name}</div><div class="changes">${s.changes.join(' · ')}<br>${tags}</div></div>`;
});
h+=`</div></div>`;
}
if(state.tiers){
h+=`<div class="section"><div class="section-head">Version Tier Changes</div>
<table class="tier-table"><thead><tr><th>Version</th><th>Tier</th><th>Highlights</th></tr></thead><tbody>
<tr class="recommended"><td>&ge; 2.1.110</td><td><span class="tier-badge tier-rec">Recommended</span></td><td>/tui, PushNotification, /focus, session recap default-on, Bash timeout enforced</td></tr>
<tr class="old-rec"><td>&ge; 2.1.108</td><td><span class="tier-badge tier-full">Full</span></td><td>Was Recommended — prompt caching 1h, /recap, skill discovery</td></tr>
<tr><td>&ge; 2.1.105</td><td><span class="tier-badge tier-full">Full</span></td><td>EnterWorktree path, PreCompact blocking, skill desc 1536</td></tr>
<tr><td>&ge; 2.1.94</td><td><span class="tier-badge tier-min">Minimum</span></td><td>Skill hooks fix, sessionTitle, effort default high</td></tr>
</tbody></table></div>`;
}
if(state.breaking){
h+=`<div class="section"><div class="section-head">Breaking / Behavioral Changes</div><div class="matrix-grid">
<div class="feat-card highlight"><div class="feat-name">bash_max_timeout_enforced</div><div class="feat-desc">Bash tool now enforces documented max timeout. Values exceeding limit hard-fail. <strong>Audit result: all OrchestKit hooks within 300s — safe.</strong></div><div class="feat-ver" style="color:var(--green)">✓ No action needed</div></div>
<div class="feat-card highlight"><div class="feat-name">write_user_edit_signal</div><div class="feat-desc">Write tool tells model when user edits diff. PostToolUse hooks may see different tool_response. <strong>Audit result: hooks only read tool_input — safe.</strong></div><div class="feat-ver" style="color:var(--green)">✓ No action needed</div></div>
<div class="feat-card highlight"><div class="feat-name">ctrl_o_transcript_only</div><div class="feat-desc">Ctrl+O no longer toggles focus view — only transcript verbosity. Focus view moved to /focus command.</div><div class="feat-ver" style="color:var(--yellow)">Updated: implement, doctor</div></div>
<div class="feat-card highlight"><div class="feat-name">session_recap_default_on</div><div class="feat-desc">CLAUDE_CODE_ENABLE_AWAY_SUMMARY no longer needed for telemetry-off users. Opt out via /config.</div><div class="feat-ver" style="color:var(--yellow)">Updated: 7 skills + chain-patterns</div></div>
</div></div>`;
}
if(state.audit){
h+=`<div class="section"><div class="section-head">Agent Validation Results</div><div class="matrix-grid">
<div class="feat-card"><div class="feat-name" style="color:var(--green)">🛡️ security-auditor — PASS</div><div class="feat-desc">No injection vectors. PushNotification CC-gated by Remote Control. Flagged missing test update (fixed).</div></div>
<div class="feat-card"><div class="feat-name" style="color:var(--green)">📋 code-quality-reviewer — PASS</div><div class="feat-desc">Consistent naming/style. All AWAY_SUMMARY and Ctrl+O references updated.</div></div>
<div class="feat-card"><div class="feat-name" style="color:var(--green)">🧪 test-generator — PASS</div><div class="feat-desc">Matrix test assertions updated: 278→294. 42/42 unit tests pass.</div></div>
</div></div>`;
}
document.getElementById('preview').innerHTML=h;
updatePrompt(filtered);
}

function updatePrompt(filtered){
const parts=[`CC 2.1.110 adds ${filtered.length} features`];
if(state.tiers)parts.push('Recommended tier bumped 2.1.108 → 2.1.110');
if(state.skills)parts.push(`${SKILLS.filter(s=>s.tags.includes('push')).length} skills gain PushNotification`);
if(state.breaking)parts.push('Bash timeout + Write signal audited safe');
document.getElementById('prompt').textContent=parts.join('. ')+'.';
}

function copyPrompt(){
const t=document.getElementById('prompt').textContent;
navigator.clipboard.writeText(t).then(()=>{
const b=document.querySelector('.copy-btn');b.textContent='Copied!';setTimeout(()=>b.textContent='Copy',1500);
});
}

render();
</script>
</body>
</html>
