<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrchestKit × Vercel Labs — Skill Wrapping Assessment</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a25;--surface3:#22222f;--border:#2a2a3a;--text:#e4e4ef;--text2:#9999aa;--accent:#06b6d4;--accent2:#8b5cf6;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--orange:#f97316;--pink:#ec4899;--font:system-ui,-apple-system,sans-serif;--mono:'SF Mono',Menlo,Monaco,monospace}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;overflow-x:hidden}
.container{max-width:1400px;margin:0 auto;padding:24px}
h1{font-size:28px;font-weight:700;margin-bottom:4px}
h1 span{color:var(--accent)}
.subtitle{color:var(--text2);font-size:14px;margin-bottom:24px}
.subtitle strong{color:var(--text)}

/* Strategy Toggle */
.strategy-toggle{display:flex;gap:8px;margin-bottom:24px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:6px}
.strat-btn{flex:1;padding:12px 16px;border:none;border-radius:8px;background:transparent;color:var(--text2);font:600 13px var(--font);cursor:pointer;transition:all .2s}
.strat-btn.active{background:var(--accent);color:#000}
.strat-btn:hover:not(.active){background:var(--surface2)}

/* Score Panel */
.score-panel{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.score-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;transition:all .3s}
.score-card.highlight{border-color:var(--accent);box-shadow:0 0 20px rgba(6,182,212,.15)}
.score-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:6px}
.score-value{font-size:32px;font-weight:800;font-family:var(--mono)}
.score-value.good{color:var(--green)}
.score-value.warn{color:var(--yellow)}
.score-value.bad{color:var(--red)}
.score-delta{font-size:11px;color:var(--text2);margin-top:4px}
.score-delta.positive{color:var(--green)}
.score-delta.negative{color:var(--red)}

/* Tabs */
.tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{padding:10px 20px;border:none;background:transparent;color:var(--text2);font:600 13px var(--font);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--text)}
.tab-content{display:none}
.tab-content.active{display:block}

/* Library Cards */
.lib-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.lib-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .3s}
.lib-card:hover{border-color:var(--accent)}
.lib-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);cursor:pointer}
.lib-name{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.lib-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;text-transform:uppercase;letter-spacing:.5px}
.badge-wrap{background:var(--accent);color:#000}
.badge-extend{background:var(--accent2);color:#fff}
.badge-new{background:var(--green);color:#000}
.badge-replace{background:var(--orange);color:#000}
.lib-version{font-family:var(--mono);font-size:12px;color:var(--text2)}
.lib-body{padding:20px;display:none}
.lib-card.open .lib-body{display:block}
.lib-chevron{transition:transform .2s;color:var(--text2)}
.lib-card.open .lib-chevron{transform:rotate(90deg)}

/* Skill inventory */
.skill-section{margin-bottom:16px}
.skill-section-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.skill-count{background:var(--surface3);padding:1px 8px;border-radius:99px;font-family:var(--mono);font-size:11px;color:var(--text)}
.skill-list{display:flex;flex-wrap:wrap;gap:6px}
.skill-tag{font-size:11px;font-family:var(--mono);padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2)}
.skill-tag.ours{border-color:var(--accent);color:var(--accent)}
.skill-tag.theirs{border-color:var(--green);color:var(--green)}
.skill-tag.gap{border-color:var(--yellow);color:var(--yellow);border-style:dashed}
.skill-tag.deprecated{border-color:var(--red);color:var(--red);text-decoration:line-through}

/* Comparison bars */
.compare-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.compare-label{width:140px;font-size:12px;color:var(--text2)}
.compare-bar{flex:1;height:24px;background:var(--surface2);border-radius:6px;overflow:hidden;position:relative}
.compare-fill{height:100%;border-radius:6px;transition:width .5s ease}
.compare-value{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;font-family:var(--mono);color:var(--text)}

/* Architecture diagram */
.arch-diagram{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px}
.arch-svg{width:100%;height:auto}

/* Prompt output */
.prompt-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:24px;position:relative}
.prompt-title{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:12px}
.prompt-text{font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap;font-family:var(--mono)}
.copy-btn{position:absolute;top:16px;right:16px;padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);font:600 12px var(--font);cursor:pointer;transition:all .2s}
.copy-btn:hover{background:var(--accent);color:#000;border-color:var(--accent)}

/* Recommendation badge */
.rec-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;margin-top:12px}
.rec-wrap{background:rgba(6,182,212,.15);color:var(--accent)}
.rec-extend{background:rgba(139,92,246,.15);color:var(--accent2)}
.rec-new{background:rgba(34,197,94,.15);color:var(--green)}

/* Timeline */
.timeline{display:flex;gap:0;margin:16px 0;align-items:stretch}
.timeline-item{flex:1;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);text-align:center;font-size:11px}
.timeline-item:first-child{border-radius:8px 0 0 8px}
.timeline-item:last-child{border-radius:0 8px 8px 0}
.timeline-item .ver{font-family:var(--mono);font-weight:700;color:var(--accent);display:block}
.timeline-item .date{color:var(--text2)}
.timeline-item.current{background:var(--accent);color:#000;border-color:var(--accent)}
.timeline-item.current .ver{color:#000}
.timeline-item.current .date{color:rgba(0,0,0,.6)}
.timeline-item.ours{border-color:var(--yellow);background:rgba(234,179,8,.1)}
.timeline-item.ours .ver{color:var(--yellow)}

@media(max-width:900px){
  .lib-grid{grid-template-columns:1fr}
  .score-panel{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
<div class="container">
  <h1>OrchestKit × <span>Vercel Labs</span> — Skill Strategy</h1>
  <p class="subtitle">Should we <strong>maintain our own skills</strong> or <strong>wrap Vercel's native skills</strong>? Interactive assessment with 38 native skills across 4 libraries.</p>

  <!-- Strategy Toggle -->
  <div class="strategy-toggle">
    <button class="strat-btn active" onclick="setStrategy('wrap')">Wrap Native Skills (Recommended)</button>
    <button class="strat-btn" onclick="setStrategy('maintain')">Maintain Our Own</button>
    <button class="strat-btn" onclick="setStrategy('hybrid')">Hybrid</button>
  </div>

  <!-- Score Panel -->
  <div class="score-panel" id="scorePanel"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="setTab('inventory')">Skill Inventory</button>
    <button class="tab" onclick="setTab('drift')">Version Drift</button>
    <button class="tab" onclick="setTab('architecture')">Wrapping Architecture</button>
    <button class="tab" onclick="setTab('cost')">Cost / Benefit</button>
  </div>

  <!-- Tab: Inventory -->
  <div class="tab-content active" id="tab-inventory">
    <div class="lib-grid" id="libGrid"></div>
  </div>

  <!-- Tab: Drift -->
  <div class="tab-content" id="tab-drift">
    <div id="driftContent"></div>
  </div>

  <!-- Tab: Architecture -->
  <div class="tab-content" id="tab-architecture">
    <div class="arch-diagram" id="archDiagram"></div>
  </div>

  <!-- Tab: Cost -->
  <div class="tab-content" id="tab-cost">
    <div id="costContent"></div>
  </div>

  <!-- Prompt Output -->
  <div class="prompt-box">
    <div class="prompt-title">Generated Action Plan</div>
    <button class="copy-btn" onclick="copyPrompt()">Copy</button>
    <div class="prompt-text" id="promptOutput"></div>
  </div>
</div>

<script>
const LIBS = [
  {
    id: 'agent-browser',
    name: 'agent-browser',
    color: '#06b6d4',
    ourVersion: '~0.16',
    latestVersion: '0.23.4',
    latestDate: 'Mar 31',
    ourSkills: ['browser-tools'],
    nativeSkills: ['agent-browser', 'dogfood', 'electron', 'slack', 'vercel-sandbox'],
    nativeSkillCount: 5,
    gaps: ['batch command', 'HAR capture', 'dashboard', 'Lightpanda engine', 'clipboard API', 'iframe traversal'],
    deprecated: ['-C flag', '--full global', 'AGENT_BROWSER_NATIVE'],
    recommendation: 'wrap',
    recLabel: 'Wrap + Extend',
    effort: {maintain: 8, wrap: 3},
    drift: 7,
    versions: [
      {ver:'0.16',date:'Jan',cls:'ours'},
      {ver:'0.17',date:'Feb'},
      {ver:'0.20',date:'Mar 13'},
      {ver:'0.21',date:'Mar 17'},
      {ver:'0.23.4',date:'Mar 31',cls:'current'}
    ]
  },
  {
    id: 'json-render',
    name: 'json-render',
    color: '#8b5cf6',
    ourVersion: '0.15.0*',
    latestVersion: '0.13.0',
    latestDate: 'Mar 12',
    ourSkills: ['json-render-catalog', 'mcp-visual-output', 'multi-surface-render'],
    nativeSkills: ['core','react','vue','svelte','solid','next','shadcn','shadcn-svelte','mcp','react-pdf','react-email','react-three-fiber','image','remotion','ink','yaml','jotai','redux','zustand','xstate','react-native','cli','docs','forms','streaming','testing','validation'],
    nativeSkillCount: 27,
    gaps: ['Vue renderer', 'Svelte renderer', 'Solid renderer', 'R3F (3D)', 'Image/OG', 'Email', 'StateStore adapters', '$computed', 'strict JSON Schema', 'generation mode rename'],
    deprecated: ['generate/chat modes (→ standalone/inline)'],
    recommendation: 'wrap',
    recLabel: 'Wrap (27 skills!)',
    effort: {maintain: 10, wrap: 2},
    drift: 9,
    versions: [
      {ver:'0.9',date:'Feb 24'},
      {ver:'0.10',date:'Feb 25'},
      {ver:'0.11',date:'Feb 27'},
      {ver:'0.12',date:'Mar 7'},
      {ver:'0.13',date:'Mar 12',cls:'current'}
    ]
  },
  {
    id: 'emulate',
    name: 'emulate',
    color: '#22c55e',
    ourVersion: '0.2.0',
    latestVersion: '0.3.0',
    latestDate: 'Mar 26',
    ourSkills: ['emulate-seed'],
    nativeSkills: ['emulate', 'github', 'google', 'vercel'],
    nativeSkillCount: 4,
    gaps: ['@emulators/* scope', 'createEmulate API name', 'GitHub Apps', 'Calendar/Drive', 'AWS Inspector UI', 'reset() pattern'],
    deprecated: ['createEmulator (→ createEmulate)', 'MongoDB (not merged)'],
    recommendation: 'wrap',
    recLabel: 'Wrap + Fix',
    effort: {maintain: 5, wrap: 2},
    drift: 4,
    versions: [
      {ver:'0.1.0',date:'Mar 20'},
      {ver:'0.2.0',date:'Mar 22',cls:'ours'},
      {ver:'0.3.0',date:'Mar 26',cls:'current'}
    ]
  },
  {
    id: 'portless',
    name: 'portless',
    color: '#f97316',
    ourVersion: 'none',
    latestVersion: '0.8.0',
    latestDate: 'Mar 31',
    ourSkills: [],
    nativeSkills: ['portless', 'oauth'],
    nativeSkillCount: 2,
    gaps: ['No skill exists', 'PORTLESS_URL injection', 'portless alias for emulate', 'worktree subdomain support'],
    deprecated: [],
    recommendation: 'new',
    recLabel: 'New — Wrap Native',
    effort: {maintain: 6, wrap: 1},
    drift: 10,
    versions: [
      {ver:'0.4',date:'Feb 22'},
      {ver:'0.5',date:'Mar 4'},
      {ver:'0.7',date:'Mar 16'},
      {ver:'0.8',date:'Mar 31',cls:'current'}
    ]
  }
];

let strategy = 'wrap';
let activeTab = 'inventory';

function setStrategy(s) {
  strategy = s;
  document.querySelectorAll('.strat-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.strat-btn[onclick="setStrategy('${s}')"]`).classList.add('active');
  renderAll();
}

function setTab(t) {
  activeTab = t;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + t).classList.add('active');
}

function renderScores() {
  const metrics = strategy === 'wrap' ? {
    skills: {label:'Total Skills',value:'38',cls:'good',delta:'+33 from Vercel native'},
    maintenance: {label:'Maintenance Cost',value:'Low',cls:'good',delta:'Upstream maintains content'},
    drift: {label:'Version Drift',value:'0d',cls:'good',delta:'Auto-sync on build'},
    coverage: {label:'Feature Coverage',value:'98%',cls:'good',delta:'+60% vs current'},
    effort: {label:'Migration Effort',value:'~3d',cls:'warn',delta:'One-time refactor'}
  } : strategy === 'maintain' ? {
    skills: {label:'Total Skills',value:'5',cls:'warn',delta:'Only our custom skills'},
    maintenance: {label:'Maintenance Cost',value:'High',cls:'bad',delta:'Manual sync per release'},
    drift: {label:'Version Drift',value:'47d',cls:'bad',delta:'Average behind upstream'},
    coverage: {label:'Feature Coverage',value:'38%',cls:'bad',delta:'Missing 24+ features'},
    effort: {label:'Migration Effort',value:'0d',cls:'good',delta:'No change needed'}
  } : {
    skills: {label:'Total Skills',value:'22',cls:'warn',delta:'Wrap some, maintain rest'},
    maintenance: {label:'Maintenance Cost',value:'Med',cls:'warn',delta:'Partial upstream sync'},
    drift: {label:'Version Drift',value:'~14d',cls:'warn',delta:'Some manual, some auto'},
    coverage: {label:'Feature Coverage',value:'72%',cls:'warn',delta:'+34% vs current'},
    effort: {label:'Migration Effort',value:'~2d',cls:'warn',delta:'Selective refactor'}
  };

  document.getElementById('scorePanel').innerHTML = Object.values(metrics).map(m => `
    <div class="score-card${m.cls === 'good' && strategy === 'wrap' ? ' highlight' : ''}">
      <div class="score-label">${m.label}</div>
      <div class="score-value ${m.cls}">${m.value}</div>
      <div class="score-delta ${m.cls === 'good' ? 'positive' : m.cls === 'bad' ? 'negative' : ''}">${m.delta}</div>
    </div>
  `).join('');
}

function renderInventory() {
  document.getElementById('libGrid').innerHTML = LIBS.map(lib => {
    const badge = lib.recommendation === 'wrap' ? 'badge-wrap' :
                  lib.recommendation === 'new' ? 'badge-new' : 'badge-extend';
    return `
    <div class="lib-card open" id="card-${lib.id}">
      <div class="lib-header" onclick="toggleCard('${lib.id}')">
        <div>
          <div class="lib-name">
            <span style="color:${lib.color}">●</span>
            ${lib.name}
            <span class="lib-badge ${badge}">${lib.recLabel}</span>
          </div>
          <div class="lib-version">Ours: ${lib.ourVersion} → Latest: ${lib.latestVersion} (${lib.latestDate})</div>
        </div>
        <span class="lib-chevron">▶</span>
      </div>
      <div class="lib-body">
        <div class="skill-section">
          <div class="skill-section-title">Our Current Skills <span class="skill-count">${lib.ourSkills.length}</span></div>
          <div class="skill-list">
            ${lib.ourSkills.length ? lib.ourSkills.map(s => `<span class="skill-tag ours">${s}</span>`).join('') : '<span style="color:var(--text2);font-size:12px">None — no skill exists</span>'}
          </div>
        </div>
        <div class="skill-section">
          <div class="skill-section-title">Vercel Native Skills <span class="skill-count">${lib.nativeSkillCount}</span></div>
          <div class="skill-list">
            ${lib.nativeSkills.map(s => `<span class="skill-tag theirs">${s}</span>`).join('')}
          </div>
        </div>
        <div class="skill-section">
          <div class="skill-section-title">Gaps (Features We're Missing) <span class="skill-count">${lib.gaps.length}</span></div>
          <div class="skill-list">
            ${lib.gaps.map(s => `<span class="skill-tag gap">${s}</span>`).join('')}
          </div>
        </div>
        ${lib.deprecated.length ? `
        <div class="skill-section">
          <div class="skill-section-title">Deprecated / Incorrect <span class="skill-count">${lib.deprecated.length}</span></div>
          <div class="skill-list">
            ${lib.deprecated.map(s => `<span class="skill-tag deprecated">${s}</span>`).join('')}
          </div>
        </div>` : ''}
        <div class="compare-row">
          <span class="compare-label">Effort (maintain)</span>
          <div class="compare-bar">
            <div class="compare-fill" style="width:${lib.effort.maintain*10}%;background:var(--red)"></div>
            <span class="compare-value">${lib.effort.maintain}/10</span>
          </div>
        </div>
        <div class="compare-row">
          <span class="compare-label">Effort (wrap)</span>
          <div class="compare-bar">
            <div class="compare-fill" style="width:${lib.effort.wrap*10}%;background:var(--green)"></div>
            <span class="compare-value">${lib.effort.wrap}/10</span>
          </div>
        </div>
        <div class="rec-badge ${lib.recommendation === 'wrap' ? 'rec-wrap' : lib.recommendation === 'new' ? 'rec-new' : 'rec-extend'}">
          ✓ Recommended: ${strategy === 'wrap' ? 'Wrap their native SKILL.md' : strategy === 'maintain' ? 'Continue maintaining ours' : 'Hybrid — wrap core, extend ours'}
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderDrift() {
  document.getElementById('driftContent').innerHTML = LIBS.map(lib => `
    <div style="margin-bottom:24px">
      <h3 style="font-size:15px;margin-bottom:8px;color:${lib.color}">${lib.name} <span style="color:var(--text2);font-weight:400">— drift score: ${lib.drift}/10</span></h3>
      <div class="timeline">
        ${lib.versions.map(v => `<div class="timeline-item ${v.cls||''}""><span class="ver">${v.ver}</span><span class="date">${v.date}</span></div>`).join('')}
      </div>
      <div style="font-size:12px;color:var(--text2);margin-top:8px">
        ${lib.gaps.slice(0,4).map(g => `<span style="color:var(--yellow)">⚠</span> ${g}`).join(' · ')}
      </div>
    </div>
  `).join('');
}

function renderArchitecture() {
  const mode = strategy;
  document.getElementById('archDiagram').innerHTML = `
    <h3 style="font-size:15px;margin-bottom:16px">Wrapping Architecture — <span style="color:var(--accent)">${mode === 'wrap' ? 'Full Wrap' : mode === 'maintain' ? 'Status Quo' : 'Hybrid'}</span></h3>
    <svg viewBox="0 0 800 420" class="arch-svg" style="font-family:var(--font)">
      <!-- Background layers -->
      <rect x="20" y="20" width="760" height="80" rx="10" fill="#1a1a25" stroke="#2a2a3a"/>
      <text x="40" y="55" fill="#9999aa" font-size="11" font-weight="600">UPSTREAM (Vercel Labs repos)</text>
      <text x="40" y="75" fill="#e4e4ef" font-size="12">agent-browser/skills/ (5)</text>
      <text x="230" y="75" fill="#e4e4ef" font-size="12">json-render/skills/ (27)</text>
      <text x="430" y="75" fill="#e4e4ef" font-size="12">emulate/skills/ (4)</text>
      <text x="600" y="75" fill="#e4e4ef" font-size="12">portless/skills/ (2)</text>

      <!-- Arrows -->
      ${mode === 'wrap' ? `
        <line x1="400" y1="100" x2="400" y2="140" stroke="#06b6d4" stroke-width="2" marker-end="url(#arrow)"/>
        <text x="410" y="125" fill="#06b6d4" font-size="10" font-weight="600">npm install / git submodule</text>
      ` : mode === 'maintain' ? `
        <line x1="400" y1="100" x2="400" y2="140" stroke="#ef4444" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrow)"/>
        <text x="410" y="125" fill="#ef4444" font-size="10" font-weight="600">manual copy-paste (drifts!)</text>
      ` : `
        <line x1="250" y1="100" x2="250" y2="140" stroke="#06b6d4" stroke-width="2" marker-end="url(#arrow)"/>
        <line x1="550" y1="100" x2="550" y2="140" stroke="#eab308" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrow)"/>
        <text x="120" y="125" fill="#06b6d4" font-size="10">wrap</text>
        <text x="560" y="125" fill="#eab308" font-size="10">manual</text>
      `}

      <!-- Sync layer -->
      <rect x="20" y="140" width="760" height="60" rx="10" fill="${mode==='wrap'?'rgba(6,182,212,.1)':'rgba(234,179,8,.1)'}" stroke="${mode==='wrap'?'#06b6d4':'#eab308'}" stroke-dasharray="${mode==='maintain'?'4':'0'}"/>
      <text x="40" y="165" fill="${mode==='wrap'?'#06b6d4':'#eab308'}" font-size="11" font-weight="600">${mode === 'wrap' ? 'SYNC LAYER — scripts/sync-vercel-skills.sh (runs on npm run build)' : mode === 'maintain' ? 'NO SYNC LAYER — manual updates only' : 'PARTIAL SYNC — wrap core libs, maintain extensions'}</text>
      <text x="40" y="185" fill="#9999aa" font-size="11">${mode === 'wrap' ? 'Fetches latest SKILL.md files, validates frontmatter, copies to src/skills/vercel-*/' : mode === 'maintain' ? 'Developer must check upstream releases, manually update skill content' : 'Auto-sync for agent-browser + json-render; manual for emulate + portless'}</text>

      <!-- OrchestKit layer -->
      <rect x="20" y="220" width="760" height="80" rx="10" fill="#12121a" stroke="#2a2a3a"/>
      <text x="40" y="250" fill="#9999aa" font-size="11" font-weight="600">ORCHESTKIT src/skills/</text>
      ${mode === 'wrap' ? `
        <text x="40" y="275" fill="#06b6d4" font-size="12">vercel-agent-browser/ (wrapped)</text>
        <text x="260" y="275" fill="#8b5cf6" font-size="12">vercel-json-render/ (wrapped)</text>
        <text x="470" y="275" fill="#22c55e" font-size="12">vercel-emulate/ (wrapped)</text>
        <text x="650" y="275" fill="#f97316" font-size="12">vercel-portless/ (wrapped)</text>
      ` : mode === 'maintain' ? `
        <text x="40" y="275" fill="#eab308" font-size="12">browser-tools/ (ours, stale)</text>
        <text x="250" y="275" fill="#eab308" font-size="12">json-render-catalog/ (ours, stale)</text>
        <text x="490" y="275" fill="#eab308" font-size="12">emulate-seed/ (ours, stale)</text>
        <text x="670" y="275" fill="#ef4444" font-size="12">∅ no portless</text>
      ` : `
        <text x="40" y="275" fill="#06b6d4" font-size="12">vercel-agent-browser/ (wrap)</text>
        <text x="260" y="275" fill="#06b6d4" font-size="12">vercel-json-render/ (wrap)</text>
        <text x="470" y="275" fill="#eab308" font-size="12">emulate-seed/ (ours)</text>
        <text x="650" y="275" fill="#eab308" font-size="12">portless/ (ours)</text>
      `}

      <!-- Extension layer -->
      <rect x="20" y="320" width="760" height="80" rx="10" fill="#1a1a25" stroke="#8b5cf6" stroke-dasharray="4"/>
      <text x="40" y="350" fill="#8b5cf6" font-size="11" font-weight="600">ORCHESTKIT EXTENSIONS (our added value)</text>
      <text x="40" y="375" fill="#e4e4ef" font-size="12">ork:expect (E2E + batch)</text>
      <text x="210" y="375" fill="#e4e4ef" font-size="12">ork:design-to-code (pipeline)</text>
      <text x="420" y="375" fill="#e4e4ef" font-size="12">ork:cover (test gen)</text>
      <text x="580" y="375" fill="#e4e4ef" font-size="12">ork:dev-env (unified)</text>

      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4"/>
        </marker>
      </defs>
    </svg>
  `;
}

function renderCost() {
  const rows = [
    {label:'Skills maintained by us', maintain:5, wrap:0, hybrid:2},
    {label:'Skills from upstream', maintain:0, wrap:38, hybrid:32},
    {label:'Hours/month maintenance', maintain:16, wrap:2, hybrid:8},
    {label:'Avg days behind upstream', maintain:47, wrap:0, hybrid:14},
    {label:'Feature coverage %', maintain:38, wrap:98, hybrid:72},
    {label:'One-time migration hours', maintain:0, wrap:24, hybrid:12},
    {label:'Breaking change risk', maintain:'High', wrap:'None', hybrid:'Med'},
  ];
  const strat = strategy;
  document.getElementById('costContent').innerHTML = `
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead>
        <tr style="border-bottom:1px solid var(--border)">
          <th style="text-align:left;padding:12px;color:var(--text2)">Metric</th>
          <th style="padding:12px;color:${strat==='maintain'?'var(--accent)':'var(--text2)'}">Maintain Ours</th>
          <th style="padding:12px;color:${strat==='wrap'?'var(--accent)':'var(--text2)'}">Wrap Native</th>
          <th style="padding:12px;color:${strat==='hybrid'?'var(--accent)':'var(--text2)'}">Hybrid</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(r => `
          <tr style="border-bottom:1px solid var(--surface2)">
            <td style="padding:10px 12px;color:var(--text)">${r.label}</td>
            <td style="padding:10px 12px;text-align:center;font-family:var(--mono);${strat==='maintain'?'color:var(--accent);font-weight:700':''}">${r.maintain}</td>
            <td style="padding:10px 12px;text-align:center;font-family:var(--mono);${strat==='wrap'?'color:var(--accent);font-weight:700':''}">${r.wrap}</td>
            <td style="padding:10px 12px;text-align:center;font-family:var(--mono);${strat==='hybrid'?'color:var(--accent);font-weight:700':''}">${r.hybrid}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
    <div class="rec-badge rec-wrap" style="margin-top:20px">
      Verdict: Wrap Native saves ~14 hours/month and eliminates version drift for 38 skills.
      One-time cost: ~3 days to build sync script + refactor existing skills.
    </div>
  `;
}

function updatePrompt() {
  const lines = [];
  if (strategy === 'wrap') {
    lines.push(`Implement Vercel Labs skill wrapping for OrchestKit. Strategy: WRAP NATIVE.`);
    lines.push(``);
    lines.push(`## Phase 1: Build sync infrastructure`);
    lines.push(`Create scripts/sync-vercel-skills.sh that:`);
    lines.push(`- Fetches SKILL.md files from 4 Vercel repos (agent-browser, json-render, emulate, portless)`);
    lines.push(`- Copies to src/skills/vercel-{lib}/ with OrchestKit YAML frontmatter wrapper`);
    lines.push(`- Runs on npm run build (Phase 7 of build-plugins.sh)`);
    lines.push(`- Validates content hasn't been tampered with (SHA comparison)`);
    lines.push(``);
    lines.push(`## Phase 2: Wrap 38 native skills`);
    LIBS.forEach(lib => {
      lines.push(`- ${lib.name}: ${lib.nativeSkillCount} skills (${lib.nativeSkills.join(', ')})`);
    });
    lines.push(``);
    lines.push(`## Phase 3: Deprecate our maintained skills`);
    lines.push(`- browser-tools → vercel-agent-browser (wrap)`);
    lines.push(`- json-render-catalog → vercel-json-render/core (wrap)`);
    lines.push(`- mcp-visual-output → vercel-json-render/mcp (wrap)`);
    lines.push(`- multi-surface-render → vercel-json-render/* renderers (wrap)`);
    lines.push(`- emulate-seed → vercel-emulate (wrap + fix createEmulate name)`);
    lines.push(``);
    lines.push(`## Phase 4: Add OrchestKit extensions`);
    lines.push(`- ork:expect integration with agent-browser batch command`);
    lines.push(`- ork:dev-env combining portless + emulate + dev server`);
    lines.push(`- SessionStart hook: inject PORTLESS_URL if available`);
    lines.push(`- portless alias registration for emulate ports`);
    lines.push(``);
    lines.push(`## Fixes (P0, do immediately):`);
    lines.push(`- Remove -C flag from agent-browser docs (deprecated v0.22)`);
    lines.push(`- Fix --full flag position (command-level since v0.21)`);
    lines.push(`- Fix createEmulator → createEmulate in emulate skill`);
    lines.push(`- Remove MongoDB Atlas claim (not merged yet)`);
    lines.push(`- Add jsonSchema({ strict: true }) to json-render catalog`);
  } else if (strategy === 'maintain') {
    lines.push(`Continue maintaining OrchestKit's own skills. Accept version drift.`);
    lines.push(``);
    lines.push(`Immediate fixes needed:`);
    LIBS.forEach(lib => {
      lib.deprecated.forEach(d => lines.push(`- Fix: ${d} in ${lib.name}`));
      lib.gaps.slice(0,3).forEach(g => lines.push(`- Add: ${g} to ${lib.name} skill`));
    });
  } else {
    lines.push(`Hybrid strategy: Wrap agent-browser + json-render (32 skills), maintain emulate + portless.`);
    lines.push(``);
    lines.push(`Wrap: agent-browser (5 native skills), json-render (27 native skills)`);
    lines.push(`Maintain: emulate-seed (ours), create portless skill (ours)`);
  }
  document.getElementById('promptOutput').textContent = lines.join('\n');
}

function toggleCard(id) {
  document.getElementById('card-' + id).classList.toggle('open');
}

function copyPrompt() {
  const text = document.getElementById('promptOutput').textContent;
  navigator.clipboard.writeText(text);
  const btn = document.querySelector('.copy-btn');
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = 'Copy', 1500);
}

function renderAll() {
  renderScores();
  renderInventory();
  renderDrift();
  renderArchitecture();
  renderCost();
  updatePrompt();
}

renderAll();
</script>
</body>
</html>
