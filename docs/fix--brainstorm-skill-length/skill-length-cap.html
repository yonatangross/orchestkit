<body>
<h1>Skill length cap explorer</h1>
<p class="lede">Drag the slider to see where a SKILL.md lands against <code>tests/skills/test-skill-length.sh</code>.</p>

<label for="lines">Lines: <strong id="lineCount">500</strong></label>
<input id="lines" type="range" min="50" max="600" value="500" />
<div class="meter"><div id="bar"></div></div>
<div class="row"><span>0</span><span>400 (preferred)</span><span>500 (cap)</span></div>

<div id="verdict" class="verdict ok">PASS — within 500-line cap.</div>

<p style="margin-top:2rem;color:#888;font-size:13px">
PR #1576 trims <code>src/skills/brainstorm/SKILL.md</code> from 501 → 500 lines to unblock the
<strong>Agents &amp; Skills</strong> CI job for the open PR queue.
</p>

<script>
  const slider = document.getElementById('lines');
  const lineCount = document.getElementById('lineCount');
  const bar = document.getElementById('bar');
  const verdict = document.getElementById('verdict');
  function render(v) {
    lineCount.textContent = v;
    bar.style.width = Math.min(100, (v / 600) * 100) + '%';
    verdict.classList.remove('ok','warn','fail');
    if (v > 500) { verdict.className = 'verdict fail'; verdict.textContent = 'FAIL — over 500-line cap. CI blocks merge.'; }
    else if (v > 400) { verdict.className = 'verdict warn'; verdict.textContent = 'WARN — over preferred 400, still passes.'; }
    else { verdict.className = 'verdict ok'; verdict.textContent = 'PASS — within preferred 400-line target.'; }
  }
  slider.addEventListener('input', e => render(+e.target.value));
  render(+slider.value);
</script>
