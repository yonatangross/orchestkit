<body>
<div class="wrap">
  <h1>#2041 — dedup key: <span class="em">slug-drift vs changelog-ref hash</span></h1>
  <p class="sub">Re-triaging the same CC version re-runs the LLM, which emits the same feature with a slightly different <code>feature_slug</code>. Pick the slug the LLM emits this run and file — see how the old key dupes and the new key holds.</p>

  <div class="toggle">
    <button id="b-old" class="on">OLD key: slug+version</button>
    <button id="b-new">NEW key: sha256(changelog-line)</button>
  </div>

  <div class="controls">
    <label>An issue already exists for: <code>marketplace_remove_scope_flag</code> · ref <code>"…accepts --scope…"</code></label>

  <div class="out" id="out"></div>

</div>

<script>
  const $=(id)=>document.getElementById(id);
  let mode="old";
  const EXISTING_SLUG="marketplace_remove_scope_flag";
  const REF="`claude plugin marketplace remove` now accepts --scope…";  // immutable across runs
  // tiny stable hash for display (not real sha256 — just deterministic per string)
  function h(s){let x=5381;for(const c of s)x=((x<<5)+x+c.charCodeAt(0))>>>0;return x.toString(16).padStart(8,"0");}
  const ob=$("b-old"), nb=$("b-new");
  ob.onclick=()=>{mode="old";ob.classList.add("on");nb.classList.remove("on");$("out").innerHTML="";$("v").innerHTML="";};
  nb.onclick=()=>{mode="new";nb.classList.add("on");ob.classList.remove("on");$("out").innerHTML="";$("v").innerHTML="";};

  $("file").onclick=()=>{
    const slug=$("slug").value, ver="2.1.152";
    let key, existKey, dup;
    if(mode==="old"){ key=`${slug}+${ver}`; existKey=`${EXISTING_SLUG}+${ver}`; dup=(key===existKey); }
    else { key=`sha256(ref)=${h(REF)}`; existKey=`sha256(ref)=${h(REF)}`; dup=true; } // ref identical → always dedups
    const rows=[
      `<div class="row key">search key:   ${key}</div>`,
      `<div class="row key">existing key: ${existKey}</div>`,
      dup
        ? `<div class="row dedup">→ MATCH → Skip (exists) → 0 issues filed ✅</div>`
        : `<div class="row dupe">→ no match → DUPLICATE issue filed ❌</div>`
    ];
    $("out").innerHTML=rows.join("");
    $("v").innerHTML = mode==="old"
      ? (dup ? "🟡 Only dedups when the LLM happens to emit the IDENTICAL slug. Any drift → duplicate. That's the bug (#2030/#2038, #2032/#2039)."
             : "🔴 The bug: a drifted slug → different key → duplicate issue. This is what actually happened on re-triage.")
      : "🟢 The changelog line is immutable, so its hash is identical every run regardless of slug drift → always dedups. Pre-existing issues get this marker via the backfill step (storm-proof).";
  };
</script>
