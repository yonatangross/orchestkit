<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>README Hero Banner — Preview Playground</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--txt:#e6edf3;--dim:#8b949e;--accent:#58a6ff;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;--sys:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:var(--sys);font-size:14px;display:grid;grid-template-columns:300px 1fr;min-height:100vh}
  aside{border-right:1px solid var(--border);padding:20px;background:var(--panel)}
  aside h1{font-size:16px;margin-bottom:4px}
  aside p.sub{color:var(--dim);font-size:12px;margin-bottom:20px}
  .grp{margin-bottom:18px}
  .grp label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--dim);margin-bottom:7px}
  input[type=range]{width:100%}
  input[type=text]{width:100%;background:#0d1117;border:1px solid var(--border);color:var(--txt);border-radius:6px;padding:7px}
  .seg{display:flex;border:1px solid var(--border);border-radius:7px;overflow:hidden}
  .seg button{flex:1;background:#0d1117;border:0;color:var(--dim);padding:8px;cursor:pointer;font-size:12px;font-family:var(--sys)}
  .seg button.on{background:var(--accent);color:#fff;font-weight:600}
  .val{font-family:var(--mono);color:var(--accent);font-size:12px}
  .presets{display:flex;flex-wrap:wrap;gap:6px}
  .presets button{background:#0d1117;border:1px solid var(--border);color:var(--dim);border-radius:20px;padding:5px 11px;font-size:11px;cursor:pointer}
  .presets button:hover{border-color:var(--accent);color:var(--txt)}
  main{padding:26px;overflow:auto;display:flex;flex-direction:column;gap:18px}
  .readme{border:1px solid var(--border);border-radius:10px;padding:30px;text-align:center;transition:.2s}
  .readme.light{background:#ffffff;color:#1f2328}
  .readme.dark{background:#0d1117;color:#e6edf3}
  .readme img{max-width:100%;height:auto;border-radius:6px}
  .readme .stats{margin-top:16px;font-weight:600;font-size:14px}
  .readme .stats .dimx{opacity:.6;font-weight:400}
  .caption{color:var(--dim);font-size:12px;text-align:center}
  .promptwrap{margin-top:auto}
  .ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .ph h3{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--dim)}
  .ph button{background:var(--accent);color:#fff;border:0;border-radius:6px;padding:7px 15px;cursor:pointer;font-weight:600;font-size:12px}
  pre{background:#010409;border:1px solid var(--border);border-radius:9px;padding:14px;font-family:var(--mono);font-size:12px;color:#c9d1d9;white-space:pre-wrap;line-height:1.5}
</style>
</head>
<body>
<aside>
  <h1>🖼️ README Hero Banner</h1>
  <p class="sub">Preview the OrchestKit hero banner (PR #2467) in GitHub README context and copy the embed snippet.</p>

  <div class="grp">
    <label>Theme background <span class="val" id="themeVal">dark</span></label>
    <div class="seg" id="themeSeg">
      <button data-t="light">GitHub light</button>
      <button data-t="dark" class="on">GitHub dark</button>
    </div>
  </div>

  <div class="grp">
    <label>Banner width <span class="val" id="widthVal">100%</span></label>
    <input type="range" id="width" min="40" max="100" value="100" step="5">
  </div>

  <div class="grp">
    <label>Alt text</label>
    <input type="text" id="alt" value="OrchestKit - Stop explaining your stack. Start shipping.">
  </div>

  <div class="grp">
    <label>Stats line under banner</label>
    <div class="seg" id="statsSeg">
      <button data-s="1" class="on">Show</button>
      <button data-s="0">Hide</button>
    </div>
  </div>

  <div class="grp">
    <label>Presets</label>
    <div class="presets" id="presets">
      <button data-w="100" data-t="dark">Full / dark</button>
      <button data-w="80" data-t="light">80% / light</button>
      <button data-w="60" data-t="dark">Compact</button>
    </div>
  </div>
</aside>

<main>
  <div class="readme dark" id="readme">
    <img src="../banner.png" id="banner" alt="banner" style="width:100%">
    <div class="stats" id="stats">
      <span>111</span> skills · <span>37</span> agents · <span>211</span> hooks
    </div>
  </div>
  <div class="caption">Live preview · banner is <span class="val">docs/banner.png</span> (1500×500). The README centers it inside a <code>&lt;div align="center"&gt;</code>.</div>

  <div class="promptwrap">
    <div class="ph">
      <h3>📋 README embed snippet</h3>
      <button id="copy">Copy</button>
    </div>
    <pre id="out"></pre>
  </div>
</main>

<script>
const DEF={theme:'dark',width:100,alt:'OrchestKit - Stop explaining your stack. Start shipping.',stats:1};
const state={...DEF};
const $=id=>document.getElementById(id);

function seg(segId,key,attr,cast){
  $(segId).querySelectorAll('button').forEach(b=>b.onclick=()=>{
    state[key]=cast?cast(b.dataset[attr]):b.dataset[attr];
    $(segId).querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));
    render();
  });
}
seg('themeSeg','theme','t');
seg('statsSeg','stats','s',v=>+v);
$('width').oninput=e=>{state.width=+e.target.value;render();};
$('alt').oninput=e=>{state.alt=e.target.value;render();};
$('presets').querySelectorAll('button').forEach(b=>b.onclick=()=>{
  state.width=+b.dataset.w; state.theme=b.dataset.t;
  $('width').value=state.width;
  $('themeSeg').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x.dataset.t===state.theme));
  render();
});

function render(){
  $('themeVal').textContent=state.theme;
  $('widthVal').textContent=state.width+'%';
  $('readme').className='readme '+state.theme;
  $('banner').style.width=state.width+'%';
  $('banner').alt=state.alt;
  $('stats').style.display=state.stats?'block':'none';
  // snippet
  const lines=['<div align="center">','','  <img src="docs/banner.png" alt="'+state.alt+'" width="'+state.width+'%" />'];
  if(state.stats) lines.push('','  **111 skills · 37 agents · 211 hooks**');
  lines.push('','</div>');
  $('out').textContent=lines.join('\n');
}
$('copy').onclick=()=>{navigator.clipboard.writeText($('out').textContent).then(()=>{const b=$('copy');b.textContent='Copied!';setTimeout(()=>b.textContent='Copy',1200);});};
render();
</script>
</body>
</html>
