      <h3>${esc(cur.title)}</h3>
      ${cur.impact.lines.map(l => `<div class="row"><span class="tick">✓</span><span>${esc(l)}</span></div>`).join("")}
      <div class="added">▲ ${esc(cur.tagLabel)} in ${esc(RELEASE.product)} ${esc(RELEASE.version)}</div></div>`;

  stage.innerHTML = `
    <div class="phone"><div class="screen">
      <div class="app-head"><div class="av">✳️</div>
        <div><div class="nm">${esc(RELEASE.product)} · What's New</div><div class="st">${RELEASE.items.length} changes · ${esc(RELEASE.captured)}</div></div>
        <div class="vpill">${esc(RELEASE.version)}</div></div>
      <ul class="feed" id="feed" role="list">${shown}</ul>
    </div></div>
    <div class="arrow"><div class="ar">➜</div><div class="cap">each change → what it does for you</div></div>
    ${impact}`;

  const feed = document.getElementById("feed");
  if (feed) { const c = feed.querySelector(".item.current"); if (c) c.scrollIntoView({ block: "nearest" }); }

  document.getElementById("stepHint").innerHTML = `Change <b>${state.step + 1}</b> of <b>${maxStep() + 1}</b>`;
  document.getElementById("prev").disabled = state.step <= 0;
  document.getElementById("next").disabled = state.step >= maxStep();
  // aria-live: announce the step for screen readers (the v2 a11y win)
  live.textContent = `Change ${state.step + 1} of ${maxStep() + 1}: ${cur.title} — ${cur.tagLabel}`;
  updatePrompt();
}

function updatePrompt() {
  document.getElementById("promptOut").innerHTML =
    `Build a <b>release-notes player</b> for <b>${esc(RELEASE.product)} ${esc(RELEASE.version)}</b>: a `
    + `categorized user-story-player (cool-glass) where Play steps through each change in a device feed, `
    + `lanes color each change by type, and a flow arrow reveals the impact card for the current change.`;
}

function stop() { state.playing = false; clearTimeout(timer); const p = document.getElementById("play"); p.innerHTML = "▶ Play"; p.setAttribute("aria-pressed", "false"); }
function play() {
  if (state.playing) return stop();
  state.playing = true; const p = document.getElementById("play"); p.innerHTML = "⏸ Pause"; p.setAttribute("aria-pressed", "true"); state.step = -1;
  const tick = () => {
    if (!state.playing) return;
    if (state.step >= maxStep()) return stop();
    state.step++; render();
    timer = setTimeout(tick, 1600);
  };
  tick();
}

document.getElementById("play").addEventListener("click", play);
document.getElementById("prev").addEventListener("click", () => { stop(); state.step = Math.max(0, state.step - 1); render(); });
document.getElementById("next").addEventListener("click", () => { stop(); state.step = Math.min(maxStep(), state.step + 1); render(); });
document.getElementById("dirToggle").addEventListener("click", e => {
  state.rtl = !state.rtl; document.documentElement.dir = state.rtl ? "rtl" : "ltr"; e.currentTarget.setAttribute("aria-pressed", state.rtl);
});
document.getElementById("copyBtn").addEventListener("click", () => {
  const txt = document.getElementById("promptOut").textContent;
  const done = () => { const b = document.getElementById("copyBtn"); b.textContent = "✓ Copied"; b.classList.add("done"); setTimeout(() => { b.textContent = "📋 Copy prompt"; b.classList.remove("done"); }, 1500); };
  if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(txt).then(done).catch(() => fb(txt, done)); else fb(txt, done);
});
function fb(txt, done){ const ta=document.createElement("textarea"); ta.value=txt; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy");done();}catch(e){} ta.remove(); }

render();
</script>
</body>
