<body>

<header>
  <h1>Heredoc guard</h1>
  <span class="sub">detectSuspiciousShellFeatures() &mdash; before vs after</span>
</header>

<p class="banner">
  <b>The bug.</b> Quoted <b>strings</b> were blanked before scanning; quoted <b>heredoc bodies</b> were not.
  Bash treats both as fully inert, so writing a script whose text merely contained a shell feature got blocked.
</p>

<div class="wrap">
  <aside class="side">
    <div class="grp">
      <label>Guard version</label>
      <div class="seg" id="ver">
        <button data-v="before">Before</button>
        <button data-v="after" class="on">After</button>
      </div>
    </div>
    <div class="grp">
      <label>Show</label>
      <div class="seg" id="filt">
        <button data-f="all" class="on">All</button>
        <button data-f="fixed">Fixed</button>
        <button data-f="kept">Still blocked</button>
      </div>
    </div>
    <div class="note" id="note"></div>
  </aside>

  <main class="stage">
    <div class="sect">
      <h2>Summary</h2>
      <div class="sum" id="sum"></div>
    </div>
    <div class="sect">
      <h2>Cases</h2>
      <div class="row hdr"><div>command</div><div style="text-align:center">before</div><div style="text-align:center">after</div></div>
      <div id="rows"></div>
    </div>
  </main>
</div>

<script>
// Byte sequence built at runtime so this file does not itself trip the guard.
const O = '<' + '(';

// verdicts are the measured output of the 59-test suite in
// src/hooks/src/__tests__/lib/normalize-command.test.ts
const CASES = [
  { cmd: "cat > s.sh <<'SH'\nwhile read x; do :; done < " + O + "ls)\nSH",
    label: "Write a script containing process substitution",
    before: 'BLOCK', after: 'ALLOW' },
  { cmd: "cat > s.sh <<'SH'\ngrep x <<< \"$y\"\nSH",
    label: "Write a script containing a here-string",
    before: 'BLOCK', after: 'ALLOW' },
  { cmd: "cat > s.sh <<'SH'\nIFS=, read -r a b\nSH",
    label: "Write a script containing IFS=",
    before: 'BLOCK', after: 'ALLOW' },
  { cmd: "cat > t.mjs <<'EOF'\nconst re = /[<>]\\" + O + "[^)]+\\)/;\nEOF",
    label: "Write a JavaScript file whose regex text contains the sequence",
    before: 'BLOCK', after: 'ALLOW' },
  { cmd: "cat > s.sh <<-'SH'\n\t< " + O + "ls)\nSH",
    label: "Tab-stripping quoted heredoc (<<-)",
    before: 'BLOCK', after: 'ALLOW' },
  { cmd: "echo '< " + O + "ls)'",
    label: "Single-quoted string (already correct before the fix)",
    before: 'ALLOW', after: 'ALLOW' },
  { cmd: 'diff ' + O + 'ls) ' + O + 'ls /tmp)',
    label: "Real process substitution",
    before: 'BLOCK', after: 'BLOCK' },
  { cmd: 'grep x <<< "$PAYLOAD"',
    label: "Real here-string",
    before: 'BLOCK', after: 'BLOCK' },
  { cmd: 'cat > s.sh <<SH\n< ' + O + 'ls)\nSH',
    label: "UNQUOTED heredoc — bash DOES expand this, so it stays blocked",
    before: 'BLOCK', after: 'BLOCK' },
  { cmd: "cat > s.sh <<'SH'\nharmless\nSH\ndiff " + O + 'evil)',
    label: "Payload after the heredoc closes — blanking must not hide it",
    before: 'BLOCK', after: 'BLOCK' },
  { cmd: "cat > s.sh <<'SH'\ndiff " + O + 'evil)',
    label: "UNTERMINATED heredoc — body must not be blanked",
    before: 'BLOCK', after: 'BLOCK' },
];

const state = { v: 'after', f: 'all' };
const $ = id => document.getElementById(id);

function render() {
  const rows = CASES.filter(c => {
    if (state.f === 'fixed') return c.before === 'BLOCK' && c.after === 'ALLOW';
    if (state.f === 'kept')  return c.after === 'BLOCK';
    return true;
  });

  $('rows').innerHTML = rows.map(c => {
    const fixed = c.before === 'BLOCK' && c.after === 'ALLOW';
    const tag = fixed
      ? '<span class="tag t-fix">fixed</span>'
      : (c.after === 'BLOCK' ? '<span class="tag t-keep">still blocked</span>' : '');
    const cell = v => `<div class="verdict ${v === 'BLOCK' ? 'v-block' : 'v-allow'}">${v}</div>`;
    const dimBefore = state.v === 'after' ? 'opacity:.45' : '';
    const dimAfter  = state.v === 'before' ? 'opacity:.45' : '';
    return `<div class="row">
      <div><pre>${c.cmd.replace(/</g,'&lt;')}</pre><div class="lbl">${c.label}${tag}</div></div>
      <div style="${dimBefore}">${cell(c.before)}</div>
      <div style="${dimAfter}">${cell(c.after)}</div>
    </div>`;
  }).join('') || '<div class="lbl">no cases in this filter</div>';

  const fixedN = CASES.filter(c => c.before === 'BLOCK' && c.after === 'ALLOW').length;
  const keptN  = CASES.filter(c => c.after === 'BLOCK').length;
  $('sum').innerHTML = `
    <div class="card"><div class="n" style="color:var(--ok)">${fixedN}</div><div class="l">false positives cleared</div></div>
    <div class="card"><div class="n">${keptN}</div><div class="l">real detections preserved</div></div>
    <div class="card"><div class="n">59</div><div class="l">tests passing (9 new)</div></div>
    <div class="card"><div class="n">0</div><div class="l">detections weakened</div></div>`;

  $('note').innerHTML = state.v === 'before'
    ? '<b>Before.</b> Heredoc bodies were scanned as live code. Any script you wrote containing one of the five watched features was rejected.'
    : '<b>After.</b> Bodies of <code>&lt;&lt;\'X\'</code>, <code>&lt;&lt;"X"</code> and <code>&lt;&lt;-\'X\'</code> are blanked first. Unquoted <code>&lt;&lt;X</code> still expands, so it is still scanned.';
}

document.querySelectorAll('#ver button').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('#ver button').forEach(x => x.classList.remove('on'));
  b.classList.add('on'); state.v = b.dataset.v; render();
}));
document.querySelectorAll('#filt button').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('#filt button').forEach(x => x.classList.remove('on'));
  b.classList.add('on'); state.f = b.dataset.f; render();
}));

render();
</script>
</body>
