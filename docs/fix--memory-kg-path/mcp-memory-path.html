<script>
const PROJECT = '/Users/you/coding/orchestkit';
const PKGDIR = '~/.npm/_npx/<hash>/node_modules/@modelcontextprotocol/server-memory/dist';
const state = { v:'MEMORY_FILE_PATH', p:'def' };

function pathValue(p){
  return p==='rel' ? '.claude/memory/memory.json'
    : p==='bare' ? '${CLAUDE_PROJECT_DIR}/.claude/memory/memory.json'
    : '${CLAUDE_PROJECT_DIR:-.}/.claude/memory/memory.json';
}

// Model server-memory's real ensureMemoryFilePath() + CC's .mcp.json expansion.
function resolve(){
  const raw = pathValue(state.p);
  const steps = [];
  // 1. CC env expansion in project-scoped .mcp.json
  let expanded = raw, expandOk = true;
  if (state.p==='bare') {
    // bare ${CLAUDE_PROJECT_DIR} not guaranteed to expand in project-scoped .mcp.json
    expanded = raw; expandOk = false;
    steps.push(`<span class="k">CC expand</span>  bare \${CLAUDE_PROJECT_DIR} in a project-scoped .mcp.json <span class="x">may NOT expand (no default)</span> → literal string`);
  } else if (state.p==='def') {
    expanded = raw.replace('${CLAUDE_PROJECT_DIR:-.}', PROJECT);
    steps.push(`<span class="k">CC expand</span>  \${CLAUDE_PROJECT_DIR:-.} → <span class="g">${PROJECT}</span>`);
  } else {
    steps.push(`<span class="k">CC expand</span>  no variable → "<span class="v">${raw}</span>"`);
  }
  // 2. server reads the var?
  if (state.v !== 'MEMORY_FILE_PATH') {
    steps.push(`<span class="k">server</span>  reads <span class="g">MEMORY_FILE_PATH</span>, but you set <span class="x">${state.v}</span> → IGNORED`);
    steps.push(`<span class="k">server</span>  no custom path → default → <span class="x">npx cache dir</span>`);
    return { ok:false, lands:`${PKGDIR}/memory.jsonl`, steps, why:'Wrong env var name — server never sees your path.' };
  }
  steps.push(`<span class="k">server</span>  reads MEMORY_FILE_PATH = "<span class="v">${expanded}</span>"`);
  // 3. absolute vs relative
  const isAbs = expanded.startsWith('/');
  if (isAbs) {
    steps.push(`<span class="k">server</span>  path is ABSOLUTE → used as-is <span class="g">✓</span>`);
    return { ok:true, lands:`${expanded}`, steps, why:'Absolute project-rooted path — graph lands in the repo.' };
  }
  // relative (incl. unexpanded bare ${...} which isn't absolute)
  steps.push(`<span class="k">server</span>  path is RELATIVE → path.join(packageDir, path) <span class="x">→ npx cache</span>`);
  return { ok:false, lands:`${PKGDIR}/${expanded.replace(/^\.\//,'')}`, steps,
    why: state.p==='bare' ? 'Unexpanded ${CLAUDE_PROJECT_DIR} stays relative → joined to the npx cache.' : 'Relative path is joined to the npx-cache install dir, not the project.' };
}

function seg(id,key){ document.getElementById(id).querySelectorAll('button').forEach(b=>b.onclick=()=>{
  state[key]=b.dataset[key==='v'?'v':'p']; document.getElementById(id).querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b)); render(); }); }
seg('varSeg','v'); seg('pathSeg','p');
document.getElementById('presets').querySelectorAll('button').forEach(b=>b.onclick=()=>{
  state.v=b.dataset.v; state.p=b.dataset.p;
  document.getElementById('varSeg').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x.dataset.v===state.v));
  document.getElementById('pathSeg').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x.dataset.p===state.p));
  render(); });

function render(){
  const r = resolve();
  const v = document.getElementById('verdict');
  v.className = 'verdict ' + (r.ok?'ok':'bad');
  v.innerHTML = `<h2>${r.ok?'✅ Graph lands in the repo':'🪦 Graph lands in a throwaway cache'}</h2>`+
    `<div style="color:var(--dim);font-size:12.5px">${r.why}</div>`+
    `<div class="lands"><span class="label">writes to</span><br>${r.lands}</div>`;
  document.getElementById('steps').innerHTML = r.steps.join('<br>');
  document.getElementById('out').textContent = `"env": { "${state.v}": "${pathValue(state.p)}" }`;
}
document.getElementById('copy').onclick=()=>{navigator.clipboard.writeText(document.getElementById('out').textContent).then(()=>{const b=document.getElementById('copy');b.textContent='Copied!';setTimeout(()=>b.textContent='Copy',1200);});};
render();
</script>
