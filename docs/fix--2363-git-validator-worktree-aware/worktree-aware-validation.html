<body>
<h1>🌳 Worktree-Aware Git Validation</h1>
<div class="sub">Issue #2363 — git-validator now judges commands by the branch where they actually run, and validates through leading command chains. Try a command below.</div>

<div class="grid">
  <div class="panel">
    <h2>Input</h2>
    <label>Bash command</label>
    <textarea id="cmd">git commit -m "fix: ship it"</textarea>
    <label>Session project-dir branch</label>
    <select id="sessionBranch">
      <option value="main" selected>main (protected)</option>
      <option value="feat/regular">feat/regular</option>
    </select>
    <label>Shell cwd (tracked by CwdChanged hook → session-state shell_cwd)</label>
    <select id="shellCwd">
      <option value="">— same as project dir —</option>
      <option value="wt-feature" selected>.worktrees/agent-x → branch fix/2360-ship-hook-bundles</option>
      <option value="wt-main">.worktrees/agent-y → branch main</option>
      <option value="wt-unknown">/nonexistent → branch unresolvable</option>
    </select>
    <div class="examples" style="margin-top:1rem">
      <h2>Scenarios</h2>
      <button data-cmd='git commit -m "fix: ship it"' data-cwd="wt-feature" data-br="main">🟢 The #2363 false positive: worktree commit, session on main</button>
      <button data-cmd='cd .worktrees/agent-x && git commit -m "fix: x"' data-cwd="" data-br="main">🟢 Leading cd into a feature worktree</button>
      <button data-cmd='git -C /elsewhere/repo push origin feat/x' data-cwd="" data-br="main">🟢 git -C explicit path</button>
      <button data-cmd='pwd && git commit -m "fix: evade"' data-cwd="" data-br="main">🔴 Old under-blocking evasion — now caught</button>
      <button data-cmd='env -u NPM_TOKEN git push origin main' data-cwd="" data-br="main">🔴 env-prefixed push on main — now caught</button>
      <button data-cmd='gh issue create --body "never git commit to main"' data-cwd="" data-br="main">⚪ Prose mentioning git commit — stays silent</button>
      <button data-cmd='git commit -m "fix: y"' data-cwd="wt-main" data-br="main">🔴 Worktree itself on main — still blocked</button>
    </div>
  </div>
  <div class="panel">
    <h2>Validator verdict</h2>
    <div id="verdict" class="verdict silent">—</div>
    <div id="trace" class="trace"></div>
  </div>
</div>

<script>
const WT = {
  'wt-feature': { dir: '.worktrees/agent-x', branch: 'fix/2360-ship-hook-bundles' },
  'wt-main':    { dir: '.worktrees/agent-y', branch: 'main' },
  'wt-unknown': { dir: '/nonexistent', branch: null },
};
const PROTECTED = ['main', 'master'];

// Mirror of locateGitSegment: simple quote-free leading chain
function locateGit(cmd) {
  let cdTarget = null, pos = 0;
  const n = cmd.length;
  while (pos < n) {
    while (pos < n && /\s/.test(cmd[pos])) pos++;
    if (pos >= n) return null;
    let end = pos, sawQuote = false;
    while (end < n) {
      const ch = cmd[end];
      if (ch === '"' || ch === "'" || ch === '`' || ch === '$') { sawQuote = true; break; }
      if (ch === ';' || (ch === '&' && cmd[end+1] === '&') || ch === '|') break;
      end++;
    }
    const seg = cmd.slice(pos, end).trim();
    const m = /^(?:rtk\s+)?(?:env(?:\s+-u\s+\w+)*\s+)?(?:\w+=[^\s]*\s+)*(git)(?:\s|$)/.exec(seg);
    if (m) return { offset: pos + m[0].lastIndexOf('git'), cdTarget };
    if (sawQuote) return null;
    const cd = seg.match(/^cd\s+([^\s]+)$/);
    if (cd) cdTarget = cd[1];
    else if (!/^[A-Za-z0-9_./-]+(\s+[^"'`$;|&]*)?$/.test(seg) && seg !== '') return null;
    if (end >= n) return null;
    if (cmd[end] === ';') pos = end + 1;
    else if (cmd[end] === '&') pos = end + 2;
    else return null;
  }
  return null;
}

function evaluate() {
  const cmd = document.getElementById('cmd').value;
  const sessionBranch = document.getElementById('sessionBranch').value;
  const shellKey = document.getElementById('shellCwd').value;
  const v = document.getElementById('verdict');
  const t = document.getElementById('trace');
  const trace = [];

  const loc = locateGit(cmd);
  if (!loc) {
    v.className = 'verdict silent';
    v.textContent = '⚪ silent — no git invocation found via a simple leading chain';
    t.textContent = 'locateGitSegment → null (quotes/pipes/complex segments bail conservatively)';
    return;
  }
  const gitCmd = cmd.slice(loc.offset);
  trace.push(`git segment @ offset ${loc.offset}: "${gitCmd.slice(0,48)}…"`.replace('…"','"'));
  if (loc.cdTarget) trace.push(`leading cd target: ${loc.cdTarget}`);

  if (!PROTECTED.includes(sessionBranch)) {
    v.className = 'verdict allow';
    v.textContent = `🟢 not protected — session branch '${sessionBranch}', zero extra work (no state read)`;
    t.textContent = trace.join('\n');
    return;
  }

  // effective dir: -C > cd > shell_cwd
  let effDir = null, effBranch;
  const dashC = gitCmd.match(/^git\s+-C\s+([^\s]+)/);
  if (dashC) { effDir = dashC[1]; effBranch = 'feat/x'; trace.push(`git -C → ${effDir}`); }
  else if (loc.cdTarget) {
    effDir = loc.cdTarget;
    effBranch = (Object.values(WT).find(w => effDir.includes(w.dir.split('/').pop())) || WT['wt-feature']).branch;
    trace.push(`cd target → ${effDir} (branch: ${effBranch})`);
  }
  else if (shellKey) { const w = WT[shellKey]; effDir = w.dir; effBranch = w.branch; trace.push(`session-state shell_cwd → ${effDir} (branch: ${effBranch ?? 'unresolvable'})`); }

  if (effDir && effBranch && !PROTECTED.includes(effBranch)) {
    v.className = 'verdict allow';
    v.textContent = `🟢 ALLOW — git runs on branch '${effBranch}' (${effDir}); session dir on '${sessionBranch}', not blocking`;
    t.textContent = trace.join('\n');
    return;
  }
  if (effDir && !effBranch) trace.push('branch unresolvable → fail closed');

  if (/git\s+(commit|push)/.test(gitCmd)) {
    v.className = 'verdict deny';
    v.textContent = `🔴 BLOCKED — cannot commit/push directly to '${sessionBranch}'`;
  } else {
    v.className = 'verdict advisory';
    v.textContent = `🟡 advisory — on protected branch '${sessionBranch}', create a feature branch for changes`;
  }
  t.textContent = trace.join('\n');
}

document.querySelectorAll('.examples button').forEach(b => b.addEventListener('click', () => {
  document.getElementById('cmd').value = b.dataset.cmd;
  document.getElementById('sessionBranch').value = b.dataset.br;
  document.getElementById('shellCwd').value = b.dataset.cwd;
  evaluate();
}));
['cmd','sessionBranch','shellCwd'].forEach(id => document.getElementById(id).addEventListener('input', evaluate));
evaluate();
</script>
</body>
