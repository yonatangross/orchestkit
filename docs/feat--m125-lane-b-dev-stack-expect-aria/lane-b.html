<body>
<div class="container">
  <h1>M125 Lane B <span class="badge live">PR · #1525 + #1526 + #1530</span></h1>
  <p class="subtitle">Three composing pieces of the dev loop: <code>/ork:dev</code> boot, auto-expect after UI edits, ARIA snapshot recording. Adjust state to see the full lifecycle.</p>

  <div class="toggle">
    <button data-view="boot" class="active">/ork:dev boot</button>
    <button data-view="edit">UI edit triggers expect</button>
    <button data-view="snapshot">ARIA snapshot</button>
  </div>

  <div class="grid">
    <div class="panel">
      <div class="panel-head">Inputs</div>
      <div class="panel-body" id="controls"></div>
    </div>
    <div class="panel">
      <div class="panel-head">Output</div>
      <div class="panel-body">
        <div class="components" id="comps"></div>
        <pre id="output"></pre>
      </div>
    </div>
  </div>

  <div class="copy-section">
    <h3>Prompt for Claude</h3>
    <div class="copy-text" id="promptText"></div>
    <button class="copy-btn" id="copyBtn">Copy</button>
  </div>
</div>

<script>
const state = {
  view: 'boot',
  branch: 'feat/m125-lane-b',
  pkgMgr: 'pnpm',
  hasNextAuth: true,
  hasStripe: true,
  hasOctokit: false,
  filePath: 'app/dashboard/page.tsx',
  devStackLive: true,
  skipSession: false,
  cooldown: false,
  hasArtifact: true,
  hasPriorSnapshot: false,
  passed: true,
};

const $ = (id) => document.getElementById(id);

function slug(branch) {
  return branch.toLowerCase().replace(/\//g,'-').replace(/[^a-z0-9-]/g,'');
}

function fileToRoute(p) {
  const n = p.replace(/\\/g,'/');
  let m = n.match(/(?:^|\/)app\/(.+)\/page\.(tsx|jsx)$/);
  if (m) {
    const segs = m[1].split('/').filter(s => !(s.startsWith('(') && s.endsWith(')')));
    return '/' + segs.join('/');
  }
  m = n.match(/(?:^|\/)pages\/(?!api\/)(.+)\.(tsx|jsx)$/);
  if (m) {
    let r = m[1];
    if (r === 'index') return '/';
    if (r.endsWith('/index')) r = r.slice(0, -6);
    return '/' + r;
  }
  if (/\.(tsx|jsx|css|scss)$/.test(n)) return '/';
  return null;
}

const VIEWS = {
  boot: {
    controls: () => `
      <div class="control">
        <label>Branch</label>
        <input type="text" id="branch" value="${state.branch}">
      </div>
      <div class="control">
        <label>Package manager</label>
        <label class="toggle-row"><input type="radio" name="pm" value="pnpm" ${state.pkgMgr === 'pnpm' ? 'checked' : ''}> pnpm</label>
        <label class="toggle-row"><input type="radio" name="pm" value="npm" ${state.pkgMgr === 'npm' ? 'checked' : ''}> npm</label>
        <label class="toggle-row"><input type="radio" name="pm" value="yarn" ${state.pkgMgr === 'yarn' ? 'checked' : ''}> yarn</label>
      </div>
      <div class="control">
        <label>Detected deps for emulators</label>
        <label class="toggle-row"><input type="checkbox" id="dep-na" ${state.hasNextAuth ? 'checked' : ''}> next-auth</label>
        <label class="toggle-row"><input type="checkbox" id="dep-stripe" ${state.hasStripe ? 'checked' : ''}> stripe</label>
        <label class="toggle-row"><input type="checkbox" id="dep-octo" ${state.hasOctokit ? 'checked' : ''}> @octokit/rest</label>
      </div>
    `,
    render: () => {
      const sub = slug(state.branch) + '.localhost';
      const url = `https://${sub}`;
      const ems = [];
      if (state.hasNextAuth) ems.push('google-oauth','apple-auth','microsoft-entra');
      if (state.hasStripe) ems.push('stripe');
      if (state.hasOctokit) ems.push('github');
      const lines = [];
      lines.push(`<span class="dim">$ /ork:dev</span>`);
      lines.push(`<span class="dim">[step 0]</span> detected package manager: <span class="key">${state.pkgMgr}</span>`);
      lines.push(`<span class="dim">[step 1]</span> subdomain: <span class="url">${sub}</span>`);
      lines.push(`<span class="dim">[step 2]</span> portless start --domain ${sub} --tls --lan  <span class="ok">✓</span>`);
      if (ems.length) {
        lines.push(`<span class="dim">[step 3]</span> emulate-seed --auto  <span class="ok">✓</span> (${ems.length} services)`);
        lines.push(`<span class="dim">[step 4]</span> emulate up  <span class="ok">✓</span>`);
      } else {
        lines.push(`<span class="dim">[step 3-4]</span> emulate skipped (no mapped deps)`);
      }
      lines.push(`<span class="dim">[step 5]</span> ${state.pkgMgr} dev (background, log → .claude/state/dev.log)  <span class="ok">✓</span>`);
      lines.push(`<span class="dim">[step 6]</span> wait-on ${url}  <span class="ok">✓</span>  <span class="dim">(TLS handshake 1.2s)</span>`);
      lines.push(`<span class="dim">[step 7]</span> agent-browser session start --name ${slug(state.branch)}  <span class="ok">✓</span>`);
      lines.push(`<span class="dim">[step 8]</span> wrote .claude/state/dev-stack.json  <span class="ok">✓</span>`);
      lines.push('');
      lines.push(`<span class="ok">ork:dev — ${state.branch}</span>`);
      lines.push(`  ✓ portless     <span class="url">${url}</span>`);
      if (ems.length) lines.push(`  ✓ emulate      ${ems.length} services (${ems.slice(0,3).join(', ')}${ems.length > 3 ? '...' : ''})`);
      lines.push(`  ✓ ${state.pkgMgr} dev    port 3000`);
      lines.push(`  ✓ agent-browser  session "${slug(state.branch)}"`);
      lines.push(`<span class="dim">Booted in 4.2s. Open ${url} or run /ork:expect.</span>`);
      return { lines, comps: [
        { name: 'portless', pid: 12345, up: true },
        { name: 'emulate', pid: ems.length ? 12346 : null, up: ems.length > 0 },
        { name: state.pkgMgr + ' dev', pid: 12347, up: true },
        { name: 'agent-browser', pid: 'session', up: true },
      ]};
    },
  },

  edit: {
    controls: () => `
      <div class="control">
        <label>File edited</label>
        <input type="text" id="file" value="${state.filePath}">
        <div style="font-size:10px; color:var(--text2); margin-top:4px;">Try: app/dashboard/page.tsx, components/Button.tsx, styles/main.css, pages/api/users.ts</div>
      </div>
      <div class="control">
        <label>Hook gating state</label>
        <label class="toggle-row"><input type="checkbox" id="dl" ${state.devStackLive ? 'checked' : ''}> dev stack live (/ork:dev ran)</label>
        <label class="toggle-row"><input type="checkbox" id="ss" ${state.skipSession ? 'checked' : ''}> session-skip token set</label>
        <label class="toggle-row"><input type="checkbox" id="cd" ${state.cooldown ? 'checked' : ''}> within 30s cooldown for this route</label>
      </div>
    `,
    render: () => {
      const route = fileToRoute(state.filePath);
      const isUI = /\.(tsx|jsx|css|scss)$/.test(state.filePath) && !state.filePath.includes('pages/api/');
      const lines = [];
      lines.push(`<span class="dim">// PostToolUse hook fires after Edit/Write of ${state.filePath}</span>`);
      lines.push(`<span class="dim">// posttool/ui-change-detector evaluates:</span>`);
      lines.push('');
      if (!isUI) {
        lines.push(`<span class="warn">SKIP</span> file extension not in {tsx,jsx,css,scss} or matches pages/api/* — not a UI edit`);
        lines.push(`<span class="dim">→ outputSilentSuccess()</span>`);
      } else if (process.env && process.env.ORK_EXPECT_AUTO === '0') {
        lines.push(`<span class="warn">SKIP</span> ORK_EXPECT_AUTO=0`);
      } else if (state.skipSession) {
        lines.push(`<span class="warn">SKIP</span> .claude/state/expect-skip.&lt;sessionId&gt; exists`);
        lines.push(`<span class="dim">→ outputSilentSuccess()</span>`);
      } else if (!state.devStackLive) {
        lines.push(`<span class="warn">SKIP</span> dev stack not live (graceful no-op — /ork:dev hasn't run)`);
        lines.push(`<span class="dim">→ outputSilentSuccess()</span>`);
      } else if (!route) {
        lines.push(`<span class="warn">SKIP</span> file path doesn't map to a UI route`);
      } else if (state.cooldown) {
        lines.push(`<span class="warn">SKIP</span> route ${route} fired &lt; 30s ago (cooldown)`);
        lines.push(`<span class="dim">→ outputSilentSuccess()</span>`);
      } else {
        lines.push(`<span class="ok">FIRE</span> route resolved: <span class="key">${route}</span>`);
        lines.push(`recorded fire at .claude/state/expect-auto-fires.json`);
        lines.push('');
        lines.push(`<span class="dim">// outputAllowWithContext nudge appears in transcript:</span>`);
        lines.push(`<span class="ok">UI change detected on \`${state.filePath}\` → route \`${route}\`.</span>`);
        lines.push(`<span class="ok">Run \`/ork:expect ${route}\` against ${state.devStackLive ? 'https://' + slug(state.branch) + '.localhost' : '<dev-url>'}${route} to verify,</span>`);
        lines.push(`<span class="ok">or write \`SKIP\` to \`.claude/state/expect-skip.&lt;sessionId&gt;\` to silence for the session.</span>`);
      }
      return { lines, comps: [] };
    },
  },

  snapshot: {
    controls: () => `
      <div class="control">
        <label>Expect run state</label>
        <label class="toggle-row"><input type="checkbox" id="passed" ${state.passed ? 'checked' : ''}> RUN_COMPLETED|passed in tool_output</label>
        <label class="toggle-row"><input type="checkbox" id="ha" ${state.hasArtifact ? 'checked' : ''}> ROUTE| and ARIA| tags emitted</label>
        <label class="toggle-row"><input type="checkbox" id="hp" ${state.hasPriorSnapshot ? 'checked' : ''}> prior snapshot exists for this route</label>
      </div>
    `,
    render: () => {
      const lines = [];
      const route = '/dashboard';
      const parent = '8641214e';
      lines.push(`<span class="dim">// PostToolUse hook fires after Skill (skill === 'expect') completes</span>`);
      lines.push(`<span class="dim">// posttool/expect/snapshot-recorder evaluates:</span>`);
      lines.push('');
      if (!state.passed) {
        lines.push(`<span class="warn">SKIP</span> tool_output missing 'RUN_COMPLETED|passed' — only record snapshots from green runs`);
        lines.push(`<span class="dim">→ outputSilentSuccess()</span>`);
      } else if (!state.hasArtifact) {
        lines.push(`<span class="warn">SKIP</span> tool_output missing ROUTE| or ARIA| tags — old expect format`);
        lines.push(`<span class="dim">→ outputSilentSuccess()</span>`);
      } else {
        lines.push(`<span class="ok">FIRE</span> route: <span class="key">${route}</span>  parent commit: <span class="key">${parent}</span>`);
        lines.push(`writing .claude/state/expect-snapshots/dashboard/${parent}.json`);
        lines.push(`  <span class="dim">{ route, parentCommit, capturedAt, ariaSummary (cap 8KB) }</span>`);
        lines.push('');
        if (state.hasPriorSnapshot) {
          lines.push(`<span class="ok">→ outputWithContext:</span>`);
          lines.push(`<span class="ok">ARIA snapshot recorded: route=${route} commit=${parent}</span>`);
          lines.push(`<span class="ok">(prior: ca73a641). Run \`/ork:expect ${route} --diff\` to compare semantic structure.</span>`);
        } else {
          lines.push(`<span class="ok">→ outputWithContext:</span>`);
          lines.push(`<span class="ok">ARIA snapshot recorded: route=${route} commit=${parent}.</span>`);
          lines.push(`<span class="ok">First snapshot for this route — future runs will diff against it.</span>`);
        }
      }
      return { lines, comps: [] };
    },
  },
};

function render() {
  const v = VIEWS[state.view];
  $('controls').innerHTML = v.controls();
  bindControls();
  const { lines, comps } = v.render();
  $('output').innerHTML = lines.join('\n');
  $('comps').innerHTML = comps.map(c => `
    <div class="comp ${c.up ? 'up' : 'down'}">
      <div class="name">${c.name}</div>
      <div class="pid">${c.pid ? 'pid ' + c.pid : '-'}</div>
      <div class="status">${c.up ? 'live' : 'down'}</div>
    </div>
  `).join('');
  updatePrompt();
}

function bindControls() {
  document.querySelectorAll('input').forEach(el => {
    el.addEventListener('change', () => {
      if (el.id === 'branch') state.branch = el.value || state.branch;
      if (el.id === 'file') state.filePath = el.value || state.filePath;
      if (el.name === 'pm') state.pkgMgr = el.value;
      if (el.id === 'dep-na') state.hasNextAuth = el.checked;
      if (el.id === 'dep-stripe') state.hasStripe = el.checked;
      if (el.id === 'dep-octo') state.hasOctokit = el.checked;
      if (el.id === 'dl') state.devStackLive = el.checked;
      if (el.id === 'ss') state.skipSession = el.checked;
      if (el.id === 'cd') state.cooldown = el.checked;
      if (el.id === 'passed') state.passed = el.checked;
      if (el.id === 'ha') state.hasArtifact = el.checked;
      if (el.id === 'hp') state.hasPriorSnapshot = el.checked;
      render();
    });
    el.addEventListener('input', () => {
      if (el.id === 'branch') { state.branch = el.value || 'feat/m125-lane-b'; render(); }
      if (el.id === 'file') { state.filePath = el.value || 'app/dashboard/page.tsx'; render(); }
    });
  });
}

document.querySelectorAll('.toggle button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.toggle button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    state.view = b.dataset.view;
    render();
  });
});

function updatePrompt() {
  const parts = [];
  parts.push('M125 Lane B — three pieces wired together:');
  parts.push('');
  if (state.view === 'boot') {
    parts.push(`/ork:dev for branch "${state.branch}":`);
    parts.push(`  subdomain: ${slug(state.branch)}.localhost`);
    parts.push(`  package manager: ${state.pkgMgr}`);
    const ems = [];
    if (state.hasNextAuth) ems.push('google-oauth','apple-auth','microsoft-entra');
    if (state.hasStripe) ems.push('stripe');
    if (state.hasOctokit) ems.push('github');
    if (ems.length) parts.push(`  emulators: ${ems.join(', ')}`);
    parts.push('  state: .claude/state/dev-stack.json');
  } else if (state.view === 'edit') {
    const route = fileToRoute(state.filePath);
    parts.push(`UI edit on ${state.filePath}`);
    if (route) parts.push(`  route resolved: ${route}`);
    parts.push(`  dev stack: ${state.devStackLive ? 'live' : 'not live'}`);
    parts.push(`  session-skip: ${state.skipSession ? 'set' : 'not set'}`);
    parts.push(`  cooldown: ${state.cooldown ? 'within 30s window' : 'clear'}`);
  } else {
    parts.push('ARIA snapshot recorder');
    parts.push(`  expect passed: ${state.passed}`);
    parts.push(`  artifact tags present: ${state.hasArtifact}`);
    parts.push(`  prior snapshot: ${state.hasPriorSnapshot}`);
  }
  $('promptText').textContent = parts.join('\n');
}

$('copyBtn').addEventListener('click', async () => {
  await navigator.clipboard.writeText($('promptText').textContent);
  const btn = $('copyBtn');
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1400);
});

render();
</script>
