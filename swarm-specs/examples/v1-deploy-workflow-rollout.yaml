# Created: 2026-05-16

# swarm-spec: v1-deploy-workflow-rollout
#
# THE BIG ONE. Roll out the canonical `@v1` reusable deploy workflow to
# every repo in the platform fleet. This is the spec that, per the
# 275-session insights audit, eats the most time when done manually:
#
#   • 28 sessions / month spent on CI debugging (much of it from drift
#     between repos running different deploy workflow versions).
#   • The @v1 reusable workflow rollout itself was historically done
#     14 repos × ~10 min each = ~2.5h manual coordination per cycle.
#
# This spec replaces each repo's `.github/workflows/deploy.yml` with
# the reusable-workflow call shape:
#
#   jobs:
#     deploy:
#       uses: yonatangross/.github/.github/workflows/deploy.yml@v1
#       secrets: inherit
#
# IMPORTANT: Run the warmup (codeowners-quarterly-stamp.yaml) FIRST.
# Roll this out only after you've seen the swarm coordinator work
# end-to-end on a low-stakes target.

name: v1-deploy-workflow-rollout
description: |
  Migrate every fleet repo from its bespoke deploy.yml to the canonical
  `uses: yonatangross/.github/.github/workflows/deploy.yml@v1` shape.
  Topology is deliberately conservative — platform first (it owns the
  reusable workflow), then ventures depend on it being green.

repos:
  # Wave 0 — the source of truth for the reusable workflow.
  # If THIS doesn't merge green, nothing downstream should proceed.
  - path: ~/coding/yonatan-hq/platform
    upstream: []

  # Wave 1 — ventures. All depend on platform being green so that
  # if platform's reusable workflow itself needs adjustment, we catch
  # it before fanning out.
  - path: ~/coding/yonatan-hq/ventures/jobscraper
    upstream: [platform]
  - path: ~/coding/yonatan-hq/ventures/trading-ai-analyst
    upstream: [platform]
  - path: ~/coding/yonatan-hq/ventures/realconnect
    upstream: [platform]
  - path: ~/coding/yonatan-hq/hq-ext-plugin
    upstream: [platform]

transform:
  type: command
  command: |
    # Idempotent: if deploy.yml already references @v1, no-op.
    DEPLOY=.github/workflows/deploy.yml
    if [ ! -f "$DEPLOY" ]; then
      echo "no deploy workflow at $DEPLOY — skipping"
      exit 0
    fi
    if grep -q 'yonatangross/.github/.github/workflows/deploy.yml@v1' "$DEPLOY"; then
      echo "already on @v1 — no-op"
      exit 0
    fi

    # Snapshot the original so reviewers can see what was replaced.
    cp "$DEPLOY" .github/workflows/deploy.yml.pre-v1.bak

    cat > "$DEPLOY" <<'EOF'
    # Migrated to canonical reusable workflow.
    # Original preserved at .github/workflows/deploy.yml.pre-v1.bak
    # See yonatangross/.github for the workflow definition.
    name: deploy

    on:
      push:
        branches: [main]
      workflow_dispatch:

    jobs:
      deploy:
        uses: yonatangross/.github/.github/workflows/deploy.yml@v1
        secrets: inherit
    EOF

verify:
  # The new shape must be present
  - command: "grep -q 'yonatangross/.github/.github/workflows/deploy.yml@v1' .github/workflows/deploy.yml"
    expect: zero
  # The backup of the original must exist (reviewer-friendly)
  - command: "test -f .github/workflows/deploy.yml.pre-v1.bak"
    expect: zero
  # `actionlint` must pass on the new file if it's available locally
  # (skipped silently if actionlint isn't installed — per memory rule
  # actionlint should be in your PATH; not having it is your prompt
  # to install it, not for swarm-migrate to bail)
  - command: |
      if command -v actionlint >/dev/null 2>&1; then
        actionlint .github/workflows/deploy.yml
      fi
    expect: zero

pr:
  branch_prefix: chore/deploy-workflow-v1
  title: "chore(ci): migrate deploy.yml to yonatangross/.github @v1"
  body_file: swarm-specs/examples/v1-deploy-workflow-rollout.pr.md
  base: main
  labels:
    - chore
    - ci
    - infrastructure

ci_gate:
  # Deploy workflows have real CI weight. We wait for the standard set.
  required_checks:
    - build
    - test
    - lint
  timeout_minutes: 30
  on_failure: pause     # PAUSE — never `skip`. A failing deploy CI is exactly
                         # the kind of novel signal the insights say you want
                         # surfaced to a human, not buried.

# Conservative parallelism: even though wave 1 has 4 repos, we cap at 2
# so the platform team can monitor each in real time without losing track.
max_parallel: 2
abort_on_novel_failure: true
