# Generated by OrchestKit Claude Plugin
# Created: 2026-05-16

# swarm-spec: codeowners-quarterly-stamp
#
# WARMUP example for /ork:swarm-migrate. This is the recommended first
# real-world run before doing anything bigger:
#   1. The transform is trivially reversible (one comment line).
#   2. There are no dependencies between repos — single wave, max parallel.
#   3. Verification is a simple grep.
#   4. PRs are tiny and obviously safe to merge.
#
# Edit the `repos[]` paths to point at YOUR repos before running.
#
# Run:
#   /ork:swarm-migrate swarm-specs/examples/codeowners-quarterly-stamp.yaml --dry-run
#   # confirm the DAG + verify result, then:
#   /ork:swarm-migrate swarm-specs/examples/codeowners-quarterly-stamp.yaml

name: codeowners-quarterly-stamp-2026q2
description: |
  Add a `# Last reviewed: 2026-Q2` header to .github/CODEOWNERS across
  the listed repos. This is the smallest-stakes way to validate the
  swarm-migrate coordinator end-to-end on real repos.

repos:
  # All in wave 0 — no dependencies. Adjust paths to YOUR repo locations.
  - path: ~/coding/yonatan-hq/platform
    upstream: []
  - path: ~/coding/yonatan-hq/ventures/jobscraper
    upstream: []
  - path: ~/coding/yonatan-hq/ventures/trading-ai-analyst
    upstream: []

transform:
  type: command
  command: |
    # Prepend the review-stamp line if it's not already there.
    # Idempotent: re-running the same spec is a no-op.
    mkdir -p .github
    touch .github/CODEOWNERS
    if ! grep -q "^# Last reviewed: 2026-Q2" .github/CODEOWNERS; then
      printf '# Last reviewed: 2026-Q2\n%s\n' "$(cat .github/CODEOWNERS)" > .github/CODEOWNERS.new
      mv .github/CODEOWNERS.new .github/CODEOWNERS
    fi

verify:
  # The stamp must now be present
  - command: "grep -q '^# Last reviewed: 2026-Q2' .github/CODEOWNERS"
    expect: zero
  # And the file must still have content (we didn't accidentally clobber it)
  - command: "test -s .github/CODEOWNERS"
    expect: zero

pr:
  branch_prefix: chore/codeowners-q2-stamp
  title: "chore(codeowners): stamp 2026-Q2 review header"
  body_file: swarm-specs/examples/codeowners-quarterly-stamp.pr.md
  base: main
  labels:
    - chore
    - codeowners

ci_gate:
  # CODEOWNERS edits typically don't have required CI on most repos.
  # If your repos DO require checks, list them here.
  required_checks: []
  timeout_minutes: 10
  on_failure: pause

max_parallel: 4
abort_on_novel_failure: true
