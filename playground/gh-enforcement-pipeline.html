<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrchestKit — GitHub Enforcement Pipeline Explorer</title>
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --border: #30363d;
    --text: #e6edf3; --text2: #8b949e; --text3: #6e7681;
    --red: #f85149; --red-bg: #f8514920; --yellow: #d29922; --yellow-bg: #d2992220;
    --green: #3fb950; --green-bg: #3fb95020; --blue: #58a6ff; --blue-bg: #58a6ff20;
    --purple: #bc8cff; --purple-bg: #bc8cff20;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  .layout { display: grid; grid-template-columns: 280px 1fr; grid-template-rows: auto 1fr auto; height: 100vh; }
  .header { grid-column: 1 / -1; padding: 12px 20px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 15px; font-weight: 600; }
  .header .subtitle { font-size: 12px; color: var(--text2); }

  .controls { grid-column: 1; padding: 16px; overflow-y: auto; border-right: 1px solid var(--border); background: var(--bg2); }
  .main { grid-column: 2; padding: 20px; overflow-y: auto; }
  .prompt-bar { grid-column: 1 / -1; padding: 12px 20px; background: var(--bg2); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .prompt-bar .prompt-text { flex: 1; font-family: var(--mono); font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .prompt-bar button { padding: 6px 14px; background: var(--blue); color: #fff; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .prompt-bar button:hover { opacity: .85; }

  .section { margin-bottom: 20px; }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); margin-bottom: 8px; }

  .mode-toggle { display: flex; background: var(--bg); border-radius: 8px; padding: 3px; gap: 2px; }
  .mode-btn { flex: 1; padding: 8px; text-align: center; font-size: 13px; font-weight: 500; border: none; border-radius: 6px; cursor: pointer; background: transparent; color: var(--text2); transition: all .15s; }
  .mode-btn.active { background: var(--blue); color: #fff; }
  .mode-btn:hover:not(.active) { color: var(--text); }

  .cmd-list { display: flex; flex-direction: column; gap: 4px; }
  .cmd-btn { padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: var(--mono); font-size: 12px; color: var(--text2); cursor: pointer; text-align: left; transition: all .15s; }
  .cmd-btn.active { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }
  .cmd-btn:hover:not(.active) { border-color: var(--text3); color: var(--text); }

  .preset-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .preset-btn { padding: 4px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; font-size: 11px; color: var(--text2); cursor: pointer; transition: all .15s; }
  .preset-btn:hover { border-color: var(--text3); color: var(--text); }
  .preset-btn.active { border-color: var(--purple); color: var(--purple); background: var(--purple-bg); }

  .scorecard { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .score-item { padding: 8px; background: var(--bg); border-radius: 6px; border: 1px solid var(--border); }
  .score-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .3px; }
  .score-value { font-size: 18px; font-weight: 700; font-family: var(--mono); margin-top: 2px; }
  .score-delta { font-size: 11px; margin-top: 1px; }
  .delta-good { color: var(--green); }
  .delta-bad { color: var(--red); }
  .delta-same { color: var(--text3); }

  .pipeline { max-width: 700px; margin: 0 auto; }
  .phase { margin-bottom: 16px; position: relative; }
  .phase-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .phase-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; padding: 3px 8px; border-radius: 4px; }
  .phase-security .phase-label { background: var(--red-bg); color: var(--red); }
  .phase-enforcement .phase-label { background: var(--yellow-bg); color: var(--yellow); }
  .phase-advisory .phase-label { background: var(--blue-bg); color: var(--blue); }
  .phase-async .phase-label { background: var(--purple-bg); color: var(--purple); }
  .phase-stop .phase-label { background: var(--green-bg); color: var(--green); }
  .phase-info { font-size: 11px; color: var(--text3); }
  .phase-spawn { font-size: 10px; color: var(--text3); margin-left: auto; font-family: var(--mono); }

  .hook-list { display: flex; flex-direction: column; gap: 4px; }
  .hook { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; font-size: 12px; transition: all .3s; position: relative; overflow: hidden; }
  .hook::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 3px 0 0 3px; }
  .hook.type-block::before { background: var(--red); }
  .hook.type-advisory::before { background: var(--yellow); }
  .hook.type-silent::before { background: var(--text3); }
  .hook.type-async::before { background: var(--purple); }
  .hook.type-new::before { background: var(--green); }

  .hook.fires { border-color: var(--yellow); background: var(--yellow-bg); }
  .hook.blocks { border-color: var(--red); background: var(--red-bg); }
  .hook.removed { opacity: .3; text-decoration: line-through; border-style: dashed; }
  .hook.merged { border-color: var(--green); border-style: dashed; }
  .hook.new-hook { border-color: var(--green); background: var(--green-bg); }

  .hook-name { font-family: var(--mono); font-size: 11px; flex: 1; }
  .hook-badge { font-size: 9px; padding: 2px 6px; border-radius: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: .3px; white-space: nowrap; }
  .badge-block { background: var(--red-bg); color: var(--red); }
  .badge-pass { background: var(--green-bg); color: var(--green); }
  .badge-silent { background: var(--bg3); color: var(--text3); }
  .badge-fires { background: var(--yellow-bg); color: var(--yellow); }
  .badge-new { background: var(--green-bg); color: var(--green); }
  .badge-removed { background: var(--red-bg); color: var(--red); }
  .badge-merged { background: var(--blue-bg); color: var(--blue); }
  .badge-async { background: var(--purple-bg); color: var(--purple); }

  .hook-cost { font-family: var(--mono); font-size: 10px; color: var(--text3); white-space: nowrap; }

  .connector { display: flex; align-items: center; justify-content: center; height: 20px; position: relative; }
  .connector::before { content: ''; position: absolute; left: 50%; width: 1px; height: 100%; background: var(--border); }
  .connector-arrow { width: 8px; height: 8px; border-right: 1px solid var(--text3); border-bottom: 1px solid var(--text3); transform: rotate(45deg); z-index: 1; background: var(--bg); }
  .connector.short-circuit::after { content: 'SHORT-CIRCUIT'; position: absolute; right: 20px; font-size: 9px; color: var(--red); font-weight: 600; letter-spacing: .5px; }

  .token-bar { margin-top: 4px; background: var(--bg); border-radius: 4px; height: 20px; position: relative; overflow: hidden; border: 1px solid var(--border); }
  .token-fill { height: 100%; border-radius: 3px; transition: width .5s ease; }
  .token-fill.low { background: linear-gradient(90deg, var(--green), var(--green)); }
  .token-fill.medium { background: linear-gradient(90deg, var(--yellow), var(--yellow)); }
  .token-fill.high { background: linear-gradient(90deg, var(--red), var(--red)); }
  .token-label { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 10px; font-family: var(--mono); color: var(--text2); }

  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  .animate-pulse { animation: pulse .6s ease-out; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(88,166,255,.4); } 100% { box-shadow: 0 0 0 8px rgba(88,166,255,0); } }

  .play-btn { padding: 6px 14px; background: var(--green); color: #000; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .play-btn:hover { opacity: .85; }
  .play-btn:disabled { opacity: .4; cursor: not-allowed; }

  .diff-indicator { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; margin-left: 6px; }
  .diff-indicator.added { color: var(--green); }
  .diff-indicator.removed { color: var(--red); }
</style>
</head>
<body>
<div class="layout">
  <div class="header">
    <h1>OrchestKit Hook Pipeline Explorer</h1>
    <span class="subtitle">GitHub Enforcement Architecture &mdash; Before vs After Consolidation</span>
    <div style="margin-left:auto;">
      <button class="play-btn" id="animateBtn" onclick="animatePipeline()">&#9654; Animate</button>
    </div>
  </div>

  <div class="controls">
    <div class="section">
      <div class="section-title">Mode</div>
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="before" onclick="setMode('before')">Before</button>
        <button class="mode-btn" data-mode="after" onclick="setMode('after')">After</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Command</div>
      <div class="cmd-list" id="cmdList"></div>
    </div>

    <div class="section">
      <div class="section-title">Presets</div>
      <div class="preset-list" id="presetList"></div>
    </div>

    <div class="section">
      <div class="section-title">Scorecard</div>
      <div class="scorecard" id="scorecard"></div>
    </div>

    <div class="section">
      <div class="section-title">Legend</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> Blocking</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div> Advisory</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--text3)"></div> Silent</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div> Async</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> New</div>
      </div>
    </div>
  </div>

  <div class="main" id="mainView"></div>

  <div class="prompt-bar">
    <span class="prompt-text" id="promptText"></span>
    <button onclick="copyPrompt()">Copy</button>
  </div>
</div>

    'gh-pr-merge': {
      pretool: [
        { phase: 'security', spawn: 1, label: 'PHASE 1: SECURITY', hooks: [
          { name: 'dangerous-command-blocker', type: 'block', tokens: 0, latency: 0, status: 'pass' },
          { name: 'compound-command-validator', type: 'block', tokens: 0, latency: 0, status: 'pass' },
        ]},
        { phase: 'enforcement', spawn: 1, label: 'PHASE 2: MERGE ENFORCEMENT', hooks: [
          { name: 'pr-merge-gate', type: 'block', tokens: 100, latency: 400, status: 'fires', note: 'gh pr view ~400ms', network: true, merged: true },
        ]},
        { phase: 'advisory', spawn: 1, label: 'PHASE 3: ADVISORY', budget: 800, hooks: [
          { name: 'error-pattern-warner', type: 'advisory', tokens: 0, latency: 0, status: 'silent' },
          { name: 'gh-issue-creation-guide', type: 'advisory', tokens: 0, latency: 0, status: 'silent' },
          { name: 'affected-tests-finder', type: 'advisory', tokens: 0, latency: 0, status: 'silent' },
        ]},
      ],
      posttool: [
        { phase: 'async', spawn: 1, label: 'ASYNC POST-TOOL', hooks: [
          { name: 'unified-dispatcher (17 hooks)', type: 'async', tokens: 0, latency: 0, status: 'silent' },
        ]},
      ],
      stop: [
        { phase: 'stop', spawn: 0, label: 'SESSION END (FREE)', hooks: [
          { name: 'session-end-gh-audit', type: 'new', tokens: 0, latency: 0, status: 'new', note: 'full session review' },
        ]},
      ],
      stats: { spawns: 2, blockingHooks: 3, advisoryHooks: 3, tokens: 100, networkSync: 1, networkAsync: 0 },
    },
  },
};

function setMode(mode) {
  state.mode = mode;
  state.activePreset = null;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  render();
}

function setCmd(cmd) {
  state.cmd = cmd;
  state.activePreset = null;
  render();
}

function setPreset(id) {
  const p = PRESETS.find(x => x.id === id);
  if (!p) return;
  state.mode = p.mode;
  state.cmd = p.cmd;
  state.activePreset = id;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === state.mode));
  render();
}

function render() {
  renderCommands();
  renderPresets();
  renderPipeline();
  renderScorecard();
  updatePrompt();
}

function renderCommands() {
  const el = document.getElementById('cmdList');
  el.innerHTML = COMMANDS.map(c =>
    `<button class="cmd-btn ${state.cmd === c.id ? 'active' : ''}" onclick="setCmd('${c.id}')"><span style="color:var(--text3);font-size:10px">$</span> ${c.short}</button>`
  ).join('');
}

function renderPresets() {
  const el = document.getElementById('presetList');
  el.innerHTML = PRESETS.map(p =>
    `<button class="preset-btn ${state.activePreset === p.id ? 'active' : ''}" onclick="setPreset('${p.id}')">${p.label}</button>`
  ).join('');
}

function renderPipeline() {
  const data = HOOKS[state.mode][state.cmd];
  if (!data) return;
  const el = document.getElementById('mainView');
  let html = '';

  const allPhases = [...data.pretool, ...data.posttool, ...data.stop];
  let prevType = null;

  for (let i = 0; i < allPhases.length; i++) {
    const group = allPhases[i];

    if (prevType && prevType !== group.phase) {
      const isShortCircuit = group.shortCircuit;
      html += `<div class="connector${isShortCircuit ? ' short-circuit' : ''}"><div class="connector-arrow"></div></div>`;
    } else if (i > 0) {
      html += `<div class="connector"><div class="connector-arrow"></div></div>`;
    }

    html += `<div class="phase phase-${group.phase}">`;
    html += `<div class="phase-header">`;
    html += `<span class="phase-label">${group.label}</span>`;
    if (group.spawn > 0) {
      html += `<span class="phase-spawn">spawn #${group.spawn}</span>`;
    } else if (group.spawn === 0) {
      html += `<span class="phase-spawn" style="color:var(--green)">0 cost</span>`;
    }
    html += `</div>`;

    if (group.budget) {
      const totalTokens = group.hooks.reduce((s, h) => s + (h.tokens || 0), 0);
      const pct = Math.min((totalTokens / group.budget) * 100, 100);
      const level = pct > 70 ? 'high' : pct > 30 ? 'medium' : 'low';
      html += `<div class="token-bar"><div class="token-fill ${level}" style="width:${pct}%"></div><span class="token-label">${totalTokens}/${group.budget}t</span></div>`;
    }

    html += `<div class="hook-list">`;
    for (const hook of group.hooks) {
      let cls = `hook type-${hook.type}`;
      if (hook.status === 'fires') cls += ' fires';
      if (hook.status === 'block') cls += ' blocks';
      if (hook.status === 'removed') cls += ' removed';
      if (hook.merged) cls += ' merged';
      if (hook.isNew) cls += ' new-hook';

      let badge = '';
      if (hook.status === 'pass') badge = '<span class="hook-badge badge-pass">PASS</span>';
      else if (hook.status === 'block') badge = '<span class="hook-badge badge-block">BLOCK</span>';
      else if (hook.status === 'silent') badge = '<span class="hook-badge badge-silent">SILENT</span>';
      else if (hook.status === 'fires') badge = '<span class="hook-badge badge-fires">FIRES</span>';
      else if (hook.status === 'new') badge = '<span class="hook-badge badge-new">NEW</span>';
      else if (hook.status === 'removed') badge = '<span class="hook-badge badge-removed">CUT</span>';
      else if (hook.status === 'merged') badge = '<span class="hook-badge badge-merged">MERGED</span>';

      let cost = '';
      const parts = [];
      if (hook.tokens > 0) parts.push(`${hook.tokens}t`);
      if (hook.latency > 0) parts.push(`${hook.latency}ms`);
      if (hook.network) parts.push('NET');
      if (parts.length) cost = `<span class="hook-cost">${parts.join(' ')}</span>`;

      let note = hook.note ? `<span style="font-size:10px;color:var(--text3);margin-left:4px">${hook.note}</span>` : '';
      if (hook.merged && state.mode === 'after') note = `<span class="diff-indicator added">+ merged in</span>`;
      if (hook.isNew) note = `<span class="diff-indicator added">+ new</span>`;

      html += `<div class="${cls}" data-hook="${hook.name}">`;
      html += `<span class="hook-name">${hook.name}${note}</span>`;
      html += cost;
      html += badge;
      html += `</div>`;
    }
    html += `</div></div>`;
    prevType = group.phase;
  }

  el.innerHTML = `<div class="pipeline">${html}</div>`;
}

function renderScorecard() {
  const before = HOOKS.before[state.cmd]?.stats || {};
  const after = HOOKS.after[state.cmd]?.stats || {};
  const current = state.mode === 'before' ? before : after;
  const other = state.mode === 'before' ? after : before;

  const items = [
    { label: 'Spawns', key: 'spawns', lower: true },
    { label: 'Blocking', key: 'blockingHooks', lower: false },
    { label: 'Advisory', key: 'advisoryHooks', lower: true },
    { label: 'Tokens', key: 'tokens', lower: true },
    { label: 'Net (sync)', key: 'networkSync', lower: true },
    { label: 'Net (async)', key: 'networkAsync', lower: true },
  ];

  const el = document.getElementById('scorecard');
  el.innerHTML = items.map(item => {
    const val = current[item.key] ?? 0;
    const otherVal = other[item.key] ?? 0;
    const diff = val - otherVal;
    let deltaClass = 'delta-same';
    let deltaText = '=';
    if (diff !== 0) {
      const isGood = item.lower ? diff < 0 : diff > 0;
      deltaClass = isGood ? 'delta-good' : 'delta-bad';
      deltaText = `${diff > 0 ? '+' : ''}${diff} vs ${state.mode === 'before' ? 'after' : 'before'}`;
    }
    return `<div class="score-item"><div class="score-label">${item.label}</div><div class="score-value">${val}</div><div class="score-delta ${deltaClass}">${deltaText}</div></div>`;
  }).join('');
}

function updatePrompt() {
  const data = HOOKS[state.mode][state.cmd];
  if (!data) return;
  const s = data.stats;
  const cmd = COMMANDS.find(c => c.id === state.cmd);

  const parts = [];
  if (state.mode === 'before') {
    parts.push(`Current pipeline for \`${cmd.short}\`: ${s.spawns} process spawns, ${s.advisoryHooks} advisory hooks (800t budget), ${s.blockingHooks} blocking hooks, ${s.tokens}t max token cost, ${s.networkSync} sync network calls`);
    const after = HOOKS.after[state.cmd]?.stats;
    if (after) {
      const saved = s.spawns - after.spawns;
      const gained = after.blockingHooks - s.blockingHooks;
      if (saved > 0) parts.push(`Consolidation saves ${saved} process spawn(s)`);
      if (gained > 0) parts.push(`adds ${gained} new blocking enforcement hook(s) at zero token cost`);
    }
  } else {
    parts.push(`Consolidated pipeline for \`${cmd.short}\`: ${s.spawns} process spawn(s), ${s.advisoryHooks} advisory hooks, ${s.blockingHooks} blocking hooks, ${s.tokens}t token cost`);
    const before = HOOKS.before[state.cmd]?.stats;
    if (before) {
      const saved = before.spawns - s.spawns;
      const tokensSaved = before.tokens - s.tokens;
      if (saved > 0) parts.push(`${saved} fewer spawn(s) than before`);
      if (tokensSaved > 0) parts.push(`${tokensSaved}t fewer tokens`);
    }
  }

  document.getElementById('promptText').textContent = parts.join('. ') + '.';
}

async function animatePipeline() {
  if (state.animating) return;
  state.animating = true;
  const btn = document.getElementById('animateBtn');
  btn.disabled = true;

  const hooks = document.querySelectorAll('.hook');
  // Reset all
  hooks.forEach(h => { h.style.opacity = '0.15'; h.style.transform = 'translateX(-8px)'; });

  for (let i = 0; i < hooks.length; i++) {
    await new Promise(r => setTimeout(r, 150));
    hooks[i].style.transition = 'all .3s ease';
    hooks[i].style.opacity = '1';
    hooks[i].style.transform = 'translateX(0)';
    hooks[i].classList.add('animate-pulse');
  }

  await new Promise(r => setTimeout(r, 300));
  hooks.forEach(h => h.classList.remove('animate-pulse'));

  state.animating = false;
  btn.disabled = false;
}

function copyPrompt() {
  const text = document.getElementById('promptText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
  });
}

// Init
render();
</script>
</body>
</html>
