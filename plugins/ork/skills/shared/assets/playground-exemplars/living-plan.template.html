<!-- Generated by OrchestKit Claude Plugin - 2026-07-19 -->

<!DOCTYPE html>
<html lang="en">
<!--
  LIVING PLAN template (LPP v1) — a plan playground that tracks its own execution.

  Contract (the part that makes it "living"):
  • ONE plan = ONE file. Sessions UPDATE the STATE block below in place; never fork a
    second file for the same plan slug. Git history is the timeline.
  • The visual layer renders FROM state. A dumb updater that only mutates the JSON is
    legal and sufficient; chips, wave counters, and the Updates tab re-paint on reload.
  • Every item carries `evidence`: the command/check that PROVES done. Marking an item
    done without evidence is a contract violation, not a style choice.
  • `changelog` is append-only. Merges never drop items; removed work moves to
    status "dropped" with a reason in the changelog.

  Reuse: copy this file, replace STATE, keep the engine. Run the §10 self-audit in
  playground-visual-standard.md before shipping. Archetype family: DASHBOARD (living).
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Plan</title>
<style>
  :root{
    --bg:#0f1117; --surface:#171a23; --surface2:#1e2230; --border:#2a2f42;
    --text:#e8eaf2; --muted:#9aa0b5; --accent:#7c9aff; --ok:#4ade80;
    --warn:#fbbf24; --risk:#f87171; --info:#38bdf8;
    font-size:15px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Text',Inter,sans-serif;line-height:1.55;padding:32px 20px 80px}
  .wrap{max-inline-size:1060px;margin-inline:auto}
  h1{font-size:1.7rem;letter-spacing:-.02em}
  h2{font-size:1.15rem;margin-block:36px 14px;color:var(--accent)}
  .sub{color:var(--muted);margin-block:6px 26px;font-size:.92rem}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
  .kpi b{display:block;font-size:1.35rem;font-variant-numeric:tabular-nums}
  .kpi span{color:var(--muted);font-size:.8rem}
  .kpi.ok b{color:var(--ok)} .kpi.warn b{color:var(--warn)} .kpi.info b{color:var(--info)}
  .tabs{display:flex;gap:8px;margin-block:26px 18px;flex-wrap:wrap}
  .tab{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:999px;cursor:pointer;font-size:.88rem}
  .tab.active{background:var(--accent);color:#0b0d14;border-color:var(--accent);font-weight:600}
  .panel{display:none} .panel.active{display:block}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-block-end:14px}
  .card h3{font-size:1rem;margin-block-end:6px}
  .meta{display:flex;gap:8px;flex-wrap:wrap;margin-block:8px}
  .chip{font-size:.72rem;padding:2px 10px;border-radius:999px;border:1px solid var(--border);color:var(--muted)}
  table{inline-size:100%;border-collapse:collapse;font-size:.86rem}
  th,td{text-align:start;padding:8px 10px;border-block-end:1px solid var(--border);vertical-align:top}
  th{color:var(--muted);font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.05em}
  td.num{font-variant-numeric:tabular-nums}
  .note{border-inline-start:3px solid var(--warn);padding:10px 14px;background:var(--surface);border-radius:0 8px 8px 0;margin-block:12px;font-size:.88rem;color:var(--muted)}
  .src{font-size:.78rem;color:var(--muted)}
  @media (prefers-reduced-motion: no-preference){
    .card{transition:border-color .15s ease}
    .card:hover{border-color:var(--accent)}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1 id="lpp-title">Living Plan</h1>
  <p class="sub" id="lpp-sub"></p>
  <div class="kpis" id="lpp-kpis"></div>
  <div class="tabs" id="lpp-tabs"></div>
  <div id="lpp-panels"></div>
</div>

<!-- ═══════════ STATE — the only block sessions edit. Append, flip statuses, never fork. ═══════════ -->
<script type="application/json" id="lpp-state">
{
  "lpp": 1,
  "slug": "example-plan",
  "title": "Example Plan",
  "created": "2026-01-01",
  "updated": "2026-01-01T00:00:00Z",
  "score": { "composite": 0.0, "target": 0.0 },
  "waves": [
    { "id": "W0", "title": "first wave", "status": "planned" }
  ],
  "items": [
    {
      "id": "W0.1", "wave": "W0", "title": "First item",
      "impact": 8.0, "effort": "30min", "risk": "low",
      "status": "planned",
      "detail": "One-paragraph rationale with the numbers that justified this item.",
      "evidence": "the exact command/check that proves this is done",
      "owner": "agent"
    }
  ],
  "changelog": [
    { "at": "2026-01-01", "note": "v1 authored." }
  ]
}
</script>

<script>
(function(){
  "use strict";
  const st = JSON.parse(document.getElementById('lpp-state').textContent);
  const COLORS = {planned:'var(--muted)', in_progress:'var(--warn)', done:'var(--ok)', dropped:'var(--risk)'};
  const LABEL  = {planned:'○ planned', in_progress:'◐ in progress', done:'✓ done', dropped:'✗ dropped'};
  const RISKC  = {low:'var(--ok)', med:'var(--warn)', medium:'var(--warn)', high:'var(--risk)'};

  // header
  document.getElementById('lpp-title').textContent = st.title;
  document.title = st.title;
  document.getElementById('lpp-sub').textContent =
    st.slug + ' · created ' + st.created + ' · state updated ' + st.updated.slice(0,16).replace('T',' ');

  // KPIs: score, progress, waves
  const doneN = st.items.filter(i=>i.status==='done').length;
  const kpis = [
    {cls:'ok',   v: st.score.composite + ' → ' + st.score.target, l:'score, now → target'},
    {cls:'warn', v: doneN + '/' + st.items.length, l:'items done'},
    {cls:'info', v: st.waves.filter(w=>w.status==='done').length + '/' + st.waves.length, l:'waves complete'}
  ];
  document.getElementById('lpp-kpis').innerHTML =
    kpis.map(k=>'<div class="kpi '+k.cls+'"><b>'+k.v+'</b><span>'+k.l+'</span></div>').join('');

  // tabs: Waves · Progress matrix · Updates
  const tabs = [
    {id:'waves', label:'Execution waves'},
    {id:'matrix', label:'Progress matrix'},
    {id:'updates', label:'Updates'}
  ];
  document.getElementById('lpp-tabs').innerHTML =
    tabs.map((t,i)=>'<button class="tab'+(i===0?' active':'')+'" data-t="'+t.id+'">'+t.label+'</button>').join('');

  // panel: waves
  const waveHtml = st.waves.map(w=>{
    const items = st.items.filter(i=>i.wave===w.id);
    const wDone = items.filter(i=>i.status==='done').length;
    return '<h2>'+w.id+' · '+w.title+' <span class="src">'+wDone+'/'+items.length+' done</span></h2>' +
      items.map(i=>
        '<div class="card"><h3>'+i.id+' · '+i.title+
        ' <span class="chip" style="border-color:'+COLORS[i.status]+';color:'+COLORS[i.status]+'">'+LABEL[i.status]+'</span></h3>'+
        '<div class="meta">'+
          (i.impact!=null?'<span class="chip" style="border-color:var(--info);color:var(--info)">impact '+i.impact+'</span>':'')+
          (i.effort?'<span class="chip" style="border-color:var(--ok);color:var(--ok)">'+i.effort+'</span>':'')+
          (i.risk?'<span class="chip" style="border-color:'+(RISKC[i.risk]||'var(--muted)')+';color:'+(RISKC[i.risk]||'var(--muted)')+'">risk: '+i.risk+'</span>':'')+
          (i.owner?'<span class="chip">'+i.owner+'</span>':'')+
        '</div>'+
        (i.detail?'<p class="src">'+i.detail+'</p>':'')+
        (i.evidence?'<p class="src"><b>done when:</b> '+i.evidence+'</p>':'')+
        '</div>'
      ).join('');
  }).join('');

  // panel: progress matrix (Before | Now | per-wave promise)
  const matrixRows = st.items.map(i=>{
    const now = i.status==='done' ? '<span style="color:var(--ok)">✓ '+(i.evidence?'proven':'done')+'</span>'
      : i.status==='in_progress' ? '<span style="color:var(--warn)">◐ in progress</span>'
      : i.status==='dropped' ? '<span style="color:var(--risk)">✗ dropped</span>'
      : '<span style="color:var(--muted)">○ planned</span>';
    return '<tr><td class="num">'+i.id+'</td><td>'+i.title+'</td><td>'+now+'</td><td class="num">'+i.wave+'</td></tr>';
  }).join('');
  const matrixHtml = '<h2>Progress matrix</h2><div class="card"><table>'+
    '<tr><th>id</th><th>item</th><th>now</th><th>wave</th></tr>'+matrixRows+'</table></div>'+
    '<div class="note">"Now" is computed from item statuses, never hand-written. When a wave completes, its items all read ✓ and the wave KPI advances.</div>';

  // panel: updates
  const updatesHtml = '<h2>Updates (append-only)</h2><div class="card"><table>'+
    '<tr><th>when</th><th>note</th></tr>'+
    (st.changelog||[]).slice().reverse().map(e=>'<tr><td class="num">'+e.at+'</td><td>'+e.note+'</td></tr>').join('')+
    '</table></div>'+
    '<div class="note">This is a LIVING artifact (lpp v'+st.lpp+'). Sessions mutate the state block in this same file; never fork a second file for slug "'+st.slug+'".</div>';

  document.getElementById('lpp-panels').innerHTML =
    '<div class="panel active" id="p-waves">'+waveHtml+'</div>'+
    '<div class="panel" id="p-matrix">'+matrixHtml+'</div>'+
    '<div class="panel" id="p-updates">'+updatesHtml+'</div>';

  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('p-'+t.dataset.t).classList.add('active');
  }));
})();
</script>
</body>
</html>
