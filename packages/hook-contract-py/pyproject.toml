[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "orchestkit-hook-contract"
version = "0.1.1"
description = "Hook event contract for OrchestKit — Pydantic models, JSON schemas, and a thin validation helper. Zero runtime deps beyond pydantic."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    { name = "Yonatan Gross" }
]
keywords = ["claude-code", "orchestkit", "hooks", "contract", "schema"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "pydantic>=2.5,<3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "mypy>=1.10",
    "pyyaml>=6.0",
    "types-PyYAML>=6.0",
    "ruff>=0.6",
]

[project.urls]
Homepage = "https://orchestkit.yonyon.ai"
Repository = "https://github.com/yonatangross/orchestkit"
Issues = "https://github.com/yonatangross/orchestkit/issues"
"Source spec" = "https://github.com/yonatangross/orchestkit/blob/main/spec/hook-events.spec.yml"

[tool.hatch.build.targets.wheel]
packages = ["src/orchestkit_hook_contract"]

[tool.hatch.build.targets.sdist]
include = [
    "src/",
    "tests/",
    "scripts/",
    "README.md",
    "CHANGELOG.md",
    "pyproject.toml",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers --strict-config"

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_configs = true
disallow_untyped_defs = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "RUF"]
ignore = ["E501"]
