# Spectral ruleset for the hook-sink OpenAPI spec.
# Extends the standard OpenAPI style guide; a few overly-opinionated rules are
# relaxed because this is a single-operation machine contract, not a public
# multi-resource API portal.
extends: ["spectral:oas"]
rules:
  # Single-operation spec — global tags/descriptions carry the context, so a
  # per-operation tag object is redundant ceremony here.
  operation-tag-defined: off
  # We intentionally ship without example objects; the canonical request/response
  # shapes are exercised by examples/generic-client/__tests__/server.test.ts.
  oas3-valid-media-example: off
  # Contact/license live under info already; no need to force a top-level description
  # beyond info.description.
  info-contact: warn
