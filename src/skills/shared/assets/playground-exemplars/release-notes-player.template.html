<!doctype html>
<!--
  ════════════════════════════════════════════════════════════════════════
  RELEASE-NOTES PLAYER · generalized scaffold
  OrchestKit playground exemplar — a RECIPE of the "user-story-player" archetype.

  Conforms to: skills/shared/rules/playground-visual-standard.md
  Persona: cool-glass (shown) — right for a developer/CLI/SaaS release. For a
  consumer product swap the §2 tokens to warm-glass (see user-story-player.template.html).
  Zero dependencies. Single file. LTR with RTL-ready CSS logical properties.

  WHAT THIS IS
  ------------
  Release / "what's new" notes, PLAYED instead of listed. Press Play to step
  through each change inside a device feed; a cause→effect flow arrow reveals
  the impact card for the current change. The release-notes counterpart to the
  base player (which plays a chat-thread user story).

  §0 ROUTING — use THIS for release / changelog / "what's new" notes. Route
  adoption / triage / verdict ("adopt vs keep vs skip") views to a DASHBOARD,
  not a player — those show state, they aren't a flow.

  REUSE
  -----
    1. Replace the RELEASE data block (product / version / items + impact).
    2. Keep the engine (transport · flow arrow · copy-prompt · RTL · reduced-motion).
    3. Run the §10 self-audit in the standard before shipping.
  ════════════════════════════════════════════════════════════════════════
-->
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>What's New · Release-Notes Player</title>
<style>
  /* ── §2 tokens (cool-glass persona, HSL) ────────────────────────────── */
  :root {
    --pg-bg: hsl(232 26% 7%);
    --pg-ink: hsl(220 18% 93%);
    --pg-muted: hsl(222 12% 64%);
    --pg-faint: hsl(222 10% 46%);
    --pg-line: hsl(0 0% 100% / 0.10);
    --pg-glass: hsl(0 0% 100% / 0.05);
    --pg-glass-2: hsl(0 0% 100% / 0.08);
    --pg-glass-edge: hsl(0 0% 100% / 0.18);
    --pg-accent: hsl(248 84% 68%);       /* indigo primary */
    --pg-accent-deep: hsl(256 70% 46%);
    --pg-teal: hsl(174 66% 52%);         /* cool secondary (chips only, never in mesh) */
    --pg-shadow: 0 20px 60px -22px hsl(248 60% 2% / 0.7), 0 4px 12px -6px hsl(248 60% 2% / 0.5);
    --pg-r-sm: 9px; --pg-r-md: 16px; --pg-r-lg: 24px;
    --pg-dur-instant: 100ms; --pg-dur-fast: 200ms; --pg-dur-normal: 300ms; --pg-dur-slow: 500ms;
    --pg-ease: cubic-bezier(.2,.8,.25,1);
    --pg-font: "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif;
    --pg-mono: "SF Mono", "JetBrains Mono", ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; font-family: var(--pg-font); color: var(--pg-ink);
    /* §2 gradient mesh — indigo + violet, hue span 14° (≤30°) */
    background:
      radial-gradient(900px 600px at 86% -8%, hsl(248 84% 68% / 0.16), transparent 60%),
      radial-gradient(820px 620px at 6% 110%, hsl(262 78% 64% / 0.13), transparent 58%),
      var(--pg-bg);
    background-attachment: fixed; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 960px; margin: 0 auto; padding: 24px 16px 48px; display: flex; flex-direction: column; gap: 16px; }
  .head { display: flex; align-items: flex-start; gap: 16px; }
  .logo { width: 48px; height: 48px; border-radius: 16px; flex: none; display: grid; place-items: center; font-size: 24px;
    background: linear-gradient(145deg, var(--pg-accent), var(--pg-accent-deep)); box-shadow: 0 8px 24px -8px hsl(248 70% 50% / 0.7), inset 0 1px 0 hsl(0 0% 100% / 0.4); }
  .head h1 { margin: 0; font-size: 20px; letter-spacing: -.3px; }
  .head h1 .v { color: var(--pg-accent); font-variant-numeric: tabular-nums; }
  .head p { margin: 4px 0 0; font-size: 13px; color: var(--pg-muted); max-width: 64ch; line-height: 1.55; }
  .head .right { margin-inline-start: auto; }
  .toggle { cursor: pointer; font: inherit; font-size: 12px; font-weight: 600; color: var(--pg-muted);
    background: var(--pg-glass); border: 1px solid var(--pg-line); border-radius: 999px; padding: 8px 16px; }
  .toggle:hover { color: var(--pg-ink); border-color: var(--pg-glass-edge); }
  .toggle:focus-visible { outline: 2px solid var(--pg-accent); outline-offset: 2px; }

  .panel { background: var(--pg-glass); border: 1px solid var(--pg-line); border-radius: var(--pg-r-lg);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); box-shadow: var(--pg-shadow); }

  /* transport (§7) */
  .transport { display: flex; gap: 8px; align-items: center; padding: 12px 16px; }
  .btn { cursor: pointer; font: inherit; font-size: 13px; font-weight: 650; border-radius: 12px; padding: 8px 16px;
    border: 1px solid var(--pg-line); background: var(--pg-glass); color: var(--pg-ink); transition: transform var(--pg-dur-instant), background var(--pg-dur-fast); }
  .btn:hover { background: var(--pg-glass-2); transform: translateY(-1px); }
  .btn:focus-visible { outline: 2px solid var(--pg-accent); outline-offset: 2px; }
  .btn.primary { background: linear-gradient(145deg, var(--pg-accent), var(--pg-accent-deep)); border-color: transparent; color: hsl(248 40% 96%); box-shadow: 0 10px 26px -12px hsl(248 70% 50% / 0.8); }
  .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .hint { font-size: 12px; color: var(--pg-faint); margin-inline-start: auto; font-variant-numeric: tabular-nums; }
  .hint b { color: var(--pg-muted); }

  /* stage: phone feed + flow arrow + impact card */
  .stage { padding: 24px; display: flex; gap: 24px; align-items: center; justify-content: center; flex-wrap: wrap; }

  .phone { width: 320px; height: 600px; border-radius: 54px; padding: 12px; flex: none; position: relative;
    background: linear-gradient(160deg, hsl(232 14% 17%), hsl(232 22% 7%)); box-shadow: var(--pg-shadow), inset 0 0 0 2px hsl(0 0% 100% / 0.06); }
  .phone::after { content: ""; position: absolute; top: 16px; left: 50%; transform: translateX(-50%); width: 112px; height: 24px; background: hsl(232 30% 3%); border-radius: 0 0 16px 16px; z-index: 5; }
  .screen { height: 100%; border-radius: 42px; overflow: hidden; display: flex; flex-direction: column; background: hsl(232 24% 9%); }
  .app-head { padding: 24px 16px 12px; display: flex; align-items: center; gap: 12px; background: hsl(232 22% 13%); }
  .app-head .av { width: 40px; height: 40px; border-radius: 12px; flex: none; display: grid; place-items: center; font-size: 18px;
    background: linear-gradient(145deg, var(--pg-accent), var(--pg-accent-deep)); box-shadow: inset 0 1px 0 hsl(0 0% 100% / 0.4); }
  .app-head .nm { font-size: 14px; font-weight: 700; }
  .app-head .st { font-size: 11px; color: var(--pg-muted); margin-top: 1px; }
  .app-head .vpill { margin-inline-start: auto; font-family: var(--pg-mono); font-size: 11px; font-weight: 700; color: var(--pg-accent);
    background: hsl(248 84% 68% / 0.14); border: 1px solid hsl(248 84% 68% / 0.3); border-radius: 999px; padding: 4px 12px; font-variant-numeric: tabular-nums; }
  .feed { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth; }
  .feed::-webkit-scrollbar { width: 0; }

  /* release item row — revealed step by step; current is primary, others de-emphasized (§3) */
  .item { padding: 12px; border-radius: var(--pg-r-md); border: 1px solid var(--pg-line); background: var(--pg-glass);
    animation: pop var(--pg-dur-normal) var(--pg-ease) both; }
  .item.past { opacity: .5; }                                   /* §3 de-emphasize */
  .item.current { background: var(--pg-glass-2); border-color: hsl(248 84% 68% / 0.45); box-shadow: 0 8px 24px -16px hsl(248 70% 50% / 0.7); }
  .item .top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .chip { font-size: 9.5px; font-weight: 800; letter-spacing: .4px; text-transform: uppercase; border-radius: 999px; padding: 4px 8px; }
  .chip.feat { color: hsl(248 90% 86%); background: hsl(248 84% 68% / 0.18); }
  .chip.fix  { color: hsl(220 16% 82%); background: hsl(0 0% 100% / 0.08); }
  .chip.perf { color: hsl(174 80% 82%); background: hsl(174 66% 52% / 0.16); }
  .item h3 { margin: 0 0 4px; font-size: 14.5px; font-weight: 700; letter-spacing: -.2px; }
  .item p { margin: 0; font-size: 12px; line-height: 1.5; color: var(--pg-muted); }

  /* flow arrow (RTL-sensitive — flips via scaleX) (§7/§8) */
  .arrow { display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--pg-muted); }
  .arrow .ar { font-size: 30px; color: var(--pg-accent); }
  [dir="rtl"] .arrow .ar { transform: scaleX(-1); }
  .arrow .cap { font-size: 11px; max-width: 132px; text-align: center; line-height: 1.5; }

  /* impact card — "what changes for you" for the current item */
  .card { width: 280px; background: #fff; color: hsl(232 25% 16%); border-radius: var(--pg-r-md); padding: 16px; position: relative; overflow: hidden; box-shadow: var(--pg-shadow); animation: cardin var(--pg-dur-slow) var(--pg-ease) both; }
  .card .stripe { position: absolute; inset-inline-start: 0; top: 0; bottom: 0; width: 5px; background: var(--pg-accent); }
  .card .kind { font-size: 10.5px; font-weight: 800; letter-spacing: .3px; color: hsl(232 12% 45%); text-transform: uppercase; }
  .card h3 { margin: 8px 0 12px; font-size: 18px; letter-spacing: -.3px; }
  .card .row { display: flex; gap: 8px; font-size: 13px; color: hsl(232 16% 28%); margin-top: 8px; line-height: 1.45; }
  .card .row .tick { color: var(--pg-accent-deep); font-weight: 800; flex: none; }
  .card .added { margin-top: 12px; padding-top: 12px; border-top: 1px dashed hsl(232 16% 88%); font-size: 11px; color: var(--pg-accent-deep); font-weight: 700; }

  /* copy-prompt bar (§7) */
  .promptbar { display: flex; align-items: center; gap: 16px; padding: 16px; }
  .promptbar .pt { flex: 1; font-family: var(--pg-mono); font-size: 12px; line-height: 1.6; color: hsl(220 16% 80%); }
  .promptbar .pt b { color: var(--pg-accent); }
  .copy { flex: none; cursor: pointer; font: inherit; font-weight: 650; font-size: 12.5px; color: hsl(248 40% 96%); border-radius: 12px; padding: 12px 16px; border: 1px solid transparent;
    background: linear-gradient(145deg, var(--pg-accent), var(--pg-accent-deep)); box-shadow: 0 10px 26px -12px hsl(248 70% 50% / 0.8); }
  .copy:focus-visible { outline: 2px solid var(--pg-accent); outline-offset: 2px; }
  .copy.done { background: var(--pg-glass-2); color: var(--pg-ink); box-shadow: none; border-color: var(--pg-line); }

  @keyframes pop { from { opacity: 0; transform: translateY(8px) scale(.97); } to { opacity: 1; transform: none; } }
  @keyframes cardin { from { opacity: 0; transform: translateY(16px) scale(.94); } to { opacity: 1; transform: none; } }
  /* §6 reduced-motion gate (verbatim) */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    .feed { scroll-behavior: auto; }
  }
  @media (max-width: 760px) { .arrow .ar { transform: rotate(90deg); } [dir="rtl"] .arrow .ar { transform: rotate(90deg) scaleX(-1); } }
</style>
</head>
<body>
<div class="wrap">
  <header class="head">
    <div class="logo">✳️</div>
    <div>
      <h1>What's New in <span id="prodName">Your Product</span> <span class="v" id="verName">vX.Y.Z</span></h1>
      <p>Press <b>Play</b> to step through the release. Each change appears in the feed; the
         <b>flow arrow</b> points to what it changes for the user. Swap the <code>RELEASE</code>
         data and keep the engine.</p>
    </div>
    <div class="right"><button class="toggle" id="dirToggle" aria-pressed="false">⇄ RTL</button></div>
  </header>

  <div class="panel transport">
    <button class="btn" id="prev">‹ Back</button>
    <button class="btn primary" id="play">▶ Play</button>
    <button class="btn" id="next">Next ›</button>
    <span class="hint" id="stepHint"></span>
  </div>

  <main class="panel stage" id="stage"></main>

  <div class="panel promptbar">
    <div class="pt" id="promptOut"></div>
    <button class="copy" id="copyBtn">📋 Copy prompt</button>
  </div>
</div>

<script>
/* ═══════════ RELEASE — replace with your release's data ══════════════════
   `tag` ∈ {feat, fix, perf} → chip color. `impact.lines` = what the change
   does for the user (the result card beside the device). Headliner first. */
const RELEASE = {
  product: "Your Product",
  version: "vX.Y.Z",
  captured: "YYYY-MM-DD",
  items: [
    {
      tag: "feat", tagLabel: "Feature",
      title: "Headline change",
      what: "One sentence on what shipped — concrete, not marketing. Lead with the highest-impact item.",
      impact: { kind: "What changes", lines: [
        "The benefit a user actually feels",
        "A second concrete outcome" ] },
    },
    {
      tag: "fix", tagLabel: "Fix",
      title: "A notable fix",
      what: "What was broken and is now correct. Name the symptom users hit, not the internal cause.",
      impact: { kind: "What changes", lines: [
        "The symptom that's gone",
        "What now works as expected" ] },
    },
    {
      tag: "perf", tagLabel: "Perf",
      title: "A speed/efficiency win",
      what: "What got faster or lighter, and roughly by how much if you have a number.",
      impact: { kind: "What changes", lines: [
        "The operation that's faster",
        "Where the user notices it" ] },
    },
  ],
};

const state = { step: 0, playing: false, rtl: false };
let timer = null;
const stage = document.getElementById("stage");
const esc = s => String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
const maxStep = () => RELEASE.items.length - 1;

function itemRow(it, i) {
  const cls = i === state.step ? "current" : (i < state.step ? "past" : "");
  return `<div class="item ${cls}">
    <div class="top"><span class="chip ${it.tag}">${esc(it.tagLabel)}</span></div>
    <h3>${esc(it.title)}</h3>
    <p>${esc(it.what)}</p>
  </div>`;
}

function render() {
  const shown = RELEASE.items.slice(0, state.step + 1).map(itemRow).join("");
  const cur = RELEASE.items[state.step];
  const impact = `<div class="card"><div class="stripe"></div>
      <div class="kind">${esc(cur.impact.kind)}</div>
      <h3>${esc(cur.title)}</h3>
      ${cur.impact.lines.map(l => `<div class="row"><span class="tick">✓</span><span>${esc(l)}</span></div>`).join("")}
      <div class="added">▲ ${esc(cur.tagLabel)} in ${esc(RELEASE.product)} ${esc(RELEASE.version)}</div></div>`;

  stage.innerHTML = `
    <div class="phone"><div class="screen">
      <div class="app-head"><div class="av">✳️</div>
        <div><div class="nm">${esc(RELEASE.product)} · What's New</div><div class="st">${RELEASE.items.length} changes · ${esc(RELEASE.captured)}</div></div>
        <div class="vpill">${esc(RELEASE.version)}</div></div>
      <div class="feed" id="feed">${shown}</div>
    </div></div>
    <div class="arrow"><div class="ar">➜</div><div class="cap">each change → what it does for you</div></div>
    ${impact}`;

  const feed = document.getElementById("feed");
  if (feed) { const c = feed.querySelector(".item.current"); if (c) c.scrollIntoView({ block: "nearest" }); }

  document.getElementById("prodName").textContent = RELEASE.product;
  document.getElementById("verName").textContent = RELEASE.version;
  document.getElementById("stepHint").innerHTML = `Change <b>${state.step + 1}</b> of <b>${maxStep() + 1}</b>`;
  document.getElementById("prev").disabled = state.step <= 0;
  document.getElementById("next").disabled = state.step >= maxStep();
  updatePrompt();
}

/* §7 — natural-language instruction; names only the non-default choices */
function updatePrompt() {
  document.getElementById("promptOut").innerHTML =
    `Build a <b>release-notes player</b> for <b>${esc(RELEASE.product)} ${esc(RELEASE.version)}</b>: a `
    + `user-story-player playground (cool-glass) where Play steps through each change in a device feed `
    + `and a flow arrow reveals the impact card for the current change.`;
}

function stop() { state.playing = false; clearTimeout(timer); document.getElementById("play").innerHTML = "▶ Play"; }
function play() {
  if (state.playing) return stop();
  state.playing = true; document.getElementById("play").innerHTML = "⏸ Pause"; state.step = -1;
  const tick = () => {
    if (!state.playing) return;
    if (state.step >= maxStep()) return stop();
    state.step++; render();
    timer = setTimeout(tick, 1600);
  };
  tick();
}

document.getElementById("play").addEventListener("click", play);
document.getElementById("prev").addEventListener("click", () => { stop(); state.step = Math.max(0, state.step - 1); render(); });
document.getElementById("next").addEventListener("click", () => { stop(); state.step = Math.min(maxStep(), state.step + 1); render(); });
document.getElementById("dirToggle").addEventListener("click", e => {
  state.rtl = !state.rtl; document.documentElement.dir = state.rtl ? "rtl" : "ltr"; e.currentTarget.setAttribute("aria-pressed", state.rtl);
});
document.getElementById("copyBtn").addEventListener("click", () => {
  navigator.clipboard.writeText(document.getElementById("promptOut").textContent).then(() => {
    const b = document.getElementById("copyBtn"); b.textContent = "✓ Copied"; b.classList.add("done");
    setTimeout(() => { b.textContent = "📋 Copy prompt"; b.classList.remove("done"); }, 1500);
  });
});

render();
</script>
</body>
</html>
