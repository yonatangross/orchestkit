<!DOCTYPE html>
<html lang="en">
<!--
  LIVING PLAN template (LPP v2) — a plan playground that tracks its own execution.

  Contract (the part that makes it "living"):
  • ONE plan = ONE file. Sessions UPDATE the STATE block below in place; never fork a
    second file for the same plan slug. Git history is the timeline.
  • The visual layer renders FROM state. A dumb updater that only mutates the JSON is
    legal and sufficient; every tab re-paints on reload.
  • Every item carries `evidence`: the command/check that PROVES done. Marking an item
    done without evidence is a contract violation, not a style choice.
  • `changelog` is append-only. Merges never drop items; removed work moves to
    status "dropped" with a reason. Ideas rejected at planning time live in `discards`
    (with reasons) so the plan also remembers what it chose NOT to do.

  Depth guide (what a GOOD instance carries — thin instances are the failure mode):
  • per-item: before / after states, detail with the NUMBERS that justified it,
    risk + failure mode + containment, evidence, owner.
  • plan-level: 5-8 scored dimensions with a target, discards with reasons,
    research notes with sources, append-only changelog.

  Reuse: copy this file, replace STATE, keep the engine. Run the §10 self-audit in
  playground-visual-standard.md before shipping. Archetype family: DASHBOARD (living).
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Plan</title>
<style>
  :root{
    --bg:#0f1117; --surface:#171a23; --surface2:#1e2230; --border:#2a2f42;
    --text:#e8eaf2; --muted:#9aa0b5; --accent:#7c9aff; --ok:#4ade80;
    --warn:#fbbf24; --risk:#f87171; --info:#38bdf8;
    font-size:15px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Text',Inter,sans-serif;line-height:1.55;padding:32px 20px 80px}
  .wrap{max-inline-size:1100px;margin-inline:auto}
  h1{font-size:1.7rem;letter-spacing:-.02em}
  h2{font-size:1.15rem;margin-block:32px 14px;color:var(--accent)}
  .sub{color:var(--muted);margin-block:6px 24px;font-size:.92rem}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
  .kpi b{display:block;font-size:1.3rem;font-variant-numeric:tabular-nums}
  .kpi span{color:var(--muted);font-size:.78rem}
  .kpi.ok b{color:var(--ok)} .kpi.warn b{color:var(--warn)} .kpi.info b{color:var(--info)}
  .tabs{display:flex;gap:8px;margin-block:24px 18px;flex-wrap:wrap}
  .tab{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:999px;cursor:pointer;font-size:.88rem}
  .tab.active{background:var(--accent);color:#0b0d14;border-color:var(--accent);font-weight:600}
  .panel{display:none} .panel.active{display:block}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-block-end:14px}
  .card h3{font-size:1rem;margin-block-end:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .meta{display:flex;gap:8px;flex-wrap:wrap;margin-block:8px}
  .chip{font-size:.72rem;padding:2px 10px;border-radius:999px;border:1px solid var(--border);color:var(--muted);white-space:nowrap}
  .bar{block-size:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-block-start:4px}
  .bar i{display:block;block-size:100%;border-radius:4px;background:var(--accent)}
  .score-row{display:grid;grid-template-columns:170px 1fr 46px;gap:10px;align-items:center;margin-block:5px;font-size:.85rem}
  .score-row .v{text-align:end;font-variant-numeric:tabular-nums;color:var(--muted)}
  table{inline-size:100%;border-collapse:collapse;font-size:.85rem}
  th,td{text-align:start;padding:8px 10px;border-block-end:1px solid var(--border);vertical-align:top}
  th{color:var(--muted);font-weight:600;font-size:.76rem;text-transform:uppercase;letter-spacing:.05em}
  td.num{font-variant-numeric:tabular-nums;white-space:nowrap}
  .note{border-inline-start:3px solid var(--warn);padding:10px 14px;background:var(--surface);border-radius:0 8px 8px 0;margin-block:12px;font-size:.88rem;color:var(--muted)}
  .src{font-size:.8rem;color:var(--muted)}
  .ba{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-block-start:8px;font-size:.82rem}
  .ba>div{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px}
  .ba b{display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-block-end:2px}
  .strike{color:var(--muted);text-decoration:line-through}
  details summary{cursor:pointer;color:var(--muted);font-size:.82rem;margin-block-start:6px}
  @media(max-width:720px){.ba{grid-template-columns:1fr}}
  @media (prefers-reduced-motion: no-preference){
    .card{transition:border-color .15s ease}
    .card:hover{border-color:var(--accent)}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1 id="lpp-title">Living Plan</h1>
  <p class="sub" id="lpp-sub"></p>
  <div class="kpis" id="lpp-kpis"></div>
  <div class="tabs" id="lpp-tabs"></div>
  <div id="lpp-panels"></div>
</div>

<!-- ═══════════ STATE — the only block sessions edit. Append, flip statuses, never fork. ═══════════ -->
<script type="application/json" id="lpp-state">
{
  "lpp": 2,
  "slug": "example-plan",
  "title": "Example Plan",
  "created": "2026-01-01",
  "updated": "2026-01-01T00:00:00Z",
  "score": {
    "dims": { "correctness": 0.0, "performance": 0.0, "simplicity": 0.0 },
    "composite": 0.0, "target": 0.0
  },
  "waves": [ { "id": "W0", "title": "first wave", "status": "planned" } ],
  "items": [
    {
      "id": "W0.1", "wave": "W0", "title": "First item",
      "impact": 8.0, "effort": "30min", "risk": "low",
      "status": "planned",
      "before": "the measured bad state, with numbers",
      "after": "the promised end state, verifiable",
      "detail": "One-paragraph rationale with the numbers that justified this item.",
      "failure": "how this step goes wrong",
      "containment": "what limits the blast radius",
      "evidence": "the exact command/check that proves this is done",
      "owner": "agent"
    }
  ],
  "discards": [
    { "title": "Rejected idea", "reason": "why the gate discarded it (constraint / prior incident / marginal)" }
  ],
  "research": [
    { "title": "Finding", "note": "verified fact that shaped the plan", "source": "https://example.com" }
  ],
  "changelog": [ { "at": "2026-01-01", "note": "v1 authored." } ]
}
</script>

<script>
(function(){
  "use strict";
  const st = JSON.parse(document.getElementById('lpp-state').textContent);
  const C = {planned:'var(--muted)', in_progress:'var(--warn)', done:'var(--ok)', dropped:'var(--risk)'};
  const L = {planned:'○ planned', in_progress:'◐ in progress', done:'✓ done', dropped:'✗ dropped'};
  const RC = {low:'var(--ok)', med:'var(--warn)', medium:'var(--warn)', high:'var(--risk)'};
  const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;');
  const chip = (txt,color) => '<span class="chip"'+(color?' style="border-color:'+color+';color:'+color+'"':'')+'>'+esc(txt)+'</span>';

  document.getElementById('lpp-title').textContent = st.title;
  document.title = st.title;
  document.getElementById('lpp-sub').textContent =
    st.slug+' · created '+st.created+' · state updated '+String(st.updated).slice(0,16).replace('T',' ');

  const items=st.items, doneN=items.filter(i=>i.status==='done').length,
        ipN=items.filter(i=>i.status==='in_progress').length;
  document.getElementById('lpp-kpis').innerHTML = [
    {c:'ok',   v:st.score.composite+' → '+st.score.target, l:'score, now → target'},
    {c:'warn', v:doneN+'/'+items.length, l:'items done'+(ipN?' ('+ipN+' in progress)':'')},
    {c:'info', v:st.waves.filter(w=>w.status==='done').length+'/'+st.waves.length, l:'waves complete'},
    {c:'ok',   v:(st.discards||[]).length, l:'ideas deliberately discarded'}
  ].map(k=>'<div class="kpi '+k.c+'"><b>'+esc(k.v)+'</b><span>'+esc(k.l)+'</span></div>').join('');

  // ── panels ──
  const waveHtml = st.waves.map(w=>{
    const wi=items.filter(i=>i.wave===w.id), wd=wi.filter(i=>i.status==='done').length;
    return '<h2>'+esc(w.id)+' · '+esc(w.title)+' <span class="src">'+wd+'/'+wi.length+' done</span></h2>'+
      wi.map(i=>{
        let h='<div class="card"><h3>'+esc(i.id)+' · '+esc(i.title)+chip(L[i.status]||i.status,C[i.status])+'</h3>';
        h+='<div class="meta">'+
          (i.impact!=null?chip('impact '+i.impact,'var(--info)'):'')+
          (i.effort?chip(i.effort,'var(--ok)'):'')+
          (i.risk?chip('risk: '+i.risk,RC[i.risk]||'var(--muted)'):'')+
          (i.owner?chip(i.owner):'')+'</div>';
        if(i.detail) h+='<p class="src">'+esc(i.detail)+'</p>';
        if(i.before||i.after) h+='<div class="ba"><div><b>Before</b>'+esc(i.before||'')+'</div><div><b>After (promised)</b>'+esc(i.after||'')+'</div></div>';
        if(i.evidence) h+='<p class="src" style="margin-block-start:8px"><b>done when:</b> '+esc(i.evidence)+'</p>';
        if(i.failure||i.containment) h+='<details><summary>risk detail</summary><p class="src"><b>failure:</b> '+esc(i.failure||'?')+'<br><b>containment:</b> '+esc(i.containment||'?')+'</p></details>';
        return h+'</div>';
      }).join('');
  }).join('');

  const waveIds = st.waves.map(w=>w.id);
  const matrixHtml = '<h2>Progress matrix</h2><div class="card" style="overflow-x:auto"><table>'+
    '<tr><th>id</th><th>item</th><th>before</th><th>now</th>'+waveIds.map(w=>'<th>after '+esc(w)+'</th>').join('')+'</tr>'+
    items.map(i=>{
      const now = i.status==='done' ? '<span style="color:var(--ok)">✓ '+esc((i.after||'done').slice(0,60))+'</span>'
        : i.status==='in_progress' ? '<span style="color:var(--warn)">◐ in progress</span>'
        : i.status==='dropped' ? '<span class="strike">dropped</span>'
        : '<span style="color:var(--muted)">○ '+esc((i.before||'planned').slice(0,50))+'</span>';
      const cells = waveIds.map(w=>{
        if(w!==i.wave) return '<td class="src">·</td>';
        return '<td class="src">'+(i.status==='done'?'<span style="color:var(--ok)">landed</span>':esc((i.after||'').slice(0,60)))+'</td>';
      }).join('');
      return '<tr><td class="num">'+esc(i.id)+'</td><td>'+esc(i.title)+'</td><td class="src">'+esc((i.before||'').slice(0,60))+'</td><td>'+now+'</td>'+cells+'</tr>';
    }).join('')+'</table></div>'+
    '<div class="note">"Now" is computed from item statuses, never hand-written. A completed wave collapses into the Now column with a ✓.</div>';

  const dims=st.score.dims||{};
  const scoreHtml = '<h2>Plan scoring</h2><div class="card">'+
    Object.entries(dims).map(([k,v])=>'<div class="score-row"><span>'+esc(k)+'</span><div class="bar"><i style="inline-size:'+(v*10)+'%"></i></div><span class="v">'+v.toFixed(1)+'</span></div>').join('')+
    '<div class="score-row" style="border-block-start:1px solid var(--border);padding-block-start:8px;margin-block-start:8px"><b>Composite → target</b><div class="bar"><i style="inline-size:'+(st.score.composite*10)+'%;background:var(--ok)"></i></div><span class="v"><b>'+st.score.composite+'</b></span></div></div>';

  const riskHtml = '<h2>Risk heat map</h2><div class="card"><table>'+
    '<tr><th>item</th><th>risk</th><th>failure mode</th><th>containment</th></tr>'+
    items.filter(i=>i.failure||i.containment||i.risk==='high'||i.risk==='med'||i.risk==='medium').map(i=>
      '<tr><td class="num">'+esc(i.id)+'</td><td style="color:'+(RC[i.risk]||'var(--muted)')+'">'+esc(i.risk||'?')+'</td><td class="src">'+esc(i.failure||'')+'</td><td class="src">'+esc(i.containment||'')+'</td></tr>'
    ).join('')+'</table></div>';

  const discardsHtml = '<h2>Discarded (with reasons)</h2><div class="card"><table>'+
    '<tr><th>idea</th><th>why discarded</th></tr>'+
    (st.discards||[]).map(d=>'<tr><td class="strike">'+esc(d.title)+'</td><td class="src">'+esc(d.reason)+'</td></tr>').join('')+
    '</table></div><div class="note">A plan that remembers what it rejected does not re-litigate it next session.</div>';

  const researchHtml = '<h2>Research that shaped the plan</h2>'+
    (st.research||[]).map(r=>'<div class="card"><h3>'+esc(r.title)+'</h3><p class="src">'+esc(r.note)+
      (r.source?' · <a href="'+esc(r.source)+'" style="color:var(--info)">source</a>':'')+'</p></div>').join('');

  const updatesHtml = '<h2>Updates (append-only)</h2><div class="card"><table>'+
    '<tr><th>when</th><th>note</th></tr>'+
    (st.changelog||[]).slice().reverse().map(e=>'<tr><td class="num">'+esc(e.at)+'</td><td>'+esc(e.note)+'</td></tr>').join('')+
    '</table></div>'+
    '<div class="note">This is a LIVING artifact (lpp v'+st.lpp+'). Sessions mutate the state block in this same file; never fork a second file for slug "'+esc(st.slug)+'".</div>';

  const panels=[
    {id:'waves',label:'Execution waves',html:waveHtml},
    {id:'matrix',label:'Progress matrix',html:matrixHtml},
    {id:'scores',label:'Scores',html:scoreHtml},
    {id:'risk',label:'Risk map',html:riskHtml},
    {id:'discards',label:'Discards',html:discardsHtml}
  ];
  if((st.research||[]).length) panels.push({id:'research',label:'Research',html:researchHtml});
  panels.push({id:'updates',label:'Updates',html:updatesHtml});

  document.getElementById('lpp-tabs').innerHTML =
    panels.map((p,i)=>'<button class="tab'+(i===0?' active':'')+'" data-t="'+p.id+'">'+p.label+'</button>').join('');
  document.getElementById('lpp-panels').innerHTML =
    panels.map((p,i)=>'<div class="panel'+(i===0?' active':'')+'" id="p-'+p.id+'">'+p.html+'</div>').join('');

  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('p-'+t.dataset.t).classList.add('active');
  }));
})();
</script>
</body>
</html>
