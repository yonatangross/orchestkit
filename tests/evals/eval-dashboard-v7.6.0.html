<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrchestKit v7.6.0 — Eval Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--green:#3fb950;--green-bg:rgba(63,185,80,.12);--yellow:#d29922;--yellow-bg:rgba(210,153,34,.12);--red:#f85149;--red-bg:rgba(248,81,73,.12);--blue:#58a6ff;--purple:#bc8cff}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;padding:24px;max-width:1200px;margin:0 auto}
h1{font-size:24px;font-weight:600;margin-bottom:4px}
.subtitle{color:var(--text2);font-size:14px;margin-bottom:24px}
.subtitle span{color:var(--text);font-weight:500}

/* Summary cards */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center}
.card .num{font-size:32px;font-weight:700;line-height:1.2}
.card .label{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.card.green .num{color:var(--green)}.card.yellow .num{color:var(--yellow)}.card.red .num{color:var(--red)}.card.blue .num{color:var(--blue)}

/* Filters */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filters button{background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;transition:all .15s}
.filters button:hover{border-color:var(--text2)}
.filters button.active{background:var(--blue);border-color:var(--blue);color:#fff}

/* Sort */
.sort-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center}
.sort-bar span{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.sort-bar select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;font-size:13px;cursor:pointer}

/* Skill rows */
.skill{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;transition:border-color .15s}
.skill:hover{border-color:var(--text2)}
.skill-header{display:grid;grid-template-columns:160px 1fr 80px 80px 80px 120px;align-items:center;padding:12px 16px;cursor:pointer;gap:8px}
.skill-name{font-weight:600;font-size:14px}
.bar-cell{position:relative;height:24px}
.bar-bg{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--surface2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .3s ease}
.bar-fill.with{background:var(--blue);opacity:.8}
.bar-fill.base{background:var(--text2);opacity:.4}
.bar-stack{position:relative;height:24px}
.bar-label{position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:600;z-index:1}
.score{font-size:13px;text-align:center;font-variant-numeric:tabular-nums}
.delta{font-size:13px;text-align:center;font-weight:600;font-variant-numeric:tabular-nums}
.delta.pos{color:var(--green)}.delta.neg{color:var(--red)}.delta.zero{color:var(--text2)}
.verdict{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;padding:4px 10px;border-radius:12px;text-align:center;white-space:nowrap}
.verdict.adds{background:var(--green-bg);color:var(--green)}
.verdict.neutral{background:var(--yellow-bg);color:var(--yellow)}
.verdict.regresses{background:var(--red-bg);color:var(--red)}
.expand-icon{color:var(--text2);font-size:12px;text-align:right;transition:transform .2s}
.skill.open .expand-icon{transform:rotate(90deg)}

/* Detail panel */
.skill-detail{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.skill.open .skill-detail{display:block}
.assertion-row{display:grid;grid-template-columns:1fr 80px 80px;padding:6px 0;font-size:13px;border-bottom:1px solid var(--surface2)}
.assertion-row:last-child{border-bottom:none}
.assertion-name{color:var(--text2)}
.assertion-result{text-align:center;font-weight:600;font-size:12px}
.assertion-result.pass{color:var(--green)}.assertion-result.fail{color:var(--red)}.assertion-result.eq{color:var(--text2)}
.detail-header{display:grid;grid-template-columns:1fr 80px 80px;padding:8px 0;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.eval-label{font-size:12px;color:var(--purple);font-weight:600;padding:12px 0 4px;text-transform:uppercase;letter-spacing:.5px}

/* Col headers */
.col-headers{display:grid;grid-template-columns:160px 1fr 80px 80px 80px 120px;padding:4px 16px;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;gap:8px}
.col-headers>div:nth-child(3),.col-headers>div:nth-child(4),.col-headers>div:nth-child(5){text-align:center}

/* Prompt output */
.prompt-section{margin-top:32px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.prompt-section h3{font-size:14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.prompt-text{font-family:'SF Mono',Monaco,Consolas,monospace;font-size:12px;color:var(--text2);line-height:1.6;white-space:pre-wrap;max-height:200px;overflow-y:auto}
.copy-btn{background:var(--blue);color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;transition:opacity .15s}
.copy-btn:hover{opacity:.85}
.copy-btn.copied{background:var(--green)}
</style>
</head>
<body>
<h1>OrchestKit v7.6.0 — Eval Dashboard</h1>
<p class="subtitle">Quality evaluation: <span>17 skills</span> &middot; with-skill vs baseline &middot; Claude-as-judge &middot; <span>2026-03-14</span></p>

<div class="summary">
  <div class="card blue"><div class="num">17</div><div class="label">Skills Evaluated</div></div>
  <div class="card green"><div class="num">4</div><div class="label">Adds Value</div></div>
  <div class="card yellow"><div class="num">9</div><div class="label">Neutral</div></div>
  <div class="card red"><div class="num">4</div><div class="label">Regresses</div></div>
</div>

<div class="filters">
  <button class="active" data-filter="all">All (17)</button>
  <button data-filter="adds">Adds Value (4)</button>
  <button data-filter="neutral">Neutral (9)</button>
  <button data-filter="regresses">Regresses (4)</button>
</div>

<div class="sort-bar">
  <span>Sort by</span>
  <select id="sortSelect">
    <option value="name">Name</option>
    <option value="delta-desc">Delta (best first)</option>
    <option value="delta-asc">Delta (worst first)</option>
    <option value="with-desc">With-Skill Score</option>
    <option value="verdict">Verdict</option>
  </select>
</div>

<div class="col-headers">
  <div>Skill</div>
  <div>Score Comparison</div>
  <div>With</div>
  <div>Base</div>
  <div>Delta</div>
  <div>Verdict</div>
</div>

<div id="skillList"></div>

<div class="prompt-section">
  <h3>Summary Prompt <button class="copy-btn" onclick="copyPrompt()">Copy</button></h3>
  <div class="prompt-text" id="promptOutput"></div>
</div>

<script>

   evals:[{label:"Eval 1: skill listing",assertions:[
     {name:"dynamic discovery",w:"fail",b:"fail"},{name:"categorized output",w:"fail",b:"pass"},
     {name:"includes usage examples",w:"fail",b:"pass"},{name:"covers user-invocable skills",w:"fail",b:"pass"},

   evals:[{label:"Eval 1: registration flow",assertions:[

   evals:[{label:"Eval 1: team invitation PRD",assertions:[

let activeFilter = 'all';
let sortBy = 'name';

function renderSkills() {
  const list = document.getElementById('skillList');
  let filtered = DATA.filter(s => activeFilter === 'all' || s.verdict === activeFilter);

  filtered.sort((a, b) => {
    switch(sortBy) {
      case 'delta-desc': return b.delta - a.delta;
      case 'delta-asc': return a.delta - b.delta;
      case 'with-desc': return b.with - a.with;
      case 'verdict': {
        const order = {adds:0,neutral:1,regresses:2};
        return (order[a.verdict]||1) - (order[b.verdict]||1);
      }
      default: return a.name.localeCompare(b.name);
    }
  });

  list.innerHTML = filtered.map(s => {
    const deltaClass = s.delta > 0 ? 'pos' : s.delta < 0 ? 'neg' : 'zero';
    const deltaStr = s.delta > 0 ? `+${s.delta}%` : s.delta < 0 ? `${s.delta}%` : '0%';
    const verdictClass = s.verdict === 'adds' ? 'adds' : s.verdict === 'regresses' ? 'regresses' : 'neutral';
    const verdictText = s.verdict === 'adds' ? 'Adds Value' : s.verdict === 'regresses' ? 'Regresses' : 'Neutral';
    const maxScore = Math.max(s.with, s.base, 1);

    const detailHTML = s.evals.map(ev => `
      <div class="eval-label">${ev.label}</div>
      <div class="detail-header"><div>Assertion</div><div>With</div><div>Base</div></div>
      ${ev.assertions.map(a => {
        const same = a.w === a.b;
        return `<div class="assertion-row">
          <div class="assertion-name">${a.name}</div>
          <div class="assertion-result ${a.w}">${a.w === 'pass' ? 'PASS' : 'FAIL'}</div>
          <div class="assertion-result ${a.b}${same ? ' eq' : ''}">${a.b === 'pass' ? 'PASS' : 'FAIL'}${same ? ' =' : ''}</div>
        </div>`;
      }).join('')}
    `).join('');

    return `<div class="skill" data-name="${s.name}" onclick="this.classList.toggle('open')">
      <div class="skill-header">
        <div class="skill-name">${s.name}</div>
        <div class="bar-cell">
          <div style="display:flex;flex-direction:column;gap:2px;height:100%">
            <div style="flex:1;position:relative"><div class="bar-bg"><div class="bar-fill with" style="width:${s.with}%"></div></div><div class="bar-label" style="color:var(--blue)">${s.with}%</div></div>
            <div style="flex:1;position:relative"><div class="bar-bg"><div class="bar-fill base" style="width:${s.base}%"></div></div><div class="bar-label" style="color:var(--text2)">${s.base}%</div></div>
          </div>
        </div>
        <div class="score">${s.with}%</div>
        <div class="score">${s.base}%</div>
        <div class="delta ${deltaClass}">${deltaStr}</div>
        <div><span class="verdict ${verdictClass}">${verdictText}</span></div>
      </div>
      <div class="skill-detail">${detailHTML}</div>
    </div>`;
  }).join('');

  updatePrompt();
}

function updatePrompt() {
  const adds = DATA.filter(s => s.verdict === 'adds');
  const regresses = DATA.filter(s => s.verdict === 'regresses');
  const neutral = DATA.filter(s => s.verdict === 'neutral');
  const avgWith = Math.round(DATA.reduce((a,s) => a + s.with, 0) / DATA.length);
  const avgBase = Math.round(DATA.reduce((a,s) => a + s.base, 0) / DATA.length);

  const lines = [
    `OrchestKit v7.6.0 quality eval summary (${new Date().toISOString().slice(0,10)}):`,
    ``,
    `Evaluated 17 skills with A/B comparison (with-skill vs baseline Claude).`,
    `Average score: ${avgWith}% with-skill vs ${avgBase}% baseline (delta ${avgWith >= avgBase ? '+' : ''}${avgWith - avgBase}%).`,
    ``,
    `Skills that ADD VALUE (${adds.length}):`,
    ...adds.map(s => `  - ${s.name}: ${s.with}% vs ${s.base}% (D +${s.delta}%)`),
    ``,
    `Skills that REGRESS (${regresses.length}):`,
    ...regresses.map(s => `  - ${s.name}: ${s.with}% vs ${s.base}% (D ${s.delta}%)`),
    ``,
    `NEUTRAL skills (${neutral.length}): ${neutral.map(s=>s.name).join(', ')}`,
    ``,
    `Key observations:`,
    `- brainstorm and explore show the clearest skill value (+20%, +17%)`,
    `- help skill excels at filtered queries (+100%) but regresses on broad listing (-60%)`,
    `- memory, remember, setup, write-prd regress — likely due to tool/MCP dependency in eval context`,
    `- Many skills are non-discriminating (both pass or both fail) — assertions may need tuning`
  ];
  document.getElementById('promptOutput').textContent = lines.join('\n');
}

// Filter buttons
document.querySelectorAll('.filters button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderSkills();
  });
});

// Sort select
document.getElementById('sortSelect').addEventListener('change', e => {
  sortBy = e.target.value;
  renderSkills();
});

function copyPrompt() {
  const text = document.getElementById('promptOutput').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

renderSkills();
</script>
</body>
</html>
