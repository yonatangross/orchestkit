# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: ui-components
name: "UI components skill evaluation"
skill_path: src/skills/ui-components/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I need to build a button component that supports multiple visual
      variants (primary, destructive, outline, ghost) and sizes (sm, md, lg).
      It should be composable and avoid wrapper div pollution. Using React
      with Tailwind CSS.
    assertions:
      - name: "CVA variant system"
        check: "uses class-variance-authority (CVA) for defining type-safe multi-axis variants rather than manual conditional classNames"
      - name: "cn utility for class merging"
        check: "uses a cn() or clsx/twMerge utility to merge Tailwind classes and avoid conflicts, not raw string concatenation"
      - name: "asChild composition"
        check: "mentions or uses asChild pattern (Radix Slot) to avoid unnecessary wrapper divs for polymorphic rendering"

  - prompt: |
      I'm building a dialog that opens from a dropdown menu item. When the
      user clicks 'Delete' in the dropdown, a confirmation dialog should appear.
      The dropdown should close when the dialog opens. React with accessible
      component primitives.
    assertions:
      - name: "Dialog accessibility"
        check: "includes Dialog.Title (or equivalent accessible title) for screen reader support — every dialog must have a title"
      - name: "Portal rendering"
        check: "renders dialog content through a portal to avoid z-index and overflow issues"
      - name: "data-state styling"
        check: "uses data attributes (data-state=open/closed) or equivalent for animation and styling rather than manual state-based class toggling"

  - prompt: |
      I want to set up a consistent color theme for my React app that supports
      light and dark mode. Colors should look perceptually consistent across
      different hues. Using Tailwind CSS v4.
    assertions:
      - name: "OKLCH color space"
        check: "recommends OKLCH color format for perceptually uniform theming instead of HSL or hex"
      - name: "CSS custom properties theming"
        check: "uses CSS custom properties (variables) for theme colors so dark mode swaps values without changing component code"
      - name: "no hardcoded hex values"
        check: "advises against hardcoding hex or rgb values directly in components — references design tokens or CSS variables instead"

tags: [ui-components, background, frontend]
