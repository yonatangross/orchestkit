# Created: 2026-03-14

id: product-analytics
name: "Product analytics skill evaluation"
skill_path: src/skills/product-analytics/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      We ran an A/B test on our checkout flow for 3 weeks. The new
      design shows a 4% lift in conversion, p-value is 0.08, and we
      had 2000 users per variant. The PM wants to ship it. Should we?
    assertions:
      - name: "underpowered result identification"
        check: "identifies this as an underpowered result (p > 0.05) and recommends EXTEND (add more runtime) rather than SHIP"
      - name: "confidence interval check"
        check: "checks whether the confidence interval excludes zero before declaring a win — a p-value of 0.08 means CI likely includes zero"
      - name: "no early stopping"
        check: "warns against stopping early or peeking at results, as it inflates false-positive rates"

  - prompt: |
      Our SaaS product launched a new collaboration feature 8 weeks ago.
      We want to understand if users who tried the feature are retaining
      better than those who didn't. How should we measure this?
    assertions:
      - name: "cohort retention analysis"
        check: "recommends cohort retention analysis comparing feature-adopters vs non-adopters with day-N retention curves"
      - name: "retention benchmarks"
        check: "references retention benchmarks (e.g., Day 7: 20-35%, Day 30: 10-20% for SaaS) to contextualize the results"
      - name: "behavior-based cohort definition"
        check: "defines cohorts based on behavior (used feature vs did not) rather than arbitrary time-based grouping"

  - prompt: |
      Our signup-to-purchase funnel shows: 10,000 visitors, 3,000 signups,
      800 activated, 200 subscribers. The team wants to know where to
      focus optimization efforts. How should we analyze this?
    assertions:
      - name: "largest drop-off first"
        check: "identifies the largest absolute drop-off in the funnel and recommends optimizing that stage first for maximum impact"
      - name: "stage-by-stage conversion rates"
        check: "calculates conversion rates between each stage (visitors to signups, signups to activated, activated to subscribers)"
      - name: "segmented analysis"
        check: "recommends segmenting the funnel by key dimensions (device, source, plan tier) to avoid Simpson's paradox"

tags: [product-analytics, background, product]
