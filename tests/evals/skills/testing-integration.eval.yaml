quality_evals:
  - prompt: |
      We have a Node.js orders service that depends on a payments service
      and an inventory service via REST APIs. Both teams deploy independently.
      How do we test that our integrations won't break when they change
      their API contracts?
    assertions:
      - name: "Pact contract testing"
        check: "recommends Pact or consumer-driven contract testing to verify API contracts between services"
      - name: "matchers over exact values"
        check: "suggests using flexible matchers like Like(), EachLike(), or Term() instead of exact value matching in contracts"
      - name: "broker or CI verification"
        check: "mentions Pact Broker or CI pipeline integration for provider verification"

  - prompt: |
      I'm building a FastAPI app and want to test my API endpoints properly.
      Currently I just call the functions directly in tests, but I'm missing
      bugs related to request validation and serialization. Using pytest.
    assertions:
      - name: "HTTP client testing"
        check: "recommends using httpx AsyncClient or TestClient to test actual HTTP request/response cycles, not just function calls"
      - name: "boundary validation"
        check: "tests API input validation by sending invalid data and asserting proper 400/422 error responses"
      - name: "test isolation"
        check: "recommends fresh state per test via in-memory database, transaction rollback, or test fixtures"

  - prompt: |
      Our TypeScript API accepts complex nested JSON payloads for creating
      orders with line items. We keep getting runtime errors from malformed
      requests that slip past our tests. How should we validate inputs?
    assertions:
      - name: "Zod schema validation"
        check: "recommends Zod for runtime schema validation at API boundaries"
      - name: "safeParse usage"
        check: "uses .safeParse() or .parse() to validate inputs and handle validation errors gracefully"
      - name: "schema rejection tests"
        check: "includes testing that invalid inputs are properly rejected with appropriate error messages"

  - prompt: |
      I have encode/decode functions for a custom serialization format.
      Sometimes edge cases break the roundtrip — encoding then decoding
      doesn't return the original value. How should I test this thoroughly?
    assertions:
      - name: "property-based testing"
        check: "recommends property-based testing with Hypothesis or fast-check for roundtrip/idempotence verification"
      - name: "roundtrip property"
        check: "describes the roundtrip property pattern: decode(encode(x)) == x for all valid inputs"

tags: [testing-integration, background, testing, contract, pact, zod]
