# Created: 2026-03-14

id: user-research
name: "User research evaluation"
skill_path: src/skills/user-research/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I'm building a DevOps tool and need to create user personas.
      How should I structure them to be actually useful for the team,
      not just vague demographics?
    assertions:
      - name: "goals and pain points"
        check: "includes specific goals and pain points in the persona, not just demographics"
      - name: "actionable key insight"
        check: "includes a key insight or characteristic quote that captures the persona's mindset"
      - name: "3-5 persona limit"
        check: "recommends keeping to 3-5 personas maximum"

  - prompt: |
      We're redesigning our onboarding flow and want to understand
      the full customer experience from awareness to adoption. What
      tool should I use to map this?
    assertions:
      - name: "journey map"
        check: "recommends a customer journey map to visualize the end-to-end experience"
      - name: "stage-by-stage breakdown"
        check: "breaks the journey into stages like awareness, evaluation, onboarding, adoption"
      - name: "emotions and pain points"
        check: "captures user emotions and pain points at each stage alongside actions"

  - prompt: |
      We're trying to understand why users aren't using our export
      feature. Should we run a survey or interviews? We don't know
      what the problem is yet.
    assertions:
      - name: "interviews for discovery"
        check: "recommends interviews for early discovery when you don't know the unknowns"
      - name: "5-8 participants"
        check: "suggests 5-8 participants as a sufficient sample size for user interviews"
      - name: "open-ended questions"
        check: "advises asking open-ended questions and following interesting threads"

tags: [user-research, background, product]
