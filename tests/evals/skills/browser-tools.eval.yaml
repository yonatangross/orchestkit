# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: browser-tools
name: "Browser tools evaluation"
skill_path: src/skills/browser-tools/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I need to scrape product prices from an e-commerce site. The page
      uses React and loads content dynamically. How should I extract
      the data?
    assertions:
      - name: "WebFetch first fallback"
        check: "recommends trying WebFetch first before resorting to full browser automation"
      - name: "wait for dynamic content"
        check: "mentions waiting for elements or network idle before extracting from SPAs"
      - name: "rate limiting"
        check: "advises adding delays between requests or respecting rate limits"

  - prompt: |
      I need to automate a login flow on a website, then navigate to
      a dashboard and take a screenshot. How do I handle the
      authentication state?
    assertions:
      - name: "auth vault or state save"
        check: "mentions saving auth state via vault or session state for reuse"
      - name: "no hardcoded credentials"
        check: "warns against hardcoding passwords in automation scripts"
      - name: "snapshot workflow"
        check: "suggests using snapshot to verify page state before taking screenshots"

  - prompt: |
      I want to compare the visual appearance of my staging and
      production sites side by side. How can I do that with
      browser automation?
    assertions:
      - name: "diff url command"
        check: "recommends using diff url to compare two URLs side by side"
      - name: "screenshot comparison"
        check: "mentions screenshot-based visual comparison or diff screenshot"
      - name: "selector targeting"
        check: "suggests targeting specific elements with selectors for focused comparison"

tags: [browser-tools, background, automation]
