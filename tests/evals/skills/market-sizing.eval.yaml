id: market-sizing
name: "Market sizing skill evaluation"
skill_path: src/skills/market-sizing/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      We're building an AI-powered resume screening tool for HR
      departments. I need to estimate the market opportunity for our
      investor pitch. There are about 500K companies in the US with
      HR departments, and enterprise HR teams spend around $2000/year
      on screening tools. How do I size this market?
    assertions:
      - name: "TAM SAM SOM breakdown"
        check: "provides all three levels: TAM (total addressable market), SAM (serviceable addressable market), and SOM (serviceable obtainable market)"
      - name: "top-down calculation"
        check: "applies top-down method: TAM = number of potential customers multiplied by annual value per customer"
      - name: "SOM with real-world constraints"
        check: "constrains SOM with realistic factors like sales capacity, competitive pressure, and go-to-market reach rather than just assuming a market share percentage"

  - prompt: |
      I calculated our TAM as $10B and told investors our SOM is
      $1B (10% market share in year 3). They pushed back hard.
      What did I do wrong and how should I fix the market sizing?
    assertions:
      - name: "unconstrained SOM rejection"
        check: "identifies that claiming 10% of a large market without evidence is not credible — SOM must be constrained by actual sales capacity and GTM reach"
      - name: "bottom-up cross-validation"
        check: "recommends bottom-up calculation (number of acquirable customers times average deal size) to cross-validate the top-down estimate"
      - name: "reconciliation within 20%"
        check: "methods should reconcile within 20% divergence — if they diverge more, revisit assumptions"

  - prompt: |
      We're expanding our developer tools product into the European
      market. I need to size the opportunity for the EU specifically
      and present it to the leadership team. How should I segment
      this from our global TAM?
    assertions:
      - name: "SAM as geographic/segment filter"
        check: "defines SAM by applying geographic and segment filters to the global TAM to scope the EU-specific addressable market"
      - name: "confidence levels on estimates"
        check: "labels each estimate with a confidence level (high, medium, low) based on data recency and source quality"

tags: [market-sizing, background, product]
