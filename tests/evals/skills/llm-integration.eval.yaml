id: llm-integration
name: "LLM integration patterns evaluation"
skill_path: src/skills/llm-integration/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I need to add function calling to my LLM agent. It should be
      able to search documents and create tickets. How do I define
      the tool schemas?
    assertions:
      - name: "strict mode schemas"
        check: "recommends strict: true mode for tool definitions as a 2026 best practice"
      - name: "tool count limit"
        check: "advises keeping tools to 5-15 maximum per request"
      - name: "input validation"
        check: "recommends validating all tool inputs with Pydantic or Zod before execution"

  - prompt: |
      I want to stream LLM responses to my React frontend in real-time.
      What protocol should I use and how do I set up the backend
      endpoint?
    assertions:
      - name: "SSE recommendation"
        check: "recommends Server-Sent Events (SSE) for web streaming"
      - name: "FastAPI endpoint"
        check: "shows or describes an SSE endpoint pattern with async generator"
      - name: "backpressure handling"
        check: "mentions handling backpressure with bounded queues or buffers"

  - prompt: |
      I want to run an LLM locally for development to save on API
      costs. What's the best setup for a MacBook with Apple Silicon?
    assertions:
      - name: "Ollama recommendation"
        check: "recommends Ollama for local LLM inference"
      - name: "model suggestions"
        check: "suggests specific models appropriate for the task (e.g., deepseek-r1 for reasoning, qwen2.5-coder for coding)"
      - name: "cost savings"
        check: "mentions significant cost savings compared to cloud API calls"

tags: [llm-integration, background, ai-ml]
