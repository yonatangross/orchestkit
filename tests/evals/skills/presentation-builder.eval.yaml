# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: presentation-builder
name: "Presentation builder evaluation"
skill_path: src/skills/presentation-builder/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I need to create a slide deck for a tech conference talk about
      microservices. I want it to look professional and techy, not
      generic. Can you build it as a self-contained HTML file?
    assertions:
      - name: "zero dependency HTML"
        check: "generates a single self-contained HTML file with inline CSS and JS, no external dependencies"
      - name: "keyboard navigation"
        check: "includes keyboard navigation with arrow keys and space bar"
      - name: "viewport fitting"
        check: "ensures every slide fits exactly within the viewport with no scrolling"

  - prompt: |
      I have a PowerPoint file from our marketing team. Can you convert
      it to an animated HTML presentation that we can host on our
      website?
    assertions:
      - name: "PPT conversion mode"
        check: "supports converting .ppt/.pptx files to HTML presentations"
      - name: "content extraction"
        check: "extracts content, layout, and assets from the PowerPoint file"
      - name: "animations added"
        check: "adds CSS animations or transitions that the original PowerPoint may not have had"

  - prompt: |
      The slide I'm building has too much content — a table with 20
      rows, three code blocks, and two paragraphs. It overflows the
      viewport. What should I do?
    assertions:
      - name: "split into multiple slides"
        check: "recommends splitting content across multiple slides rather than scrolling"
      - name: "no scroll rule"
        check: "enforces that slides must never scroll — overflow: hidden on slide containers"
      - name: "content density limits"
        check: "references content density rules or maximum content per slide type"

tags: [presentation-builder, background, content]
