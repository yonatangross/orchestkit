# Created: 2026-03-14

id: accessibility
name: "Accessibility patterns evaluation"
skill_path: src/skills/accessibility/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I'm building a modal dialog in React. When it opens, keyboard focus
      goes to the page behind it and users can tab to elements underneath.
      How do I fix the focus management?
    assertions:
      - name: "focus trap pattern"
        check: "recommends FocusScope or equivalent focus trapping to contain focus within the modal"
      - name: "focus restoration"
        check: "suggests restoring focus to the trigger element when the modal closes"
      - name: "escape key dismissal"
        check: "mentions handling Escape key to close the modal"

  - prompt: |
      Our design team wants to use color-coded status badges: green for
      active, yellow for pending, red for error. No text labels, just
      colored dots. Is this accessible?
    assertions:
      - name: "color-only anti-pattern"
        check: "identifies that conveying information through color alone violates WCAG and excludes colorblind users"
      - name: "text or icon alternative"
        check: "recommends adding text labels, icons, or patterns alongside color to convey status"
      - name: "contrast ratio"
        check: "mentions minimum contrast ratio requirements (4.5:1 for text, 3:1 for UI components)"

  - prompt: |
      I have a custom dropdown menu built with divs and onClick handlers.
      Screen reader users are reporting they can't use it at all.
      What's wrong and how do I fix it?
    assertions:
      - name: "semantic HTML or ARIA roles"
        check: "recommends using native HTML elements (button, select) or proper ARIA roles (role=menu, role=menuitem)"
      - name: "keyboard navigation"
        check: "mentions implementing arrow key navigation and Enter/Space activation"
      - name: "div onClick anti-pattern"
        check: "identifies using div with onClick as an accessibility anti-pattern and recommends button or useButton"

tags: [accessibility, background, frontend]
