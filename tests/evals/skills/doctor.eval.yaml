# Generated by OrchestKit Claude Plugin
# Created: 2026-03-13

id: doctor
name: "Doctor skill evaluation"
skill_path: src/skills/doctor/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — direct requests
  - prompt: "run orchestkit doctor"
    should_trigger: true
  - prompt: "check if my orchestkit installation is healthy"
    should_trigger: true
  - prompt: "are my hooks configured correctly"
    should_trigger: true
  # Should trigger — casual/indirect phrasing
  - prompt: "something feels broken with ork, can you diagnose it"
    should_trigger: true
  - prompt: "why aren't my skills showing up, run a health check"
    should_trigger: true
  - prompt: "is my plugin setup working properly"
    should_trigger: true
  # Should NOT trigger — help confusion pair (both support/debug)
  - prompt: "what skills are available in orchestkit"
    should_trigger: false
  - prompt: "show me how to use the brainstorm skill"
    should_trigger: false
  - prompt: "list all user-invocable commands"
    should_trigger: false
  # Should NOT trigger — adjacent tasks
  - prompt: "set up orchestkit for this new project"
    should_trigger: false
  - prompt: "configure my plugin settings"
    should_trigger: false
  # Should trigger — terse phrasing
  - prompt: "doctor"
    should_trigger: true
  # Should NOT trigger — multi-intent, primary is setup
  - prompt: "set up orchestkit and then run a health check"
    should_trigger: false

quality_evals:
  - prompt: |
      run a full orchestkit health check and tell me if anything
      needs attention. i recently updated to a new version.
    assertions:
      - name: "checks multiple categories"
        check: "validates at least 5 health check categories (skills, agents, hooks, memory, build, etc.)"
      - name: "reports status per category"
        check: "shows pass/warn/fail status for each checked category"
      - name: "checks CC version"
        check: "validates the Claude Code version against the minimum required version"
      - name: "actionable remediation"
        check: "provides specific fix steps for any failures or warnings found"
      - name: "no false positives"
        check: "does NOT report healthy components as failing or warn about non-issues"

  - prompt: |
      just check if my hooks are working correctly, skip everything else
    assertions:
      - name: "scoped to hooks"
        check: "focuses diagnostic checks on hooks only, skipping skill and agent health"
      - name: "reports hook status"
        check: "shows pass/fail status for individual hooks (global, agent-scoped, skill-scoped)"
      - name: "quick format"
        check: "output is concise and focused, not a full diagnostic report"
      - name: "no unrelated checks"
        check: "does NOT run or report on skill validation, agent health, or memory system checks"

tags: [doctor, user-invocable, core]
