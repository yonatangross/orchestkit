# Generated by OrchestKit Claude Plugin
# Created: 2026-03-13

id: doctor
name: "Doctor skill evaluation"
skill_path: src/skills/doctor/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — direct requests
  - prompt: "run orchestkit doctor"
    should_trigger: true
  - prompt: "check if my orchestkit installation is healthy"
    should_trigger: true
  - prompt: "are my hooks configured correctly"
    should_trigger: true
  # Should trigger — casual/indirect phrasing
  - prompt: "something feels broken with ork, can you diagnose it"
    should_trigger: true
  - prompt: "why aren't my skills showing up, run a health check"
    should_trigger: true
  - prompt: "is my plugin setup working properly"
    should_trigger: true
  # Should NOT trigger — help confusion pair (both support/debug)
  - prompt: "what skills are available in orchestkit"
    should_trigger: false
  - prompt: "show me how to use the brainstorm skill"
    should_trigger: false
  - prompt: "list all user-invocable commands"
    should_trigger: false
  # Should NOT trigger — adjacent tasks
  - prompt: "set up orchestkit for this new project"
    should_trigger: false
  - prompt: "configure my plugin settings"
    should_trigger: false
  # Should trigger — terse phrasing
  - prompt: "doctor"
    should_trigger: true
  # Should NOT trigger — multi-intent, primary is setup
  - prompt: "set up orchestkit and then run a health check"
    should_trigger: false

quality_evals:
  - prompt: |
      what does an orchestkit health check cover? what categories
      does it validate and what kind of issues can it detect?
    assertions:
      - name: "multiple categories"
        check: "describes at least 5 health check categories (skills, agents, hooks, memory, build, CC version)"
      - name: "status reporting"
        check: "mentions pass/warn/fail status reporting for each category"
      - name: "CC version check"
        check: "mentions validating the Claude Code version against minimum required"
      - name: "remediation guidance"
        check: "explains that the doctor provides specific fix steps for failures"

  - prompt: |
      my hooks seem broken after an update. what would a hook-focused
      diagnostic check look for?
    assertions:
      - name: "hook categories"
        check: "identifies the three hook scopes: global, agent-scoped, and skill-scoped"
      - name: "common hook issues"
        check: "describes common hook problems: missing files, syntax errors, permission issues, stale references"
      - name: "scoped diagnosis"
        check: "recommends focusing on hooks specifically rather than running a full diagnostic"

tags: [doctor, user-invocable, core]
