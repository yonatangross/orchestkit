id: scope-appropriate-architecture
name: "Scope-appropriate architecture evaluation"
skill_path: src/skills/scope-appropriate-architecture/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I'm building a take-home assignment for a job interview. It's a simple
      REST API for a todo app — CRUD operations, maybe 4 hours of work.
      Should I use hexagonal architecture with DI containers and a repository pattern?
    assertions:
      - name: "identifies over-engineering"
        check: "clearly states that hexagonal architecture, DI containers, and repository pattern are OVERKILL for a take-home assignment"
      - name: "flat architecture recommendation"
        check: "recommends flat file structure with minimal layers — single file or 3-5 files maximum"
      - name: "appropriate tech choices"
        check: "suggests SQLite or JSON file for storage, no auth complexity, and 8-15 focused tests"

  - prompt: |
      We're a 3-person startup building an MVP. Our tech lead wants us to
      implement event sourcing, CQRS, and microservices from day one to be
      ready for scale. We have 3 months of runway. Is this the right approach?
    assertions:
      - name: "MVP tier detection"
        check: "identifies this as MVP/startup tier (Tier 3) where event sourcing, CQRS, and microservices are all overkill"
      - name: "monolith recommendation"
        check: "recommends MVC monolith with managed Postgres and simple auth (Clerk/Supabase)"
      - name: "upgrade path"
        check: "explains that complexity can be added incrementally later — you can always add but cannot easily remove"

  - prompt: |
      Our product has grown to 200k users, 8 engineers, and complex billing
      logic with multi-tenant isolation requirements. We're still running
      everything in a flat Express app with no module boundaries. What
      architecture level should we target now?
    assertions:
      - name: "growth tier identification"
        check: "identifies this as Growth (Tier 4) or Enterprise (Tier 5) scale requiring more structured architecture"
      - name: "appropriate patterns"
        check: "recommends modular monolith or bounded contexts, DI, Redis cache, background jobs, and monitoring"
      - name: "security always enforced"
        check: "notes that security rules (SQL parameterization, input validation, auth checks) apply regardless of tier"

tags: [scope-appropriate-architecture, background, architecture]
