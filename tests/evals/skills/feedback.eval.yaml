id: feedback
name: "Feedback system evaluation"
skill_path: src/skills/feedback/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I want to check what OrchestKit has learned from my usage patterns.
      How do I see the current feedback system status?
    assertions:
      - name: "status subcommand"
        check: "describes a status command that shows current feedback system state and learned patterns"
      - name: "data location"
        check: "references feedback data stored in .claude/feedback/ directory"
      - name: "agent performance"
        check: "mentions viewing agent performance metrics as part of the status"

  - prompt: |
      I'm concerned about privacy. What data does the OrchestKit
      feedback system collect and can I opt out of analytics sharing?
    assertions:
      - name: "opt-out mechanism"
        check: "provides an opt-out command to disable anonymous analytics sharing"
      - name: "privacy policy"
        check: "mentions a privacy policy or privacy command for viewing data handling details"
      - name: "GDPR compliance"
        check: "references GDPR-compliant consent management"

  - prompt: |
      The learned patterns seem wrong and are causing bad suggestions.
      How do I reset them without losing my other settings?
    assertions:
      - name: "reset command"
        check: "provides a reset command to clear learned patterns"
      - name: "confirmation required"
        check: "requires a confirmation step before resetting data"
      - name: "export before reset"
        check: "suggests or offers exporting feedback data before resetting"

tags: [feedback, background, workflow]
