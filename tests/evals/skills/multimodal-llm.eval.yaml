# Created: 2026-03-14

id: multimodal-llm
name: "Multimodal LLM patterns evaluation"
skill_path: src/skills/multimodal-llm/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I need to analyze product images uploaded by users — extract text,
      identify objects, and generate descriptions. Which vision model
      should I use and how do I send images to the API?
    assertions:
      - name: "base64 encoding"
        check: "shows base64 encoding of images before sending to the API"
      - name: "max_tokens setting"
        check: "recommends always setting max_tokens on vision requests to avoid truncation"
      - name: "image resizing"
        check: "advises resizing images before encoding to avoid exceeding size limits"

  - prompt: |
      I want to add voice interaction to my app — users speak a question
      and get a spoken answer back. Should I chain STT + LLM + TTS or
      is there a better approach?
    assertions:
      - name: "native speech-to-speech"
        check: "recommends native speech-to-speech models over chaining STT + LLM + TTS pipeline"
      - name: "real-time voice agents"
        check: "mentions real-time voice agent options with low latency"
      - name: "barge-in support"
        check: "mentions barge-in or interruption support for natural voice conversations"

  - prompt: |
      I want to generate a series of short marketing videos with a
      consistent character across all clips. Which AI video generation
      platform should I use?
    assertions:
      - name: "character consistency"
        check: "recommends Kling 3.0 with Character Elements for maintaining character identity across clips"
      - name: "async API pattern"
        check: "notes that video generation APIs are asynchronous and require polling or callbacks"
      - name: "cost consideration"
        check: "mentions pricing differences between platforms for high-volume vs high-quality use cases"

tags: [multimodal-llm, background, ai-ml]
