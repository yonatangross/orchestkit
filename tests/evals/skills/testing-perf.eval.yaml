quality_evals:
  - prompt: |
      We're launching a new API endpoint that needs to handle 500 concurrent
      users. How do I set up a load test to verify it meets our SLA of
      p95 response time under 500ms and less than 1% error rate?
    assertions:
      - name: "k6 or Locust recommendation"
        check: "recommends k6 or Locust as the load testing tool"
      - name: "threshold configuration"
        check: "configures performance thresholds for p95 latency (< 500ms) and error rate (< 1%)"
      - name: "staged ramp-up"
        check: "uses a staged ramp-up pattern (gradually increasing virtual users) rather than instant full load"

  - prompt: |
      Our pytest suite has 1200 tests and takes 25 minutes in CI.
      Most tests are independent and could run in parallel but we
      have some database-dependent tests that fail when parallelized.
      How do I speed this up?
    assertions:
      - name: "pytest-xdist parallel"
        check: "recommends pytest-xdist with -n auto for parallel test execution"
      - name: "worker database isolation"
        check: "addresses database isolation per worker using worker_id fixture to create separate test databases"
      - name: "loadscope distribution"
        check: "mentions --dist loadscope or loadgroup to keep fixture-dependent tests on the same worker"

  - prompt: |
      We need to test how our API handles a sudden traffic spike, like
      a flash sale. Also want to check for memory leaks under sustained
      load. What types of performance tests should I run?
    assertions:
      - name: "spike test pattern"
        check: "describes a spike test pattern with a sudden surge of virtual users (e.g., 10x normal) for a short duration"
      - name: "soak test pattern"
        check: "describes a soak test pattern with sustained normal load over hours to detect memory leaks"
      - name: "test type classification"
        check: "distinguishes between at least 3 test types from: load, stress, spike, and soak testing"

  - prompt: |
      I want to load test an authenticated API that requires JWT tokens.
      The test needs to simulate different user sessions with unique tokens.
      Our team uses JavaScript. What tool and approach should I use?
    assertions:
      - name: "k6 for JS teams"
        check: "recommends k6 for JavaScript/TypeScript teams"
      - name: "authenticated requests"
        check: "shows how to include authentication tokens (JWT/Bearer) in load test requests"

tags: [testing-perf, background, testing, performance, k6, locust]
