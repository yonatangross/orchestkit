quality_evals:
  - prompt: |
      implement a simple health check endpoint that returns
      the app version, uptime, and database connectivity status.
      include a test for it.
    scaffold: typescript-nextjs
    assertions:
      - name: "endpoint created"
        check: "creates a route/handler file for the health endpoint"
      - name: "returns required fields"
        check: "response includes version, uptime, and db status"
      - name: "test included"
        check: "creates a test file for the health endpoint"
      - name: "error handling"
        check: "handles database connection failure gracefully"

  - prompt: |
      add a search feature to the existing users list.
      needs debounced input, loading state, and empty state.
    scaffold: typescript-nextjs
    assertions:
      - name: "debounce implemented"
        check: "input has debounce logic to avoid excessive API calls"
      - name: "loading state"
        check: "shows loading indicator while search is in progress"
      - name: "empty state"
        check: "displays message when no results found"

tags: [implement, user-invocable, core]
