# NOTE: Interactive workflow skill — quality evals test knowledge, not orchestration.
# Full orchestration requires interactive session (AskUserQuestion).
# Generated by OrchestKit Claude Plugin
# Created: 2026-03-11

id: implement
name: "Implement skill evaluation"
skill_path: src/skills/implement/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — feature implementation requests
  - prompt: "build a user authentication system with JWT and refresh tokens"
    should_trigger: true
  - prompt: "add dark mode support to the dashboard"
    should_trigger: true
  - prompt: "implement the payment webhook handler for stripe"
    should_trigger: true
  - prompt: "create a caching layer for the API using Redis"
    should_trigger: true
  - prompt: "set up rate limiting middleware that tracks per-user limits"
    should_trigger: true
  - prompt: "i need a file upload feature with progress bar and drag-and-drop"
    should_trigger: true
  # Should NOT trigger — non-implementation tasks
  - prompt: "what does this code do, explain it to me"
    should_trigger: false
  - prompt: "review this pull request for security issues"
    should_trigger: false
  - prompt: "run the test suite and tell me what fails"
    should_trigger: false
  - prompt: "compare these two approaches for handling websockets"
    should_trigger: false
  # Should NOT trigger — fix-issue confusion pair (both write code)
  - prompt: "there's a bug in the payment webhook, it's not validating signatures"
    should_trigger: false
  # Should trigger — terse phrasing
  - prompt: "implement search"
    should_trigger: true
  # Should trigger — common typo
  - prompt: "implment user auth"
    should_trigger: true
  # Should NOT trigger — multi-intent, primary is explore
  - prompt: "explore how the auth system works and then implement SSO"
    should_trigger: false

quality_evals:
  - prompt: |
      i need to implement a health check endpoint that returns the
      app version, uptime, and database connectivity status. what's
      the right approach and what should i test?
    assertions:
      - name: "endpoint design"
        check: "describes the health endpoint structure with version, uptime, and db status fields"
      - name: "db failure handling"
        check: "explains how to handle database connection failure gracefully (return degraded status, not crash)"
      - name: "test strategy"
        check: "recommends testing both healthy and unhealthy states"
      - name: "no placeholder approach"
        check: "provides concrete implementation guidance, not TODO stubs"

  - prompt: |
      add a search feature to the existing users list.
      needs debounced input, loading state, and empty state.
      walk me through the implementation plan.
    assertions:
      - name: "debounce pattern"
        check: "describes debounce logic to avoid excessive API calls on each keystroke"
      - name: "loading state"
        check: "includes loading indicator while search is in progress"
      - name: "empty state"
        check: "handles and displays a message when no results are found"
      - name: "component structure"
        check: "outlines the component structure or file organization for the feature"

tags: [implement, user-invocable, core]
