# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: skill-evolution
name: "Skill evolution evaluation"
skill_path: src/skills/skill-evolution/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I want to see how my OrchestKit skills are performing. Which
      ones have low success rates and what patterns have been learned
      from user edits?
    assertions:
      - name: "evolution report"
        check: "provides a report showing skill usage counts, success rates, and pending improvement suggestions"
      - name: "edit pattern tracking"
        check: "tracks patterns in user edits to skill outputs to identify common corrections"
      - name: "confidence scoring"
        check: "uses confidence scores to determine which suggestions are actionable"

  - prompt: |
      The skill-evolution system suggested some changes to my commit
      skill but I applied them and now the skill performs worse. How
      do I revert?
    assertions:
      - name: "rollback command"
        check: "provides a rollback command to restore a previous version of the skill"
      - name: "version snapshots"
        check: "mentions that version snapshots are created before applying changes"
      - name: "auto-alert on degradation"
        check: "describes auto-alerting when success rate drops significantly after changes"

  - prompt: |
      How does the skill evolution system decide which improvements
      to suggest? I want to understand the safety mechanisms before
      enabling auto-evolution.
    assertions:
      - name: "three-phase pipeline"
        check: "describes a collect-analyze-act pipeline for processing edit patterns into suggestions"
      - name: "human review required"
        check: "emphasizes that human review is required before applying changes"
      - name: "rejected suggestions excluded"
        check: "ensures rejected suggestions are never re-suggested"

tags: [skill-evolution, background, quality]
