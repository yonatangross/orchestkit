id: review-pr
name: "Review PR skill evaluation"
skill_path: src/skills/review-pr/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — direct requests
  - prompt: "review PR 123"
    should_trigger: true
  - prompt: "do a code review on this pull request"
    should_trigger: true
  - prompt: "check this PR for issues before we merge"
    should_trigger: true
  # Should trigger — casual/indirect phrasing
  - prompt: "can you look over pull request 45 and leave comments"
    should_trigger: true
  - prompt: "i need a thorough review of the auth refactor PR"
    should_trigger: true
  - prompt: "review the changes on the feature-billing branch"
    should_trigger: true
  # Should NOT trigger — assess confusion pair (both evaluate quality)
  - prompt: "rate this code from 0 to 10"
    should_trigger: false
  - prompt: "is this architecture good enough for production"
    should_trigger: false
  - prompt: "evaluate the trade-offs between Redis vs Postgres for sessions"
    should_trigger: false
  # Should NOT trigger — create-pr confusion pair (both PR-related)
  - prompt: "create a pull request for this feature"
    should_trigger: false
  - prompt: "open a PR against dev with a good description"
    should_trigger: false
  # Should trigger — terse phrasing
  - prompt: "review pr 42"
    should_trigger: true
  # Should trigger — common typo
  - prompt: "reveiw my pull reqeust"
    should_trigger: true
  # Should NOT trigger — multi-intent, primary is create-pr
  - prompt: "create a PR and then review it for quality"
    should_trigger: false

quality_evals:
  - prompt: |
      a PR adds a new payment webhook handler and updates the user
      service to track payment status. what should a thorough code
      review cover for this kind of change?
    assertions:
      - name: "security review"
        check: "recommends reviewing input validation, authentication, and webhook signature verification"
      - name: "multi-dimensional review"
        check: "covers multiple review dimensions: security, code quality, testing, and architecture"
      - name: "conventional comments"
        check: "mentions using structured review comments with prefixes like suggestion, issue, or nitpick"
      - name: "no rubber stamp"
        check: "emphasizes providing substantive feedback, not just approving without review"

  - prompt: |
      how should i review a PR that's just a dependency version bump?
      is it different from reviewing a feature PR?
    assertions:
      - name: "scope adaptation"
        check: "acknowledges dependency bumps need lighter but targeted review compared to feature PRs"
      - name: "breaking changes check"
        check: "recommends checking for breaking changes, changelog, and CVE advisories"
      - name: "clear verdict"
        check: "recommends giving a clear approve or request-changes recommendation"

tags: [review-pr, user-invocable, core]
