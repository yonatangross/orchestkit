# Generated by OrchestKit Claude Plugin
# Created: 2026-03-13

id: review-pr
name: "Review PR skill evaluation"
skill_path: src/skills/review-pr/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — direct requests
  - prompt: "review PR 123"
    should_trigger: true
  - prompt: "do a code review on this pull request"
    should_trigger: true
  - prompt: "check this PR for issues before we merge"
    should_trigger: true
  # Should trigger — casual/indirect phrasing
  - prompt: "can you look over pull request 45 and leave comments"
    should_trigger: true
  - prompt: "i need a thorough review of the auth refactor PR"
    should_trigger: true
  - prompt: "review the changes on the feature-billing branch"
    should_trigger: true
  # Should NOT trigger — assess confusion pair (both evaluate quality)
  - prompt: "rate this code from 0 to 10"
    should_trigger: false
  - prompt: "is this architecture good enough for production"
    should_trigger: false
  - prompt: "evaluate the trade-offs between Redis vs Postgres for sessions"
    should_trigger: false
  # Should NOT trigger — create-pr confusion pair (both PR-related)
  - prompt: "create a pull request for this feature"
    should_trigger: false
  - prompt: "open a PR against dev with a good description"
    should_trigger: false

quality_evals:
  - prompt: |
      review PR 78. it adds a new payment webhook handler and
      updates the user service to track payment status.
    scaffold: typescript-nextjs
    assertions:
      - name: "fetches PR diff"
        check: "retrieves the PR diff and metadata using gh pr view and gh pr diff"
      - name: "launches parallel agents"
        check: "spawns multiple review agents in parallel (security, quality, testing, etc.)"
      - name: "uses conventional comments"
        check: "review comments use conventional prefixes: praise, suggestion, issue, nitpick, or question"
      - name: "checks security"
        check: "security-auditor agent evaluates the webhook handler for input validation and auth"
      - name: "submits review via gh"
        check: "submits the review to GitHub using gh pr review with approve or request-changes"

  - prompt: |
      quick review of PR 12, its just a dependency bump
    assertions:
      - name: "adapts scope"
        check: "uses quick review mode with reduced agent count for a minor change"
      - name: "checks for breaking changes"
        check: "verifies the dependency update doesn't introduce breaking changes or known CVEs"
      - name: "provides verdict"
        check: "gives a clear approve or request-changes recommendation"

tags: [review-pr, user-invocable, core]
