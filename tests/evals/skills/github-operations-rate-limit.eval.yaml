id: github-operations-rate-limit
name: "github-operations: gh rate-limit backoff guidance"
skill_path: src/skills/github-operations/SKILL.md
plugin_dir: plugins/ork

# Verifies the model applies CC 2.1.116's gh rate-limit hint guidance
# documented in Best Practice #3 and examples/automation-scripts.md.

quality_evals:
  - prompt: |
      You are in the middle of a bulk labelling script iterating over 400 open
      issues with `gh issue edit`. After ~130 iterations, the next `gh` call
      returns: "API rate limit exceeded for user-abc. Will be reset at
      2026-04-21 10:00:00 UTC." The CC bash tool also emitted a rate-limit hint
      in the transcript. What do you do next?
    assertions:
      - name: "stops iteration immediately"
        check: "explicitly decides to STOP the loop/iteration and NOT retry the next gh call"
      - name: "waits for reset time"
        check: "mentions waiting until the reset timestamp (2026-04-21 10:00:00 UTC) before resuming"
      - name: "does not suggest bypass"
        check: "does NOT suggest using a different GITHUB_TOKEN, rotating tokens, or any bypass that would violate GitHub TOS or the rate limit policy"
      - name: "references the pre-flight check_rate_limit function or gh api rate_limit"
        check: "mentions the pre-flight rate_limit check pattern (check_rate_limit helper or `gh api rate_limit`) as the guard to prevent recurrence"

  - prompt: |
      You're about to run a bulk operation that will issue ~500 `gh` calls.
      What's the correct pre-flight and runtime pattern on CC 2.1.116+?
    assertions:
      - name: "pre-flight rate-limit check"
        check: "recommends calling `gh api rate_limit` before starting to check remaining quota"
      - name: "in-loop rate-limit check or sleep-on-hint"
        check: "recommends either an in-loop check_rate_limit helper OR reacting to the CC 2.1.116 bash tool hint as the backoff signal"
      - name: "does not recommend raw retry loop"
        check: "does NOT recommend blind retry-on-failure loops without backoff logic"

tags:
  - github
