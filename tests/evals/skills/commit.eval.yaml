# Generated by OrchestKit Claude Plugin
# Created: 2026-03-11

id: commit
name: "Commit skill evaluation"
skill_path: src/skills/commit/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — direct requests
  - prompt: "commit my changes"
    should_trigger: true
  - prompt: "i changed the auth middleware and the rate limiter, make a good commit message"
    should_trigger: true
  - prompt: "create a conventional commit for these files"
    should_trigger: true
  # Should trigger — casual/indirect phrasing
  - prompt: "save my progress before switching branches"
    should_trigger: true
  - prompt: "ok i think this is ready, wrap it up with a nice commit msg"
    should_trigger: true
  - prompt: "stage and commit the new tests i just wrote"
    should_trigger: true
  # Should NOT trigger — adjacent git operations
  - prompt: "push to main"
    should_trigger: false
  - prompt: "squash the last 3 commits into one"
    should_trigger: false
  - prompt: "rebase my branch onto dev"
    should_trigger: false
  # Should NOT trigger — create-pr confusion pair (both git operations)
  - prompt: "create a pull request for this feature"
    should_trigger: false
  # Should trigger — terse phrasing
  - prompt: "commit"
    should_trigger: true
  # Should trigger — common typo
  - prompt: "comit my changes"
    should_trigger: true
  # Should NOT trigger — multi-intent, primary is review-pr
  - prompt: "review this PR and then commit any suggested fixes"
    should_trigger: false

quality_evals:
  - prompt: |
      i refactored the database connection pool and added retry logic
      to the payment webhook handler. what would be a good commit
      message and what steps should i follow before committing?
    assertions:
      - name: "conventional format"
        check: "suggests a commit message using conventional commit format (feat, fix, refactor, or chore prefix)"
      - name: "Co-Authored-By"
        check: "mentions including a Co-Authored-By trailer line"
      - name: "mentions both changes"
        check: "the suggested message references both db connection pool and payment webhook changes"
      - name: "pre-commit checks"
        check: "recommends running tests or linting before committing"
      - name: "no WIP suggestion"
        check: "does NOT suggest WIP, TODO, or fixup as the commit type for completed work"

  - prompt: |
      just fixed a typo in the README. how should i commit this?
    assertions:
      - name: "appropriate scope"
        check: "suggests docs or fix type prefix, not feat"
      - name: "concise message"
        check: "suggests a short, one-line commit message"
      - name: "atomic commit guidance"
        check: "recommends staging only the changed file, not unrelated changes"

tags: [commit, user-invocable, core]
