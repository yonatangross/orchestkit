# Generated by OrchestKit Claude Plugin
# Created: 2026-03-11

id: commit
name: "Commit skill evaluation"
skill_path: src/skills/commit/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — direct requests
  - prompt: "commit my changes"
    should_trigger: true
  - prompt: "i changed the auth middleware and the rate limiter, make a good commit message"
    should_trigger: true
  - prompt: "create a conventional commit for these files"
    should_trigger: true
  # Should trigger — casual/indirect phrasing
  - prompt: "save my progress before switching branches"
    should_trigger: true
  - prompt: "ok i think this is ready, wrap it up with a nice commit msg"
    should_trigger: true
  - prompt: "stage and commit the new tests i just wrote"
    should_trigger: true
  # Should NOT trigger — adjacent git operations
  - prompt: "push to main"
    should_trigger: false
  - prompt: "squash the last 3 commits into one"
    should_trigger: false
  - prompt: "rebase my branch onto dev"
    should_trigger: false
  - prompt: "create a pull request for this feature"
    should_trigger: false

quality_evals:
  - prompt: |
      i refactored the database connection pool and added retry logic
      to the payment webhook handler, commit this
    scaffold: typescript-nextjs
    assertions:
      - name: "conventional format"
        check: "commit message starts with feat, fix, refactor, or chore prefix"
      - name: "Co-Authored-By"
        check: "commit includes a Co-Authored-By trailer line"
      - name: "mentions both changes"
        check: "commit message or body references both db connection pool and payment webhook"
      - name: "runs tests first"
        check: "npm test or equivalent is executed before committing"

  - prompt: |
      just fixed a typo in the README, quick commit please
    scaffold: empty
    assertions:
      - name: "appropriate scope"
        check: "commit uses docs or fix type, not feat"
      - name: "concise message"
        check: "commit message is one line, under 72 characters"

tags: [commit, user-invocable, core]
