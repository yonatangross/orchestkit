# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: configure
name: "OrchestKit configuration evaluation"
skill_path: src/skills/configure/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I just installed OrchestKit and want to set it up. I only need
      backend and security skills, no frontend stuff. How do I
      customize the installation?
    assertions:
      - name: "preset selection"
        check: "offers preset or profile options with different scope levels so users can choose a minimal or full installation"
      - name: "category filtering"
        check: "allows selecting specific skill categories like Backend and Security while excluding Frontend"
      - name: "config file location"
        check: "saves configuration to a config file path"

  - prompt: |
      I want to set up the memory MCP server for cross-session
      persistence. How do I configure it with OrchestKit?
    assertions:
      - name: "MCP configuration"
        check: "explains how to enable or configure the memory MCP server"
      - name: "default enabled"
        check: "mentions that MCP servers ship enabled by default"
      - name: "background agent limitation"
        check: "warns that MCP tools are not available in background subagents"

  - prompt: |
      I want to stream all my Claude Code session data to my own API
      endpoint for analytics. How do I set up telemetry?
    assertions:
      - name: "webhook URL"
        check: "asks for or configures a webhook endpoint URL"
      - name: "dual channel"
        check: "describes multiple telemetry channels or hook types for streaming session data to an external endpoint"
      - name: "auth token"
        check: "mentions configuring an authentication token or secret for securing the telemetry webhook"

tags: [configure, background, workflow]
