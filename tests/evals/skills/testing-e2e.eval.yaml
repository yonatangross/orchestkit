# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: testing-e2e
name: "E2E testing patterns evaluation"
skill_path: src/skills/testing-e2e/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I need to write end-to-end tests for an e-commerce checkout flow.
      Users browse products, add to cart, fill shipping info, enter payment,
      and see a confirmation page. Using Playwright. How should I structure this?
    assertions:
      - name: "page object model"
        check: "recommends Page Object Model pattern to encapsulate page interactions into reusable classes"
      - name: "semantic locators"
        check: "uses getByRole, getByLabel, or getByText for element selection instead of CSS selectors or XPath"
      - name: "no hardcoded waits"
        check: "does NOT use waitForTimeout or fixed sleep delays; relies on auto-wait or explicit condition-based waits"

  - prompt: |
      Our QA team keeps finding accessibility issues after deployment.
      We want to catch WCAG violations automatically in our CI pipeline
      before they reach production. We already use Playwright for E2E tests.
    assertions:
      - name: "axe-core integration"
        check: "recommends @axe-core/playwright or AxeBuilder for automated accessibility scanning"
      - name: "WCAG 2.2 AA tags"
        check: "specifies WCAG 2.2 AA compliance level with tags like wcag2a, wcag2aa, or wcag22aa"
      - name: "CI gate"
        check: "recommends blocking PRs or failing CI when accessibility violations are found"

  - prompt: |
      We redesigned our dashboard and now visual bugs keep slipping through.
      Buttons shift, fonts change, spacing breaks. How can we catch visual
      regressions automatically in our Playwright test suite?
    assertions:
      - name: "native screenshot comparison"
        check: "recommends Playwright's built-in toHaveScreenshot() for visual regression testing"
      - name: "diff configuration"
        check: "mentions maxDiffPixels or threshold configuration to control sensitivity"
      - name: "dynamic content masking"
        check: "suggests masking dynamic content (timestamps, avatars, ads) using the mask option to avoid false positives"

  - prompt: |
      I'm writing Playwright tests for a multi-step form wizard. Each step
      has validation, and step 3 has a file upload. The tests are brittle
      and break whenever the UI changes slightly. How do I make them resilient?
    assertions:
      - name: "locator priority"
        check: "recommends a locator priority order preferring getByRole over getByLabel over getByTestId over CSS selectors"
      - name: "page object encapsulation"
        check: "suggests encapsulating form interactions in page objects so UI changes only require updates in one place"

tags: [testing-e2e, background, testing, playwright, accessibility]
