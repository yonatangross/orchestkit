# Generated by OrchestKit Claude Plugin
# Created: 2026-03-11

id: assess
name: "Assess skill evaluation"
skill_path: src/skills/assess/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — quality evaluation requests
  - prompt: "rate this code from 0 to 10"
    should_trigger: true
  - prompt: "is this approach good enough for production?"
    should_trigger: true
  - prompt: "compare these two database schemas and tell me which is better"
    should_trigger: true
  - prompt: "what do you think of this architecture, any red flags?"
    should_trigger: true
  - prompt: "how bad is this SQL query, honestly"
    should_trigger: true
  - prompt: "evaluate the trade-offs between using Redis vs Postgres for sessions"
    should_trigger: true
  # Should NOT trigger — action requests that share evaluation keywords
  - prompt: "fix this bug in the auth middleware"
    should_trigger: false
  - prompt: "refactor the user service to use dependency injection"
    should_trigger: false
  - prompt: "write unit tests for the payment module"
    should_trigger: false
  - prompt: "review this pull request and leave comments"
    should_trigger: false

quality_evals:
  - prompt: |
      assess the quality of this API design: we have /api/users
      for CRUD, /api/auth/login and /api/auth/register for auth,
      and /api/payments/charge for payments. All return 200 for
      success and 500 for errors. No versioning.
    assertions:
      - name: "0-10 score"
        check: "output includes a numeric score between 0 and 10"
      - name: "dimension breakdown"
        check: "rates multiple dimensions separately, not just one overall score"
      - name: "identifies error handling gap"
        check: "flags the 200/500-only response codes as a problem"
      - name: "identifies versioning gap"
        check: "mentions lack of API versioning as a concern"
      - name: "actionable recommendations"
        check: "provides specific next steps, not just criticism"

tags: [assess, user-invocable, core]
