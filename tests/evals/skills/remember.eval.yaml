    should_trigger: true
  - prompt: "store this pattern as a best practice"
    should_trigger: true
  # Should trigger — casual/indirect phrasing
  - prompt: "lets not forget we decided to use JWT for auth"
    should_trigger: true
  - prompt: "mark this as an anti-pattern: using offset pagination on large tables"
    should_trigger: true
  - prompt: "record that connection pooling with pgbouncer worked well"
    should_trigger: true
  # Should NOT trigger — memory confusion pair (both deal with memory)
  - prompt: "search memory for past database decisions"
    should_trigger: false
  - prompt: "what did we decide about caching last time"
    should_trigger: false
  - prompt: "show me the knowledge graph visualization"
    should_trigger: false
