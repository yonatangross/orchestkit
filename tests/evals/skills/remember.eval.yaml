quality_evals:
  - prompt: |
      remember --success we used Redis with a 5-minute TTL for
      session caching and it reduced latency by 40%. this should
      be our standard approach.
    assertions:
      - name: "stores as success pattern"
        check: "creates the memory entity marked with a success/positive outcome"
      - name: "extracts entities"
        check: "identifies Redis, session caching, and latency as entities in the knowledge graph"
      - name: "creates relationships"
        check: "creates relations between entities (e.g., project USES Redis, Redis IMPROVES latency)"
      - name: "auto-detects category"
        check: "categorizes as performance or pattern based on content keywords"
      - name: "confirms storage"
        check: "displays a confirmation showing what was stored and the graph state"

  - prompt: |
      remember --failed using a single global database connection
      caused connection exhaustion under load. should have used
      connection pooling from the start.
    assertions:
      - name: "stores as anti-pattern"
        check: "marks the memory as a failed/anti-pattern outcome"
      - name: "extracts lesson"
        check: "captures the lesson: use connection pooling instead of single global connection"
      - name: "categorizes correctly"
        check: "auto-detects as database category"

