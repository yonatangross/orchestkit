quality_evals:
  - prompt: |
      we used Redis with a 5-minute TTL for session caching and it
      reduced latency by 40%. how would this be stored in the
      knowledge graph? what entities and relationships would be created?
    assertions:
      - name: "entity extraction"
        check: "identifies Redis, session caching, and latency as entities to store in the knowledge graph"
      - name: "relationship modeling"
        check: "describes relationships like project USES Redis, Redis IMPROVES latency"
      - name: "success categorization"
        check: "marks or categorizes this as a success pattern or positive outcome"
      - name: "confirmation step"
        check: "mentions confirming with the user what was stored, not silently saving"

  - prompt: |
      using a single global database connection caused connection
      exhaustion under load. we should have used connection pooling.
      how do i store this lesson so we don't repeat it?
    assertions:
      - name: "anti-pattern storage"
        check: "recommends storing as a failed/anti-pattern outcome in the knowledge graph"
      - name: "lesson extraction"
        check: "captures the corrective lesson: use connection pooling instead of single global connection"
      - name: "category detection"
        check: "categorizes as database-related based on content"

tags: [remember, user-invocable, core]
