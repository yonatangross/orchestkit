# Generated by OrchestKit Claude Plugin
# Created: 2026-03-25

id: storybook-mcp-integration
name: "Storybook MCP integration skill evaluation"
skill_path: src/skills/storybook-mcp-integration/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I need to create a Card component for our design system. We already
      have Storybook set up with @storybook/addon-mcp. Should I start
      from scratch or check what we already have?
    assertions:
      - name: "Discovery before generation"
        check: "recommends checking existing components via list-all-documentation or get-documentation before generating a new component"
      - name: "Storybook MCP awareness"
        check: "references Storybook MCP tools (list-all-documentation, get-documentation) for component discovery rather than only filesystem search"
      - name: "Props schema extraction"
        check: "mentions retrieving props/args schema from Storybook documentation to understand existing component API"

  - prompt: |
      I just generated a new Modal component with CSF3 stories. How do I
      verify it passes accessibility and component tests before merging?
      We have Storybook MCP running.
    assertions:
      - name: "run-story-tests with a11y"
        check: "uses run-story-tests with a11y enabled to run both component interaction tests and accessibility scans"
      - name: "Self-healing loop"
        check: "describes a fix-and-retry loop when tests fail — read violations, fix the component, re-run tests (with a retry limit)"
      - name: "Preview verification"
        check: "mentions preview-stories to embed a live preview for visual confirmation after tests pass"

  - prompt: |
      I want to audit our component library to find components that lack
      test coverage or accessibility compliance. We use Storybook 10.3.
    assertions:
      - name: "Full inventory via MCP"
        check: "uses list-all-documentation to get the complete component manifest rather than manually scanning the filesystem"
      - name: "Per-component detail lookup"
        check: "uses get-documentation with specific component IDs to retrieve story count, test coverage, and prop schemas"
      - name: "Coverage gap identification"
        check: "identifies components with zero stories or no a11y test coverage as gaps requiring attention"

tags: [storybook, mcp, component-discovery, testing, frontend]
