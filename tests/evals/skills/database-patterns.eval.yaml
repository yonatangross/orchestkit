# Created: 2026-03-14

id: database-patterns
name: "Database patterns evaluation"
skill_path: src/skills/database-patterns/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I need to add a NOT NULL column 'org_id' to my users table which has 5
      million rows. The app is running in production and we can't have downtime.
      How do I write the Alembic migration safely?
    assertions:
      - name: "two-phase NOT NULL approach"
        check: "adds the column as nullable first, backfills data, then alters to NOT NULL"
      - name: "batch backfill"
        check: "backfills in batches rather than a single UPDATE to avoid long locks"
      - name: "downgrade implemented"
        check: "includes a proper downgrade() function that reverses the migration"

  - prompt: |
      My API has a /orders endpoint that returns paginated results. Currently it
      uses OFFSET/LIMIT but performance degrades badly on page 500+. The table
      has 10 million rows. How should I fix the pagination?
    assertions:
      - name: "cursor-based pagination"
        check: "recommends cursor-based (keyset) pagination instead of OFFSET/LIMIT"
      - name: "index on cursor column"
        check: "mentions creating an index on the cursor column (e.g., created_at, id) for performance"
      - name: "no offset pagination"
        check: "explains why OFFSET pagination degrades — the database must scan and discard all skipped rows"

  - prompt: |
      I'm designing the schema for a multi-tenant SaaS app. Each tenant has
      users, projects, and tasks. I need proper indexing and want to avoid
      common mistakes. Using PostgreSQL.
    assertions:
      - name: "UUID primary keys"
        check: "uses UUID primary keys for distributed-friendly key generation"
      - name: "foreign key constraints"
        check: "defines proper foreign key references between tenants, users, projects, and tasks"
      - name: "composite indexes for tenant queries"
        check: "creates indexes that include tenant_id for efficient per-tenant queries"

tags: [database-patterns, background, database]
