# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: testing-llm
name: "LLM and AI testing patterns evaluation"
skill_path: src/skills/testing-llm/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      We have a RAG pipeline that retrieves documents and generates answers
      using GPT-4. How do I evaluate whether the generated answers are
      actually faithful to the retrieved context and relevant to the question?
    assertions:
      - name: "DeepEval or RAGAS metrics"
        check: "recommends DeepEval or RAGAS for multi-dimensional quality evaluation of RAG outputs"
      - name: "faithfulness metric"
        check: "includes a faithfulness or groundedness metric to verify output is supported by retrieved context"
      - name: "multiple quality dimensions"
        check: "evaluates across 3 or more quality dimensions (e.g., relevancy, faithfulness, hallucination, context precision)"

  - prompt: |
      My CI pipeline calls the OpenAI API during tests and it's slow,
      expensive, and flaky because of rate limits. How do I make my
      LLM integration tests deterministic and fast?
    assertions:
      - name: "mock LLM responses"
        check: "recommends mocking LLM API responses for unit tests so they never hit the live API in CI"
      - name: "VCR recording"
        check: "suggests VCR.py or cassette recording for integration tests to replay real API responses deterministically"
      - name: "credential filtering"
        check: "mentions filtering API keys or authorization headers from recorded cassettes to avoid leaking secrets"

  - prompt: |
      Our LLM returns a JSON object with fields like answer, confidence,
      and sources. Sometimes the model returns malformed JSON or missing
      fields and our app crashes. How should I handle this?
    assertions:
      - name: "Pydantic schema validation"
        check: "recommends Pydantic BaseModel or similar schema validation for structured LLM output"
      - name: "edge case coverage"
        check: "mentions testing edge cases like empty responses, missing fields, malformed JSON, or values outside expected ranges"

  - prompt: |
      I'm building an AI chatbot and want to make sure it doesn't
      hallucinate facts or produce harmful content. What testing
      patterns should I use before shipping to production?
    assertions:
      - name: "hallucination metric"
        check: "includes a hallucination detection metric with a threshold (e.g., hallucination score <= 0.3)"
      - name: "quality thresholds"
        check: "defines numerical quality thresholds that must pass before deployment (e.g., relevancy >= 0.7)"
      - name: "adversarial inputs"
        check: "mentions testing with prompt injection or adversarial inputs to verify resistance"

tags: [testing-llm, background, testing, llm, evaluation, deepeval]
