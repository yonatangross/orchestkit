# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: validate-counts
name: "Validate counts evaluation"
skill_path: src/skills/validate-counts/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I just added 3 new skills and 2 new hooks. How do I check if
      the counts in CLAUDE.md, hooks.json, and the manifest are all
      still in sync?
    assertions:
      - name: "filesystem is authoritative"
        check: "counts from src/ directories as the authoritative source of truth"
      - name: "comparison table"
        check: "outputs a comparison table showing counts from each source file"
      - name: "drift flagging"
        check: "flags mismatches with file and field references showing where the drift is"

  - prompt: |
      The CLAUDE.md says we have 89 skills but I think that's stale
      after recent additions. How do I verify the actual count?
    assertions:
      - name: "count from source"
        check: "counts SKILL.md files in src/skills/ directories as the ground truth"
      - name: "CLAUDE.md extraction"
        check: "extracts the count from CLAUDE.md Project Overview section for comparison"
      - name: "manifest check"
        check: "also checks manifests/ork.json for consistency"

  - prompt: |
      Our hook count doesn't add up — global plus agent-scoped plus
      skill-scoped doesn't equal the total. Where do I look to
      find the discrepancy?
    assertions:
      - name: "breakdown sum check"
        check: "verifies that global + agent-scoped + skill-scoped hook counts sum to the total"
      - name: "hooks.json description"
        check: "checks the hooks.json description field for the hook count"
      - name: "source directory count"
        check: "counts from src/hooks/ source directories for the authoritative number"

tags: [validate-counts, background, quality]
