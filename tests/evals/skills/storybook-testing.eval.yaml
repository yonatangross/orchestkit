# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: storybook-testing
name: "Storybook testing skill evaluation"
skill_path: src/skills/storybook-testing/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I need to write a story for a Button component that tests whether
      clicking the button calls the onClick handler and the button shows
      the correct label. We're using Storybook 9 with TypeScript. How
      should I structure the story file?
    assertions:
      - name: "CSF3 with satisfies Meta"
        check: "uses CSF3 format with 'satisfies Meta<typeof Component>' for type-safe story definitions, not the old Template.bind({}) CSF2 pattern"
      - name: "play function for interaction testing"
        check: "defines a play() function on the story that uses userEvent and expect from @storybook/test to verify click behavior"
      - name: "fn() for action tracking"
        check: "uses fn() from @storybook/test for the onClick arg to track and assert function calls"

  - prompt: |
      Our Storybook CI pipeline runs Chromatic snapshots on every PR
      and it's getting expensive. Most PRs only change a few components
      but we're snapshotting everything. How can we reduce the cost
      without losing coverage?
    assertions:
      - name: "TurboSnap for selective snapshots"
        check: "enables Chromatic TurboSnap with onlyChanged: true to only snapshot stories affected by code changes, reducing cost by 60-90%"
      - name: "stories as Vitest tests"
        check: "runs stories as Vitest tests via @storybook/addon-vitest plugin for local testing before pushing to Chromatic"

  - prompt: |
      We want to catch accessibility violations automatically in our
      component library. We already have Storybook stories for all
      components. How can we add a11y testing that runs in CI and blocks
      PRs with violations?
    assertions:
      - name: "a11y addon with axe-core"
        check: "uses @storybook/addon-a11y which runs axe-core accessibility scans on every story automatically"
      - name: "CI pipeline gating"
        check: "configures a11y tests to run in CI and fail/block PRs when accessibility violations are detected"
      - name: "no manual accessibility checking"
        check: "automates accessibility testing rather than relying on manual checking, which is not repeatable and misses violations"

tags: [storybook-testing, background, frontend]
