# Generated by OrchestKit Claude Plugin
# Created: 2026-03-13

id: verify
name: "Verify skill evaluation"
skill_path: src/skills/verify/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — direct requests
  - prompt: "verify the authentication implementation"
    should_trigger: true
  - prompt: "run a full verification on the new payment feature"
    should_trigger: true
  - prompt: "grade my implementation and tell me where it falls short"
    should_trigger: true
  # Should trigger — casual/indirect phrasing
  - prompt: "is this feature ready for merge? check everything"
    should_trigger: true
  - prompt: "run tests, security scan, and give me a score"
    should_trigger: true
  - prompt: "validate that the user profile changes are solid"
    should_trigger: true
  # Should NOT trigger — assess confusion pair (both evaluate quality)
  - prompt: "rate this code from 0 to 10"
    should_trigger: false
  - prompt: "compare these two database schemas and tell me which is better"
    should_trigger: false
  - prompt: "evaluate the trade-offs between these two approaches"
    should_trigger: false
  # Should NOT trigger — adjacent tasks
  - prompt: "implement a health check endpoint"
    should_trigger: false
  - prompt: "review PR 123"
    should_trigger: false
  # Should trigger — terse phrasing
  - prompt: "verify auth"
    should_trigger: true
  # Should trigger — common typo
  - prompt: "verifiy the feature"
    should_trigger: true
  # Should NOT trigger — multi-intent, primary is implement
  - prompt: "implement the payment flow and verify it works"
    should_trigger: false

quality_evals:
  - prompt: |
      verify the new user registration flow end-to-end.
      it includes email validation, password hashing, welcome email,
      and a database write.
    scaffold: typescript-nextjs
    assertions:
      - name: "launches parallel agents"
        check: "dispatches multiple verification agents in parallel (code quality, security, test generator, etc.)"
      - name: "runs test suite"
        check: "executes the project test suite and reports pass/fail counts and coverage"
      - name: "produces composite score"
        check: "calculates a composite 0-10 score with dimensional breakdown"
      - name: "assigns letter grade"
        check: "converts the composite score to a letter grade (A through F)"
      - name: "generates improvement suggestions"
        check: "provides prioritized suggestions ranked by effort vs impact"
      - name: "no passing grade without tests"
        check: "does NOT assign a high score or passing grade if test coverage is missing or failing"

  - prompt: |
      quick check on the api changes i just made, just tests and lint
    assertions:
      - name: "respects quick check scope"
        check: "runs only tests and lint without launching full agent verification"
      - name: "reports test results"
        check: "shows test pass/fail and lint error counts"
      - name: "no grading overhead"
        check: "skips composite scoring and report generation for quick mode"
      - name: "no unnecessary agents"
        check: "does NOT launch security-auditor, test-generator, or other heavy agents for a quick check"

tags: [verify, user-invocable, core]
