# Generated by OrchestKit Claude Plugin
# Updated: 2026-03-21 — Quality evals rewritten for claude -p compatibility
# NOTE: verify is an interactive workflow skill (AskUserQuestion).
# Full orchestration (agents, tasks, scoring) requires interactive session.
# Quality evals test the KNOWLEDGE the skill provides, not orchestration.

id: verify
name: "Verify skill evaluation"
skill_path: src/skills/verify/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — direct requests
  - prompt: "verify the authentication implementation"
    should_trigger: true
  - prompt: "run a full verification on the new payment feature"
    should_trigger: true
  - prompt: "grade my implementation and tell me where it falls short"
    should_trigger: true
  # Should trigger — casual/indirect phrasing
  - prompt: "is this feature ready for merge? check everything"
    should_trigger: true
  - prompt: "run tests, security scan, and give me a score"
    should_trigger: true
  - prompt: "validate that the user profile changes are solid"
    should_trigger: true
  # Should NOT trigger — assess confusion pair (both evaluate quality)
  - prompt: "rate this code from 0 to 10"
    should_trigger: false
  - prompt: "compare these two database schemas and tell me which is better"
    should_trigger: false
  - prompt: "evaluate the trade-offs between these two approaches"
    should_trigger: false
  # Should NOT trigger — adjacent tasks
  - prompt: "implement a health check endpoint"
    should_trigger: false
  - prompt: "review PR 123"
    should_trigger: false
  # Should trigger — terse phrasing
  - prompt: "verify auth"
    should_trigger: true
  # Should trigger — common typo
  - prompt: "verifiy the feature"
    should_trigger: true
  # Should NOT trigger — multi-intent, primary is implement
  - prompt: "implement the payment flow and verify it works"
    should_trigger: false

# Quality evals test knowledge, not orchestration (interactive skill)
quality_evals:
  - prompt: |
      What dimensions should a comprehensive code verification cover?
      I want to make sure I'm not missing anything important.
    assertions:
      - name: "security dimension"
        check: "includes security as a verification dimension (vulnerabilities, OWASP, secrets)"
      - name: "test coverage dimension"
        check: "includes test coverage or test adequacy as a verification dimension"
      - name: "code quality dimension"
        check: "includes code quality (lint, complexity, patterns) as a verification dimension"
      - name: "multiple dimensions"
        check: "covers at least 4 distinct verification dimensions"

  - prompt: |
      How should I interpret a composite verification score of 6.5/10?
      Is that good enough to merge?
    assertions:
      - name: "grade interpretation"
        check: "maps the score to a letter grade or qualitative assessment"
      - name: "merge guidance"
        check: "provides guidance on whether this score is merge-ready or needs improvement"
      - name: "dimension breakdown"
        check: "suggests looking at individual dimension scores to find weak areas"

tags: [verify, user-invocable, core]
