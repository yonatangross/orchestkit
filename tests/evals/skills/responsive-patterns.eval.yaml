id: responsive-patterns
name: "Responsive patterns skill evaluation"
skill_path: src/skills/responsive-patterns/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I have a card component that is used in a sidebar (300px wide), a main
      content area (800px), and a full-width hero section. The card layout
      should adapt to its container width, not the viewport. How do I make
      this work with modern CSS?
    assertions:
      - name: "container queries"
        check: "uses CSS container queries (@container) for component-level responsive design rather than media queries"
      - name: "container-type declaration"
        check: "sets container-type: inline-size (or size) on the parent element, since container queries do not work without it"
      - name: "logical container units"
        check: "uses cqi/cqb (logical container units) instead of cqw/cqh for internationalization-ready sizing"

  - prompt: |
      My heading text looks fine on desktop but is way too large on mobile
      and too small on ultra-wide monitors. I want smooth scaling without
      a bunch of breakpoint overrides. The text should also respect user
      font size preferences for accessibility.
    assertions:
      - name: "fluid typography with clamp"
        check: "uses CSS clamp() function for fluid font sizing that scales smoothly between a minimum and maximum"
      - name: "rem base in fluid formula"
        check: "includes rem unit in the clamp formula (not viewport-only) to respect user font size preferences and accessibility settings"

  - prompt: |
      I'm building a responsive product grid for an e-commerce page.
      Cards should auto-flow to fill available space — 4 columns on
      desktop, 2 on tablet, 1 on mobile — without writing media queries
      for each breakpoint.
    assertions:
      - name: "auto-fit minmax grid"
        check: "uses CSS Grid with auto-fit (or auto-fill) and minmax() for intrinsically responsive layouts without explicit breakpoints"
      - name: "mobile-first approach"
        check: "follows mobile-first strategy with min-width breakpoints rather than desktop-first max-width overrides"
      - name: "no fixed pixel breakpoints for text"
        check: "does not use fixed pixel values for font sizes at breakpoints — uses rem or em for scalable typography"

tags: [responsive-patterns, background, frontend]
