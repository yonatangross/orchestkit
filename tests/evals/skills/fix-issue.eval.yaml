# Generated by OrchestKit Claude Plugin
# Created: 2026-03-13

id: fix-issue
name: "Fix issue skill evaluation"
skill_path: src/skills/fix-issue/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — direct requests
  - prompt: "fix issue #234"
    should_trigger: true
  - prompt: "debug and fix the login regression from last deploy"
    should_trigger: true
  - prompt: "there's a bug where users can't reset their passwords, fix it"
    should_trigger: true
  # Should trigger — casual/indirect phrasing
  - prompt: "the checkout page is broken, can you figure out why and patch it"
    should_trigger: true
  - prompt: "we got a bug report about duplicate emails, track it down and fix"
    should_trigger: true
  - prompt: "something's causing 500 errors on the /api/users endpoint, investigate and resolve"
    should_trigger: true
  # Should NOT trigger — implement confusion pair (both write code)
  - prompt: "build a user authentication system with JWT"
    should_trigger: false
  - prompt: "add dark mode support to the dashboard"
    should_trigger: false
  - prompt: "implement a caching layer for the API"
    should_trigger: false
  # Should NOT trigger — explore confusion pair (both investigate code)
  - prompt: "how does the auth system work in this codebase"
    should_trigger: false
  - prompt: "explain the architecture of this repository"
    should_trigger: false
  # Should trigger — terse phrasing
  - prompt: "fix #87"
    should_trigger: true
  # Should trigger — common typo
  - prompt: "fix isuse #23"
    should_trigger: true
  # Should NOT trigger — multi-intent, primary is explore
  - prompt: "explore how the auth system works and fix the logging"
    should_trigger: false

quality_evals:
  - prompt: |
      users receive a 403 error when trying to update their own
      profile after the recent auth refactor. walk me through how
      you would diagnose and fix this issue.
    assertions:
      - name: "hypothesis generation"
        check: "generates at least 2 hypotheses for the root cause (e.g., permission check, middleware order, token scope)"
      - name: "investigation steps"
        check: "outlines a systematic debugging approach — check auth middleware, verify token claims, trace the request"
      - name: "regression test"
        check: "recommends writing a test that reproduces the 403 before implementing the fix"
      - name: "prevention plan"
        check: "suggests how to prevent similar auth regressions in the future"

  - prompt: |
      there's a memory leak in the WebSocket handler. the server
      OOMs after about 2 hours. quick fix, not a full investigation.
    assertions:
      - name: "respects quick fix scope"
        check: "focuses on a targeted diagnosis rather than a full investigation"
      - name: "identifies leak patterns"
        check: "identifies common WebSocket leak causes: unremoved event listeners, unclosed connections, or growing maps/sets"
      - name: "cleanup recommendation"
        check: "recommends proper cleanup on disconnect (removeEventListener, close, delete from map)"

tags: [fix-issue, user-invocable, core]
