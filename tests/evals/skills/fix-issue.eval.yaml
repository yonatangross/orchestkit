# Generated by OrchestKit Claude Plugin
# Created: 2026-03-13

id: fix-issue
name: "Fix issue skill evaluation"
skill_path: src/skills/fix-issue/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — direct requests
  - prompt: "fix issue #234"
    should_trigger: true
  - prompt: "debug and fix the login regression from last deploy"
    should_trigger: true
  - prompt: "there's a bug where users can't reset their passwords, fix it"
    should_trigger: true
  # Should trigger — casual/indirect phrasing
  - prompt: "the checkout page is broken, can you figure out why and patch it"
    should_trigger: true
  - prompt: "we got a bug report about duplicate emails, track it down and fix"
    should_trigger: true
  - prompt: "something's causing 500 errors on the /api/users endpoint, investigate and resolve"
    should_trigger: true
  # Should NOT trigger — implement confusion pair (both write code)
  - prompt: "build a user authentication system with JWT"
    should_trigger: false
  - prompt: "add dark mode support to the dashboard"
    should_trigger: false
  - prompt: "implement a caching layer for the API"
    should_trigger: false
  # Should NOT trigger — explore confusion pair (both investigate code)
  - prompt: "how does the auth system work in this codebase"
    should_trigger: false
  - prompt: "explain the architecture of this repository"
    should_trigger: false

quality_evals:
  - prompt: |
      fix issue #42. the issue says "users receive a 403 error when
      trying to update their own profile after the recent auth refactor."
    scaffold: typescript-nextjs
    assertions:
      - name: "reads issue from GitHub"
        check: "fetches the issue details using gh issue view or equivalent"
      - name: "forms hypotheses"
        check: "generates at least 2 hypotheses for the root cause before jumping to a fix"
      - name: "writes regression test first"
        check: "creates a failing test that reproduces the 403 error before implementing the fix"
      - name: "commits on feature branch"
        check: "works on a feature branch, never commits directly to main or dev"
      - name: "includes prevention plan"
        check: "suggests how to prevent similar auth regression in the future"

  - prompt: |
      there's a memory leak in the WebSocket handler. the server
      OOMs after about 2 hours. quick fix, not a full investigation.
    assertions:
      - name: "respects quick fix mode"
        check: "focuses on a targeted fix rather than full 11-phase investigation"
      - name: "identifies leak pattern"
        check: "looks for common WebSocket leak patterns like unremoved event listeners or unclosed connections"
      - name: "adds cleanup logic"
        check: "implements proper cleanup or disposal in the fix"

tags: [fix-issue, user-invocable, core]
