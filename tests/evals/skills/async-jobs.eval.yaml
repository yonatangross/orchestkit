# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: async-jobs
name: "Async jobs patterns evaluation"
skill_path: src/skills/async-jobs/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I need to process payment webhooks in the background. Sometimes the payment
      gateway is flaky and returns 503. The task should retry with increasing delays
      but not retry forever. How do I set this up with Celery?
    assertions:
      - name: "exponential backoff with jitter"
        check: "uses exponential backoff with jitter for retry delays to avoid thundering herd on transient failures"
      - name: "max retries capped"
        check: "sets max_retries to a finite number (3-5) for transient errors"
      - name: "idempotency for retries"
        check: "mentions idempotency keys or deduplication to prevent duplicate payment processing"

  - prompt: |
      I have an ETL pipeline: extract data from an API, transform it, then load
      into the database. After loading, I need to send a notification. Each step
      depends on the previous. How should I orchestrate this with Celery?
    assertions:
      - name: "chain for sequential steps"
        check: "uses a task chaining or pipeline mechanism to sequence the extract, transform, load steps so each step passes its result to the next"
      - name: "link_error for failure handling"
        check: "includes an error callback or failure handler that triggers when any step in the workflow fails"
      - name: "late ack for crash safety"
        check: "recommends acknowledging tasks only after completion (not on receipt) so tasks are re-delivered if a worker crashes mid-processing"

  - prompt: |
      My FastAPI app needs lightweight background jobs — sending emails and
      resizing images. I don't want to set up Celery and Redis for this simple
      use case. What are my options?
    assertions:
      - name: "ARQ for async jobs"
        check: "recommends a lightweight async-native task queue as an alternative to a full-featured task framework for simple use cases"
      - name: "BackgroundTasks for simple cases"
        check: "mentions using the framework's built-in background task mechanism for quick in-process work that doesn't need persistence or crash recovery"
      - name: "tool selection criteria"
        check: "explains criteria for choosing between lightweight in-process tasks, async queues, and full task frameworks based on complexity, durability, and persistence needs"

tags: [async-jobs, background, queues]
