id: doctor-reload-plugins-auto-deps
name: "doctor: recommends /reload-plugins for missing plugin deps (CC 2.1.116+)"
skill_path: src/skills/doctor/SKILL.md
plugin_dir: plugins/ork

# Verifies the model applies the CC 2.1.116 /reload-plugins auto-install-deps
# guidance documented in doctor's "Interpreting Results & Troubleshooting"
# section (moved there from "When to Use" per the /ork:explore review).

quality_evals:
  - prompt: |
      I ran `/ork:doctor` and got this finding:
        Category 5 (Build): plugin-load failure — "some-plugin" declares
        dependency "other-plugin >= 1.2.0" but other-plugin is not installed.

      I'm on Claude Code 2.1.116. How should I fix this?
    assertions:
      - name: "recommends /reload-plugins first"
        check: "recommends running `/reload-plugins` as the first step — CC 2.1.116 auto-installs missing plugin deps from known marketplaces"
      - name: "does not immediately recommend plugin install"
        check: "does NOT immediately recommend a manual `plugin install` step as the primary fix (only as a fallback if /reload-plugins doesn't resolve it)"
      - name: "mentions the CC version as the reason"
        check: "references CC 2.1.116 (or \"Claude Code 2.1.116+\") as the reason `/reload-plugins` is sufficient"

  - prompt: |
      I'm on an older Claude Code (2.1.98). Doctor reports the same plugin
      dependency issue. Does `/reload-plugins` resolve it?
    assertions:
      - name: "answers no for pre-2.1.116"
        check: "answers NO — pre-2.1.116 `/reload-plugins` does not auto-install missing deps"
      - name: "recommends manual plugin install"
        check: "recommends a manual `plugin install` or marketplace add step as the fix for pre-2.1.116"
      - name: "mentions CC version upgrade as an option"
        check: "mentions that upgrading to CC 2.1.116+ would eliminate this manual step"

tags:
  - doctor
  - reload-plugins
  - cc-2.1.116
  - plugin-deps
