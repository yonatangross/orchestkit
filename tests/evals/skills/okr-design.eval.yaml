# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: okr-design
name: "OKR design skill evaluation"
skill_path: src/skills/okr-design/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      Our product team needs to set quarterly goals. The CEO wants us
      to "improve user engagement." Help me turn this into well-structured
      goals with measurable outcomes. We currently have 10K weekly active
      users and a 25% day-7 retention rate.
    assertions:
      - name: "qualitative objective"
        check: "writes a qualitative, inspiring Objective statement that does not contain numbers — the Objective captures the aspirational direction"
      - name: "quantitative key results with baselines"
        check: "defines Key Results with specific numeric targets in 'from X to Y' format, using the provided baselines (10K WAU, 25% retention)"
      - name: "outcome not output"
        check: "Key Results are outcome-focused (e.g., 'increase retention from 25% to 40%') not output-focused (e.g., 'ship 5 features')"

  - prompt: |
      Our SaaS company uses revenue growth as our main success metric
      but it's a lagging indicator — by the time it drops, it's too
      late to react. I need a metrics framework that connects daily
      team actions to revenue outcomes. What approach should I use?
    assertions:
      - name: "KPI tree decomposition"
        check: "decomposes revenue into a KPI tree showing cause-effect relationships between leading input metrics and the lagging revenue outcome"
      - name: "North Star Metric"
        check: "identifies or recommends a North Star Metric that captures core value delivery and serves as the bridge between leading and lagging metrics"
      - name: "leading vs lagging pairs"
        check: "pairs each lagging metric with 2-3 leading predictors that teams can act on daily or weekly"

  - prompt: |
      We want to test whether adding a collaborative editing feature
      will increase user engagement. Before building the full feature,
      we want to design an experiment with clear success criteria and
      know when to kill it. How should we structure this?
    assertions:
      - name: "hypothesis with expected effect size"
        check: "defines a clear hypothesis: 'If we [change], then [metric] will [direction] by [amount] because [reasoning]'"
      - name: "guardrail metrics defined"
        check: "specifies guardrail metrics that must not degrade during the experiment, with specific thresholds for automatic kill criteria"
      - name: "staged rollout plan"
        check: "includes a staged rollout plan (e.g., 10% canary, 50%, 100%) with monitoring checkpoints at each stage"

tags: [okr-design, background, product]
