id: figma-design-handoff
name: "Figma design handoff evaluation"
skill_path: src/skills/figma-design-handoff/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      Our designers use Figma Variables for colors and spacing. How do
      I convert those into CSS custom properties and a Tailwind theme
      that our developers can use?
    assertions:
      - name: "Figma REST API export"
        check: "recommends using the Figma REST API to export Variables as design tokens"
      - name: "W3C DTCG format"
        check: "mentions W3C Design Tokens Community Group (DTCG) JSON format as the token format"
      - name: "Style Dictionary pipeline"
        check: "recommends Style Dictionary to transform tokens into CSS custom properties and Tailwind theme"

  - prompt: |
      The designer gave me a Figma component with Auto Layout set to
      horizontal direction, gap 16, padding 16 24, and fill container
      on children. How do I translate this to CSS?
    assertions:
      - name: "flex-direction row"
        check: "maps horizontal Auto Layout direction to flex-direction: row"
      - name: "gap and padding"
        check: "maps gap 16 to gap: 16px and padding 16 24 to padding: 16px 24px"
      - name: "fill container to flex"
        check: "maps fill container to flex: 1 1 0% or equivalent flex-1"

  - prompt: |
      How do I verify that our production components actually match the
      Figma designs? We keep finding small spacing and color
      discrepancies after deploy.
    assertions:
      - name: "visual regression testing"
        check: "recommends Applitools Eyes or visual regression testing tools for comparing production UI against Figma"
      - name: "automated comparison"
        check: "describes automated screenshot comparison rather than manual checking"
      - name: "common drift types"
        check: "mentions color mismatches, spacing drift, or typography inconsistencies as common issues"

tags: [figma-design-handoff, background, frontend]
