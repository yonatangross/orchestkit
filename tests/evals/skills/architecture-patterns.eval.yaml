# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: architecture-patterns
name: "Architecture patterns evaluation"
skill_path: src/skills/architecture-patterns/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I'm building a FastAPI backend for a SaaS product with 5 engineers.
      We have users, organizations, billing, and notifications domains.
      How should I structure the project and enforce layer boundaries?
    assertions:
      - name: "layer separation"
        check: "enforces router/service/repository layer separation with clear boundaries — routers handle HTTP, services handle business logic, repositories handle data access"
      - name: "dependency inversion"
        check: "uses Protocol-based interfaces or dependency injection (Depends()) to decouple layers"
      - name: "project structure"
        check: "recommends feature-based organization with max 4 levels of nesting from src/"

  - prompt: |
      My React app has components importing from everywhere — features importing
      from other features, utils scattered around, and index.ts barrel files
      causing circular dependencies. How do I fix this?
    assertions:
      - name: "unidirectional imports"
        check: "enforces unidirectional import direction: shared -> components -> features -> app"
      - name: "no barrel files"
        check: "warns against re-export files (barrel files or index.ts) that cause circular dependencies or hurt tree-shaking"
      - name: "component placement"
        check: "specifies where components and hooks should live (components/ or features/ directories)"

  - prompt: |
      We need to add tests to our backend. Currently we have zero tests and
      the team doesn't have testing conventions. What standards should we adopt
      for test structure, naming, and coverage?
    assertions:
      - name: "AAA pattern"
        check: "recommends a structured test pattern such as Arrange-Act-Assert or Given-When-Then for consistent test organization"
      - name: "coverage thresholds"
        check: "specifies minimum coverage targets with higher thresholds for critical business logic than for overall code"
      - name: "descriptive naming"
        check: "requires behavior-focused descriptive test names, not generic names like test1 or test_works"

tags: [architecture-patterns, background, architecture]
