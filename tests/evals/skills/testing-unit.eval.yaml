id: testing-unit
name: "Unit testing patterns evaluation"
skill_path: src/skills/testing-unit/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — fixture scoping and test isolation
  - prompt: "what fixture scope should I use for a pytest fixture that creates a database user?"
    should_trigger: true
  - prompt: "my tests share state and conflict in CI, how should I structure test data?"
    should_trigger: true
  # Should trigger — network-level mocking
  - prompt: "should I mock fetch directly or intercept at the network layer with MSW?"
    should_trigger: true
  # Should trigger — parametrization and boilerplate
  - prompt: "I have five near-identical test blocks that differ only by input, how do I collapse them?"
    should_trigger: true
  - prompt: "what is the AAA pattern and how strictly should I follow it?"
    should_trigger: true
  # Should trigger — terse phrasing
  - prompt: "fixture scope?"
    should_trigger: true
  # Should trigger — common typo
  - prompt: "parametrized tets with pytest"
    should_trigger: true
  # Should NOT trigger — cover confusion pair (cover GENERATES tests, this skill explains patterns)
  - prompt: "generate unit tests for the pricing service"
    should_trigger: false
  - prompt: "add test coverage for the notification module"
    should_trigger: false
  # Should NOT trigger — testing-perf confusion pair (parallel EXECUTION, not per-test authoring)
  - prompt: "how do I run my pytest suite in parallel across 8 cores?"
    should_trigger: false
  # Should NOT trigger — testing-llm confusion pair (LLM-specific mocking)
  - prompt: "how should I mock the Anthropic API response in my tests?"
    should_trigger: false
  # Should NOT trigger — testing-integration confusion pair
  - prompt: "how do I verify my API contract with Pact?"
    should_trigger: false
  # Should NOT trigger — testing-e2e confusion pair
  - prompt: "how do I set up page objects in Playwright?"
    should_trigger: false
  # Should NOT trigger — multi-intent, primary is implement
  - prompt: "implement the discount service and then write its unit tests"
    should_trigger: false

quality_evals:
  - prompt: |
      I need to write unit tests for a pricing service that calculates
      discounts based on order total, customer tier, and active promotions.
      The service calls an external loyalty API to check tier status.
      Using TypeScript with Vitest.
    assertions:
      - name: "AAA pattern"
        check: "test structure follows Arrange-Act-Assert with clear phase separation or comments"
      - name: "MSW for HTTP mocking"
        check: "uses MSW (Mock Service Worker) at the network level for the loyalty API, NOT mocking fetch/axios directly"
      - name: "parametrized tests"
        check: "uses test.each or similar parametrization for multiple discount scenarios instead of duplicated test blocks"

  - prompt: |
      I have a Python Django app with a UserService that creates users,
      sends welcome emails, and syncs to a CRM. How should I structure
      the test data? I keep having test conflicts in CI because tests
      share database records.
    assertions:
      - name: "factory pattern"
        check: "recommends FactoryBoy or a factory pattern for generating test data instead of hardcoded fixtures"
      - name: "fixture scoping"
        check: "discusses fixture scope (function vs module vs session) and recommends function-scoped for mutable data"
      - name: "test isolation"
        check: "addresses shared mutable state as a problem and recommends per-test cleanup or transaction rollback"

  - prompt: |
      My React app fetches user profiles from /api/users/:id and displays
      them. I want to test the data fetching hook without hitting the real
      API. What's the best approach? Currently using Jest.
    assertions:
      - name: "network-level mocking"
        check: "recommends MSW (Mock Service Worker) for intercepting network requests rather than mocking fetch or axios directly"
      - name: "handler setup pattern"
        check: "shows server.listen/resetHandlers/close lifecycle with beforeAll/afterEach/afterAll"
      - name: "error simulation"
        check: "includes or mentions testing error scenarios like 404 or 500 responses from the API"

  - prompt: |
      We have a pytest test suite with 800+ tests that takes 12 minutes
      to run. Many tests create similar user objects with slightly different
      attributes. How can I speed things up and reduce the boilerplate?
    assertions:
      - name: "parametrize decorator"
        check: "recommends @pytest.mark.parametrize for testing multiple input variations"
      - name: "execution time target"
        check: "mentions that individual unit tests should run fast, ideally under 100ms each"

tags: [testing-unit, background, testing, mocking]
