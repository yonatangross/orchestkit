# Generated by OrchestKit Claude Plugin
# Created: 2026-03-11

id: explore
name: "Explore skill evaluation"
skill_path: src/skills/explore/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — codebase exploration
  - prompt: "how does the auth system work in this codebase"
    should_trigger: true
  - prompt: "find all files related to payments processing"
    should_trigger: true
  - prompt: "what is the architecture of this repo, give me the big picture"
    should_trigger: true
  - prompt: "trace the request flow from the API endpoint to the database"
    should_trigger: true
  - prompt: "where is the database schema defined and what tables exist"
    should_trigger: true
  - prompt: "i just joined this project, walk me through the codebase structure"
    should_trigger: true
  # Should NOT trigger — single-file questions or action requests
  - prompt: "what does the calculateTotal function on line 45 do"
    should_trigger: false
  - prompt: "fix the auth bug thats causing 401 errors"
    should_trigger: false
  - prompt: "list all npm scripts in package.json"
    should_trigger: false
  - prompt: "help me understand this error: Cannot read property of undefined"
    should_trigger: false
  # Should NOT trigger — fix-issue confusion pair (both investigate code)
  - prompt: "the auth endpoint returns 500 errors, fix it"
    should_trigger: false
  # Should NOT trigger — assess confusion pair (both analyze code)
  - prompt: "rate this codebase from 0 to 10"
    should_trigger: false
  # Should trigger — terse phrasing
  - prompt: "explore auth"
    should_trigger: true
  # Should trigger — common typo
  - prompt: "exlpore the codebase"
    should_trigger: true
  # Should NOT trigger — multi-intent, primary is implement
  - prompt: "explore the payment module and then implement retry logic"
    should_trigger: false

quality_evals:
  - prompt: |
      explore this codebase and explain the architecture.
      what are the main components and how do they connect?
    scaffold: typescript-nextjs
    assertions:
      - name: "multi-file exploration"
        check: "reads and references 3+ files across different directories"
      - name: "architecture summary"
        check: "provides a high-level description of component structure"
      - name: "file path citations"
        check: "includes specific file paths when describing components"
      - name: "data flow description"
        check: "explains how data moves between components"
      - name: "no fabricated paths"
        check: "all file paths mentioned actually exist in the project, no hallucinated paths"
      - name: "no shallow listing"
        check: "does NOT just list directory names without explaining what each component does"

tags: [explore, user-invocable, core]
