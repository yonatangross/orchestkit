# Created: 2026-03-14

id: monitoring-observability
name: "Monitoring and observability patterns evaluation"
skill_path: src/skills/monitoring-observability/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I need to add metrics to my FastAPI service. The team wants to track
      request rate, error rate, and latency percentiles. We use Prometheus
      and Grafana. What metrics should I instrument and how?
    assertions:
      - name: "RED method metrics"
        check: "instruments Rate (Counter for requests), Errors (Counter with status label), and Duration (Histogram)"
      - name: "histogram buckets"
        check: "configures histogram buckets appropriate for HTTP latency (e.g., 10ms to 5s range)"
      - name: "label cardinality awareness"
        check: "warns against high-cardinality labels (like user_id) on metrics to prevent Prometheus storage issues"

  - prompt: |
      We're running an LLM-powered customer support agent in production. We
      need to track costs, trace multi-step interactions, and catch when the
      agent starts giving lower quality answers. What observability stack
      should we set up?
    assertions:
      - name: "Langfuse for LLM tracing"
        check: "recommends Langfuse with @observe decorator for tracing LLM calls, not LangSmith"
      - name: "cost tracking"
        check: "tracks token usage and cost per interaction using Langfuse cost tracking or Metrics API"
      - name: "quality drift detection"
        check: "implements PSI or statistical drift detection to catch quality regression over time"

  - prompt: |
      Our alerting is a mess — the on-call engineer gets 50+ alerts per day
      and most are false positives. We need to redesign our alerting strategy
      for a microservices backend with 12 services.
    assertions:
      - name: "severity levels"
        check: "defines multiple severity levels (critical, high, medium, low) with different escalation paths"
      - name: "dynamic thresholds"
        check: "recommends dynamic or percentile-based thresholds instead of static thresholds to reduce false positives"
      - name: "alert grouping"
        check: "groups related alerts to reduce noise and prevent alert fatigue"

tags: [monitoring-observability, background, observability]
