# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: rag-retrieval
name: "RAG retrieval patterns evaluation"
skill_path: src/skills/rag-retrieval/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I'm building a Q&A system over our company's internal docs (about 10k
      pages). Users complain that keyword searches miss relevant results and
      pure vector search returns irrelevant matches. How should I design the
      retrieval pipeline?
    assertions:
      - name: "hybrid search with RRF"
        check: "combines keyword search with vector semantic search using a rank fusion or score combination strategy"
      - name: "chunking strategy"
        check: "recommends chunking documents into appropriately sized segments respecting semantic boundaries"
      - name: "citation tracking"
        check: "includes citations or source references in the generated answers for verifiability"

  - prompt: |
      My RAG system uses text-embedding-3-small and cosine similarity. For
      the question "what are the company vacation policies" it retrieves
      documents about "PTO accrual rates" but misses the actual vacation
      policy doc. How do I fix this vocabulary mismatch?
    assertions:
      - name: "HyDE approach"
        check: "suggests query expansion or hypothetical document generation to bridge the vocabulary gap between queries and documents"
      - name: "HyDE timeout fallback"
        check: "mentions a timeout or fallback mechanism if the query expansion step is too slow"
      - name: "contextual retrieval"
        check: "mentions adding document-level or section-level context to individual chunks to improve retrieval relevance"

  - prompt: |
      I want to use PostgreSQL as my vector store instead of adding Pinecone.
      I have pgvector installed. How do I set up hybrid search with proper
      indexing for production traffic?
    assertions:
      - name: "HNSW index"
        check: "recommends an approximate nearest neighbor index (HNSW or similar) for production vector search performance"
      - name: "pre-computed tsvector"
        check: "uses pre-computed or indexed full-text search columns for efficient keyword search"
      - name: "RRF fusion in SQL"
        check: "combines vector similarity scores and text search scores using rank fusion or score normalization"

tags: [rag-retrieval, background, llm]
