# NOTE: Interactive workflow skill — quality evals test knowledge, not orchestration.
# Full orchestration requires interactive session (AskUserQuestion).
# Generated by OrchestKit Claude Plugin
# Created: 2026-03-15

id: cover
name: "Cover skill evaluation"
skill_path: src/skills/cover/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — direct requests
  - prompt: "generate tests for the authentication service"
    should_trigger: true
  - prompt: "cover the payment processing module with unit and integration tests"
    should_trigger: true
  - prompt: "create a full test suite for the user API"
    should_trigger: true
  # Should trigger — casual/indirect phrasing
  - prompt: "I just finished implementing checkout, now write tests for it"
    should_trigger: true
  - prompt: "add test coverage for the notification service"
    should_trigger: true
  - prompt: "we need tests with real database connections for the order service"
    should_trigger: true
  # Should trigger — terse phrasing
  - prompt: "cover auth"
    should_trigger: true
  # Should NOT trigger — verify confusion pair (grades tests, doesn't generate)
  - prompt: "verify the authentication implementation"
    should_trigger: false
  - prompt: "grade my test coverage and tell me the score"
    should_trigger: false
  # Should NOT trigger — implement confusion pair
  - prompt: "implement the payment flow"
    should_trigger: false
  # Should NOT trigger — just running existing tests
  - prompt: "run the test suite and show me results"
    should_trigger: false
  - prompt: "npm test"
    should_trigger: false
  # Should NOT trigger — code review
  - prompt: "review the tests in this PR"
    should_trigger: false

quality_evals:
  - prompt: |
      generate comprehensive tests for the user registration service.
      it has email validation, password hashing with bcrypt, database write,
      and sends a welcome email via SendGrid. we have docker-compose with postgres.
    scaffold: typescript-nextjs
    assertions:
      - name: "spawns parallel test agents"
        check: "launches multiple test-generator agents in parallel for different test tiers (unit, integration, e2e)"
      - name: "detects real services"
        check: "detects docker-compose.yml and uses real PostgreSQL for integration tests instead of mocks"
      - name: "generates unit tests"
        check: "creates unit tests with AAA pattern for business logic like email validation and password hashing"
      - name: "generates integration tests"
        check: "creates integration tests that test API endpoints and database operations"
      - name: "uses proper mocking"
        check: "mocks external services (SendGrid) at the network level using MSW or VCR, not by mocking fetch directly"
      - name: "produces coverage report"
        check: "outputs a coverage report showing before/after delta and test counts per tier"

  - prompt: |
      cover the checkout flow with e2e tests only
    assertions:
      - name: "respects tier selection"
        check: "generates only E2E tests, does not spawn unit or integration test agents"
      - name: "uses Playwright patterns"
        check: "generates Playwright tests with semantic locators (getByRole, getByLabel) not CSS selectors"
      - name: "includes page objects"
        check: "creates page object classes for complex checkout pages"

tags: [cover, user-invocable, testing, core]
