# Created: 2026-03-14

id: interaction-patterns
name: "Interaction patterns skill evaluation"
skill_path: src/skills/interaction-patterns/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      My React app fetches a list of product cards from an API. While
      loading, we show a generic spinner. Users complain about layout
      shift when the content loads. What loading pattern should I use
      instead?
    assertions:
      - name: "skeleton loading over spinner"
        check: "recommends skeleton loading (content-shaped placeholders matching the final layout) instead of a generic spinner for list/card content"
      - name: "matches content shape"
        check: "skeleton placeholders should match the dimensions and layout of the actual content to prevent layout shift (CLS)"
      - name: "animate-pulse or shimmer"
        check: "uses a pulse or shimmer animation on skeleton elements to indicate loading state"

  - prompt: |
      I'm implementing an infinite scrolling feed for a social app.
      The feed needs to load more posts as the user scrolls down. I
      also need it to work for screen reader users and keyboard-only
      navigation.
    assertions:
      - name: "IntersectionObserver sentinel"
        check: "uses IntersectionObserver with a sentinel element near the bottom to trigger fetching the next page"
      - name: "Load More button fallback"
        check: "provides a 'Load more' button as a fallback for keyboard and screen reader users who cannot trigger scroll-based loading"
      - name: "ARIA feed role and live region"
        check: "uses role='feed' on the container and aria-live='polite' region to announce new content to screen readers"

  - prompt: |
      I need to build a task board where users can drag cards between
      columns to change their status (To Do, In Progress, Done). It
      needs to work on both mouse and keyboard. What library and
      patterns should I use?
    assertions:
      - name: "keyboard alternative required"
        check: "provides keyboard alternatives (arrow keys + Enter or similar) for drag-and-drop reordering, not drag-only interaction"
      - name: "dnd-kit or accessible library"
        check: "recommends @dnd-kit/core or another accessibility-first drag-and-drop library rather than building custom drag handlers"
      - name: "aria announcements for state changes"
        check: "announces drag state changes (picked up, moved, dropped) to screen readers via aria-live or equivalent"

tags: [interaction-patterns, background, frontend]
