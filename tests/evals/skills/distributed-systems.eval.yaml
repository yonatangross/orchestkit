# Created: 2026-03-14

id: distributed-systems
name: "Distributed systems patterns evaluation"
skill_path: src/skills/distributed-systems/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      We have a payment processing service running on 3 replicas behind a load
      balancer. Sometimes the same payment gets processed twice when retries
      hit different instances. How do I prevent duplicate payments?
    assertions:
      - name: "idempotency keys"
        check: "recommends idempotency keys with deterministic generation to deduplicate retried requests"
      - name: "distributed lock or dedup"
        check: "suggests a distributed deduplication or locking mechanism (cache layer, database constraint, or distributed lock) to coordinate across instances"
      - name: "no non-deterministic keys"
        check: "warns against using random UUIDs as idempotency keys since they differ on every retry"

  - prompt: |
      Our service calls a third-party API that occasionally goes down for
      minutes at a time. When it's down, our entire backend slows to a crawl
      because every request waits for the timeout. How should I handle this?
    assertions:
      - name: "circuit breaker pattern"
        check: "recommends a circuit breaker pattern with multiple states to fast-fail when the downstream service is unhealthy"
      - name: "retry with backoff"
        check: "uses exponential backoff with jitter for retries, coordinated with the circuit breaker pattern"
      - name: "error classification"
        check: "distinguishes retryable errors (timeouts, 503) from non-retryable errors (401, 400) — never retries auth failures"

  - prompt: |
      I'm building an order fulfillment system where creating an order involves
      reserving inventory, charging payment, and scheduling shipping across
      separate services. If payment fails after inventory is reserved, I need
      to roll back. What pattern should I use?
    assertions:
      - name: "saga pattern"
        check: "recommends saga pattern with compensation steps to roll back across service boundaries"
      - name: "transactional outbox"
        check: "mentions a reliable event publishing pattern (transactional outbox, change data capture, or similar) to avoid dual-write problems"
      - name: "right-sizing caveat"
        check: "notes that saga/event-sourcing patterns are appropriate for enterprise scale but overkill for simpler projects"

tags: [distributed-systems, background, resilience]
