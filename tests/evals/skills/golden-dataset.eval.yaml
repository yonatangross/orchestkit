id: golden-dataset
name: "Golden dataset evaluation"
skill_path: src/skills/golden-dataset/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I'm building an evaluation dataset for our RAG system. How do
      I ensure quality and prevent duplicates when adding new documents
      to the golden dataset?
    assertions:
      - name: "quality threshold"
        check: "specifies a minimum quality score (e.g., >= 0.70) for inclusion in the golden dataset"
      - name: "duplicate detection"
        check: "mentions similarity threshold for detecting duplicates (e.g., >= 0.90 blocks, >= 0.85 warns)"
      - name: "minimum tags"
        check: "requires a minimum number of domain tags per entry"

  - prompt: |
      We need to back up our golden dataset and be able to restore it
      on a new environment. What format and process should we use?
    assertions:
      - name: "JSON backup format"
        check: "recommends JSON format for version-controlled, portable backups"
      - name: "embedding regeneration"
        check: "warns that embeddings must be regenerated after restore, not stored in backups"
      - name: "verification after restore"
        check: "recommends running verification checks after backup/restore operations"

  - prompt: |
      Our golden dataset seems skewed - most entries are articles and
      the difficulty distribution is uneven. How do I analyze and fix
      the coverage?
    assertions:
      - name: "content type diversity"
        check: "advises diversifying beyond articles to include tutorials, research papers, and other content types"
      - name: "difficulty distribution"
        check: "recommends balanced difficulty levels (trivial, easy, medium, hard) with minimum counts"
      - name: "coverage gap analysis"
        check: "suggests analyzing domain coverage to identify and fill gaps"

tags: [golden-dataset, background, evaluation]
