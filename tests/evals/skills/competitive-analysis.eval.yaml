id: competitive-analysis
name: "Competitive analysis skill evaluation"
skill_path: src/skills/competitive-analysis/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      We're entering the project management SaaS market and need to
      understand the competitive dynamics. There are major players like
      Asana, Monday.com, Linear, and ClickUp. Help me analyze the
      industry structure and barriers to entry.
    assertions:
      - name: "Porter's Five Forces framework"
        check: "applies Porter's Five Forces framework analyzing competitive rivalry, threat of new entrants, supplier power, buyer power, and threat of substitutes"
      - name: "barrier assessment"
        check: "evaluates specific barriers to entry such as network effects, switching costs, brand loyalty, and capital requirements"
      - name: "industry attractiveness rating"
        check: "provides an overall industry attractiveness assessment based on the combined force analysis"

  - prompt: |
      Our sales team keeps losing deals to a specific competitor. I need
      to create a document that helps reps understand this competitor's
      strengths, weaknesses, and how to position against them in sales
      conversations.
    assertions:
      - name: "competitor profile structure"
        check: "creates a structured competitor profile with overview (funding, employees, target customer), strengths, weaknesses, and threat assessment"
      - name: "differentiation positioning"
        check: "includes specific differentiation points explaining how to position against this competitor's strengths and exploit their weaknesses"

  - prompt: |
      I need to assess our startup's strategic position before a board
      meeting. We have strong technology but limited brand recognition.
      The market is growing but regulation is increasing. What framework
      should I use for a clear internal vs external assessment?
    assertions:
      - name: "SWOT analysis"
        check: "uses SWOT analysis with four quadrants: Strengths (internal positive), Weaknesses (internal negative), Opportunities (external positive), Threats (external negative)"
      - name: "TOWS strategy matrix"
        check: "converts SWOT findings into actionable strategies using a TOWS matrix (SO, WO, ST, WT strategic options)"
      - name: "competitive landscape map"
        check: "plots position on a competitive landscape map using two buyer-relevant axes to identify whitespace opportunities"

tags: [competitive-analysis, background, product]
