id: memory-fabric
name: "Memory fabric evaluation"
skill_path: src/skills/memory-fabric/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I want to search my knowledge graph for what the database-engineer
      agent recommended about pagination. How does the memory fabric
      find and rank relevant results?
    assertions:
      - name: "graph query"
        check: "uses mcp__memory__search_nodes or equivalent graph search to find matching entities"
      - name: "entity extraction"
        check: "extracts entity hints like 'database-engineer' and 'pagination' from the query"
      - name: "ranking formula"
        check: "applies a ranking formula combining recency, relevance, and source authority"

  - prompt: |
      My memory search returns duplicate results that say the same
      thing in slightly different words. How does the fabric handle
      deduplication?
    assertions:
      - name: "similarity threshold"
        check: "uses an 85% or similar text similarity threshold for deduplication"
      - name: "keep higher relevance"
        check: "keeps the result with higher relevance score when merging duplicates"
      - name: "cross-validated boost"
        check: "marks deduplicated results as cross-validated for an authority boost"

  - prompt: |
      How does the memory fabric connect related concepts across
      different graph entities? For example, linking a technology
      recommendation to the agent who made it.
    assertions:
      - name: "entity relationships"
        check: "extracts entities and relations like 'database-engineer uses pgvector'"
      - name: "cross-reference boost"
        check: "boosts relevance score when a result references entities that exist elsewhere in the graph"
      - name: "multi-hop traversal"
        check: "supports multi-hop graph traversal for following relationship chains"

tags: [memory-fabric, background, ai-ml]
