# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: analytics
name: "Cross-project analytics evaluation"
skill_path: src/skills/analytics/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I want to see which agents I use most frequently across my projects
      and what models they delegate to. Where can I find this data?
    assertions:
      - name: "agent-usage data source"
        check: "references agent-usage.jsonl in ~/.claude/analytics/ as the data source"
      - name: "jq query approach"
        check: "uses or recommends jq to query and aggregate JSONL data"
      - name: "model breakdown"
        check: "shows agent frequency with model delegation breakdown (opus/sonnet/haiku)"

  - prompt: |
      How much have my Claude Code sessions cost me this month? I want
      to see token usage broken down by model.
    assertions:
      - name: "stats-cache source"
        check: "references stats-cache.json as the data source for token and cost data"
      - name: "per-model breakdown"
        check: "shows costs broken down by model with input and output token counts"
      - name: "cache savings"
        check: "mentions or accounts for cache token savings in the cost calculation"

  - prompt: |
      Which of my hooks are slowest and which ones fail most often?
      I want to identify bottlenecks in my development workflow.
    assertions:
      - name: "hook-timing data source"
        check: "references hook-timing.jsonl for hook execution timing and failure data"
      - name: "slowest hooks"
        check: "identifies the slowest hooks by execution duration"
      - name: "failure rates"
        check: "shows hook failure rates as percentages or counts"

tags: [analytics, background, workflow]
