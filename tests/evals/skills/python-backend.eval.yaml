# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: python-backend
name: "Python backend patterns evaluation"
skill_path: src/skills/python-backend/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I need to fetch data from 5 different microservices concurrently in my
      FastAPI endpoint. Some calls may fail and I want the whole batch to
      cancel if any single call raises. What's the modern Python way to do this?
    assertions:
      - name: "uses TaskGroup not gather"
        check: "recommends asyncio.TaskGroup for structured concurrency, NOT asyncio.gather"
      - name: "asyncio.timeout for deadline"
        check: "wraps the concurrent calls with asyncio.timeout() context manager"
      - name: "handles CancelledError"
        check: "mentions never swallowing CancelledError and letting it propagate"

  - prompt: |
      I'm building a FastAPI app with SQLAlchemy. My endpoints create their own
      database sessions inline. Users are reporting occasional 'Session is already
      closed' errors under load. How should I structure the session lifecycle?
    assertions:
      - name: "dependency injection for sessions"
        check: "uses Depends() with an async generator yielding AsyncSession, not inline session creation"
      - name: "expire_on_commit false"
        check: "sets expire_on_commit=False on the session factory to prevent lazy load errors"
      - name: "lazy raise for relationships"
        check: "recommends lazy='raise' on relationships to prevent accidental N+1 queries"

  - prompt: |
      My async Python service connects to PostgreSQL and also makes outbound
      HTTP calls. Under high traffic the database starts rejecting connections
      and HTTP calls queue up. How do I tune the connection pools?
    assertions:
      - name: "SQLAlchemy pool parameters"
        check: "mentions pool_size, max_overflow, and pool_pre_ping for the database pool"
      - name: "HTTP connector limits"
        check: "recommends TCPConnector or similar with connection limits for HTTP client sessions"
      - name: "lifespan for pool lifecycle"
        check: "creates pools at startup and closes them at shutdown using FastAPI lifespan"

tags: [python-backend, background, python]
