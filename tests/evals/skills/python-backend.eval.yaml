# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: python-backend
name: "Python backend patterns evaluation"
skill_path: src/skills/python-backend/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I need to fetch data from 5 different microservices concurrently in my
      FastAPI endpoint. Some calls may fail and I want the whole batch to
      cancel if any single call raises. What's the modern Python way to do this?
    assertions:
      - name: "uses TaskGroup not gather"
        check: "recommends structured concurrency that cancels all tasks when one fails, rather than fire-and-forget parallel execution"
      - name: "asyncio.timeout for deadline"
        check: "wraps the concurrent calls with a timeout or deadline mechanism to prevent indefinite waiting"
      - name: "handles CancelledError"
        check: "mentions properly propagating cancellation signals rather than swallowing them"

  - prompt: |
      I'm building a FastAPI app with SQLAlchemy. My endpoints create their own
      database sessions inline. Users are reporting occasional 'Session is already
      closed' errors under load. How should I structure the session lifecycle?
    assertions:
      - name: "dependency injection for sessions"
        check: "uses dependency injection to manage database session lifecycle rather than creating sessions inline in each endpoint"
      - name: "expire_on_commit false"
        check: "configures the session to avoid expiring objects after commit, preventing lazy-load errors when accessing attributes post-commit"
      - name: "lazy raise for relationships"
        check: "recommends making relationship loading explicit or raising on implicit lazy loads to prevent accidental N+1 queries"

  - prompt: |
      My async Python service connects to PostgreSQL and also makes outbound
      HTTP calls. Under high traffic the database starts rejecting connections
      and HTTP calls queue up. How do I tune the connection pools?
    assertions:
      - name: "SQLAlchemy pool parameters"
        check: "mentions tuning database connection pool settings such as pool size, overflow limits, and connection health checks"
      - name: "HTTP connector limits"
        check: "recommends configuring connection limits on the HTTP client to prevent resource exhaustion under high traffic"
      - name: "lifespan for pool lifecycle"
        check: "creates connection pools at application startup and closes them at shutdown to manage resource lifecycle properly"

tags: [python-backend, background, python]
