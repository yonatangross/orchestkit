# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: documentation-patterns
name: "Documentation patterns evaluation"
skill_path: src/skills/documentation-patterns/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I'm starting a new open-source project and need a good README.
      What sections should I include and in what order?
    assertions:
      - name: "essential sections"
        check: "includes project name, quick start, installation, usage, and contributing sections"
      - name: "ordered structure"
        check: "places quick start or getting started early in the README for immediate value"
      - name: "license section"
        check: "includes a license section"

  - prompt: |
      We're deciding whether to use PostgreSQL or MongoDB for our new
      service. I want to document the decision formally so future
      engineers understand why. What format should I use?
    assertions:
      - name: "ADR format"
        check: "recommends an Architecture Decision Record (ADR) with status, context, decision, and consequences"
      - name: "consequences section"
        check: "includes both positive and negative consequences of the decision"
      - name: "references"
        check: "suggests including references to alternatives considered or supporting data"

  - prompt: |
      I need to document my REST API. Should I write markdown docs
      or use something machine-readable? We want to auto-generate
      client SDKs eventually.
    assertions:
      - name: "OpenAPI recommendation"
        check: "recommends OpenAPI 3.1 specification for machine-readable API documentation"
      - name: "error responses"
        check: "mentions documenting error responses with proper schema definitions"
      - name: "SDK generation"
        check: "confirms that OpenAPI enables auto-generating client SDKs"

tags: [documentation-patterns, background, documentation]
