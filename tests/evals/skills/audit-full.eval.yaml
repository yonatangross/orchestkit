# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: audit-full
name: "Full-codebase audit evaluation"
skill_path: src/skills/audit-full/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I want a comprehensive security audit of my Node.js Express app.
      It handles payment processing and user authentication. The codebase
      is about 30K lines of TypeScript.
    assertions:
      - name: "data flow tracing"
        check: "describes tracing user input from entry point through processing to storage"
      - name: "auth boundary verification"
        check: "mentions verifying that all protected routes check authentication"
      - name: "OWASP mapping"
        check: "references OWASP Top 10 or common vulnerability categories for classifying findings"

  - prompt: |
      Run an architecture review of our monorepo. I want to know about
      circular dependencies, layer violations, and coupling between
      modules.
    assertions:
      - name: "circular dependency detection"
        check: "addresses detecting import cycles across modules"
      - name: "layer violations"
        check: "checks for business logic in controllers or database access in route handlers"
      - name: "coupling analysis"
        check: "measures cross-module imports or identifies tightly coupled components"

  - prompt: |
      Check our dependencies for known vulnerabilities, license issues,
      and outdated packages. We're a commercial SaaS product so license
      compliance matters.
    assertions:
      - name: "CVE detection"
        check: "checks dependency versions against known CVEs or vulnerabilities"
      - name: "license compliance"
        check: "identifies copyleft licenses that may conflict with proprietary/commercial use"
      - name: "version currency"
        check: "flags significantly outdated dependencies"

tags: [audit-full, background, security]
