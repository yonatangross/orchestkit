# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: chain-patterns
name: "Chain patterns evaluation"
skill_path: src/skills/chain-patterns/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I'm building a multi-phase pipeline skill that needs to call MCP servers
      for memory and context lookup. Sometimes the MCP servers aren't available.
      How should I detect capabilities before calling them?
    assertions:
      - name: "ToolSearch probe pattern"
        check: "recommends checking or probing MCP server availability before making tool calls to avoid failures"
      - name: "capability map persistence"
        check: "persists or caches discovered capabilities for reuse across pipeline phases to avoid redundant probing"
      - name: "graceful degradation"
        check: "if MCP is unavailable, skips gracefully without errors rather than crashing"

  - prompt: |
      My pipeline skill has 5 phases. If Claude hits a rate limit or the session
      crashes mid-way through phase 3, the user has to start over from scratch.
      How can I make it resumable?
    assertions:
      - name: "handoff files between phases"
        check: "writes structured JSON handoff files after each major phase to persist state (.claude/chain/ directory)"
      - name: "checkpoint-resume protocol"
        check: "on skill start, reads state.json and resumes from the last completed phase instead of restarting"
      - name: "numbered file ordering"
        check: "handoff or checkpoint files use ordered naming (numbered prefixes or timestamps) for clear sequencing"

  - prompt: |
      I need to spawn multiple agents to work on different parts of a feature
      in parallel — one for backend, one for frontend. They'll both be writing
      files. How do I prevent them from conflicting?
    assertions:
      - name: "worktree isolation"
        check: "uses isolation: worktree for agents that write files in parallel so each gets its own copy of the repo"
      - name: "read-only agents skip worktree"
        check: "agents that only read (analysis, review, brainstorming) do not need file-system isolation"

tags: [chain-patterns, background, pipeline]
