# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: business-case
name: "Business case skill evaluation"
skill_path: src/skills/business-case/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      We're considering building an internal developer platform. The
      estimated build cost is $500K over 6 months, with $100K/year
      maintenance. We expect to save 20 developer-hours per week
      ($150/hr). Should we invest? The project would span 3 years.
    assertions:
      - name: "NPV for multi-year decision"
        check: "uses NPV (Net Present Value) calculation for this multi-year investment, not just simple ROI, to account for time value of money"
      - name: "discount rate applied"
        check: "applies an appropriate discount rate (10-20% for enterprise) to future cash flows when calculating NPV"
      - name: "payback period calculated"
        check: "calculates payback period to answer how quickly the investment breaks even"

  - prompt: |
      My team needs to decide between building a custom notification
      system, buying a SaaS solution like Courier or Knock, or
      partnering with a vendor for a managed solution. How should we
      compare these options financially?
    assertions:
      - name: "TCO comparison across options"
        check: "builds a Total Cost of Ownership (TCO) comparison across build, buy, and partner options including hidden costs"
      - name: "hidden costs included"
        check: "includes hidden costs like opportunity cost (team blocked from other work), switching costs, training, and maintenance in the analysis"
      - name: "sensitivity analysis"
        check: "recommends sensitivity analysis with at least conservative and optimistic scenarios to stress-test assumptions"

  - prompt: |
      I'm putting together a business case for my VP to justify
      adopting a new CI/CD platform. She's going to ask about ROI
      and risk. What should the document include?
    assertions:
      - name: "structured business case template"
        check: "follows a structured business case format with executive summary, investment costs, expected benefits, key financial metrics, and recommendation"
      - name: "risk analysis section"
        check: "includes a risk analysis section identifying probability, impact, and mitigation strategies for key risks"
      - name: "GO/NO-GO recommendation"
        check: "concludes with a clear GO or NO-GO recommendation backed by the financial analysis"

tags: [business-case, background, product]
