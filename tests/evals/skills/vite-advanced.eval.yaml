# Created: 2026-03-14

id: vite-advanced
name: "Vite advanced skill evaluation"
skill_path: src/skills/vite-advanced/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      My Vite app needs to build for both client-side rendering and SSR
      from the same codebase. The client bundle goes to dist/client and
      the server bundle to dist/server. They need different entry points
      and different build settings. How do I configure this in Vite 7?
    assertions:
      - name: "Environment API"
        check: "uses Vite 7 Environment API with the environments config object to define separate client and ssr environments"
      - name: "separate output directories"
        check: "configures distinct outDir for each environment (client and ssr) within the environments configuration"
      - name: "SSR build flag"
        check: "sets ssr: true in the server environment build configuration to enable SSR-specific bundling"

  - prompt: |
      I want to write a custom Vite plugin that transforms .svg files
      into React components during development and build. The plugin
      should work with HMR so changes to SVGs update in the browser
      without a full reload.
    assertions:
      - name: "plugin hook structure"
        check: "implements Vite plugin hooks like transform, resolveId, or load for processing SVG files during the build pipeline"
      - name: "HMR support"
        check: "includes HMR (Hot Module Replacement) handling so SVG changes trigger module updates without full page reload"

  - prompt: |
      Our production bundle is 2MB. We have React, a charting library,
      and several route-level chunks. I want to split vendor dependencies
      into stable, cacheable chunks and keep route chunks small. What's
      the best chunk splitting strategy?
    assertions:
      - name: "manual chunks for vendors"
        check: "uses manualChunks (Vite 7) or advancedChunks (Vite 8+) to separate vendor dependencies like React into stable, long-term cacheable chunks"
      - name: "route-level code splitting"
        check: "splits application code by route for smaller initial load and lazy-loaded route chunks"
      - name: "bundle analysis"
        check: "recommends bundle analysis tooling (rollup-plugin-visualizer or similar) to identify large dependencies and optimization opportunities"

tags: [vite-advanced, background, frontend]
