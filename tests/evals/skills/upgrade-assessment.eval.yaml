id: upgrade-assessment
name: "Upgrade assessment evaluation"
skill_path: src/skills/upgrade-assessment/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      We're considering upgrading from Claude Sonnet 4 to Opus 4.6.
      How do I assess whether our codebase and agents are ready for
      the model change?
    assertions:
      - name: "scope definition"
        check: "identifies this as a model-only upgrade assessment and focuses on relevant dimensions"
      - name: "agent model fields"
        check: "scans agent model: fields and context window assumptions for compatibility"
      - name: "readiness score"
        check: "produces a structured readiness score across multiple dimensions"

  - prompt: |
      Claude Code just released version 2.1.75 and we're on 2.1.72.
      What breaking changes should I watch for before upgrading?
    assertions:
      - name: "CC version focus"
        check: "focuses on hook compatibility, skill format changes, and new/removed tools"
      - name: "changelog research"
        check: "researches the changelog for breaking changes between current and target versions"
      - name: "action items"
        check: "generates prioritized action items based on findings"

  - prompt: |
      I want a full platform readiness assessment — model, CC version,
      and OrchestKit plugin upgrade all at once. What does the process
      look like?
    assertions:
      - name: "6-phase workflow"
        check: "describes a multi-phase workflow covering detection, research, codebase scan, scoring, and recommendations"
      - name: "6-dimension scoring"
        check: "rates readiness across 6 dimensions with a 0-10 scale"
      - name: "structured JSON output"
        check: "produces a structured report (JSON or equivalent) with findings and recommendations"

tags: [upgrade-assessment, background, platform]
