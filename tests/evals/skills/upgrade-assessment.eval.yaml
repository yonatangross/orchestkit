id: upgrade-assessment
name: "Upgrade assessment evaluation"
skill_path: src/skills/upgrade-assessment/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      We're considering upgrading from Claude Sonnet 4 to Opus 4.6.
      How do I assess whether our codebase and agents are ready for
      the model change?
    assertions:
      - name: "scope definition"
        check: "identifies this as a model upgrade and focuses on model-related compatibility"
      - name: "agent impact"
        check: "considers how agent model: fields or context window assumptions may need updating"
      - name: "risk assessment"
        check: "identifies potential risks or breaking changes from the model upgrade"

  - prompt: |
      Claude Code just released version 2.1.80 and we're on 2.1.76.
      What breaking changes should I watch for before upgrading?
    assertions:
      - name: "version gap analysis"
        check: "analyzes changes between the current and target CC versions"
      - name: "hook compatibility"
        check: "considers hook or plugin compatibility when upgrading CC versions"
      - name: "action items"
        check: "provides actionable steps or recommendations for the upgrade"

  - prompt: |
      I want a full platform readiness assessment — model, CC version,
      and OrchestKit plugin upgrade all at once. What does the process
      look like?
    assertions:
      - name: "multi-layer assessment"
        check: "addresses all three layers: model, CC version, and plugin"
      - name: "readiness scoring"
        check: "produces some form of readiness score or rating across dimensions"
      - name: "recommendations"
        check: "concludes with prioritized recommendations for what to upgrade first"

tags: [upgrade-assessment, background, platform]
