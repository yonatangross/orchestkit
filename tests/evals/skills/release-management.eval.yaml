# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: release-management
name: "Release management evaluation"
skill_path: src/skills/release-management/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      We just merged a big feature PR and 3 bug fix PRs into main. I need
      to create a new release. The last version was 1.4.2. How should I
      tag and publish this?
    assertions:
      - name: "semantic version bump"
        check: "bumps to 1.5.0 (minor) since a new feature was added, not just a patch"
      - name: "gh release create"
        check: "uses gh release create with --generate-notes to auto-generate release notes from merged PRs"
      - name: "draft before publish"
        check: "suggests creating a draft release first for review before publishing"

  - prompt: |
      A critical bug was found in production (v2.3.0). I need to push a
      hotfix ASAP. What's the fastest safe way to get a fix released?
    assertions:
      - name: "patch version bump"
        check: "creates a patch release (v2.3.1) rather than a minor or major version"
      - name: "hotfix from main"
        check: "branches from the release tag or main, not from a feature branch"
      - name: "release notes mention fix"
        check: "release notes clearly describe the bug fix and its impact"

  - prompt: |
      We're preparing for a major release with breaking API changes. Some
      users need time to migrate. How should we handle the pre-release
      cycle and communicate changes?
    assertions:
      - name: "pre-release versions"
        check: "uses pre-release tags like alpha, beta, or rc (e.g., v3.0.0-beta.1)"
      - name: "breaking changes prominent"
        check: "breaking changes are prominently documented in the release notes"
      - name: "major version bump"
        check: "bumps the major version number for breaking changes per semver"

tags: [release-management, background, versioning]
