# Created: 2026-03-14

id: security-patterns
name: "Security patterns evaluation"
skill_path: src/skills/security-patterns/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I'm building a user authentication system in Python. Users need to log in
      with email/password and get a token back. How should I store passwords
      and generate tokens? Also need refresh token rotation.
    assertions:
      - name: "argon2id hashing"
        check: "recommends Argon2id (or at minimum bcrypt) for password hashing — never plaintext or MD5/SHA"
      - name: "JWT short-lived access tokens"
        check: "access tokens have short expiry (15 minutes or similar) with separate refresh tokens"
      - name: "refresh token rotation"
        check: "describes refresh token rotation where old refresh tokens are invalidated on use"

  - prompt: |
      We have a FastAPI endpoint that takes user input and builds a database query.
      We also accept file uploads. A security review flagged several issues.
      What patterns should I follow to validate and sanitize everything?
    assertions:
      - name: "parameterized queries"
        check: "recommends parameterized queries or ORM — never string concatenation for SQL"
      - name: "schema validation"
        check: "uses Zod or Pydantic for input schema validation with allowlist approach"
      - name: "file upload validation"
        check: "validates file uploads by magic bytes, not just Content-Type header or file extension"

  - prompt: |
      Our app sends user messages to an LLM for processing. We log all prompts
      and responses to our observability platform. How do we prevent prompt
      injection attacks and make sure we're not leaking PII in our logs?
    assertions:
      - name: "context separation"
        check: "IDs and sensitive data flow around the LLM, never through it — context separation pattern"
      - name: "PII masking in observability"
        check: "uses mask callback (e.g., Langfuse mask) or pre-logging redaction to strip PII before logging"
      - name: "output validation pipeline"
        check: "validates LLM output with a guardrail pipeline (schema check, grounding, safety)"

tags: [security-patterns, background, security]
