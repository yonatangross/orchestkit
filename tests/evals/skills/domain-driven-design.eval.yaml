# Created: 2026-03-14

id: domain-driven-design
name: "Domain-driven design evaluation"
skill_path: src/skills/domain-driven-design/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I'm modeling an e-commerce domain with orders, products, and payments.
      An order has line items, a shipping address, and a total price. How
      should I distinguish what gets its own ID vs what's just data?
    assertions:
      - name: "entity vs value object"
        check: "explains that entities have identity and lifecycle (Order) while value objects are immutable and defined by attributes (Money, Address)"
      - name: "frozen value objects"
        check: "value objects are immutable (frozen dataclass, readonly record, or equivalent enforcement)"
      - name: "identity equality"
        check: "entities compare by identity (ID-based equality), not by comparing all attribute values"

  - prompt: |
      Our codebase has models that are just data holders — no behavior, no
      validation. All the business logic lives in service classes that
      manipulate these models externally. Is this a problem?
    assertions:
      - name: "anemic domain model anti-pattern"
        check: "identifies this as the anemic domain model anti-pattern where entities lack behavior"
      - name: "rich domain model"
        check: "recommends moving business logic into domain entities as methods that enforce invariants"
      - name: "domain vs infrastructure separation"
        check: "domain objects should not know about database sessions, HTTP, or framework concerns"

  - prompt: |
      We have a growing monolith with users, orders, inventory, and billing
      all sharing the same database tables and models. Teams are stepping on
      each other. How should we draw boundaries?
    assertions:
      - name: "bounded contexts"
        check: "recommends establishing bounded contexts by business capability (orders, billing, inventory as separate contexts)"
      - name: "aggregate root per context"
        check: "each bounded context has its own aggregate roots with one repository per aggregate root"
      - name: "reference by ID"
        check: "contexts reference each other by ID, not by direct object references — avoids tight coupling"

tags: [domain-driven-design, background, domain-modeling]
