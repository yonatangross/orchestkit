# Created: 2026-03-14

id: ascii-visualizer
name: "ASCII visualizer evaluation"
skill_path: src/skills/ascii-visualizer/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      Draw me an architecture diagram showing a React frontend connecting
      to a FastAPI backend, which connects to both PostgreSQL and Redis.
    assertions:
      - name: "box-drawing characters"
        check: "uses Unicode box-drawing characters (like borders, connectors) for the diagram"
      - name: "all components present"
        check: "includes all four components: React, FastAPI, PostgreSQL, and Redis"
      - name: "directional arrows"
        check: "uses arrows to show data flow direction between components"

  - prompt: |
      Show the blast radius of changing the auth middleware file.
      Direct imports: 3 files. Transitive: 5 files. Test files: 8 files.
    assertions:
      - name: "concentric ring pattern"
        check: "uses a concentric ring or layered box pattern showing direct, transitive, and test impact zones"
      - name: "file counts shown"
        check: "displays the file counts (3, 5, 8) in the appropriate rings"
      - name: "changed file at center"
        check: "places the changed file (auth middleware) at the center of the diagram"

  - prompt: |
      Visualize a 4-phase migration timeline where phases 1-2 are fully
      reversible, phase 3 is partially reversible, and phase 4 is
      irreversible with a point of no return.
    assertions:
      - name: "timeline bars"
        check: "uses horizontal bars or progress indicators for each phase"
      - name: "reversibility labels"
        check: "labels each phase with its reversibility status (fully, partially, irreversible)"
      - name: "point of no return"
        check: "marks a clear point of no return between the reversible and irreversible phases"

tags: [ascii-visualizer, background, visualization]
