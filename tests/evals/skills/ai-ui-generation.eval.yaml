id: ai-ui-generation
name: "AI UI generation patterns evaluation"
skill_path: src/skills/ai-ui-generation/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I used v0 to generate a signup form component but it has hardcoded
      hex colors like #3b82f6 and no ARIA labels on inputs. How should
      I clean this up before merging?
    assertions:
      - name: "design token replacement"
        check: "recommends replacing hardcoded hex/rgb values with design tokens or CSS variables"
      - name: "accessibility remediation"
        check: "suggests adding ARIA labels, proper label associations, or aria-live for error announcements"
      - name: "human review required"
        check: "emphasizes that AI-generated code must be reviewed and refactored before shipping"

  - prompt: |
      I need to build a new dashboard component from scratch. Should I
      use v0, Bolt, or Cursor? The project already has an existing
      design system with Tailwind tokens.
    assertions:
      - name: "Cursor for existing codebase"
        check: "recommends Cursor for incremental changes in an existing codebase since it understands project context"
      - name: "v0 for new components"
        check: "recommends a scaffold-oriented AI tool for generating new components from scratch rather than editing existing ones"
      - name: "constraint-first prompting"
        check: "advises specifying design constraints like framework, tokens, accessibility requirements, and component states upfront in prompts rather than leaving them vague"

  - prompt: |
      My team wants to skip CI for AI-generated components since they're
      just prototypes. Is that okay for a quick iteration cycle?
    assertions:
      - name: "CI is non-negotiable"
        check: "states that AI-generated code must go through the same CI pipeline as hand-written code"
      - name: "same bug surface"
        check: "explains that AI-generated code has the same bug surface and needs the same quality gates"

tags: [ai-ui-generation, background, frontend]
