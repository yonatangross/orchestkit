id: checkpoint-resume
name: "Checkpoint resume evaluation"
skill_path: src/skills/checkpoint-resume/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I'm about to start a complex refactoring that involves creating
      GitHub issues, updating 20+ files, and running tests. I'm worried
      about hitting rate limits mid-way. How can I make this resilient?
    assertions:
      - name: "pipeline state file"
        check: "recommends saving progress to a state file like .claude/pipeline-state.json after each phase"
      - name: "phase ordering"
        check: "advises doing GitHub issues and commits first, file-heavy phases last"
      - name: "mini-commits"
        check: "suggests checkpoint commits every few phases to preserve progress"

  - prompt: |
      My session crashed mid-way through a 6-phase pipeline. There's
      a .claude/pipeline-state.json file with 3 phases completed.
      How do I pick up where I left off?
    assertions:
      - name: "resume from state"
        check: "reads the pipeline state file to determine which phases are completed and resumes from the next pending phase"
      - name: "dependency checking"
        check: "verifies that dependencies for the next phase are satisfied before resuming"
      - name: "state write after each phase"
        check: "emphasizes writing state after every phase, never batching"

  - prompt: |
      How should I structure an execution plan for a multi-step task
      that has some phases that can run in parallel and some that
      must be sequential?
    assertions:
      - name: "phase dependencies"
        check: "uses a dependencies array to express execution order between phases"
      - name: "parallel when independent"
        check: "identifies that phases with empty dependencies can run in parallel"
      - name: "atomic phases"
        check: "recommends one meaningful deliverable per phase (a commit, a set of issues, a feature)"

tags: [checkpoint-resume, background, workflow]
