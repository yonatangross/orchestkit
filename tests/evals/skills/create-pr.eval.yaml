id: create-pr
name: "Create PR skill evaluation"
skill_path: src/skills/create-pr/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — direct requests
  - prompt: "create a pull request for this feature"
    should_trigger: true
  - prompt: "open a PR against dev"
    should_trigger: true
  - prompt: "submit this branch as a pull request"
    should_trigger: true
  # Should trigger — casual/indirect phrasing
  - prompt: "this is ready for review, make a PR"
    should_trigger: true
  - prompt: "can you open a pr with a good description for these changes"
    should_trigger: true
  - prompt: "push this up and create a pr please"
    should_trigger: true
  # Should NOT trigger — commit confusion pair (both git operations)
  - prompt: "commit my changes"
    should_trigger: false
  - prompt: "save my progress with a conventional commit"
    should_trigger: false
  - prompt: "stage and commit the auth refactor"
    should_trigger: false
  # Should NOT trigger — review-pr confusion pair (both PR-related)
  - prompt: "review PR 42 and leave comments"
    should_trigger: false
  - prompt: "check this pull request for security issues"
    should_trigger: false
  # Should trigger — terse phrasing
  - prompt: "create pr"
    should_trigger: true
  # Should trigger — common typo
  - prompt: "crate a pull reqeust"
    should_trigger: true
  # Should NOT trigger — multi-intent, primary is commit
  - prompt: "commit the changes and then create a pull request"
    should_trigger: false

quality_evals:
  - prompt: |
      i just finished implementing the user invitation system.
      create a pull request with a proper description. the related
      issue is #87.
    scaffold: git-repo
    assertions:
      - name: "validates branch"
        check: "checks that the current branch is not main or dev before creating the PR"
      - name: "references issue"
        check: "PR body includes 'Closes #87' or equivalent issue reference"
      - name: "structured PR body"
        check: "PR body contains Summary, Changes, and Test Plan sections"
      - name: "runs pre-flight checks"
        check: "verifies there are no uncommitted changes and branch is pushed to remote"
      - name: "no direct push to main"
        check: "does NOT push directly to main or master branch"

  - prompt: |
      quick pr, just a docs update to the readme, nothing fancy
    assertions:
      - name: "appropriate scope"
        check: "uses docs type prefix in PR title, not feat"
      - name: "lightweight validation"
        check: "skips or reduces agent validation since it is a quick/docs PR"
      - name: "creates PR via gh"
        check: "uses gh pr create command to create the pull request"
      - name: "no empty description"
        check: "PR body is NOT empty or a single line — includes meaningful context"

tags: [create-pr, user-invocable, core]
