id: create-pr
name: "Create PR skill evaluation"
skill_path: src/skills/create-pr/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — direct requests
  - prompt: "create a pull request for this feature"
    should_trigger: true
  - prompt: "open a PR against dev"
    should_trigger: true
  - prompt: "submit this branch as a pull request"
    should_trigger: true
  # Should trigger — casual/indirect phrasing
  - prompt: "this is ready for review, make a PR"
    should_trigger: true
  - prompt: "can you open a pr with a good description for these changes"
    should_trigger: true
  - prompt: "push this up and create a pr please"
    should_trigger: true
  # Should NOT trigger — commit confusion pair (both git operations)
  - prompt: "commit my changes"
    should_trigger: false
  - prompt: "save my progress with a conventional commit"
    should_trigger: false
  - prompt: "stage and commit the auth refactor"
    should_trigger: false
  # Should NOT trigger — review-pr confusion pair (both PR-related)
  - prompt: "review PR 42 and leave comments"
    should_trigger: false
  - prompt: "check this pull request for security issues"
    should_trigger: false
  # Should trigger — terse phrasing
  - prompt: "create pr"
    should_trigger: true
  # Should trigger — common typo
  - prompt: "crate a pull reqeust"
    should_trigger: true
  # Should NOT trigger — multi-intent, primary is commit
  - prompt: "commit the changes and then create a pull request"
    should_trigger: false

quality_evals:
  - prompt: |
      i just finished implementing the user invitation system.
      how should i create a pull request? the related issue is #87.
      what should the PR description include?
    assertions:
      - name: "branch validation"
        check: "recommends verifying the current branch is not main or dev before creating a PR"
      - name: "issue reference"
        check: "recommends including 'Closes #87' or equivalent issue reference in the PR body"
      - name: "structured PR body"
        check: "suggests a PR body with Summary, Changes, and Test Plan sections"
      - name: "pre-flight checklist"
        check: "mentions checking for uncommitted changes or unpushed commits before creating the PR"
      - name: "gh pr create"
        check: "recommends using gh pr create to create the pull request"

  - prompt: |
      quick pr for a docs update to the readme. what's the minimal
      but correct way to do this?
    assertions:
      - name: "appropriate scope"
        check: "suggests docs type prefix in the PR title, not feat"
      - name: "meaningful description"
        check: "recommends a PR body with at least a brief summary, not empty"
      - name: "lightweight process"
        check: "acknowledges this is a simple change and suggests a streamlined process"

tags: [create-pr, user-invocable, core]
