id: performance
name: "Performance optimization evaluation"
skill_path: src/skills/performance/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      My Next.js page has a poor LCP score of 4.2 seconds. The hero
      image loads late and causes a visible pop-in. How do I fix the
      Largest Contentful Paint?
    assertions:
      - name: "priority attribute"
        check: "recommends marking the hero image as high priority (priority prop, fetchpriority, or preload) to load it sooner"
      - name: "SSR for LCP content"
        check: "advises server-rendering the LCP content rather than client-side fetching"
      - name: "no lazy loading LCP"
        check: "warns against lazy loading the LCP image since it delays the largest paint"

  - prompt: |
      Our product listing page renders 2000 items and scrolling is
      extremely janky. React DevTools shows every item re-renders
      on any state change. How do I fix this?
    assertions:
      - name: "virtualization"
        check: "recommends virtualization or windowing (rendering only visible items) to handle large lists efficiently"
      - name: "selector optimization"
        check: "suggests using selectors, memoization, or fine-grained subscriptions to prevent unnecessary re-renders"
      - name: "React Compiler"
        check: "mentions automatic memoization or compiler-level optimizations available in modern React"

  - prompt: |
      I want to deploy a fine-tuned LLM for production inference. What
      quantization method should I use on our H100 GPU cluster to
      maximize throughput?
    assertions:
      - name: "FP8 for H100"
        check: "recommends an appropriate quantization level (FP8, INT8, or similar) matched to the GPU hardware capabilities"
      - name: "vLLM deployment"
        check: "recommends a high-throughput inference server with efficient memory management and batching for production"
      - name: "speculative decoding"
        check: "mentions speculative decoding or draft-model techniques for improving generation throughput"

tags: [performance, background, optimization]
