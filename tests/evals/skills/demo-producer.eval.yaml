id: demo-producer
name: "Demo producer evaluation"
skill_path: src/skills/demo-producer/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I want to create a short demo video showcasing our CLI tool's
      main features. It should be about 15 seconds and work on
      YouTube and Twitter.
    assertions:
      - name: "horizontal format"
        check: "recommends 16:9 horizontal format for YouTube and Twitter"
      - name: "VHS or terminal recording"
        check: "mentions using a terminal recording tool or technique to capture CLI command execution for the demo"
      - name: "focused content"
        check: "advises keeping it focused on one feature or concept per video"

  - prompt: |
      I need demo videos in both landscape for YouTube and vertical
      for TikTok/Reels. Can I generate both from the same content?
    assertions:
      - name: "multi-format support"
        check: "supports generating multiple format variants (16:9 horizontal and 9:16 vertical)"
      - name: "Remotion composition"
        check: "mentions a programmatic video composition tool or framework for rendering output in different formats"
      - name: "template selection"
        check: "offers layout or template options suited to different demo styles such as comparisons, walkthroughs, or before/after transformations"

  - prompt: |
      Our marketing team says the demo videos look too generic and
      AI-generated. How do I make them more distinctive and avoid
      the slop aesthetic?
    assertions:
      - name: "slop avoidance"
        check: "addresses avoiding generic AI aesthetics with specific content density and timing rules"
      - name: "show don't tell"
        check: "emphasizes demonstrating actual usage rather than abstract descriptions"
      - name: "real data"
        check: "recommends using real command outputs and actual tool behavior"

tags: [demo-producer, background, content]
