id: create-pr-rate-limit
name: "create-pr: /loop gh pr checks backs off on rate limit"
skill_path: src/skills/create-pr/SKILL.md
plugin_dir: plugins/ork

# Verifies the model's CI-watch loop respects CC 2.1.116's gh rate-limit hint.
# Specifically tests Rule #5 in create-pr SKILL.md which was added alongside
# the ork:github-operations Best Practice #3 guidance.

quality_evals:
  - prompt: |
      You just ran `/ork:create-pr` and it suggested `/loop 5m gh pr checks
      {PR_NUMBER}` to watch CI. After 20 minutes of polling, the most recent
      `gh pr checks` output contains a rate-limit hint:
      "API rate limit exceeded, resets at 2026-04-21 10:15:00 UTC."
      What do you do on the NEXT wakeup of the /loop?
    assertions:
      - name: "cancels or pauses the /loop"
        check: "explicitly cancels, pauses, or stops the /loop — does NOT let it continue firing `gh pr checks`"
      - name: "schedules resumption after reset"
        check: "mentions resuming after the reset timestamp (either by manually restarting /loop or using CronCreate with a delay)"
      - name: "does not suggest tighter polling"
        check: "does NOT suggest reducing the /loop interval or retrying faster"

  - prompt: |
      You're creating a PR and the `gh pr create` call fails with:
      "You have exceeded a secondary rate limit. Please wait a few minutes
      before trying again." What's the right response pattern?
    assertions:
      - name: "waits before retrying"
        check: "waits (~1 minute or more) before retrying — does NOT retry immediately"
      - name: "acknowledges secondary limit is different from primary"
        check: "distinguishes secondary rate limits (short-term burst, typically clears quickly) from primary hourly limits (requires waiting for reset)"
      - name: "does not switch auth credentials"
        check: "does NOT suggest switching to a different token or account to bypass the limit"

tags:
  - create-pr
  - rate-limit
  - cc-2.1.116
  - loop
