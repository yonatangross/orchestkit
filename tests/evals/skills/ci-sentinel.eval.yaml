# Refined from the eval-coverage --fill starter (#2192).
# Assertions describe behaviour the skill body actually commits to, not a
# verbatim echo of the description (which the harness flags non-discriminating
# and which rots on every description edit).
# Created: 2026-07-18 · Refined: 2026-07-20

id: ci-sentinel
name: "Ci sentinel skill evaluation"
skill_path: src/skills/ci-sentinel/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  - prompt: "set up an hourly bot that triages failing PRs across my repos"
    should_trigger: true
  - prompt: "automatically classify red CI checks on my open pull requests"
    should_trigger: true
  - prompt: "fix the failing test in this PR"
    should_trigger: false
  - prompt: "review my pull request for code quality"
    should_trigger: false

quality_evals:
  - prompt: "set up an autonomous classifier for failing PRs across my repos"
    assertions:
      - name: "propose-don't-apply"
        check: "states that it proposes fixes as a PR comment and never auto-pushes or applies a fix"
      - name: "per-repo ledger"
        check: "mentions appending each verdict to a per-repo ledger (.sentinel/ledger.jsonl)"
      - name: "collapsed PR comment"
        check: "describes posting the verdict as a collapsed comment on the pull request"

tags: [ci-sentinel]
