# Closes: #1436 (CC 2.1.116 eval coverage)

id: agent-hooks-main-thread
name: "agent hook authoring: context-agnostic design (CC 2.1.116+)"
skill_path: src/agents/README.md
plugin_dir: plugins/ork

# Verifies the model applies the CC 2.1.116 main-thread firing guidance
# documented in .claude/rules/agent-authoring.md. New hooks must be
# context-agnostic — fire correctly whether the agent runs as a subagent
# via Task tool OR as main thread via `claude --agent <name>`.

quality_evals:
  - prompt: |
      I'm adding a new PostToolUse hook to the `ci-cd-engineer` agent that
      logs every `gh workflow run` invocation. I'm writing the hook TypeScript
      in `src/hooks/src/agent/ci-workflow-logger.ts`.

      Before I write the logic, are there any CC 2.1.116 considerations for
      how the hook should be structured?
    assertions:
      - name: "mentions main-thread firing"
        check: "mentions that agent-scoped `hooks:` now fire BOTH when the agent runs as a subagent via Task AND when invoked as main thread via `claude --agent ci-cd-engineer` (behavior change since CC 2.1.116)"
      - name: "advises context-agnostic logic"
        check: "advises writing the hook context-agnostic — validate tool_input, apply policy; do NOT branch on whether we're a subagent vs main thread"
      - name: "CLAUDE_AGENT_ID is optional"
        check: "notes that `process.env.CLAUDE_AGENT_ID` is available for LOGGING but should default gracefully (e.g. 'unknown') and must NOT gate enforcement logic"

  - prompt: |
      Show me the skeleton for a new agent-scoped PreToolUse hook that blocks
      `rm -rf /` on the `data-pipeline-engineer` agent. I want the safety to
      apply whether the agent runs as subagent or `--agent` main thread.
    assertions:
      - name: "no subagent-only branch"
        check: "the skeleton does NOT contain an `if subagent` / `if parentSession` / `if agentId` branch that gates the rm-rf block"
      - name: "tool_input-level validation"
        check: "the skeleton validates tool_input.command at the tool level, applying the rm-rf check uniformly regardless of calling context"
      - name: "uses CLAUDE_AGENT_ID for logging only"
        check: "if CLAUDE_AGENT_ID is referenced at all, it's used only for log tagging (falls back to 'unknown') — never as the enforcement condition"

tags:
  - agent-hooks
  - main-thread
  - cc-2.1.116
  - authoring
