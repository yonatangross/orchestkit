id: api-design
name: "API design skill evaluation"
skill_path: src/skills/api-design/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — API design tasks
  - prompt: "design a REST API for user profiles with CRUD endpoints"
    should_trigger: true
  - prompt: "add versioning to my /api/v2 endpoints"
    should_trigger: true
  - prompt: "help me add swagger docs to this express app"
    should_trigger: true
  - prompt: "graphql schema for an orders service with mutations and queries"
    should_trigger: true
  - prompt: "what error format should my API return? i keep doing ad-hoc json"
    should_trigger: true
  - prompt: "i need to design the endpoints for a billing microservice"
    should_trigger: true
  # Should NOT trigger — related but different domains
  - prompt: "fix this TypeError in my route handler"
    should_trigger: false
  - prompt: "optimize this database query, it's slow"
    should_trigger: false
  - prompt: "create a React form component for user registration"
    should_trigger: false
  - prompt: "set up authentication middleware with JWT"
    should_trigger: false

quality_evals:
  - prompt: |
      design a REST API for a task management app. needs:
      users, projects, tasks with assignments, comments on tasks.
      should handle pagination for large lists.
    scaffold: typescript-nextjs
    assertions:
      - name: "RFC 9457 error format"
        check: "error responses use Problem Details format or structured error objects"
      - name: "versioning strategy"
        check: "includes API versioning approach (URL, header, or query param)"
      - name: "pagination pattern"
        check: "specifies cursor-based or offset pagination for list endpoints"
      - name: "resource relationships"
        check: "models the relationships between users, projects, tasks, comments"
      - name: "HTTP methods correct"
        check: "uses GET/POST/PUT/PATCH/DELETE appropriately for CRUD"

  - prompt: |
      my api currently returns errors like {"error": "not found"} with
      status 200 for everything. how should i fix the error handling?
    assertions:
      - name: "proper status codes"
        check: "recommends using appropriate HTTP status codes (404, 400, 500)"
      - name: "structured error format"
        check: "suggests a consistent error response schema"

tags: [api-design, knowledge, backend]
