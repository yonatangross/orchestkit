# Generated by OrchestKit Claude Plugin
# Created: 2026-03-13

id: setup
name: "Setup skill evaluation"
skill_path: src/skills/setup/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — direct requests
  - prompt: "set up orchestkit for this project"
    should_trigger: true
  - prompt: "run the onboarding wizard"
    should_trigger: true
  - prompt: "configure ork for my codebase"
    should_trigger: true
  # Should trigger — casual/indirect phrasing
  - prompt: "i just installed orchestkit, what do i do first"
    should_trigger: true
  - prompt: "help me get orchestkit working for this repo"
    should_trigger: true
  - prompt: "i want to see my readiness score for this project"
    should_trigger: true
  # Should NOT trigger — doctor confusion pair (both check plugin health)
  - prompt: "run a health check on my plugin installation"
    should_trigger: false
  - prompt: "my hooks aren't running, diagnose the problem"
    should_trigger: false
  # Should NOT trigger — help confusion pair (both discover skills)
  - prompt: "what skills are available in orchestkit"
    should_trigger: false
  # Should NOT trigger — adjacent tasks
  - prompt: "explore the codebase architecture"
    should_trigger: false
  - prompt: "implement a new feature"
    should_trigger: false

quality_evals:
  - prompt: |
      i just installed orchestkit on my typescript nextjs project
      with postgres and redis. run the full setup wizard.
    scaffold: typescript-nextjs
    assertions:
      - name: "scans codebase"
        check: "runs Phase 1 scan detecting package.json, tsconfig, Next.js config, and infrastructure"
      - name: "detects stack"
        check: "correctly identifies TypeScript, Next.js, Postgres, and Redis as the tech stack"
      - name: "recommends relevant skills"
        check: "suggests skills matched to the detected stack (e.g., testing-unit, api-design, database-patterns)"
      - name: "computes readiness score"
        check: "produces a 0-10 readiness score across multiple dimensions"
      - name: "generates improvement plan"
        check: "provides prioritized P0/P1/P2 recommendations with runnable commands"

  - prompt: |
      just show my readiness score, skip the full wizard
    assertions:
      - name: "respects score-only flag"
        check: "jumps directly to readiness score computation without running the full wizard"
      - name: "shows dimensional breakdown"
        check: "displays score per dimension, not just a single number"

tags: [setup, user-invocable, core]
