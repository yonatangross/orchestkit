# Created: 2026-03-14

id: devops-deployment
name: "DevOps deployment patterns evaluation"
skill_path: src/skills/devops-deployment/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I need to containerize my FastAPI app for production. The current Docker
      image is 1.2 GB and takes 8 minutes to build. I also need to make sure
      it runs securely in Kubernetes.
    assertions:
      - name: "multi-stage build"
        check: "uses a multi-stage Dockerfile to separate build and runtime stages, reducing image size"
      - name: "non-root user"
        check: "runs the container as a non-root user (uid 1001 or similar)"
      - name: "health check endpoint"
        check: "includes a HEALTHCHECK instruction or describes the health endpoint for Kubernetes probes"

  - prompt: |
      Set up a GitHub Actions CI/CD pipeline for a Python backend. It should
      lint, test, build a Docker image, and deploy to staging automatically
      on push to main. Production deploys should require manual approval.
    assertions:
      - name: "pipeline stages in order"
        check: "defines stages in correct order: lint, test, security scan, build, deploy staging, deploy production"
      - name: "environment protection for production"
        check: "uses GitHub Actions environment with required approval or manual trigger for production deployment"
      - name: "caching for speed"
        check: "caches dependencies (pip, Docker layers) to speed up builds"

  - prompt: |
      My Kubernetes deployment keeps having issues during rollouts — pods
      crash before they're ready, and sometimes we get 502 errors during
      deploys. How should I configure the deployment for zero downtime?
    assertions:
      - name: "separate health probes"
        check: "configures separate startup, liveness, and readiness health checks with appropriate thresholds for each"
      - name: "rolling update with zero unavailable"
        check: "configures the rolling update strategy to ensure zero unavailable pods during deployment for zero-downtime rollouts"
      - name: "security context"
        check: "includes container security hardening such as running as non-root, disabling privilege escalation, or dropping capabilities"

tags: [devops-deployment, background, infrastructure]
