id: react-server-components-framework
name: "React Server Components framework skill evaluation"
skill_path: src/skills/react-server-components-framework/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I'm building a Next.js 16 dashboard page that shows user profile
      data from the database and has an interactive chart with hover
      tooltips. How should I split this into components? I want to minimize
      the client JS bundle.
    assertions:
      - name: "server component by default"
        check: "uses Server Components (no directive) by default for data fetching and static content, keeping them as the default rendering mode"
      - name: "client components at leaves"
        check: "extracts only the interactive chart into a Client Component with 'use client' directive, keeping it at the leaf of the component tree"
      - name: "children prop composition"
        check: "passes Server Components as children props to Client Components rather than importing Server Components inside Client Components"

  - prompt: |
      My Next.js 16 page needs to fetch a list of products from the
      database. The product list rarely changes. I also need to show the
      current user's cart which changes frequently. How should I handle
      caching and data freshness?
    assertions:
      - name: "cache components for static data"
        check: "uses 'use cache' directive or cacheLife/cacheTag for the rarely-changing product list to enable caching with revalidation"
      - name: "streaming with Suspense"
        check: "wraps async data fetching in Suspense boundaries to enable streaming SSR and show loading states"
      - name: "parallel data fetching"
        check: "fetches independent data (products and cart) in parallel using Promise.all or separate Suspense boundaries rather than sequential waterfall"

  - prompt: |
      I have a form in my Next.js 16 app where users can create a new
      blog post with a title and body. After submission, it should save
      to the database, clear the form, and show the new post. How should
      I implement the mutation?
    assertions:
      - name: "Server Action with use server"
        check: "creates a Server Action with 'use server' directive for the form mutation rather than a client-side API call"
      - name: "revalidation after mutation"
        check: "calls revalidatePath or revalidateTag after the mutation to refresh cached data"
      - name: "async params pattern"
        check: "if route params are used, awaits them as Promises (Next.js 16 breaking change where params and searchParams are now async)"

tags: [react-server-components-framework, background, frontend]
