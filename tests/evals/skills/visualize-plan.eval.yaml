# Generated by OrchestKit Claude Plugin
# Created: 2026-03-13

id: visualize-plan
name: "Visualize plan skill evaluation"
skill_path: src/skills/visualize-plan/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — direct requests
  - prompt: "visualize the plan for the billing module redesign"
    should_trigger: true
  - prompt: "show me a before and after diagram for this migration"
    should_trigger: true
  - prompt: "render the execution order for the changes on this branch"
    should_trigger: true
  # Should trigger — casual/indirect phrasing
  - prompt: "whats the risk and impact of the changes im about to make"
    should_trigger: true
  - prompt: "break down this plan into phases with a swimlane view"
    should_trigger: true
  - prompt: "i want to see what files will change and in what order for issue #234"
    should_trigger: true
  # Should NOT trigger — brainstorm confusion pair (both planning phase)
  - prompt: "brainstorm some ideas for the notification system"
    should_trigger: false
  - prompt: "lets explore different approaches for caching"
    should_trigger: false
  - prompt: "compare three auth strategies before we start building"
    should_trigger: false
  # Should NOT trigger — adjacent tasks
  - prompt: "implement the billing module"
    should_trigger: false
  - prompt: "assess the quality of this code"
    should_trigger: false

quality_evals:
  - prompt: |
      visualize the plan for migrating our auth from session cookies
      to JWT. the branch has changes to 8 files across the auth
      middleware, user service, and frontend login.
    scaffold: typescript-nextjs
    assertions:
      - name: "renders change manifest"
        check: "shows a file tree with [A]/[M]/[D] markers and line counts per file"
      - name: "shows execution swimlane"
        check: "renders an ASCII swimlane diagram showing execution phases and dependencies"
      - name: "includes risk analysis"
        check: "provides a risk dashboard with severity levels and at least one pre-mortem scenario"
      - name: "offers next actions"
        check: "presents options like save to file, generate GitHub issues, or drill deeper"

  - prompt: |
      just show me the file diff for whats on this branch, nothing fancy
    assertions:
      - name: "quick file diff only"
        check: "shows the change manifest with file counts and line deltas without risk analysis or swimlanes"
      - name: "uses precise counts"
        check: "runs git commands to get actual file and line counts rather than estimates"
      - name: "no unnecessary sections"
        check: "skips execution swimlane, risk dashboard, and decision log"

tags: [visualize-plan, user-invocable, core]
