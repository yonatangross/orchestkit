# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: release-checklist
name: "Release checklist evaluation"
skill_path: src/skills/release-checklist/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I'm about to release a new version of my CLI tool. I've made changes
      to the TypeScript hooks and added 2 new skills. What steps do I need
      to run before I can safely commit the release?
    assertions:
      - name: "build before test"
        check: "runs npm run build BEFORE npm test, not the other way around"
      - name: "security tests required"
        check: "includes npm run test:security as a mandatory gate that must pass"
      - name: "typecheck for hooks"
        check: "runs npm run typecheck since TypeScript hooks were changed"

  - prompt: |
      All my pre-release tests passed. Now I need to create the actual
      release commit, tag it, and push. Walk me through the steps so I
      don't mess up the git history.
    assertions:
      - name: "changelog entry"
        check: "verifies a CHANGELOG.md entry exists for the new version before committing"
      - name: "version bump in both files"
        check: "bumps version in both package.json and CLAUDE.md"
      - name: "specific file staging"
        check: "stages specific files with git add, never uses git add -A or git add ."

  - prompt: |
      I just ran npm test and got a failure in the manifest consistency
      check. The skill count in CLAUDE.md says 88 but there are 89 skills
      in the manifests. Should I just skip this and release anyway?
    assertions:
      - name: "never skip on failure"
        check: "stops on the failure and fixes the count mismatch before proceeding"
      - name: "fix counts first"
        check: "updates the count in CLAUDE.md or manifests to be consistent before releasing"
      - name: "re-run after fix"
        check: "re-runs the full test suite after fixing to verify the fix before continuing"

tags: [release-checklist, background, release]
