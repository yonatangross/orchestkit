id: langgraph
name: "LangGraph workflow patterns evaluation"
skill_path: src/skills/langgraph/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I'm building a LangGraph workflow where multiple agents process
      data in parallel and I need to collect all their results into a
      single list. How do I set up the state schema?
    assertions:
      - name: "Annotated list with add reducer"
        check: "uses Annotated[list, add] or equivalent reducer to accumulate results instead of overwriting"
      - name: "TypedDict state"
        check: "uses TypedDict for the state schema definition"
      - name: "Send API for fan-out"
        check: "recommends the Send API for dynamic parallel branches with fan-out"

  - prompt: |
      My LangGraph workflow sometimes gets stuck in an infinite loop
      when the LLM keeps calling tools without reaching a final answer.
      How do I prevent this?
    assertions:
      - name: "max retry counter"
        check: "recommends adding a maximum step or retry counter to prevent infinite loops"
      - name: "END fallback"
        check: "ensures routing always includes an END fallback to prevent workflow hangs"
      - name: "RemainingSteps"
        check: "mentions RemainingSteps or recursion limit handling for proactive loop prevention"

  - prompt: |
      I need to add a human approval step to my LangGraph pipeline
      before executing a dangerous tool call. How do I implement
      human-in-the-loop?
    assertions:
      - name: "interrupt function"
        check: "uses interrupt() function for pausing the workflow at the approval point"
      - name: "checkpointer required"
        check: "mentions that a checkpointer is required for state persistence during human-in-loop"
      - name: "Command resume"
        check: "uses Command(resume=...) to resume the workflow after human approval"

tags: [langgraph, background, workflow]
