quality_evals:
  - prompt: |
      search memory for any decisions we made about authentication
      and session management in this project.
    assertions:
      - name: "uses knowledge graph"
        check: "queries the memory MCP server using mcp__memory__search_nodes or mcp__memory__read_graph"
      - name: "filters by relevant topic"
        check: "searches with authentication/session-related query terms"
      - name: "formats results clearly"
        check: "presents found memories with entity names, types, and observations"

  - prompt: |
      show me the full knowledge graph as a visualization
    assertions:
      - name: "renders Mermaid diagram"
        check: "outputs a Mermaid graph diagram showing entities and relationships"
      - name: "includes entity types"
        check: "differentiates entity types visually (Technology, Pattern, Decision, etc.)"
      - name: "handles empty graph"
        check: "shows a helpful message if the graph is empty instead of failing"

