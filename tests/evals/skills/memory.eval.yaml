id: memory
name: "Memory skill evaluation"
skill_path: src/skills/memory/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — direct requests
  - prompt: "search my memory for past database decisions"
    should_trigger: true
  - prompt: "what did we decide about pagination last time"
    should_trigger: true
  - prompt: "load context from previous sessions"
    should_trigger: true
  # Should trigger — casual/indirect phrasing
  - prompt: "do we have any prior decisions about auth strategy"
    should_trigger: true
  - prompt: "show me the knowledge graph"
    should_trigger: true
  - prompt: "recall what patterns we agreed on for error handling"
    should_trigger: true
  # Should NOT trigger — remember confusion pair (both deal with memory)
  - prompt: "remember that we chose Postgres over MongoDB"
    should_trigger: false
  - prompt: "save this decision: use cursor pagination everywhere"
    should_trigger: false
  - prompt: "store this as a best practice for future sessions"
    should_trigger: false
  # Should NOT trigger — adjacent tasks
  - prompt: "explore the codebase architecture"
    should_trigger: false
  - prompt: "brainstorm ideas for the search feature"
    should_trigger: false
  # Should trigger — terse phrasing
  - prompt: "show memory"
    should_trigger: true
  # Should NOT trigger — multi-intent, primary is remember
  - prompt: "remember this pattern and then show me all stored memories"
    should_trigger: false

quality_evals:
  - prompt: |
      i want to search my project's knowledge graph for any past
      decisions about authentication. how does the memory system
      work and what should i search for?
    assertions:
      - name: "explains search mechanism"
        check: "describes using mcp__memory__search_nodes or similar MCP tools to query the knowledge graph"
      - name: "suggests search terms"
        check: "recommends searching with authentication/session/auth-related query terms"
      - name: "describes result format"
        check: "explains that results include entity names, types, observations, and relationships"
      - name: "no fabricated memories"
        check: "does NOT invent specific memories — explains the search process without hallucinating results"

  - prompt: |
      how can i visualize the knowledge graph for my project?
      what format does it use?
    assertions:
      - name: "Mermaid visualization"
        check: "mentions Mermaid diagrams as the visualization format for the knowledge graph"
      - name: "entity types"
        check: "describes entity types in the graph (Technology, Pattern, Decision, etc.)"
      - name: "empty graph handling"
        check: "mentions that an empty graph should show a helpful message rather than an error"

tags: [memory, user-invocable, core]
