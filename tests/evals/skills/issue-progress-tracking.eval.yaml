# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: issue-progress-tracking
name: "Issue progress tracking evaluation"
skill_path: src/skills/issue-progress-tracking/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I'm about to start working on GitHub issue #42. What's the
      proper ceremony for starting work — branch naming, labels, etc.?
    assertions:
      - name: "branch naming convention"
        check: "recommends branch name format issue/42-description or similar issue-linked format"
      - name: "label update"
        check: "suggests adding status:in-progress label and removing status:todo"
      - name: "initial comment"
        check: "recommends posting an initial comment on the issue indicating work has started"

  - prompt: |
      I've been working on a feature for a while and have a big diff.
      Should I just commit everything at the end or break it up?
    assertions:
      - name: "atomic commits"
        check: "recommends one logical change per commit rather than giant commits at the end"
      - name: "issue reference in commits"
        check: "each commit should reference the issue number in the message"
      - name: "commit early and often"
        check: "advises committing early and often to avoid accumulating a massive diff"

  - prompt: |
      I finished implementing issue #42. How do I create the PR so
      the issue automatically closes when merged?
    assertions:
      - name: "Closes keyword"
        check: "uses 'Closes #42' in the PR body to auto-close the issue on merge"
      - name: "label transition"
        check: "updates the issue label from in-progress to in-review"
      - name: "never close manually"
        check: "warns against using gh issue close — issues should only close via PR merge"

tags: [issue-progress-tracking, background, workflow]
