# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: task-dependency-patterns
name: "Task dependency patterns evaluation"
skill_path: src/skills/task-dependency-patterns/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I'm implementing a user authentication feature that involves
      creating a model, adding API endpoints, implementing JWT, adding
      middleware, and writing tests. How do I break this into tracked
      tasks with proper dependencies?
    assertions:
      - name: "task decomposition"
        check: "breaks the feature into atomic tasks like model, endpoints, JWT, middleware, tests"
      - name: "dependency chains"
        check: "uses blockedBy or dependency arrays to enforce execution order between tasks"
      - name: "status workflow"
        check: "tracks task status through pending, in_progress, and completed states"

  - prompt: |
      I need multiple agents to work on different parts of a feature
      simultaneously. When should I use Task tool subagents vs Agent
      Teams?
    assertions:
      - name: "Task tool for simple work"
        check: "recommends Task tool (star topology) for independent, simple tasks"
      - name: "Agent Teams for complex coordination"
        check: "recommends Agent Teams (mesh topology) for cross-cutting changes where agents need to communicate"
      - name: "cost comparison"
        check: "notes that Agent Teams cost approximately 2.5x more than Task tool subagents"

  - prompt: |
      My Agent Team ran out of context mid-workflow. Three tasks are
      completed, two are in-progress, and four are pending. How do
      I handle this gracefully?
    assertions:
      - name: "collect partial results"
        check: "recommends collecting partial results from completed teammates via TaskList"
      - name: "synthesize available outputs"
        check: "prefers synthesizing available outputs over silent failure"
      - name: "cancel remaining tasks"
        check: "logs or cancels skipped tasks with a context limit note"

tags: [task-dependency-patterns, background, workflow]
