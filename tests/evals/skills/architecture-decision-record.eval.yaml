# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: architecture-decision-record
name: "Architecture decision record evaluation"
skill_path: src/skills/architecture-decision-record/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      We're choosing between PostgreSQL and MongoDB for our new e-commerce
      platform. The team is split. We need to document the decision so future
      engineers understand why we chose what we chose. Can you write this up?
    assertions:
      - name: "Nygard format sections"
        check: "includes Context, Decision, and Consequences sections following the ADR template format"
      - name: "alternatives documented"
        check: "documents at least 2 alternatives considered with reasons for not choosing them"
      - name: "consequences balanced"
        check: "lists both positive and negative consequences — not just benefits"

  - prompt: |
      Our team just decided to migrate from a monolith to microservices.
      I want to record this decision properly. What should I capture and
      what format should I use? We have no existing decision documentation.
    assertions:
      - name: "ADR lifecycle"
        check: "explains the ADR lifecycle (Proposed -> Accepted -> Implemented) and status tracking"
      - name: "immutability principle"
        check: "states that accepted ADRs should not be edited — new ADRs supersede old ones"
      - name: "storage in git"
        check: "recommends storing ADRs in version control alongside code (e.g., docs/adr/)"

  - prompt: |
      We need to pick a caching strategy — Redis vs Memcached vs application-level
      caching. We have 1M+ concurrent users and need sub-50ms latency for reads.
      Help me write a decision document that captures the tradeoffs.
    assertions:
      - name: "context with constraints"
        check: "captures specific constraints (1M+ users, sub-50ms latency) in the Context section"
      - name: "specific actionable decision"
        check: "states a specific decision (not vague like 'use a better cache') with clear what/why"
      - name: "sequential numbering"
        check: "uses numbered ADR format (e.g., ADR-0001) with sequential numbering convention"

tags: [architecture-decision-record, background, documentation]
