id: design-system-tokens
name: "Design system tokens skill evaluation"
skill_path: src/skills/design-system-tokens/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I need to set up a design token system for our product. We have
      colors, spacing, and typography values scattered across CSS files.
      I want a single source of truth that can generate CSS custom
      properties and Tailwind theme config. What format and structure
      should I use?
    assertions:
      - name: "W3C DTCG token format"
        check: "recommends a standardized token format (e.g., W3C DTCG or similar spec) with typed token definitions in JSON files"
      - name: "three-tier hierarchy"
        check: "organizes tokens into layered tiers: primitive/global values, semantic/alias tokens, and component-level tokens"
      - name: "Style Dictionary for transformation"
        check: "recommends a token transformation tool or build pipeline to generate platform-specific outputs (CSS custom properties, theme configs, etc.)"

  - prompt: |
      We're adding dark mode to our app. Currently we toggle CSS classes
      and override every color manually. There must be a better way using
      our design tokens. How should theming work with a token-based
      approach?
    assertions:
      - name: "semantic alias tokens for theming"
        check: "uses semantic alias tokens that remap to different global values per theme, rather than toggling raw color values via class names"
      - name: "data-theme attribute"
        check: "uses a data-theme attribute (or equivalent selector) on the root element to switch theme values via CSS custom properties"
      - name: "OKLCH for color scales"
        check: "recommends a perceptually uniform color space (OKLCH, LCH, or similar) for generating consistent shade scales across themes"

  - prompt: |
      Our design team wants to deprecate some old color tokens and
      introduce new ones without breaking existing components. We ship
      tokens as an npm package consumed by 3 frontend apps. How do we
      version and migrate tokens safely?
    assertions:
      - name: "semantic versioning for tokens"
        check: "recommends semantic versioning (semver) for token packages so consumers can pin versions and upgrade deliberately"
      - name: "deprecation annotations"
        check: "uses deprecation annotations in token files (via $extensions or equivalent) that specify replacement tokens and removal timeline"

tags: [design-system-tokens, background, frontend]
