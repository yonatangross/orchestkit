# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: quality-gates
name: "Quality gates evaluation"
skill_path: src/skills/quality-gates/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I've been asked to build a real-time collaborative editor with CRDTs,
      WebSocket sync, offline support, and conflict resolution. The PM wants
      it done in 2 weeks. Before I start, how should I assess this task?
    assertions:
      - name: "complexity score 4-5"
        check: "identifies the task as high complexity due to multiple unknowns, dependencies, and unfamiliar technology"
      - name: "blocks without plan"
        check: "recommends BLOCKING progress until a decomposition plan exists for level 4-5 tasks"
      - name: "breakdown into subtasks"
        check: "suggests breaking the complex task into smaller level 1-3 subtasks"

  - prompt: |
      I've tried fixing this flaky integration test 3 times now. First I
      added retries, then I mocked the external API, then I tried increasing
      timeouts. Nothing works and I'm not sure what's causing the flakiness.
    assertions:
      - name: "stuck detection at 3 attempts"
        check: "identifies repeated failed attempts as a signal that the developer is stuck and needs escalation"
      - name: "escalation protocol"
        check: "recommends escalating to the user or team rather than continuing to iterate"
      - name: "escalation template"
        check: "documents what was tried, why each approach failed, and specific guidance needed"

  - prompt: |
      The architect wants me to add a plugin system with dynamic module
      loading, a custom DSL for configuration, and a marketplace API. This
      is for an internal tool used by 3 people. Should I build all of this?
    assertions:
      - name: "YAGNI gate triggers"
        check: "flags overengineering — the planned scope far exceeds what the actual user base needs"
      - name: "simpler alternatives"
        check: "suggests simpler alternatives that match the actual scale of the project"
      - name: "block or warn"
        check: "recommends BLOCKING or WARNING status based on the YAGNI gate check"

tags: [quality-gates, background, quality]
