# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: github-operations
name: "GitHub operations evaluation"
skill_path: src/skills/github-operations/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I need to create a new sprint milestone with 8 issues, assign them
      all to the milestone, and set a due date of April 15th. How do I
      do this efficiently with the gh CLI?
    assertions:
      - name: "REST API for milestone creation"
        check: "uses gh api to create the milestone via REST API, not a non-existent gh milestone command"
      - name: "ISO 8601 due date"
        check: "passes the due date in ISO 8601 format (YYYY-MM-DDTHH:MM:SSZ)"
      - name: "milestone name not number for issues"
        check: "assigns issues to the milestone using the milestone NAME string, not the number"

  - prompt: |
      I want to find all open PRs that have been approved and have passing
      CI checks, then auto-merge them with squash. How do I script this?
    assertions:
      - name: "JSON output with jq filter"
        check: "uses gh pr list --json with --jq to filter by reviewDecision and statusCheckRollupState"
      - name: "auto-merge with squash"
        check: "uses gh pr merge with --auto --squash flags for automated squash merge"
      - name: "delete branch after merge"
        check: "includes --delete-branch flag to clean up merged branches"

  - prompt: |
      I need to create 15 issues for a new feature epic. Each needs labels,
      a milestone assignment, and a body. Doing them one by one in the
      browser is too slow. What's the best approach?
    assertions:
      - name: "batch creation loop"
        check: "uses a bash loop or array-driven approach to create issues in bulk with gh issue create"
      - name: "captures issue numbers"
        check: "captures created issue numbers from the output for later reference or project linking"
      - name: "heredoc for body"
        check: "uses heredoc or --body flag for multi-line issue bodies, not interactive mode"

tags: [github-operations, background, github]
