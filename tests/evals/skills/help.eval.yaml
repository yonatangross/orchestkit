# Generated by OrchestKit Claude Plugin
# Created: 2026-03-13

id: help
name: "Help skill evaluation"
skill_path: src/skills/help/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — direct requests
  - prompt: "what orchestkit skills can i use"
    should_trigger: true
  - prompt: "show me the available ork commands"
    should_trigger: true
  - prompt: "i dont know which skill to use for writing tests"
    should_trigger: true
  # Should trigger — casual/indirect phrasing
  - prompt: "whats ork got for git workflows"
    should_trigger: true
  - prompt: "is there a skill for creating pull requests"
    should_trigger: true
  - prompt: "help me find the right skill for code review"
    should_trigger: true
  # Should NOT trigger — doctor confusion pair (both support/debug)
  - prompt: "my hooks aren't working, run diagnostics"
    should_trigger: false
  - prompt: "check if my orchestkit installation is healthy"
    should_trigger: false
  - prompt: "why are my skills failing to load"
    should_trigger: false
  # Should NOT trigger — actual task requests
  - prompt: "implement a payment gateway"
    should_trigger: false
  - prompt: "review PR 123"
    should_trigger: false
  # Should trigger — terse phrasing
  - prompt: "help"
    should_trigger: true
  # Should NOT trigger — multi-intent, primary is implement
  - prompt: "implement user auth and help me understand the existing tests"
    should_trigger: false

quality_evals:
  - prompt: |
      what orchestkit skills can i use? organize them by category.
    assertions:
      - name: "categorized output"
        check: "groups skills into categories like BUILD, GIT, PLAN, MEMORY, QUALITY, CONFIG or similar"
      - name: "includes invocations"
        check: "shows invocation syntax like /ork:implement, /ork:commit for skills"
      - name: "covers key skills"
        check: "lists major user-invocable skills including implement, commit, explore, assess, brainstorm"
      - name: "descriptions included"
        check: "provides a brief description of what each skill does"

  - prompt: |
      i need to do something with git but not sure which ork
      command to use. whats available for git workflows?
    assertions:
      - name: "git skills listed"
        check: "shows git-related skills: commit, create-pr, review-pr, and/or fix-issue"
      - name: "includes descriptions"
        check: "provides a brief description of what each git skill does"
      - name: "shows invocation"
        check: "shows how to call each skill (e.g., /ork:commit)"
      - name: "focused response"
        check: "filters to git-relevant skills rather than listing all skills"

tags: [help, user-invocable, core]
