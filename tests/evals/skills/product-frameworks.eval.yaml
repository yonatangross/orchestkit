# Created: 2026-03-14

id: product-frameworks
name: "Product frameworks skill evaluation"
skill_path: src/skills/product-frameworks/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      Our team has 15 feature requests from customers, 8 internal
      improvement ideas, and 3 tech debt items. We need a systematic
      way to rank and prioritize them for the next quarter. What
      framework should we use and how do we apply it?
    assertions:
      - name: "RICE or WSJF scoring"
        check: "recommends RICE (Reach x Impact x Confidence / Effort) or WSJF (Weighted Shortest Job First) as a quantitative prioritization framework"
      - name: "scoring dimensions defined"
        check: "defines specific scoring scales for each dimension (e.g., Reach as number of users, Impact on 1-3 scale, Effort in person-weeks)"
      - name: "output is ranked list"
        check: "produces a ranked priority list based on calculated scores, not just subjective judgment"

  - prompt: |
      We're launching a new project management tool for small agencies.
      I need to articulate why agencies would choose us over existing
      tools like Asana or Monday.com. Help me frame our value
      proposition clearly.
    assertions:
      - name: "Value Proposition Canvas or JTBD"
        check: "uses Value Proposition Canvas, Jobs-to-be-Done framework, or similar structured approach to map customer jobs, pains, and gains"
      - name: "differentiation against competitors"
        check: "explicitly identifies how the product differentiates from named competitors on specific dimensions"

  - prompt: |
      I'm writing a product requirements document for a new onboarding
      flow. It needs to be clear enough for engineers to implement
      without ambiguity. What structure and sections should I include?
    assertions:
      - name: "PRD template structure"
        check: "includes standard PRD sections: problem statement, user stories, acceptance criteria, and success metrics"
      - name: "user story format"
        check: "uses structured user story format: 'As a [persona], I want [goal], so that [benefit]'"
      - name: "INVEST criteria or acceptance criteria"
        check: "defines acceptance criteria for each requirement or references INVEST principles for user story quality"

tags: [product-frameworks, background, product]
