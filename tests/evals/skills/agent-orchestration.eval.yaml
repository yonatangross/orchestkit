# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: agent-orchestration
name: "Agent orchestration patterns evaluation"
skill_path: src/skills/agent-orchestration/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I want to build an autonomous agent that can search the web, read
      documents, and answer questions iteratively. What pattern should
      I use for the reasoning loop?
    assertions:
      - name: "ReAct pattern"
        check: "recommends the ReAct (Reasoning + Acting) pattern with thought-action-observation loop"
      - name: "max steps limit"
        check: "includes a maximum step limit (5-15) to prevent infinite loops"
      - name: "memory management"
        check: "addresses context window management or sliding-window memory for the agent loop"

  - prompt: |
      I need to analyze a codebase for security, performance, and
      architecture issues simultaneously. Should I use one agent or
      multiple agents? How do I combine the results?
    assertions:
      - name: "multi-agent fan-out"
        check: "recommends running specialized agents in parallel using fan-out/fan-in pattern"
      - name: "result synthesis"
        check: "describes a synthesis step to combine and deduplicate findings from multiple agents"
      - name: "error isolation"
        check: "mentions isolating failures so one agent crash does not affect others"

  - prompt: |
      I'm comparing CrewAI, LangGraph, and OpenAI Agents SDK for building
      a customer support agent system with handoffs. Which should I use?
    assertions:
      - name: "framework comparison"
        check: "compares at least two frameworks with tradeoffs relevant to handoff workflows"
      - name: "match to use case"
        check: "recommends matching framework choice to team expertise and specific requirements"
      - name: "topology guidance"
        check: "distinguishes between a centralized hub-and-spoke topology for simple delegated work and a peer-to-peer mesh topology for complex cross-agent coordination"

tags: [agent-orchestration, background, workflow]
