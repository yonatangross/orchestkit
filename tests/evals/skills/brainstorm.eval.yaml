# NOTE: Interactive workflow skill — quality evals test knowledge, not orchestration.
# Full orchestration requires interactive session (AskUserQuestion).
# Generated by OrchestKit Claude Plugin
# Created: 2026-03-13

id: brainstorm
name: "Brainstorm skill evaluation"
skill_path: src/skills/brainstorm/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — direct requests
  - prompt: "brainstorm how to build the notification system"
    should_trigger: true
  - prompt: "lets explore some ideas for the new onboarding flow"
    should_trigger: true
  - prompt: "what are some approaches for handling real-time updates"
    should_trigger: true
  # Should trigger — casual/indirect phrasing
  - prompt: "i have a rough idea for caching, can we think through it together"
    should_trigger: true
  - prompt: "help me compare different auth strategies before i start building"
    should_trigger: true
  - prompt: "im not sure how to architect the billing module, lets brainstorm"
    should_trigger: true
  # Should NOT trigger — write-prd confusion pair (both design phase)
  - prompt: "write a product requirements document for the SSO feature"
    should_trigger: false
  - prompt: "create a PRD with user stories and acceptance criteria"
    should_trigger: false
  - prompt: "i need formal requirements for the payments system"
    should_trigger: false
  # Should NOT trigger — visualize-plan confusion pair (both planning phase)
  - prompt: "show me the execution plan with risk analysis and timeline"
    should_trigger: false
  # Should NOT trigger — adjacent tasks
  - prompt: "implement the caching layer we discussed"
    should_trigger: false
  - prompt: "rate this code from 0 to 10"
    should_trigger: false
  # Should trigger — terse phrasing
  - prompt: "brainstorm caching"
    should_trigger: true
  # Should trigger — common typo
  - prompt: "brianstorm ideas"
    should_trigger: true
  # Should NOT trigger — multi-intent, primary is implement
  - prompt: "implement the notification system and brainstorm future improvements"
    should_trigger: false

quality_evals:
  - prompt: |
      brainstorm approaches for adding real-time collaboration to our
      document editor. we currently have a REST API and postgres.
      users edit markdown documents and need to see each other's
      changes live.
    scaffold: typescript-nextjs
    assertions:
      - name: "generates multiple alternatives"
        check: "presents at least 3 distinct technical approaches (e.g., WebSocket, CRDTs, OT)"
      - name: "includes trade-off comparison"
        check: "compares approaches on dimensions like complexity, latency, scalability"
      - name: "considers existing stack"
        check: "accounts for the existing REST API and Postgres when evaluating feasibility"
      - name: "asks clarifying questions or detects tier"
        check: "either asks the user about constraints/project tier or auto-detects project complexity"
      - name: "no single option"
        check: "does NOT present only one approach — must offer multiple alternatives"

  - prompt: |
      i want to add full-text search to the app. should i use
      postgres full text, elasticsearch, or typesense? just a quick
      brainstorm, dont go too deep.
    assertions:
      - name: "respects quick ideation mode"
        check: "keeps response concise without deep evaluation phases"
      - name: "covers all three options"
        check: "discusses postgres full text, elasticsearch, and typesense"
      - name: "provides a recommendation"
        check: "offers a directional suggestion based on trade-offs"
      - name: "no unsupported claims"
        check: "does NOT make performance or scalability claims without justification or data points"

tags: [brainstorm, user-invocable, core]
