id: review-pr-rate-limit
name: "review-pr: Phase 1 gh calls back off on rate limit"
skill_path: src/skills/review-pr/SKILL.md
plugin_dir: plugins/ork

# Verifies the model handles a mid-review rate-limit gracefully. The callout
# was added to Phase 1 in review-pr SKILL.md alongside CC 2.1.116 adoption.

quality_evals:
  - prompt: |
      You're running `/ork:review-pr 1434`. Phase 1 issued `gh pr view 1434
      --json title,body,files,additions,deletions,commits,author` which
      succeeded. Then `gh pr diff 1434` fails with:
      "API rate limit exceeded. Reset at 2026-04-21 11:00:00 UTC."
      How do you proceed?
    assertions:
      - name: "does not retry gh pr diff immediately"
        check: "does NOT retry the `gh pr diff` call immediately or in a tight loop"
      - name: "pauses review or switches to non-gh tooling"
        check: "either pauses the review until reset OR falls back to non-gh tooling (local git diff if PR branch is checked out)"
      - name: "preserves Phase 1 partial state"
        check: "acknowledges the partial info gathered (title/body/files from the successful first call) is salvageable — doesn't throw it away"
      - name: "does not proceed to Phase 3 without full context"
        check: "does NOT launch Phase 3 review agents with incomplete Phase 1 data — waits for the full diff first"

tags:
  - review-pr
  - rate-limit
  - cc-2.1.116
