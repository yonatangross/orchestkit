id: mcp-patterns
name: "MCP patterns evaluation"
skill_path: src/skills/mcp-patterns/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I'm building a new MCP server that exposes a search tool and a
      document resource. How do I set up the server with proper
      lifecycle management?
    assertions:
      - name: "FastMCP setup"
        check: "uses FastMCP with lifespan management for proper resource handling"
      - name: "tool and resource primitives"
        check: "defines both tool and resource primitives with proper decorators"
      - name: "error handling pattern"
        check: "returns errors as text content rather than raising exceptions"

  - prompt: |
      I'm worried about prompt injection attacks on my MCP server.
      Users could potentially inject malicious instructions through
      tool descriptions. How do I harden it?
    assertions:
      - name: "description sanitization"
        check: "recommends sanitizing tool descriptions to prevent prompt injection"
      - name: "zero-trust model"
        check: "advocates for a zero-trust approach with explicit tool allowlists"
      - name: "hash verification"
        check: "mentions hash verification on tool invocations to detect tampering"

  - prompt: |
      Should I use stdio or HTTP transport for my MCP server? It needs
      to work both in development and production deployment.
    assertions:
      - name: "transport selection"
        check: "recommends stdio for CLI/desktop and Streamable HTTP for production"
      - name: "SSE deprecated"
        check: "mentions that SSE transport is deprecated in favor of Streamable HTTP"
      - name: "spec version reference"
        check: "references the 2025-11-25 specification or later"

tags: [mcp-patterns, background, ai-ml]
