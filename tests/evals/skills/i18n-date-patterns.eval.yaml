id: i18n-date-patterns
name: "i18n and date patterns evaluation"
skill_path: src/skills/i18n-date-patterns/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I'm adding a price display component to our React app. It needs
      to show Israeli Shekel amounts and a list of items formatted
      for the user's locale. How should I handle the formatting?
    assertions:
      - name: "useFormatting hook"
        check: "recommends using a centralized formatting hook like useFormatting for locale-aware currency and list formatting"
      - name: "no hardcoded currency symbols"
        check: "warns against hardcoding currency symbols like the shekel sign"
      - name: "formatList for lists"
        check: "uses formatList instead of .join() for locale-aware list formatting"

  - prompt: |
      I have a component with the text "5 patients" but I need it to
      work correctly for 0, 1, and many patients. Also needs to work
      in Hebrew. How do I handle pluralization?
    assertions:
      - name: "ICU MessageFormat"
        check: "recommends ICU MessageFormat plural syntax in translation files"
      - name: "no inline plural logic"
        check: "warns against using ternary operators like count === 1 ? 'item' : 'items' for pluralization"
      - name: "translation function"
        check: "uses t() from useTranslation with a count parameter for pluralization"

  - prompt: |
      Our app needs to support Hebrew (RTL) alongside English (LTR).
      What do I need to handle for the layout direction switch?
    assertions:
      - name: "CSS logical properties"
        check: "recommends CSS logical properties for RTL-aware layouts"
      - name: "isRTL detection"
        check: "mentions detecting RTL direction via isRTL or similar mechanism"
      - name: "bidirectional text"
        check: "addresses handling bidirectional text content"

tags: [i18n-date-patterns, background, frontend]
