# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: audit-skills
name: "Skill audit evaluation"
skill_path: src/skills/audit-skills/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I just added 5 new skills to OrchestKit. Can you check if they
      all have proper frontmatter, are registered in the manifest,
      and follow the authoring standards?
    assertions:
      - name: "frontmatter validation"
        check: "checks for required frontmatter fields like name, description, version, tags, user-invocable, complexity"
      - name: "manifest registration"
        check: "verifies skills are registered in manifests/ork.json"
      - name: "PASS/WARN/FAIL classification"
        check: "classifies each skill with a status like PASS, WARN, or FAIL"

  - prompt: |
      Some of our skills have SKILL.md files over 600 lines. Which
      ones are too long and need to be refactored into rules/ files?
    assertions:
      - name: "line count check"
        check: "checks SKILL.md line counts against the 500-line maximum"
      - name: "identifies offenders"
        check: "lists specific skills that exceed the line limit"
      - name: "rules refactoring suggestion"
        check: "recommends moving content to rules/ subdirectory files"

  - prompt: |
      Run a full quality audit of all OrchestKit skills before our
      next release. I want a summary table showing the health of
      each skill.
    assertions:
      - name: "all skills scanned"
        check: "scans all src/skills/*/SKILL.md files to get the complete skill list"
      - name: "summary table"
        check: "outputs a formatted table showing each skill with its audit status"
      - name: "totals summary"
        check: "includes totals showing count of pass, warn, and fail results"

tags: [audit-skills, background, quality]
