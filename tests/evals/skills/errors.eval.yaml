# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: errors
name: "Error pattern analysis evaluation"
skill_path: src/skills/errors/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I keep getting "role does not exist" errors when connecting to PostgreSQL
      from my local dev environment. It works in Docker but fails when I run
      the app directly. How do I troubleshoot this?
    assertions:
      - name: "connection string diagnosis"
        check: "identifies that the connection string may point to a different database or user than the Docker container provides"
      - name: "actionable fix"
        check: "provides a concrete fix such as using the Docker container connection or creating the missing role"

  - prompt: |
      My CI pipeline keeps failing with random errors — sometimes it's a timeout
      on API calls, sometimes a flaky test. How can I systematically capture and
      analyze these error patterns to find the root causes?
    assertions:
      - name: "structured error collection"
        check: "recommends capturing errors in structured format (JSONL or similar) with tool name, message, timestamp, and input"
      - name: "pattern detection"
        check: "suggests analyzing repeated error signatures to identify recurring patterns rather than treating each failure individually"
      - name: "automated rules"
        check: "mentions auto-generating warning rules or alerts when patterns repeat above a threshold"

  - prompt: |
      I have a Python script that calls several external APIs in sequence.
      When one fails, the whole thing crashes with an unhandled exception.
      How should I structure error handling and recovery?
    assertions:
      - name: "error classification"
        check: "distinguishes between retryable errors (timeouts, rate limits) and non-retryable errors (auth failures, validation)"
      - name: "recovery strategy"
        check: "recommends a recovery approach such as retry with backoff for transient errors or graceful degradation"

tags: [errors, background, debugging]
