id: animation-motion-design
name: "Animation and motion design skill evaluation"
skill_path: src/skills/animation-motion-design/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I have a list of items in React. When the user deletes an item, it
      just disappears instantly which feels jarring. I want items to animate
      out smoothly before being removed from the DOM. Also when new items
      are added, they should fade in.
    assertions:
      - name: "AnimatePresence for exit animations"
        check: "uses AnimatePresence (from Motion/Framer Motion) to animate components as they unmount, since React unmounts instantly without it"
      - name: "spring physics over duration"
        check: "recommends spring-based transitions with stiffness/damping parameters rather than fixed duration-based easing"
      - name: "composite properties only"
        check: "animates only transform and opacity (GPU-composited properties), not layout-triggering properties like width, height, or margin"

  - prompt: |
      I need to add page transitions to my React Router app. When
      navigating between routes, the old page should crossfade to the
      new page. I want to keep the JS bundle small and use native
      browser capabilities where possible.
    assertions:
      - name: "View Transitions API"
        check: "recommends the View Transitions API (document.startViewTransition or framework integration) for page navigation transitions as it has zero JS bundle cost"
      - name: "CSS view transition selectors"
        check: "uses ::view-transition-old and ::view-transition-new CSS pseudo-elements or viewTransition prop for defining transition animations"

  - prompt: |
      My app has lots of animations and a user complained they feel
      dizzy using it. How should I handle motion accessibility in my
      React application?
    assertions:
      - name: "prefers-reduced-motion"
        check: "checks prefers-reduced-motion media query (via useReducedMotion hook or CSS) and provides instant or minimal alternatives"
      - name: "vestibular disorder awareness"
        check: "mentions that motion sensitivity affects a significant portion of users and animations must provide opt-out or reduced alternatives"
      - name: "instant transition fallback"
        check: "provides a concrete pattern for setting duration to 0 or disabling animations entirely when reduced motion is preferred"

tags: [animation-motion-design, background, frontend]
