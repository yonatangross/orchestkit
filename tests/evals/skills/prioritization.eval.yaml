# Created: 2026-03-14

id: prioritization
name: "Prioritization frameworks evaluation"
skill_path: src/skills/prioritization/SKILL.md
plugin_dir: plugins/ork

quality_evals:
  - prompt: |
      I have 10 features in our backlog and we need to decide which
      to build next quarter. We have good analytics data on user reach.
      What scoring framework should I use?
    assertions:
      - name: "RICE recommendation"
        check: "recommends RICE scoring since analytics/reach data is available"
      - name: "RICE formula"
        check: "explains the RICE formula: (Reach x Impact x Confidence) / Effort"
      - name: "scoring table"
        check: "produces or describes a scoring table with features ranked by RICE score"

  - prompt: |
      We have a regulatory deadline for GDPR compliance this quarter
      and it's competing with a new AI feature. How do I compare
      them objectively?
    assertions:
      - name: "WSJF for deadlines"
        check: "recommends WSJF (Weighted Shortest Job First) because time criticality and cost of delay drive the decision"
      - name: "cost of delay"
        check: "calculates Cost of Delay including User Value, Time Criticality, and Risk Reduction"
      - name: "trade-off analysis"
        check: "quantifies what delaying each option costs per month"

  - prompt: |
      We're in a fast-paced startup and need to quickly triage 20
      feature ideas during a 30-minute planning meeting. We don't
      have user data yet. What's the fastest approach?
    assertions:
      - name: "ICE for speed"
        check: "recommends ICE scoring (Impact x Confidence x Ease) for fast triage without data"
      - name: "1-10 scales"
        check: "uses simple 1-10 scales that require no external data"
      - name: "quick time estimate"
        check: "notes that ICE takes only 5-10 minutes to score"

tags: [prioritization, background, product]
