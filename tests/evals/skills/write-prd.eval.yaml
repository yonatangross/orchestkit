id: write-prd
name: "Write PRD skill evaluation"
skill_path: src/skills/write-prd/SKILL.md
plugin_dir: plugins/ork

trigger_evals:
  # Should trigger — direct requests
  - prompt: "write a PRD for the SSO invite flow"
    should_trigger: true
  - prompt: "create a product requirements document for the billing feature"
    should_trigger: true
  - prompt: "i need a formal spec with user stories and acceptance criteria for the dashboard redesign"
    should_trigger: true
  # Should trigger — casual/indirect phrasing
  - prompt: "help me define the requirements for the new onboarding experience"
    should_trigger: true
  - prompt: "draft up user stories for the notification system"
    should_trigger: true
  - prompt: "we need a proper product spec before the team starts building search"
    should_trigger: true
  # Should NOT trigger — brainstorm confusion pair (both design phase)
  - prompt: "brainstorm approaches for the notification system"
    should_trigger: false
  - prompt: "explore some ideas for how to handle real-time updates"
    should_trigger: false
  - prompt: "compare three different caching strategies"
    should_trigger: false
  # Should NOT trigger — adjacent tasks
  - prompt: "implement the feature from the PRD"
    should_trigger: false
  - prompt: "rate this architecture from 0 to 10"
    should_trigger: false

quality_evals:
  - prompt: |
      write a full PRD for a team invitation system. users should be
      able to invite others via email, invitees get a link to join,
      admins can revoke invites, and there should be rate limiting
      on invitations.
    assertions:
      - name: "follows 8-section structure"
        check: "PRD includes executive summary, problem statement, objectives, user stories, functional requirements, non-functional requirements, release plan, and appendices"
      - name: "user stories use INVEST"
        check: "user stories follow INVEST criteria with 'As a [role], I want [goal] so that [benefit]' format"
      - name: "acceptance criteria in Gherkin"
        check: "acceptance criteria use Given/When/Then format"
      - name: "writes output file"
        check: "saves the PRD to a file named PRD-team-invitation.md or similar"
      - name: "includes non-functional requirements"
        check: "covers rate limiting, security, and scalability as non-functional requirements"

  - prompt: |
      just write user stories for an image upload feature, nothing
      more. need drag-and-drop, file size validation, and thumbnails.
    assertions:
      - name: "respects stories-only scope"
        check: "produces user stories without the full 8-section PRD"
      - name: "covers all requested features"
        check: "includes stories for drag-and-drop, file size validation, and thumbnail generation"
      - name: "includes acceptance criteria"
        check: "each story has testable acceptance criteria"

tags: [write-prd, user-invocable, core]
