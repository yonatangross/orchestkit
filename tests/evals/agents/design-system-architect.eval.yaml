# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: design-system-architect
name: "Design system architect evaluation"
agent_path: src/agents/design-system-architect.md

agent_evals:
  - prompt: |
      Design a design token hierarchy for a multi-brand SaaS platform. Need
      global tokens, semantic tokens (colors, spacing, typography), and
      component-specific tokens. Must support light/dark themes and 3 brand variants.
    scaffold: typescript-nextjs
    assertions:
      - name: "token hierarchy"
        check: "defines a three-tier token hierarchy: primitive/global, semantic, and component-specific"
      - name: "theme support"
        check: "implements light and dark theme variants using CSS custom properties or theme provider"
      - name: "multi-brand"
        check: "supports multiple brand configurations that override semantic tokens"

  - prompt: |
      Create a Button component with variants (primary, secondary, ghost, danger),
      sizes (sm, md, lg), loading state, icon support, and full accessibility.
      Use CSS-in-JS or Tailwind with design tokens.
    scaffold: typescript-nextjs
    assertions:
      - name: "variant system"
        check: "implements button variants using a structured approach (cva, styled-components variants, or Tailwind)"
      - name: "accessibility"
        check: "includes aria-disabled during loading, focus-visible styles, and proper button semantics"
      - name: "design token usage"
        check: "references design tokens for colors, spacing, and typography rather than hardcoded values"

  - prompt: |
      Set up a Figma-to-code pipeline using Style Dictionary. Transform design
      tokens exported from Figma into CSS custom properties, Tailwind config,
      and TypeScript constants.
    scaffold: typescript-nextjs
    assertions:
      - name: "Style Dictionary config"
        check: "configures Style Dictionary with source token files and platform-specific transforms"
      - name: "multiple output formats"
        check: "generates tokens in at least two formats (CSS variables, Tailwind config, or TypeScript)"
      - name: "automation"
        check: "includes a build script or CI step to regenerate tokens on change"

  - prompt: |
      Implement a responsive spacing and typography scale system. Define an 8px
      grid for spacing and a modular scale for typography. Include responsive
      breakpoints that adjust the scale.
    scaffold: typescript-nextjs
    assertions:
      - name: "8px grid system"
        check: "defines spacing values based on an 8px grid (8, 16, 24, 32, 48, 64)"
      - name: "type scale"
        check: "implements a modular or major-second type scale with defined heading and body sizes"
      - name: "responsive adjustments"
        check: "adjusts spacing or typography scale at different breakpoints"

  - prompt: |
      Create a component documentation site with live examples, prop tables,
      accessibility notes, and usage guidelines. Include a theme playground
      that lets users toggle themes and preview components.
    scaffold: typescript-nextjs
    assertions:
      - name: "live examples"
        check: "renders interactive component examples that can be modified in-browser"
      - name: "prop documentation"
        check: "generates or displays prop type tables with descriptions and default values"
      - name: "theme playground"
        check: "includes an interactive theme switcher that updates component previews in real time"

tags: [design-system-architect, agent, frontend, design-system]
