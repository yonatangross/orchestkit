# Created: 2026-03-14

id: security-layer-auditor
name: "Security layer auditor evaluation"
agent_path: src/agents/security-layer-auditor.md

agent_evals:
  - prompt: |
      Audit the defense-in-depth implementation for a REST API endpoint
      POST /api/v1/payments that processes credit card payments. Trace the
      request flow from edge (CDN/WAF) through authentication, authorization,
      input validation, business logic, data access, and storage layers.
    scaffold: typescript-nextjs
    assertions:
      - name: "8-layer-coverage"
        check: "Audit covers all 8 security layers from edge to storage with specific findings per layer"
      - name: "severity-ratings"
        check: "Each finding includes a severity rating (Critical/High/Medium/Low) with justification"
      - name: "remediation-code"
        check: "Provides specific code-level remediation for identified gaps, not just descriptions"

  - prompt: |
      Audit the authentication and session management implementation of a
      Next.js application using JWT tokens stored in httpOnly cookies. Check
      for token validation, refresh token rotation, session fixation, and
      CSRF protection.
    scaffold: typescript-nextjs
    assertions:
      - name: "jwt-security"
        check: "Checks JWT signing algorithm, expiration, audience/issuer validation, and key management"
      - name: "session-attacks"
        check: "Tests for session fixation, replay attacks, and token theft scenarios"

  - prompt: |
      Perform a security audit on a file upload endpoint that accepts images
      and PDFs. Check all layers: rate limiting at edge, authentication,
      file type validation, malware scanning, storage isolation, and access
      control for retrieval.
    scaffold: typescript-nextjs
    assertions:
      - name: "upload-validation"
        check: "Checks file type validation beyond extension (magic bytes, content-type verification, size limits)"
      - name: "storage-security"
        check: "Verifies storage isolation, filename sanitization, and access control for uploaded files"
      - name: "request-flow"
        check: "Traces the complete request flow identifying gaps at each security layer"

tags: [security-layer-auditor, agent, security, defense-in-depth]
