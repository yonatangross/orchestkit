# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: code-quality-reviewer
name: "Code quality reviewer evaluation"
agent_path: src/agents/code-quality-reviewer.md

agent_evals:
  - prompt: |
      Review this PR that adds a new payment processing module. Check for security
      issues, error handling gaps, test coverage, and adherence to the existing
      codebase patterns.
    scaffold: python-fastapi
    assertions:
      - name: "security review"
        check: "checks for security concerns in payment processing like input validation and data sanitization"
      - name: "error handling"
        check: "reviews error handling completeness for payment failures, timeouts, and edge cases"
      - name: "pattern consistency"
        check: "verifies the new code follows existing project patterns and conventions"

  - prompt: |
      Run code quality checks on the entire backend codebase. Check linting,
      type coverage, test coverage percentage, and identify any dead code or
      unused imports.
    scaffold: python-fastapi
    assertions:
      - name: "linting results"
        check: "runs linting tools (ruff, eslint, or similar) and reports violations"
      - name: "type coverage"
        check: "checks type annotation coverage using mypy, pyright, or tsc"
      - name: "test coverage threshold"
        check: "reports test coverage percentage and identifies modules below threshold"

  - prompt: |
      Review a React component library for performance issues. Check for unnecessary
      re-renders, missing memoization, large bundle imports, and accessibility
      violations.
    scaffold: typescript-nextjs
    assertions:
      - name: "re-render analysis"
        check: "identifies components with unnecessary re-renders due to missing memo, useMemo, or useCallback"
      - name: "bundle size"
        check: "flags large imports or missing tree-shaking opportunities"

tags: [code-quality-reviewer, agent, testing, background]
