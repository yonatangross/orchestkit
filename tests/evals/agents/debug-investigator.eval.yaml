# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: debug-investigator
name: "Debug investigator evaluation"
agent_path: src/agents/debug-investigator.md

agent_evals:
  - prompt: |
      Users report intermittent 500 errors on POST /api/orders. The error logs show
      "IntegrityError: duplicate key value violates unique constraint". Investigate
      the root cause and provide a fix recommendation.
    scaffold: python-fastapi
    assertions:
      - name: "root cause identification"
        check: "identifies the race condition or duplicate ID generation causing the integrity error"
      - name: "evidence-based"
        check: "references specific log entries, stack traces, or code lines as evidence"
      - name: "fix recommendation"
        check: "provides a concrete fix recommendation without modifying code directly"

  - prompt: |
      The application memory usage grows from 200MB to 4GB over 24 hours and
      eventually gets OOM killed. Profile the memory leak. The app is a FastAPI
      service with SQLAlchemy async sessions and background Celery workers.
    scaffold: python-fastapi
    assertions:
      - name: "leak source hypothesis"
        check: "identifies potential memory leak sources like unclosed sessions, unbounded caches, or growing queues"
      - name: "investigation methodology"
        check: "follows a systematic approach: reproduce, measure, isolate, verify"
      - name: "diagnostic commands"
        check: "suggests profiling tools or diagnostic commands to confirm the leak source"

  - prompt: |
      A Next.js app shows a hydration mismatch error in production but not in
      development. The error appears on pages that display user-specific data
      like timestamps and locale-formatted numbers.
    scaffold: typescript-nextjs
    assertions:
      - name: "SSR vs client mismatch"
        check: "identifies the server-client rendering difference as the cause (timezone, locale, or dynamic data)"
      - name: "reproduction strategy"
        check: "suggests steps to reproduce the hydration mismatch consistently"

  - prompt: |
      API response times jumped from 50ms to 3 seconds after deploying a new
      feature that adds user activity logging. The database CPU is at 95%.
      Investigate the performance regression.
    scaffold: python-fastapi
    assertions:
      - name: "query analysis"
        check: "investigates slow queries related to the activity logging feature using EXPLAIN or slow query logs"
      - name: "correlation with deployment"
        check: "correlates the performance regression with the specific deployment and new feature code"
      - name: "N+1 or missing index"
        check: "checks for N+1 query patterns or missing database indexes in the new logging code"

  - prompt: |
      Celery workers are silently dropping tasks. The task queue shows tasks being
      published but worker logs show no execution. Redis broker is running and
      connected. Investigate why tasks are not being consumed.
    scaffold: python-fastapi
    assertions:
      - name: "queue routing check"
        check: "verifies task routing configuration matches between publisher and consumer queue names"
      - name: "worker inspection"
        check: "inspects worker registration, concurrency settings, and prefetch configuration"

tags: [debug-investigator, agent, testing, debugging]
