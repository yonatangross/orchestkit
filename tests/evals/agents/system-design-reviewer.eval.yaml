# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: system-design-reviewer
name: "System design reviewer evaluation"
agent_path: src/agents/system-design-reviewer.md

agent_evals:
  - prompt: |
      Review a system design for a real-time collaborative document editor
      supporting 1000 concurrent users per document. The proposal uses
      WebSocket connections, CRDTs for conflict resolution, PostgreSQL for
      persistence, and Redis for presence tracking. Evaluate across all
      5 dimensions.
    scaffold: typescript-nextjs
    assertions:
      - name: "5-dimension-coverage"
        check: "Review covers all 5 dimensions: Scale, Data, Security, UX, and Coherence with specific findings"
      - name: "verdict"
        check: "Includes a clear verdict (APPROVE, REQUEST CHANGES, or REJECT) with justification"
      - name: "scale-analysis"
        check: "Scale dimension addresses WebSocket connection limits, CRDT sync overhead, and horizontal scaling strategy"

  - prompt: |
      Evaluate a migration plan from a monolithic Django application to
      microservices. The plan proposes 12 services, an API gateway, event-driven
      communication via Kafka, and a 6-month migration timeline with strangler
      fig pattern.
    scaffold: typescript-nextjs
    assertions:
      - name: "data-dimension"
        check: "Data dimension evaluates data ownership boundaries, consistency guarantees, and migration strategy for shared tables"
      - name: "coherence-check"
        check: "Coherence dimension assesses whether 12 services is appropriate or risks over-decomposition"

  - prompt: |
      Review an implementation plan for adding multi-tenant support to a
      SaaS platform. The proposal uses row-level security in PostgreSQL,
      tenant-scoped API keys, and a shared database with tenant_id columns.
      Current scale is 500 tenants, projected to 5000 in 12 months.
    scaffold: typescript-nextjs
    assertions:
      - name: "security-dimension"
        check: "Security dimension evaluates tenant isolation, RLS policy completeness, and cross-tenant data leak risks"
      - name: "scale-projection"
        check: "Scale dimension addresses the 10x growth projection with specific concerns about query performance and noisy neighbor"
      - name: "recommendations"
        check: "Includes specific architectural recommendations with trade-offs for each alternative approach"

tags: [system-design-reviewer, agent, design, architecture]
