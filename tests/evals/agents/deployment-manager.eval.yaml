# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: deployment-manager
name: "Deployment manager evaluation"
agent_path: src/agents/deployment-manager.md

agent_evals:
  - prompt: |
      Plan a zero-downtime deployment for a FastAPI service behind an AWS ALB.
      The service has WebSocket connections, a PostgreSQL database, and Redis
      cache. Include rollback procedures.
    scaffold: python-fastapi
    assertions:
      - name: "zero-downtime strategy"
        check: "uses blue-green or rolling deployment to avoid downtime during release"
      - name: "WebSocket draining"
        check: "handles graceful draining of existing WebSocket connections before terminating old instances"
      - name: "rollback plan"
        check: "defines rollback steps including traffic switching and database migration reversal"

  - prompt: |
      Implement feature flags for a gradual rollout of a new payment system. Start
      with 5% of users, monitor error rates, and auto-halt if error rate exceeds
      2%. Include kill switch capability.
    scaffold: python-fastapi
    assertions:
      - name: "percentage rollout"
        check: "implements percentage-based feature flag that can target a specific fraction of users"
      - name: "error monitoring"
        check: "monitors error rates during rollout and triggers auto-halt when threshold is exceeded"
      - name: "kill switch"
        check: "provides a kill switch to immediately disable the feature for all users"

  - prompt: |
      Create a production release checklist and runbook for deploying a major
      version upgrade that includes breaking API changes and database schema
      migrations.
    scaffold: python-fastapi
    assertions:
      - name: "pre-deployment checks"
        check: "includes pre-deployment verification steps like backup, migration dry-run, and dependency checks"
      - name: "API versioning"
        check: "addresses backward compatibility with a deprecation period or API versioning strategy"
      - name: "communication plan"
        check: "includes stakeholder notification and maintenance window communication"

  - prompt: |
      Set up a canary deployment strategy for a Kubernetes-hosted microservice.
      Route 10% of traffic to the canary, compare latency and error metrics
      against the baseline, and auto-promote or rollback.
    scaffold: empty
    assertions:
      - name: "traffic splitting"
        check: "configures traffic splitting between stable and canary deployments (e.g., Istio, Argo Rollouts)"
      - name: "metric comparison"
        check: "compares canary metrics (latency, error rate) against baseline for promotion decision"
      - name: "auto-rollback"
        check: "automatically rolls back the canary if metrics exceed defined thresholds"

  - prompt: |
      Design a multi-region deployment strategy for a globally distributed app.
      Handle database replication, CDN configuration, DNS-based routing, and
      region failover procedures.
    scaffold: empty
    assertions:
      - name: "database replication"
        check: "sets up cross-region database replication with read replicas or multi-master"
      - name: "DNS routing"
        check: "uses DNS-based routing (Route 53, Cloudflare) for geographic traffic distribution"
      - name: "failover procedure"
        check: "defines region failover steps including health checks and automatic DNS failover"

tags: [deployment-manager, agent, devops, deployment]
