# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: database-engineer
name: "Database engineer evaluation"
agent_path: src/agents/database-engineer.md

agent_evals:
  - prompt: |
      Design a PostgreSQL schema for a content management system with posts,
      categories (hierarchical), tags (many-to-many), and revision history.
      Include proper indexes for common query patterns.
    scaffold: python-fastapi
    assertions:
      - name: "hierarchical categories"
        check: "uses adjacency list, materialized path, or ltree for hierarchical category structure"
      - name: "many-to-many tags"
        check: "creates a junction table for post-tag relationships with proper foreign keys"
      - name: "revision history"
        check: "stores post revisions with timestamps allowing rollback to previous versions"

  - prompt: |
      Create Alembic migrations for adding pgvector support to an existing users table.
      Need to store 1536-dimension embeddings for semantic search with an HNSW index.
    scaffold: python-fastapi
    assertions:
      - name: "pgvector extension"
        check: "creates the vector extension and adds a vector(1536) column"
      - name: "HNSW index"
        check: "creates an HNSW index on the vector column for approximate nearest neighbor search"
      - name: "migration safety"
        check: "uses reversible migration with proper upgrade and downgrade functions"

  - prompt: |
      Optimize slow queries on an orders table with 50M rows. The main query joins
      orders with order_items and filters by date range, status, and customer_id.
      Current query takes 12 seconds.
    scaffold: python-fastapi
    assertions:
      - name: "composite index"
        check: "recommends composite index covering the filter columns (customer_id, status, date range)"
      - name: "EXPLAIN ANALYZE"
        check: "uses EXPLAIN ANALYZE to diagnose the query plan before and after optimization"
      - name: "partitioning consideration"
        check: "considers table partitioning by date range for the 50M row table"

  - prompt: |
      Implement full-text search across articles table with title, body, and author
      fields. Need weighted search (title 3x, body 1x), highlighting, and typo
      tolerance. Support both English and Hebrew content.
    scaffold: python-fastapi
    assertions:
      - name: "tsvector column"
        check: "creates a tsvector column with weighted fields (A for title, D for body)"
      - name: "GIN index"
        check: "creates a GIN index on the tsvector column for fast full-text search"
      - name: "multi-language"
        check: "handles multiple text search configurations for English and Hebrew content"

  - prompt: |
      Design a database schema for a real-time analytics dashboard that tracks
      page views, user sessions, and conversion funnels. Must handle 10K writes/sec
      with sub-100ms read queries for dashboard charts.
    scaffold: python-fastapi
    assertions:
      - name: "time-series optimization"
        check: "uses time-based partitioning or TimescaleDB for high-volume time-series data"
      - name: "materialized views"
        check: "uses materialized views or pre-aggregated summary tables for dashboard queries"
      - name: "write throughput"
        check: "addresses write throughput with batching, COPY, or unlogged tables for staging"

tags: [database-engineer, agent, backend, database]
