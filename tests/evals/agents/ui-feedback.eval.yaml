# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: ui-feedback
name: "UI feedback evaluation"
agent_path: src/agents/ui-feedback.md

agent_evals:
  - prompt: |
      Process a UI annotation on a React button component at
      src/components/Button.tsx. The annotation says "Button text is truncated
      on mobile and the hover state has no visual change." Map the element
      path to source code and implement fixes.
    scaffold: typescript-nextjs
    assertions:
      - name: "element-mapping"
        check: "Maps the annotated element path to the correct source file and component"
      - name: "truncation-fix"
        check: "Implements a fix for text truncation on mobile (e.g., responsive text sizing, text-overflow, min-width)"
      - name: "hover-state"
        check: "Adds or fixes hover state styling with visible feedback (color change, shadow, or scale)"

  - prompt: |
      Handle a batch of 5 UI annotations on a dashboard page. Annotations
      include: misaligned grid items, contrast ratio failure on a label,
      missing loading skeleton, broken tooltip positioning, and inconsistent
      icon sizing. Prioritize and implement fixes.
    scaffold: typescript-nextjs
    assertions:
      - name: "prioritization"
        check: "Prioritizes fixes by severity (contrast/accessibility first, then layout, then polish)"
      - name: "batch-processing"
        check: "Processes all 5 annotations with individual fixes and resolution summaries"

  - prompt: |
      An annotation reports that a data table component at
      src/components/DataTable.tsx has poor keyboard accessibility and the
      sort indicators are invisible to screen readers. Investigate the
      component and implement accessibility fixes.
    scaffold: typescript-nextjs
    assertions:
      - name: "source-investigation"
        check: "Reads and analyzes the existing component code before making changes"
      - name: "keyboard-fix"
        check: "Adds keyboard navigation support for table sorting (focusable headers, Enter/Space to sort)"
      - name: "screen-reader-fix"
        check: "Adds aria-sort attributes and visually hidden text for sort direction announcements"

tags: [ui-feedback, agent, frontend, annotations]
