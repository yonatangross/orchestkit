# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: infrastructure-architect
name: "Infrastructure architect evaluation"
agent_path: src/agents/infrastructure-architect.md

agent_evals:
  - prompt: |
      Design a Terraform module for deploying a production-ready EKS cluster on AWS.
      Include VPC with public/private subnets, node groups with auto-scaling, IAM
      roles with least privilege, and monitoring with CloudWatch.
    scaffold: empty
    assertions:
      - name: "VPC design"
        check: "creates a VPC with separate public and private subnets across multiple availability zones"
      - name: "least privilege IAM"
        check: "defines IAM roles with minimal permissions following principle of least privilege"
      - name: "auto-scaling"
        check: "configures node group auto-scaling with min/max/desired capacity settings"

  - prompt: |
      Create Kubernetes manifests for deploying a FastAPI application with
      horizontal pod autoscaler, resource limits, health checks, and
      ingress with TLS termination.
    scaffold: python-fastapi
    assertions:
      - name: "HPA configuration"
        check: "defines HorizontalPodAutoscaler with CPU/memory targets and scaling thresholds"
      - name: "resource limits"
        check: "sets resource requests and limits for CPU and memory on the deployment"
      - name: "health probes"
        check: "configures liveness, readiness, and startup probes with appropriate endpoints and timing"

  - prompt: |
      Design a cost-optimized AWS architecture for a SaaS application with
      500K monthly active users. Include compute (ECS/EKS), database (RDS),
      caching (ElastiCache), CDN (CloudFront), and estimated monthly cost.
    scaffold: empty
    assertions:
      - name: "right-sizing"
        check: "recommends appropriately sized instances based on workload, not defaulting to largest"
      - name: "cost optimization"
        check: "uses reserved instances, spot instances, or savings plans for cost reduction"
      - name: "cost estimate"
        check: "provides an estimated monthly cost breakdown by service"

  - prompt: |
      Set up infrastructure monitoring and alerting with Prometheus, Grafana,
      and AlertManager. Include dashboards for application metrics, infrastructure
      health, and SLA tracking.
    scaffold: empty
    assertions:
      - name: "Prometheus config"
        check: "configures Prometheus scrape targets for application and infrastructure metrics"
      - name: "Grafana dashboards"
        check: "creates Grafana dashboards with panels for key metrics (latency, error rate, throughput)"
      - name: "alert rules"
        check: "defines alert rules with severity levels and notification routing"

  - prompt: |
      Design a disaster recovery strategy for a multi-AZ deployment. Include
      RTO/RPO targets, automated backup procedures, failover testing, and
      runbook for recovery scenarios.
    scaffold: empty
    assertions:
      - name: "RTO/RPO targets"
        check: "defines Recovery Time Objective and Recovery Point Objective with specific time targets"
      - name: "backup automation"
        check: "automates backups with retention policies and cross-region replication"
      - name: "failover testing"
        check: "includes procedures for regular failover testing and chaos engineering"

  - prompt: |
      Implement a service mesh using Istio for a microservices architecture.
      Configure mTLS between services, traffic management rules, circuit
      breaking, and distributed tracing with Jaeger.
    scaffold: empty
    assertions:
      - name: "mTLS configuration"
        check: "enables mutual TLS between services for encrypted inter-service communication"
      - name: "traffic management"
        check: "configures VirtualService and DestinationRule for traffic routing and load balancing"
      - name: "observability"
        check: "integrates distributed tracing with Jaeger or Zipkin for request flow visibility"

  - prompt: |
      Design a Terraform state management strategy for a team of 10 engineers
      working across 15 environments. Include remote backend, state locking,
      workspace organization, and module versioning.
    scaffold: empty
    assertions:
      - name: "remote backend"
        check: "uses S3+DynamoDB or Terraform Cloud as remote backend with state locking"
      - name: "workspace strategy"
        check: "organizes workspaces or state files per environment with clear naming conventions"
      - name: "module versioning"
        check: "versions Terraform modules with semantic versioning and a module registry"

tags: [infrastructure-architect, agent, devops, infrastructure, parent]
