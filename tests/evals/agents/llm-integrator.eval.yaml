# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: llm-integrator
name: "LLM integrator evaluation"
agent_path: src/agents/llm-integrator.md

agent_evals:
  - prompt: |
      Integrate OpenAI and Anthropic APIs with a unified interface. Support
      streaming responses, function calling, and automatic fallback from
      OpenAI to Anthropic when rate limited.
    scaffold: python-fastapi
    assertions:
      - name: "unified interface"
        check: "creates an abstraction layer that works with both OpenAI and Anthropic APIs"
      - name: "streaming support"
        check: "implements streaming responses using async generators or SSE"
      - name: "provider fallback"
        check: "automatically falls back to the alternative provider on rate limit or failure"

  - prompt: |
      Design a versioned prompt template system with variable interpolation,
      few-shot example management, and A/B testing support. Include prompt
      performance tracking.
    scaffold: python-fastapi
    assertions:
      - name: "versioned templates"
        check: "stores prompt templates with version numbers allowing rollback to previous versions"
      - name: "variable interpolation"
        check: "supports variable substitution in prompts with type validation"
      - name: "A/B testing"
        check: "implements prompt variant selection for A/B testing with metric collection"

  - prompt: |
      Implement function calling with OpenAI's tool use API. Define tools for
      database queries, external API calls, and file operations. Include
      validation of tool arguments and result formatting.
    scaffold: python-fastapi
    assertions:
      - name: "tool definitions"
        check: "defines tool schemas with JSON Schema parameter descriptions for the LLM"
      - name: "argument validation"
        check: "validates tool call arguments before execution using Pydantic or JSON Schema"
      - name: "result formatting"
        check: "formats tool results back into the conversation context for the LLM"

  - prompt: |
      Optimize LLM API costs for a high-volume application. Implement semantic
      caching, request batching, model routing (expensive model for complex
      queries, cheap model for simple ones), and token usage tracking.
    scaffold: python-fastapi
    assertions:
      - name: "semantic caching"
        check: "caches LLM responses based on semantic similarity of inputs, not just exact match"
      - name: "model routing"
        check: "routes requests to different models based on complexity or task type"
      - name: "token tracking"
        check: "tracks token usage per request with cost calculation and budget alerts"

  - prompt: |
      Build a RAG pipeline that retrieves context from a PostgreSQL pgvector
      store, reranks results, and generates answers with citations. Include
      chunk overlap handling and source attribution.
    scaffold: python-fastapi
    assertions:
      - name: "vector retrieval"
        check: "queries pgvector for semantically similar documents using cosine similarity or L2 distance"
      - name: "reranking"
        check: "applies a reranking step to improve retrieval relevance before sending to the LLM"
      - name: "source citations"
        check: "includes source document references or citations in the generated response"

tags: [llm-integrator, agent, llm]
