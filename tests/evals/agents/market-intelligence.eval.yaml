id: market-intelligence
name: "Market intelligence evaluation"
agent_path: src/agents/market-intelligence.md

agent_evals:
  - prompt: |
      Conduct a competitive landscape analysis for a developer tools startup
      entering the API gateway market. Identify the top 5 direct competitors,
      their pricing tiers, key differentiators, and market positioning.
    scaffold: typescript-nextjs
    assertions:
      - name: "competitor-mapping"
        check: "Output identifies direct competitors with structured comparison (pricing, features, positioning)"
      - name: "market-positioning"
        check: "Analysis includes a positioning map or framework showing competitive differentiation"
      - name: "actionable-insights"
        check: "Report includes specific recommendations or opportunities based on competitive gaps"

  - prompt: |
      Size the market opportunity for an AI-powered code review tool targeting
      enterprise teams. Provide TAM, SAM, and SOM estimates with methodology
      and data sources.
    scaffold: typescript-nextjs
    assertions:
      - name: "tam-sam-som"
        check: "Output includes TAM, SAM, and SOM with distinct dollar or user figures for each level"
      - name: "methodology"
        check: "Each estimate includes the methodology used (top-down, bottom-up, or value-theory) with cited assumptions"

  - prompt: |
      Analyze emerging trends in the LLM infrastructure space for Q1 2026.
      Cover inference optimization, fine-tuning platforms, evaluation frameworks,
      and identify threats and opportunities for a startup building eval tooling.
    scaffold: typescript-nextjs
    assertions:
      - name: "trend-analysis"
        check: "Output covers multiple trend categories with specific examples and trajectory assessment"
      - name: "threat-opportunity"
        check: "Includes a structured SWOT or threat/opportunity matrix with severity ratings"

tags: [market-intelligence, agent, product, research]
