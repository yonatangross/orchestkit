# Created: 2026-03-14

id: frontend-performance-engineer
name: "Frontend performance engineer evaluation"
agent_path: src/agents/frontend-performance-engineer.md

agent_evals:
  - prompt: |
      Audit the Core Web Vitals of a Next.js e-commerce site. The homepage has
      an LCP of 4.2s, INP of 380ms, and CLS of 0.18. Identify root causes
      and provide specific optimizations to bring all metrics to "good" thresholds.
    scaffold: typescript-nextjs
    assertions:
      - name: "cwv-diagnosis"
        check: "Identifies specific root causes for each failing metric (LCP > 2.5s, INP > 200ms, CLS > 0.1)"
      - name: "optimization-plan"
        check: "Provides concrete code-level optimizations for each metric with expected improvement estimates"
      - name: "good-thresholds"
        check: "References the correct 'good' thresholds: LCP < 2.5s, INP < 200ms, CLS < 0.1"

  - prompt: |
      Analyze the JavaScript bundle of a React SPA. The main bundle is 1.8MB
      gzipped with lodash, moment.js, and three chart libraries. Recommend
      code splitting strategy, tree-shaking improvements, and modern alternatives.
    scaffold: typescript-nextjs
    assertions:
      - name: "bundle-analysis"
        check: "Identifies the largest dependencies and their contribution to bundle size"
      - name: "modern-alternatives"
        check: "Recommends modern lighter alternatives (e.g., date-fns for moment, lodash-es for lodash)"

  - prompt: |
      Set up Real User Monitoring (RUM) and performance budgets for a Vite-based
      React application. Configure performance budgets for bundle size, LCP, and
      INP. Add CI checks that fail the build when budgets are exceeded.
    scaffold: typescript-nextjs
    assertions:
      - name: "rum-setup"
        check: "Includes web-vitals or equivalent RUM library integration with metric collection and reporting"
      - name: "performance-budgets"
        check: "Defines specific performance budgets with numeric thresholds for bundle size and CWV metrics"
      - name: "ci-enforcement"
        check: "Includes CI configuration that blocks merges when performance budgets are exceeded"

tags: [frontend-performance-engineer, agent, frontend, performance, cwv]
