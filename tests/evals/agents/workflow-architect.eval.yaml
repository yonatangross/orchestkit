# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: workflow-architect
name: "Workflow architect evaluation"
agent_path: src/agents/workflow-architect.md

agent_evals:
  - prompt: |
      Design a LangGraph workflow for a document analysis pipeline. Nodes: extract
      text, classify document type, extract entities, generate summary, quality
      check. Include conditional routing based on document type and retry logic.
    scaffold: python-fastapi
    assertions:
      - name: "graph structure"
        check: "defines a LangGraph StateGraph with named nodes and edges for the pipeline stages"
      - name: "conditional routing"
        check: "uses conditional edges to route different document types through different processing paths"
      - name: "state management"
        check: "defines a typed state schema that flows through all nodes with clear data contracts"

  - prompt: |
      Implement a supervisor-worker pattern with LangGraph Command API for
      coordinating 4 specialist agents: researcher, writer, editor, and
      fact-checker. The supervisor decides which agent to invoke next.
    scaffold: python-fastapi
    assertions:
      - name: "supervisor node"
        check: "implements a supervisor node that decides which worker to invoke based on current state"
      - name: "Command API"
        check: "uses LangGraph Command API for dynamic routing between worker nodes"
      - name: "completion detection"
        check: "supervisor detects when the workflow is complete and routes to END"

  - prompt: |
      Add checkpointing and human-in-the-loop to a LangGraph workflow. The
      workflow should pause for human approval before sending emails, allow
      state inspection, and support resuming from any checkpoint.
    scaffold: python-fastapi
    assertions:
      - name: "checkpoint persistence"
        check: "configures a checkpointer (SQLite, PostgreSQL, or memory) for state persistence"
      - name: "human-in-the-loop"
        check: "uses interrupt_before or interrupt_after to pause workflow for human approval"
      - name: "resume capability"
        check: "supports resuming the workflow from a saved checkpoint with updated state"

  - prompt: |
      Design a RAG orchestration workflow with LangGraph that handles: query
      understanding, multi-source retrieval (vector DB + web search), reranking,
      answer generation, and self-evaluation with retry if quality score is low.
    scaffold: python-fastapi
    assertions:
      - name: "multi-source retrieval"
        check: "retrieves from multiple sources (vector store and web search) in parallel or sequence"
      - name: "self-evaluation loop"
        check: "implements a quality check node that can loop back to retry generation if score is below threshold"
      - name: "reranking step"
        check: "includes a reranking node between retrieval and generation to improve context relevance"

  - prompt: |
      Implement a map-reduce pattern in LangGraph for processing a large document
      collection. Split documents into chunks, process each in parallel, then
      aggregate results into a final summary.
    scaffold: python-fastapi
    assertions:
      - name: "map phase"
        check: "implements parallel processing of document chunks using LangGraph Send or fan-out pattern"
      - name: "reduce phase"
        check: "aggregates results from parallel processing into a consolidated output"
      - name: "error handling"
        check: "handles failures in individual chunk processing without failing the entire pipeline"

  - prompt: |
      Design a multi-turn conversational agent with LangGraph that maintains
      conversation memory, supports tool calling, and handles conversation
      branching (user can go back to a previous state and explore a different path).
    scaffold: python-fastapi
    assertions:
      - name: "conversation memory"
        check: "uses LangGraph Store or message history for maintaining conversation context across turns"
      - name: "tool integration"
        check: "integrates tool calling within the conversation flow with proper tool result handling"
      - name: "state branching"
        check: "supports conversation branching using checkpoints to fork from a previous state"

  - prompt: |
      Create a workflow that orchestrates multiple LLM calls with different models:
      fast model for classification, medium model for extraction, large model for
      generation. Include cost tracking and token budget management.
    scaffold: python-fastapi
    assertions:
      - name: "multi-model routing"
        check: "uses different LLM models at different workflow stages based on task complexity"
      - name: "token budget"
        check: "tracks token usage across the workflow and enforces budget limits"
      - name: "cost optimization"
        check: "routes simpler tasks to cheaper/faster models to optimize overall cost"

tags: [workflow-architect, agent, llm, workflow, parent]
