# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: test-generator
name: "Test generator evaluation"
agent_path: src/agents/test-generator.md

agent_evals:
  - prompt: |
      Generate unit tests for a UserService class that has methods: create_user,
      get_user_by_email, update_profile, and deactivate_user. The service uses
      SQLAlchemy async sessions and raises custom exceptions.
    scaffold: python-fastapi
    assertions:
      - name: "arrange-act-assert"
        check: "test functions follow arrange-act-assert pattern with clear setup, execution, and assertions"
      - name: "edge cases"
        check: "covers edge cases like duplicate email, non-existent user, and invalid input"
      - name: "async test support"
        check: "uses pytest.mark.asyncio for async test functions"

  - prompt: |
      Create integration tests for a REST API with endpoints: POST /api/orders,
      GET /api/orders/:id, PATCH /api/orders/:id/status. Use FastAPI TestClient
      with a test database.
    scaffold: python-fastapi
    assertions:
      - name: "TestClient usage"
        check: "uses FastAPI TestClient or httpx AsyncClient for HTTP request testing"
      - name: "status code assertions"
        check: "asserts specific HTTP status codes (201 for creation, 200 for retrieval, 404 for missing)"
      - name: "database fixtures"
        check: "sets up test data with fixtures or factories rather than relying on production data"

  - prompt: |
      Write Vitest tests for a React checkout form component that validates credit
      card number, expiration date, and CVV. The component calls a payment API
      on submit and shows success/error states.
    scaffold: typescript-nextjs
    assertions:
      - name: "MSW for API mocking"
        check: "uses MSW (Mock Service Worker) for mocking the payment API, not vi.mock or fetch mocks"
      - name: "validation testing"
        check: "tests form validation for invalid card numbers, expired dates, and missing fields"
      - name: "user interaction"
        check: "simulates user typing and form submission with testing-library user events"

  - prompt: |
      Analyze test coverage gaps for a notification service that sends email, SMS,
      and push notifications. Current coverage is 45%. Generate tests to bring it
      above 80%.
    scaffold: python-fastapi
    assertions:
      - name: "coverage analysis"
        check: "runs coverage report to identify specific uncovered lines and branches"
      - name: "provider isolation"
        check: "tests each notification channel (email, SMS, push) independently with mocked providers"
      - name: "failure scenarios"
        check: "covers provider failures, retry logic, and fallback behavior"

  - prompt: |
      Create E2E tests for a user registration flow: fill form, submit, verify email
      confirmation page, check welcome email was sent. Use Playwright.
    scaffold: typescript-nextjs
    assertions:
      - name: "page navigation"
        check: "navigates between registration form and confirmation page"
      - name: "form interaction"
        check: "fills form fields and submits using Playwright locators or testing-library queries"
      - name: "assertion on result"
        check: "verifies the confirmation page content or success message after registration"

tags: [test-generator, agent, testing]
