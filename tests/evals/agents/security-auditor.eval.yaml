# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: security-auditor
name: "Security auditor evaluation"
agent_path: src/agents/security-auditor.md

agent_evals:
  - prompt: |
      Run a full security audit on this FastAPI backend. Check for SQL injection,
      hardcoded secrets, insecure dependencies, and missing authentication on
      admin endpoints.
    scaffold: python-fastapi
    assertions:
      - name: "OWASP coverage"
        check: "checks for OWASP Top 10 categories including injection, broken access control, and security misconfiguration"
      - name: "dependency audit"
        check: "runs pip-audit or npm audit to identify vulnerable dependencies with CVE references"
      - name: "severity classification"
        check: "classifies findings by severity (critical, high, medium, low) with remediation guidance"

  - prompt: |
      Scan the codebase for hardcoded secrets, API keys, and credentials. Check
      .env files, config modules, and git history for leaked tokens.
    scaffold: python-fastapi
    assertions:
      - name: "secret patterns"
        check: "searches for patterns like API keys, passwords, tokens, and connection strings in source code"
      - name: "env file review"
        check: "checks .env and .env.example files for real credential values"
      - name: "no secret exposure"
        check: "redacts actual secret values in the report rather than displaying them"

  - prompt: |
      Review the authentication implementation for vulnerabilities. Check JWT
      validation, session management, password storage, and brute force protection.
    scaffold: python-fastapi
    assertions:
      - name: "JWT validation"
        check: "verifies JWT signature validation, expiration checks, and algorithm specification"
      - name: "password storage"
        check: "checks that passwords are hashed with bcrypt, argon2, or scrypt, not stored in plaintext"

tags: [security-auditor, agent, security, background]
