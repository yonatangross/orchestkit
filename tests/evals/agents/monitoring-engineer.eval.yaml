# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: monitoring-engineer
name: "Monitoring engineer evaluation"
agent_path: src/agents/monitoring-engineer.md

agent_evals:
  - prompt: |
      Set up Prometheus metrics instrumentation and Grafana dashboards for a FastAPI
      order service with endpoints: POST /orders, GET /orders/{id}, POST /payments.
      Include request rate, latency percentiles, and error rate panels.
    scaffold: typescript-nextjs
    assertions:
      - name: "prometheus-metrics"
        check: "Output includes Prometheus metric definitions (Counter, Histogram) with proper naming conventions"
      - name: "grafana-dashboard"
        check: "Output includes a Grafana dashboard JSON or configuration with panels for request rate, latency, and errors"
      - name: "label-cardinality"
        check: "Metrics use bounded label sets and avoid high-cardinality labels like user_id or request_id"

  - prompt: |
      Create alerting rules for a payment processing service. The SLO is 99.95%
      availability and p99 latency under 800ms. Include error rate, latency, and
      saturation alerts with appropriate for-durations and severity levels.
    scaffold: typescript-nextjs
    assertions:
      - name: "alert-rules"
        check: "Output includes Prometheus alerting rules with expr, for, labels (severity), and annotations"
      - name: "slo-alignment"
        check: "Alert thresholds align with the stated SLO targets (99.95% availability, p99 < 800ms)"

  - prompt: |
      Add OpenTelemetry distributed tracing to a Python microservice that calls
      three downstream services via HTTP. Include auto-instrumentation for FastAPI
      and manual spans for business logic in the checkout flow.
    scaffold: typescript-nextjs
    assertions:
      - name: "otel-setup"
        check: "Output includes TracerProvider configuration with OTLP exporter and resource attributes"
      - name: "auto-instrumentation"
        check: "Output includes FastAPIInstrumentor and HTTP client instrumentation setup"
      - name: "manual-spans"
        check: "Output includes manual span creation with meaningful span names and attributes for the checkout flow"

tags: [monitoring-engineer, agent, devops, observability]
