# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: python-performance-engineer
name: "Python performance engineer evaluation"
agent_path: src/agents/python-performance-engineer.md

agent_evals:
  - prompt: |
      Profile a FastAPI application where the GET /api/reports endpoint takes
      12 seconds to respond. The endpoint queries PostgreSQL, aggregates data
      in Python, and serializes a large JSON response. Identify bottlenecks
      and optimize to under 2 seconds.
    scaffold: typescript-nextjs
    assertions:
      - name: "profiling-approach"
        check: "Uses profiling tools (cProfile, py-spy, or line_profiler) to identify the specific bottleneck"
      - name: "db-optimization"
        check: "Addresses database query optimization (e.g., pushing aggregation to SQL, adding indexes, avoiding N+1)"
      - name: "serialization-fix"
        check: "Addresses serialization performance with approaches like orjson, streaming response, or pagination"

  - prompt: |
      Optimize memory usage for a Python data processing service that loads
      a 2GB CSV into memory, transforms it, and writes to PostgreSQL. The
      service is OOM-killed on a 4GB container. Implement streaming processing.
    scaffold: typescript-nextjs
    assertions:
      - name: "streaming-approach"
        check: "Replaces full-file loading with streaming/chunked processing (e.g., pandas chunksize, csv.reader generator)"
      - name: "memory-monitoring"
        check: "Includes memory profiling or monitoring to verify the optimization (tracemalloc, memory_profiler)"

  - prompt: |
      Set up load testing for a Python API using Locust. Test the checkout
      flow (browse -> add to cart -> checkout -> payment) with 500 concurrent
      users. Define performance SLOs and create a CI-integrated benchmark.
    scaffold: typescript-nextjs
    assertions:
      - name: "locust-config"
        check: "Includes Locust test file with user behavior classes modeling the multi-step checkout flow"
      - name: "slo-definition"
        check: "Defines performance SLOs with specific targets for p95 latency, error rate, and throughput"
      - name: "ci-integration"
        check: "Includes CI pipeline configuration that runs load tests and fails on SLO breaches"

tags: [python-performance-engineer, agent, backend, performance, python]
