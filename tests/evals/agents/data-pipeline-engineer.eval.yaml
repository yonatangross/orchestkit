id: data-pipeline-engineer
name: "Data pipeline engineer evaluation"
agent_path: src/agents/data-pipeline-engineer.md

agent_evals:
  - prompt: |
      Design a RAG ingestion pipeline for a documentation site with 5000 markdown
      files. Implement chunking with overlap, generate embeddings using
      text-embedding-3-large, and store in pgvector. Include metadata extraction
      and deduplication.
    scaffold: typescript-nextjs
    assertions:
      - name: "chunking-strategy"
        check: "Output defines a chunking strategy with chunk size, overlap, and boundary-aware splitting (headings, paragraphs)"
      - name: "embedding-pipeline"
        check: "Pipeline includes batch embedding generation with rate limiting and error handling"
      - name: "vector-storage"
        check: "Includes pgvector table schema with vector column, metadata columns, and appropriate index (HNSW or IVFFlat)"

  - prompt: |
      Build a data transformation pipeline that reads events from a Kafka topic,
      enriches them with user data from PostgreSQL, computes rolling 5-minute
      aggregates, and writes results to both a real-time dashboard sink and a
      cold storage parquet sink.
    scaffold: typescript-nextjs
    assertions:
      - name: "stream-processing"
        check: "Output includes streaming architecture with proper windowing for 5-minute aggregates"
      - name: "dual-sink"
        check: "Pipeline writes to both real-time and cold storage sinks with appropriate serialization"

  - prompt: |
      Create a golden dataset pipeline for evaluating a customer support chatbot.
      Generate test cases from historical support tickets, include expected
      responses, and set up automated quality scoring with DeepEval metrics.
    scaffold: typescript-nextjs
    assertions:
      - name: "dataset-structure"
        check: "Golden dataset includes input queries, expected outputs, and metadata for categorization"
      - name: "quality-metrics"
        check: "Includes DeepEval or RAGAS metric configuration for answer relevancy, faithfulness, or correctness"
      - name: "versioning"
        check: "Dataset includes versioning or timestamping for tracking changes over time"

tags: [data-pipeline-engineer, agent, data, embeddings, rag]
