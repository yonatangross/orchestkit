# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: eval-runner
name: "Eval runner evaluation"
agent_path: src/agents/eval-runner.md

agent_evals:
  - prompt: |
      Run a quality evaluation on a RAG-based Q&A system using a golden dataset
      of 50 question-answer pairs. Compute answer relevancy, faithfulness, and
      context precision metrics using DeepEval. Report results with pass/fail
      thresholds and identify the 5 worst-performing queries.
    scaffold: typescript-nextjs
    assertions:
      - name: "metric-computation"
        check: "Output includes computed scores for answer relevancy, faithfulness, and context precision metrics"
      - name: "pass-fail-thresholds"
        check: "Results include configurable pass/fail thresholds with aggregate pass rate"
      - name: "worst-performers"
        check: "Identifies the worst-performing queries with specific metric breakdowns and failure reasons"

  - prompt: |
      Set up a regression testing pipeline that compares model outputs between
      Claude Sonnet 4 and Claude Opus 4.6 across a test suite. Track score
      deltas, identify regressions exceeding 5%, and generate a comparison report.
    scaffold: typescript-nextjs
    assertions:
      - name: "model-comparison"
        check: "Pipeline compares outputs from both models on the same test cases with side-by-side scoring"
      - name: "regression-detection"
        check: "Includes regression detection logic with configurable threshold (5%) and flagging mechanism"

  - prompt: |
      Configure Langfuse integration for eval tracing. Set up trace creation
      for each eval run, attach scores as Langfuse scores, and create a
      dashboard view that shows metric trends over the last 30 days.
    scaffold: typescript-nextjs
    assertions:
      - name: "langfuse-setup"
        check: "Includes Langfuse client initialization with trace creation per eval run"
      - name: "score-attachment"
        check: "Attaches individual metric scores to Langfuse traces with proper naming and metadata"
      - name: "trend-tracking"
        check: "Configures or describes dashboard setup for tracking metric trends over time"

tags: [eval-runner, agent, testing, evaluation, deepeval]
