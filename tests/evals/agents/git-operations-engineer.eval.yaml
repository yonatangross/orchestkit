# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: git-operations-engineer
name: "Git operations engineer evaluation"
agent_path: src/agents/git-operations-engineer.md

agent_evals:
  - prompt: |
      Set up a stacked PR workflow for a feature that needs 3 dependent PRs:
      database schema changes, backend API implementation, and frontend UI.
      Each PR should be reviewable independently.
    scaffold: git-repo
    assertions:
      - name: "branch chain"
        check: "creates a chain of branches where each PR targets the previous branch"
      - name: "independent review"
        check: "each PR contains only its own changes, not the cumulative diff"
      - name: "rebase strategy"
        check: "describes how to rebase the stack when the base branch receives updates"

  - prompt: |
      Recover from a force push that overwrote a colleague's commits on the
      shared feature branch. Find the lost commits and restore them without
      losing the force-pushed changes.
    scaffold: git-repo
    assertions:
      - name: "reflog usage"
        check: "uses git reflog or git fsck to find the lost commits"
      - name: "cherry-pick or rebase"
        check: "restores lost commits using cherry-pick or interactive rebase"
      - name: "non-destructive"
        check: "preserves both the force-pushed changes and the recovered commits"

  - prompt: |
      Clean up a messy branch with 47 commits including "wip", "fix typo",
      and "debug" messages. Squash into logical commits with conventional
      commit messages before merging to main.
    scaffold: git-repo
    assertions:
      - name: "interactive rebase"
        check: "uses git rebase to squash or fixup commits into logical groups"
      - name: "conventional commits"
        check: "rewrites commit messages following conventional commit format (feat:, fix:, chore:)"
      - name: "history preservation"
        check: "creates a backup branch before rewriting history"

  - prompt: |
      Resolve a complex merge conflict where both main and the feature branch
      modified the same database migration file. The feature branch adds a new
      table while main added a column to an existing table.
    scaffold: git-repo
    assertions:
      - name: "conflict analysis"
        check: "examines both sides of the conflict to understand the intent of each change"
      - name: "migration ordering"
        check: "ensures migration files maintain correct ordering after conflict resolution"
      - name: "verification"
        check: "suggests running tests or migration dry-run after resolving to verify correctness"

  - prompt: |
      Set up branch protection rules and a Git workflow for a team of 8 developers.
      Include branch naming conventions, PR requirements, and release branch
      management.
    scaffold: git-repo
    assertions:
      - name: "branch naming"
        check: "defines branch naming conventions (e.g., feat/, fix/, release/)"
      - name: "PR requirements"
        check: "specifies required reviews, status checks, and merge strategies"
      - name: "release management"
        check: "describes release branch workflow with tagging and version bumping"

tags: [git-operations-engineer, agent, git]
