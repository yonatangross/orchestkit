id: ai-safety-auditor
name: "AI safety auditor evaluation"
agent_path: src/agents/ai-safety-auditor.md

agent_evals:
  - prompt: |
      Audit an LLM-powered customer support chatbot for prompt injection
      vulnerabilities. The chatbot uses RAG with a knowledge base and has access
      to tools for order lookup and refund processing. Identify attack vectors
      and recommend guardrails.
    scaffold: typescript-nextjs
    assertions:
      - name: "attack-vectors"
        check: "Identifies specific prompt injection vectors including direct injection, indirect injection via RAG documents, and tool-use manipulation"
      - name: "owasp-mapping"
        check: "Maps findings to OWASP LLM Top 10 categories (e.g., LLM01 Prompt Injection, LLM02 Insecure Output Handling)"
      - name: "guardrail-recommendations"
        check: "Provides specific guardrail implementations such as input sanitization, output filtering, and tool-call validation"

  - prompt: |
      Evaluate the safety of an AI agent system that has file system access,
      shell command execution, and web browsing capabilities. Assess the
      permission model, sandboxing, and blast radius of potential exploits.
    scaffold: typescript-nextjs
    assertions:
      - name: "permission-analysis"
        check: "Analyzes the permission model for each tool (file, shell, web) with escalation paths"
      - name: "blast-radius"
        check: "Assesses blast radius including data exfiltration, persistent compromise, and lateral movement risks"

  - prompt: |
      Red-team a content moderation pipeline that uses Claude to classify
      user-generated content. Test for jailbreak resistance, boundary cases
      between allowed and disallowed content, and consistency across rephrased inputs.
    scaffold: typescript-nextjs
    assertions:
      - name: "jailbreak-tests"
        check: "Includes specific jailbreak test categories (role-play, encoding, multi-turn, instruction hierarchy)"
      - name: "boundary-testing"
        check: "Tests edge cases at the boundary of moderation policy with graduated severity examples"
      - name: "severity-ratings"
        check: "Each finding has a severity rating (Critical/High/Medium/Low) with remediation steps"

tags: [ai-safety-auditor, agent, security, llm, red-team]
