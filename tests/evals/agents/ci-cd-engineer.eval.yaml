# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: ci-cd-engineer
name: "CI/CD engineer evaluation"
agent_path: src/agents/ci-cd-engineer.md

agent_evals:
  - prompt: |
      Create a GitHub Actions CI pipeline for a monorepo with a Next.js frontend
      and FastAPI backend. Include linting, type checking, unit tests, and build
      steps. Only run jobs for changed packages.
    scaffold: typescript-nextjs
    assertions:
      - name: "path filtering"
        check: "uses path filters or change detection to only run jobs for modified packages"
      - name: "parallel jobs"
        check: "runs frontend and backend CI jobs in parallel, not sequentially"
      - name: "caching"
        check: "caches dependencies (node_modules, pip cache) to speed up builds"

  - prompt: |
      Set up a CD pipeline that deploys to staging on PR merge and to production
      on release tag. Include database migration step, smoke tests after deploy,
      and automatic rollback on failure.
    scaffold: python-fastapi
    assertions:
      - name: "environment separation"
        check: "deploys to staging and production as separate environments with different triggers"
      - name: "migration ordering"
        check: "runs database migrations before application deployment"
      - name: "rollback mechanism"
        check: "implements automatic rollback when post-deploy smoke tests fail"

  - prompt: |
      Optimize a GitHub Actions workflow that currently takes 25 minutes. The
      bottlenecks are: npm install (4 min), Docker build (8 min), and test suite
      (10 min). Target under 10 minutes.
    scaffold: typescript-nextjs
    assertions:
      - name: "dependency caching"
        check: "uses actions/cache or setup-node caching to eliminate redundant npm installs"
      - name: "Docker layer caching"
        check: "uses Docker layer caching or BuildKit cache mounts to speed up Docker builds"
      - name: "test parallelization"
        check: "splits test suite across parallel runners or uses test sharding"

  - prompt: |
      Add security scanning to the CI pipeline: SAST (static analysis), dependency
      vulnerability scanning, container image scanning, and secrets detection.
      Block PRs with critical findings.
    scaffold: python-fastapi
    assertions:
      - name: "SAST integration"
        check: "integrates static analysis tools (semgrep, bandit, or CodeQL) into the pipeline"
      - name: "dependency scanning"
        check: "runs dependency vulnerability scanning (npm audit, pip-audit, or Dependabot)"
      - name: "PR blocking"
        check: "configures the security jobs as required status checks that block PR merges on failure"

  - prompt: |
      Create a reusable GitHub Actions workflow for building and publishing npm
      packages. Include version bumping, changelog generation, npm publish,
      and GitHub release creation.
    scaffold: typescript-nextjs
    assertions:
      - name: "reusable workflow"
        check: "uses workflow_call trigger to make the workflow reusable across repositories"
      - name: "version management"
        check: "automates version bumping based on conventional commits or manual input"
      - name: "npm publish"
        check: "publishes to npm registry with proper authentication using NPM_TOKEN secret"

tags: [ci-cd-engineer, agent, devops, ci-cd]
