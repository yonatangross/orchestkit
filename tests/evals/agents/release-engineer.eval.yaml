# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: release-engineer
name: "Release engineer evaluation"
agent_path: src/agents/release-engineer.md

agent_evals:
  - prompt: |
      Prepare a minor release (v3.5.0) for a monorepo with packages api, sdk, and cli.
      Generate a changelog from conventional commits since v3.4.0, create GitHub
      milestones for the next sprint, and draft the release notes.
    scaffold: typescript-nextjs
    assertions:
      - name: "semver-compliance"
        check: "Output follows semantic versioning with correct minor version bump to 3.5.0"
      - name: "changelog-format"
        check: "Changelog groups commits by type (feat, fix, chore) with references to PRs or issues"
      - name: "release-notes"
        check: "Release notes include a summary of notable changes, breaking changes section, and upgrade instructions"

  - prompt: |
      Audit the current milestone structure. Close completed milestones where all
      issues are done, identify stale milestones with no activity in 30+ days,
      and propose a cleanup plan using gh api commands.
    scaffold: typescript-nextjs
    assertions:
      - name: "gh-api-usage"
        check: "Uses gh api repos/.../milestones endpoints rather than gh milestone CLI commands"
      - name: "cleanup-criteria"
        check: "Identifies milestones by completion percentage and last activity date"

  - prompt: |
      Set up release-please automation for a TypeScript monorepo. Configure
      release-please-config.json and .release-please-manifest.json for three
      packages with independent versioning.
    scaffold: typescript-nextjs
    assertions:
      - name: "config-structure"
        check: "Output includes valid release-please-config.json with packages map and versioning strategy"
      - name: "manifest-file"
        check: "Output includes .release-please-manifest.json with current versions for each package"
      - name: "workflow-integration"
        check: "Includes GitHub Actions workflow or instructions for CI integration with release-please"

tags: [release-engineer, agent, devops, releases]
