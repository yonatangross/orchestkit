# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: frontend-ui-developer
name: "Frontend UI developer evaluation"
agent_path: src/agents/frontend-ui-developer.md

agent_evals:
  - prompt: |
      Build a data table component with server-side pagination, sortable columns,
      row selection, and inline editing. Use React 19 with TypeScript and Zod
      for API response validation.
    scaffold: typescript-nextjs
    assertions:
      - name: "server-side pagination"
        check: "implements cursor-based or server-side pagination, not loading all data client-side"
      - name: "Zod validation"
        check: "validates API responses with Zod schemas before rendering data"
      - name: "TypeScript types"
        check: "uses proper TypeScript generics or type parameters for the table component"

  - prompt: |
      Implement an optimistic update pattern for a todo list. When users toggle
      a todo, show the change immediately, then sync with the server. Handle
      rollback on failure with a toast notification.
    scaffold: typescript-nextjs
    assertions:
      - name: "optimistic mutation"
        check: "updates UI state immediately before server confirmation"
      - name: "rollback on error"
        check: "reverts the optimistic update and shows error feedback when the server request fails"
      - name: "loading state"
        check: "shows a subtle loading indicator during the pending server sync"

  - prompt: |
      Create a multi-step form wizard for user onboarding with 4 steps: profile info,
      preferences, team setup, and confirmation. Include form validation, progress
      indicator, and the ability to navigate back to previous steps.
    scaffold: typescript-nextjs
    assertions:
      - name: "step navigation"
        check: "allows forward and backward navigation between form steps"
      - name: "per-step validation"
        check: "validates form fields before allowing progression to the next step"
      - name: "state persistence"
        check: "preserves form data when navigating between steps"

  - prompt: |
      Build an accessible modal dialog system that supports nested modals, focus
      trapping, keyboard navigation (Escape to close), and screen reader
      announcements. Follow WAI-ARIA dialog pattern.
    scaffold: typescript-nextjs
    assertions:
      - name: "focus trap"
        check: "traps focus within the modal and restores focus to the trigger element on close"
      - name: "ARIA attributes"
        check: "uses role=dialog, aria-modal, aria-labelledby, and aria-describedby correctly"
      - name: "keyboard support"
        check: "handles Escape key to close and Tab/Shift+Tab for focus cycling"

  - prompt: |
      Implement a real-time collaborative text editor component with WebSocket
      connection, presence indicators showing other users' cursors, and
      conflict resolution for simultaneous edits.
    scaffold: typescript-nextjs
    assertions:
      - name: "WebSocket connection"
        check: "establishes WebSocket connection with reconnection logic and heartbeat"
      - name: "presence indicators"
        check: "shows other users' cursor positions or selection ranges in the editor"
      - name: "conflict handling"
        check: "implements operational transforms or CRDT-based conflict resolution for concurrent edits"

tags: [frontend-ui-developer, agent, frontend]
