# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: multimodal-specialist
name: "Multimodal specialist evaluation"
agent_path: src/agents/multimodal-specialist.md

agent_evals:
  - prompt: |
      Design and implement a multimodal RAG pipeline that indexes both text
      documents and product images. Users should be able to search by text
      query and get results from both modalities. Use CLIP embeddings for
      images and text-embedding-3-large for documents.
    scaffold: typescript-nextjs
    assertions:
      - name: "dual-embedding"
        check: "Pipeline uses separate embedding models for images (CLIP) and text with a unified search interface"
      - name: "cross-modal-retrieval"
        check: "Supports cross-modal queries where text queries can retrieve image results and vice versa"
      - name: "index-design"
        check: "Vector store schema supports both modalities with metadata for filtering by content type"

  - prompt: |
      Build an image analysis API endpoint that accepts uploaded images,
      extracts text via OCR, describes visual content using Claude's vision
      capabilities, and returns structured metadata including detected objects,
      text content, and dominant colors.
    scaffold: typescript-nextjs
    assertions:
      - name: "vision-integration"
        check: "Uses Claude vision API or equivalent for image description with structured output extraction"
      - name: "ocr-pipeline"
        check: "Includes OCR processing for text extraction from images with confidence scores"

  - prompt: |
      Implement an audio transcription pipeline that accepts audio files,
      transcribes using Whisper, generates a summary using an LLM, extracts
      action items, and stores results with timestamps and speaker diarization.
    scaffold: typescript-nextjs
    assertions:
      - name: "transcription-pipeline"
        check: "Includes Whisper integration with timestamp alignment and configurable language support"
      - name: "post-processing"
        check: "Pipeline includes LLM-based summarization and action item extraction from transcription"
      - name: "structured-output"
        check: "Output includes timestamped segments, speaker labels, summary, and extracted action items"

tags: [multimodal-specialist, agent, llm, vision, audio]
