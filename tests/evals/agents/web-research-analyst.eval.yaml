# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: web-research-analyst
name: "Web research analyst evaluation"
agent_path: src/agents/web-research-analyst.md

agent_evals:
  - prompt: |
      Research the pricing pages of three competing observability platforms:
      Datadog, Grafana Cloud, and New Relic. Extract their pricing tiers,
      per-host costs, included features, and any usage-based pricing components.
      Produce a structured comparison report.
    scaffold: typescript-nextjs
    assertions:
      - name: "structured-extraction"
        check: "Output includes structured pricing data with tier names, prices, and feature lists for each competitor"
      - name: "comparison-format"
        check: "Report presents a side-by-side comparison table or matrix for easy evaluation"
      - name: "evidence-capture"
        check: "Report references source URLs and includes confidence levels for extracted data"

  - prompt: |
      Extract the full API documentation structure from a developer docs site
      at https://docs.example.com/api. Capture endpoint paths, HTTP methods,
      request/response schemas, and authentication requirements. Output as
      a structured JSON summary.
    scaffold: typescript-nextjs
    assertions:
      - name: "api-structure"
        check: "Output includes endpoint paths, HTTP methods, and parameter descriptions in structured format"
      - name: "extraction-approach"
        check: "Uses the 3-tier approach: WebFetch first, then Tavily if available, then agent-browser for JS-rendered content"

  - prompt: |
      Investigate how three SaaS companies (Vercel, Supabase, Clerk) handle
      their changelog and release communication. Capture the format, frequency,
      categorization scheme, and any interactive elements used.
    scaffold: typescript-nextjs
    assertions:
      - name: "multi-site-research"
        check: "Output covers all three companies with specific observations about their changelog approach"
      - name: "pattern-synthesis"
        check: "Report synthesizes patterns across the three companies and identifies best practices"
      - name: "rate-limiting"
        check: "Research approach respects rate limits and uses efficient multi-page extraction"

tags: [web-research-analyst, agent, research, browser]
