id: product-strategist
name: "Product strategist evaluation"
agent_path: src/agents/product-strategist.md

agent_evals:
  - prompt: |
      Evaluate whether we should build an in-house analytics dashboard or buy
      a solution like Mixpanel/Amplitude. We have 50K MAU, 3 engineers, and
      need custom funnel analysis and cohort tracking.
    scaffold: empty
    assertions:
      - name: "build vs buy framework"
        check: "applies a structured build vs buy analysis with criteria like cost, time-to-market, and customization"
      - name: "team capacity"
        check: "considers the 3-engineer team capacity and opportunity cost of building in-house"
      - name: "recommendation"
        check: "provides a clear go/no-go recommendation with supporting rationale"

  - prompt: |
      We want to add AI-powered features to our project management tool. Evaluate
      the value proposition for: auto task estimation, smart assignment, meeting
      summary generation, and risk prediction. Prioritize which to build first.
    scaffold: empty
    assertions:
      - name: "value proposition"
        check: "evaluates each feature against user needs and willingness to pay"
      - name: "prioritization framework"
        check: "uses a structured prioritization method (RICE, ICE, or impact/effort matrix)"
      - name: "feasibility assessment"
        check: "considers technical feasibility and data requirements for each AI feature"

  - prompt: |
      Our B2B SaaS has 200 customers but churn is 8% monthly. Analyze potential
      causes and recommend a retention strategy. We have usage data, NPS scores,
      and support ticket history.
    scaffold: empty
    assertions:
      - name: "churn analysis"
        check: "identifies potential churn drivers using available data signals (usage patterns, NPS, support tickets)"
      - name: "retention strategy"
        check: "proposes specific retention interventions tied to identified churn causes"
      - name: "success metrics"
        check: "defines measurable success metrics to track retention improvement"

  - prompt: |
      Assess the market opportunity for launching a developer-focused API
      monitoring tool. Identify target segments, competitive landscape
      (Datadog, New Relic, Grafana Cloud), and potential differentiation.
    scaffold: empty
    assertions:
      - name: "market sizing"
        check: "estimates addressable market size with TAM, SAM, or SOM methodology"
      - name: "competitive analysis"
        check: "maps competitors with their strengths, weaknesses, and pricing"
      - name: "differentiation"
        check: "identifies specific differentiation opportunities or underserved segments"

  - prompt: |
      Create a product roadmap for the next 3 quarters for a developer tools
      startup. Balance feature requests from enterprise customers, open-source
      community needs, and platform stability work.
    scaffold: empty
    assertions:
      - name: "stakeholder balance"
        check: "balances enterprise, community, and platform needs across the roadmap"
      - name: "quarterly milestones"
        check: "defines clear deliverables and themes for each of the 3 quarters"
      - name: "strategic alignment"
        check: "ties roadmap items to business objectives or strategic goals"

tags: [product-strategist, agent, product, parent]
