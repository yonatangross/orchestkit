# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: event-driven-architect
name: "Event-driven architect evaluation"
agent_path: src/agents/event-driven-architect.md

agent_evals:
  - prompt: |
      Design an event sourcing system for an e-commerce order service. Events
      include OrderCreated, ItemAdded, PaymentProcessed, OrderShipped. Include
      event store, projections, and snapshots for performance.
    scaffold: python-fastapi
    assertions:
      - name: "event store design"
        check: "defines an append-only event store with event versioning and stream identification"
      - name: "projections"
        check: "implements read-model projections that rebuild state from the event stream"
      - name: "snapshots"
        check: "uses periodic snapshots to avoid replaying entire event history for state reconstruction"

  - prompt: |
      Implement CQRS pattern separating write and read models for a product
      catalog. Writes go through command handlers with validation, reads use
      denormalized views optimized for specific query patterns.
    scaffold: python-fastapi
    assertions:
      - name: "command handlers"
        check: "implements command handlers that validate business rules before persisting changes"
      - name: "read model separation"
        check: "creates separate denormalized read models optimized for query patterns"
      - name: "eventual consistency"
        check: "addresses eventual consistency between write and read models with synchronization strategy"

  - prompt: |
      Set up a Kafka-based message bus for inter-service communication between
      5 microservices. Include dead letter queues, schema registry for event
      schemas, and consumer group management.
    scaffold: python-fastapi
    assertions:
      - name: "topic design"
        check: "defines Kafka topics with appropriate partitioning strategy for each service"
      - name: "dead letter queue"
        check: "configures dead letter topics for messages that fail processing after retries"
      - name: "schema registry"
        check: "uses a schema registry (Avro, Protobuf, or JSON Schema) for event schema evolution"

  - prompt: |
      Implement the transactional outbox pattern to guarantee exactly-once event
      publishing from a PostgreSQL database. Use a background poller or CDC
      (change data capture) to relay events to the message broker.
    scaffold: python-fastapi
    assertions:
      - name: "outbox table"
        check: "creates an outbox table that stores events within the same database transaction as the state change"
      - name: "relay mechanism"
        check: "implements a poller or CDC-based relay to publish outbox events to the message broker"
      - name: "exactly-once semantics"
        check: "ensures events are published exactly once through idempotency keys or deduplication"

  - prompt: |
      Design a saga orchestration pattern for a trip booking system that
      coordinates hotel, flight, and car rental reservations. Handle compensating
      transactions when any step fails.
    scaffold: python-fastapi
    assertions:
      - name: "saga coordinator"
        check: "implements a saga orchestrator that manages the multi-step booking workflow"
      - name: "compensating transactions"
        check: "defines compensating actions (cancel hotel, cancel flight) for each step in case of failure"
      - name: "state tracking"
        check: "tracks saga execution state to handle retries and partial failures"

tags: [event-driven-architect, agent, backend, event-driven]
