# Generated by OrchestKit Claude Plugin
# Created: 2026-03-14

id: backend-system-architect
name: "Backend system architect evaluation"
agent_path: src/agents/backend-system-architect.md

agent_evals:
  - prompt: |
      Design a REST API for a multi-tenant SaaS billing system. Needs: organizations,
      subscription plans, invoices, payment methods, usage tracking. Must support
      plan upgrades/downgrades with prorated billing.
    scaffold: python-fastapi
    assertions:
      - name: "RESTful resource design"
        check: "defines resource endpoints for organizations, subscriptions, invoices, and payments using proper HTTP methods"
      - name: "multi-tenancy isolation"
        check: "addresses tenant isolation strategy (schema-per-tenant, row-level security, or org_id foreign keys)"
      - name: "proration logic"
        check: "describes how plan upgrades/downgrades handle prorated billing calculations"

  - prompt: |
      Implement JWT authentication with refresh token rotation for a FastAPI backend.
      Include rate limiting on auth endpoints, bcrypt password hashing, and account
      lockout after 5 failed attempts.
    scaffold: python-fastapi
    assertions:
      - name: "refresh token rotation"
        check: "implements refresh token rotation where old refresh tokens are invalidated on use"
      - name: "bcrypt hashing"
        check: "uses bcrypt or argon2 for password hashing, not plaintext or weak algorithms"
      - name: "rate limiting on auth"
        check: "applies rate limiting specifically to login/register endpoints"

  - prompt: |
      Create a service layer for an order processing system. Orders go through states:
      draft -> submitted -> payment_pending -> paid -> fulfilled -> completed.
      Include validation rules for state transitions and event emission on each transition.
    scaffold: python-fastapi
    assertions:
      - name: "state machine pattern"
        check: "implements explicit state transitions with validation preventing invalid jumps (e.g., draft cannot go directly to fulfilled)"
      - name: "event emission"
        check: "emits domain events or callbacks on state transitions for downstream consumers"
      - name: "service layer separation"
        check: "separates business logic into a service class rather than putting it in route handlers"

  - prompt: |
      Design a microservice API gateway pattern for 4 services: auth, users, products,
      orders. Implement request routing, rate limiting per service, circuit breaker
      pattern, and request/response logging.
    scaffold: python-fastapi
    assertions:
      - name: "service routing"
        check: "routes requests to appropriate downstream services based on URL path prefix"
      - name: "circuit breaker"
        check: "implements circuit breaker pattern with open/half-open/closed states for downstream service calls"
      - name: "per-service rate limits"
        check: "applies different rate limiting configurations per downstream service"

  - prompt: |
      Implement a repository pattern with unit of work for a FastAPI app using
      SQLAlchemy 2.0 async. Include proper transaction management, optimistic
      locking, and connection pooling configuration.
    scaffold: python-fastapi
    assertions:
      - name: "repository abstraction"
        check: "creates repository classes that abstract database operations from service layer"
      - name: "unit of work pattern"
        check: "implements unit of work to manage transaction boundaries across multiple repositories"
      - name: "async SQLAlchemy"
        check: "uses SQLAlchemy 2.0 async session with proper await patterns"

  - prompt: |
      Set up CORS, request validation middleware, and structured logging for a
      FastAPI application. Include request ID propagation across all log entries
      and health check endpoints.
    scaffold: python-fastapi
    assertions:
      - name: "CORS configuration"
        check: "configures CORS middleware with explicit allowed origins, not wildcard in production"
      - name: "request ID propagation"
        check: "generates or accepts a request ID header and propagates it through middleware and logging"
      - name: "health check endpoints"
        check: "implements /health or /healthz endpoint with dependency checks (database, cache)"

  - prompt: |
      Design a webhook delivery system that handles retries with exponential backoff,
      dead letter queue, payload signing with HMAC, and delivery status tracking.
      Must handle at-least-once delivery semantics.
    scaffold: python-fastapi
    assertions:
      - name: "exponential backoff"
        check: "implements retry logic with exponential backoff and jitter for failed webhook deliveries"
      - name: "HMAC signing"
        check: "signs webhook payloads with HMAC-SHA256 so consumers can verify authenticity"
      - name: "idempotency"
        check: "addresses at-least-once delivery with idempotency keys or delivery tracking"

tags: [backend-system-architect, agent, backend, parent]
