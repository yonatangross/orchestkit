# Created: 2026-03-14

id: accessibility-specialist
name: "Accessibility specialist evaluation"
agent_path: src/agents/accessibility-specialist.md

agent_evals:
  - prompt: |
      Audit a React dashboard component that includes a data table with sorting,
      a modal dialog for row details, and a filter sidebar with checkboxes and
      date pickers. Check WCAG 2.2 Level AA compliance and provide fixes.
    scaffold: typescript-nextjs
    assertions:
      - name: "wcag-criteria"
        check: "Audit references specific WCAG 2.2 success criteria numbers (e.g., 1.3.1, 2.1.1, 4.1.2)"
      - name: "aria-patterns"
        check: "Recommendations include correct ARIA roles, states, and properties for table, dialog, and form controls"
      - name: "keyboard-navigation"
        check: "Audit checks keyboard navigation paths including focus trapping in modal and tab order in table"

  - prompt: |
      Implement keyboard navigation and screen reader support for a custom
      autocomplete/combobox component built with React. The component has a text
      input, a dropdown list of suggestions, and supports multi-select with chips.
    scaffold: typescript-nextjs
    assertions:
      - name: "combobox-pattern"
        check: "Implementation follows WAI-ARIA combobox pattern with proper role, aria-expanded, aria-activedescendant"
      - name: "screen-reader-announcements"
        check: "Includes aria-live regions or announcements for suggestion count changes and selection feedback"

  - prompt: |
      Set up automated accessibility testing in a Next.js project using
      jest-axe for unit tests and Playwright with axe-core for integration tests.
      Cover the homepage, login form, and a CRUD table page.
    scaffold: typescript-nextjs
    assertions:
      - name: "unit-test-setup"
        check: "Includes jest-axe configuration with toHaveNoViolations matcher for component-level tests"
      - name: "e2e-a11y-tests"
        check: "Includes Playwright tests that run axe-core scans on specified pages with violation assertions"
      - name: "ci-integration"
        check: "Tests are structured to run in CI and report accessibility violations as test failures"

tags: [accessibility-specialist, agent, frontend, a11y, wcag]
