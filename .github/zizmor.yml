# Created: 2026-06-20

# zizmor config — GitHub Actions security audit (#2535, milestone #160)
# https://docs.zizmor.sh/configuration/
#
# Policy: the CI gate (validate-workflows.yml → zizmor job) uploads ALL findings
# to code-scanning as advisory, and HARD-BLOCKS only on `dangerous-triggers`
# (the pull_request_target regression this gate exists to prevent). The ignores
# below are findings that have been individually audited as safe — adding a new
# one requires the same written justification.

rules:
  # dependabot-automerge.yml uses pull_request_target, but safely: it NEVER checks
  # out or executes PR code (only `gh pr merge|edit|comment`), is gated to the
  # dependabot[bot] actor, and passes metadata via env (not run-body). This is the
  # GitHub-recommended pattern for granting Dependabot PRs a privileged token.
  # Audited in milestone #160 (security-posture review).
  dangerous-triggers:
    ignore:
      - dependabot-automerge.yml

  # Same workflow: the `github.actor == 'dependabot[bot]'` gate. zizmor flags actor
  # checks as spoofable in general, but github.actor on pull_request_target is set
  # by GitHub from the triggering identity and is not attacker-controllable via PR
  # content here; combined with the no-checkout design above, this is safe.
  bot-conditions:
    ignore:
      - dependabot-automerge.yml
