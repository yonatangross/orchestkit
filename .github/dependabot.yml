# Generated by OrchestKit Claude Plugin
# Created: 2026-02-19

# Dependabot keeps GitHub Actions AND every npm package tree current.
#
# Why npm is here (added for #2490): the Security-Tests npm-audit gate
# (tests/security/test-npm-audit.sh, severity >= moderate) went red repeatedly
# on continuously-published transitive advisories (hono x5, js-yaml/vite, ...).
# The `^range` in package.json allows the patch, but the LOCKFILE stays pinned
# to the last-resolved version until `npm audit fix` runs -- so lockfiles drift
# behind in-range patches and the gate fails reactively, one advisory at a time,
# wedging the whole PR queue. A weekly npm version-update stream keeps every
# lockfile fresh proactively; `groups` bundles updates (and security updates) so
# advisories land as ONE PR per tree instead of N. Paired with auto-merge
# (.github/workflows/dependabot-automerge.yml) the bumps land hands-off.
#
# hono is an `overrides` entry in root + docs/site (pulled transitively by
# @modelcontextprotocol/sdk); it is intentionally NOT removed -- dropping it
# un-pins the SDK's vulnerable transitive hono. The fix is freshness, not removal.

version: 2
updates:
  # ── GitHub Actions ──────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5

  # ── npm: root (workspace root; no direct deps today) ──
  # Root package.json is governed by the Release-Please File Guard, so this
  # stream carries `release-please-override` to keep that (non-required) check
  # green when a bump edits the override ranges or devDependencies.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "release-please-override"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 5

  # ── npm: src/hooks (TypeScript hooks bundle) ────────────────────────
  - package-ecosystem: "npm"
    directory: "/src/hooks"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 5

  # ── npm: docs/site (Next.js docs site) ──────────────────────────────
  - package-ecosystem: "npm"
    directory: "/docs/site"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 5

  # ── npm: src/mcp-server (@orchestkit/mcp-server) ────────────────────
  - package-ecosystem: "npm"
    directory: "/src/mcp-server"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 5

  # ── npm: orchestkit-demos (Remotion render tree, used by release-video.yml) ──
  # Tracked tree the npm-audit gate intentionally does NOT cover (gating a
  # demos/render tree would add queue-wedging surface), but it still needs
  # freshness — it carried a live high `ws` advisory that Dependabot's security
  # updates could not auto-resolve (transitive ws is exact-pinned by remotion;
  # the fix needs an `overrides` entry).
  - package-ecosystem: "npm"
    directory: "/orchestkit-demos"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      # Remotion is split OUT of the minor-patch bundle. #3086: a remotion
      # 4.0.484 -> 4.0.489 *patch* removed a Config API and, buried in a
      # 21-package group PR, shipped invisibly and broke 27 releases. Remotion
      # does not follow semver for its config/CLI surface, so even its patch
      # bumps need to arrive as their own reviewable PR (now also gated by
      # demos-validate.yml).
      remotion:
        patterns:
          - "remotion"
          - "@remotion/*"
      npm-minor-patch:
        exclude-patterns:
          - "remotion"
          - "@remotion/*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Remotion 4.x cannot build under TypeScript 7 (@remotion/bundler needs the
      # legacy ts.sys / ts.readConfigFile the Go rewrite dropped). #3099 pinned
      # this tree to ^6.0.3; without this ignore Dependabot re-proposes the TS 7
      # major every week and each maintainer rediscovers the break. Revisit when
      # Remotion ships TS 7 support.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 5
