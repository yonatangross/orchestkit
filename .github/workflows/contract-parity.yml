# Generated by OrchestKit Claude Plugin
# Created: 2026-05-19

name: contract-parity

on:
  push:
    branches: [main]
    paths:
      - "spec/hook-events.spec.yml"
      - "packages/hook-contract/**"
      - "packages/hook-contract-py/**"
      - "scripts/parity-check.py"
      - ".github/workflows/contract-parity.yml"
  pull_request:
    paths:
      - "spec/hook-events.spec.yml"
      - "packages/hook-contract/**"
      - "packages/hook-contract-py/**"
      - "scripts/parity-check.py"
      - ".github/workflows/contract-parity.yml"
  workflow_dispatch:

# Default-deny: jobs that need writes override at job level.
permissions:
  contents: read

jobs:
  parity:
    name: npm ↔ PyPI schema parity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: packages/hook-contract-py/pyproject.toml

      - name: Install npm workspace deps
        run: npm ci --workspaces --include-workspace-root --no-audit --no-fund

      - name: Build npm package
        # The per-side drift gate runs as `prebuild` in package.json, so this
        # also asserts the npm-side spec→emit is faithful before the parity
        # check sees it.
        working-directory: packages/hook-contract
        run: npm run build

      - name: Install PyPI package (with dev deps)
        working-directory: packages/hook-contract-py
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: PyPI-side codegen drift gate
        # Same check the dedicated hook-contract-py.yml workflow runs, but
        # we re-run it here to fail fast on this workflow if the PyPI side
        # has drifted from the spec.
        working-directory: packages/hook-contract-py
        run: python scripts/codegen-py.py --check

      - name: Cross-language parity gate
        # Imports both sides, asserts event-name set equality and per-event
        # payload field-set + type-category equality. Fails CI on any drift.
        run: python scripts/parity-check.py
