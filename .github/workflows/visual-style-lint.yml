# Generated by OrchestKit Claude Plugin
# Created: 2026-05-22

# Visual-Style Lint
#
# Enforces src/rules/visual-style.md on PR titles and bodies. The
# commit-msg git hook already covers commit messages; this workflow
# closes the gate gap on PR-level surfaces.
#
# Rules enforced:
#   1. PR title: zero emoji of any kind (matches "no emoji in PR titles"
#      from visual-style.md per-surface rules)
#   2. PR body: only the 12-glyph closed vocabulary allowed; decorative
#      emoji blocked (closes the LLM echo-chamber risk)
#
# Bypass: visual-style-override label (use sparingly).

name: Visual-Style Lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Visual-Style PR Lint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Allow bot PRs and labeled overrides to proceed
        id: bot-check
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          HEAD_REF: ${{ github.head_ref }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$PR_LABELS" | grep -q '"visual-style-override"'; then
            echo "::notice::PR carries 'visual-style-override' label — skipping lint"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$PR_AUTHOR" == "orchestkit-release-bot[bot]" \
             || "$PR_AUTHOR" == "release-please[bot]" \
             || "$PR_AUTHOR" == "dependabot[bot]" \
             || "$PR_AUTHOR" == "github-actions[bot]" \
             || "$HEAD_REF" =~ ^(release-please|chore/cc-snapshot-|dependabot/) ]]; then
            echo "::notice::Bot PR — skipping lint (author=$PR_AUTHOR)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repo (for the shared validator)
        if: steps.bot-check.outputs.skip == 'false'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Check PR title for any emoji
        if: steps.bot-check.outputs.skip == 'false'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        # Single source of truth: the same validator the local pre-flight
        # (bin/check-pr-visual-style.sh) runs, so "clean locally" == "clean in
        # CI". --env avoids interpolating the title into the shell command.
        run: python3 bin/validate-visual-style.py --mode title --env PR_TITLE

      - name: Check PR body for non-vocabulary emoji
        if: steps.bot-check.outputs.skip == 'false'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python3 bin/validate-visual-style.py --mode body --env PR_BODY
