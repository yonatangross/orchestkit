# Generated by OrchestKit Claude Plugin
# Created: 2026-05-20

# memory-staleness.yml — nightly KG staleness sweep (closes orchestkit#1888)
#
# Calls plugins/ork/skills/memory/scripts/staleness_cron.py to scan the
# memory MCP knowledge graph for entries that haven't been touched in
# 30+ days. Writes the report to docs/reports/ and (in this repo) leaves
# it as a workflow artifact — operators decide whether to commit results
# back to main.
#
# HQ-only: requires yg-mcp-core>=0.3.0 from a private index +
# the YG_PYPI_INDEX_URL secret (the full authenticated --extra-index-url,
# so the host/username/scheme stay server-side, not in this public file) +
# memory MCP reachable from the runner. On forks without those, the
# script self-skips cleanly with WARN — the workflow still succeeds.

name: Memory KG staleness sweep

on:
  schedule:
    # 04:00 UTC nightly. Offset 2h from claude-health.yml (02:00 UTC)
    # so they don't both compete for runners + MCP at the same minute.
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      threshold_days:
        description: "Staleness cutoff (days)"
        type: number
        default: 30
      limit:
        description: "Max entries in report"
        type: number
        default: 50

permissions:
  contents: read

concurrency:
  group: memory-staleness
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.13"

      - name: Install yg-mcp-core (HQ-only — self-skips on forks)
        env:
          # Full authenticated private-index URL (https://<user>:<pw>@<host>/simple/)
          # kept entirely in one secret — no host/username/scheme in this public file.
          YG_PYPI_INDEX_URL: ${{ secrets.YG_PYPI_INDEX_URL }}
        run: |
          set -euo pipefail
          if [ -z "${YG_PYPI_INDEX_URL:-}" ]; then
            echo "::warning::YG_PYPI_INDEX_URL not set — yg-mcp-core won't install; sweep will self-skip with WARN."
            exit 0
          fi
          python -m pip install --upgrade pip
          python -m pip install \
            --extra-index-url "${YG_PYPI_INDEX_URL}" \
            "yg-mcp-core>=0.3.0"

      - name: Run staleness sweep
        env:
          THRESHOLD_DAYS: ${{ github.event.inputs.threshold_days || '30' }}
          LIMIT: ${{ github.event.inputs.limit || '50' }}
        run: |
          set -euo pipefail
          mkdir -p docs/reports
          python3 plugins/ork/skills/memory/scripts/staleness_cron.py \
            docs/reports \
            --threshold-days "$THRESHOLD_DAYS" \
            --limit "$LIMIT"

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: memory-staleness-${{ github.run_id }}
          path: docs/reports/memory-staleness-*.md
          if-no-files-found: ignore
          retention-days: 30
