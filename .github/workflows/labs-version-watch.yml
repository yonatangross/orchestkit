# Generated by OrchestKit Claude Plugin
# Created: 2026-04-27
# M125 #7: weekly Vercel Labs upstream version watcher.

name: Vercel Labs Version Watch
on:
  schedule:
    - cron: "0 8 * * 1"  # Monday 08:00 UTC
  workflow_dispatch:

# Default-deny at workflow level; writes scoped to the check-and-pr job.
permissions:
  contents: read

concurrency:
  group: labs-version-watch
  cancel-in-progress: false

jobs:
  check-and-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write       # push branch
      pull-requests: write  # gh pr create
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.3 # zizmor: ignore[artipacked] - persisted GITHUB_TOKEN is required for the git push in the Open PR step

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '20'

      - name: Detect drift
        id: detect
        run: |
          if node scripts/check-labs-versions.mjs --check; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply updates
        if: steps.detect.outputs.drift == 'true'
        run: node scripts/check-labs-versions.mjs --apply

      # Regenerate plugins/ so the committed twins match the bumped src/skills/
      # frontmatter. Without this the build-drift gate fails on the resulting PR.
      - name: Rebuild plugins
        if: steps.detect.outputs.drift == 'true'
        run: |
          npm ci
          npm run build

      - name: Build summary
        if: steps.detect.outputs.drift == 'true'
        id: summary
        run: |
          {
            echo 'body<<EOF'
            echo 'Auto-generated by `.github/workflows/labs-version-watch.yml` (M125 #7).'
            echo ''
            echo 'Bumped `upstream-version-tested:` frontmatter in skills that drifted from npm latest:'
            echo ''
            echo '```'
            git diff --stat src/skills/ || true
            echo '```'
            echo ''
            echo 'Body version mentions in skill content may need manual review — this PR only updates the frontmatter pin.'
            echo ''
            echo '## Interactive Playground'
            echo ''
            echo '**[Open Playground](https://htmlpreview.github.io/?https://github.com/yonatangross/orchestkit/blob/main/docs/playgrounds/vercel-labs-integration.html)** — see how the four packages compose.'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.detect.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ steps.summary.outputs.body }}
        run: |
          set -euo pipefail
          BRANCH="chore/labs-version-watch-$(date -u +%Y-%m-%d)"
          git config user.name "orchestkit-release-bot"
          git config user.email "orchestkit-release-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src/skills/ plugins/
          git commit -m "chore(labs): bump upstream-version-tested pins for drifted skills"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore(labs): weekly upstream pin sync" \
            --body "$PR_BODY" \
            --label "chore" \
            --label "vercel-labs" || true
