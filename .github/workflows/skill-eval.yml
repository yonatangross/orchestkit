# Generated by OrchestKit Claude Plugin
# Created: 2026-07-15

name: Skill Eval

# System B (eval:skill) PR wiring: when a PR touches skill sources, run the
# unified trigger+quality eval for exactly the changed skills. Failures FAIL
# the job — no continue-on-error. When Claude auth is unavailable in the run
# context (fork PR, or the repo secret unset), the job SKIPS LOUDLY via an
# explicit notice + step summary; it never fake-passes silently.

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'src/skills/**'
      - 'tests/evals/skills/**'

permissions: {}

concurrency:
  group: skill-eval-${{ github.ref }}
  cancel-in-progress: true

# Fork each subagent invocation per #1545 (CC 2.1.121+): fresh context per
# `claude -p` call, eliminating the cross-eval state leak that produced flaky
# scores. Same rationale as orchestkit-eval.yml. Older CC ignores the var.
env:
  CLAUDE_CODE_FORK_SUBAGENT: 1

jobs:
  eval-changed-skills:
    name: Eval changed skills
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Job-level OAuth token so `claude -p` reads it natively — the pattern
    # proven on runners by ci-sentinel.yml / claude-release-watch.yml
    # (Max-plan OAuth = $0 spend; ANTHROPIC_API_KEY env is NOT read by
    # `claude -p` in a fresh HOME, #1857). On fork PRs secrets are absent,
    # so this env resolves to '' and the skip path below fires.
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # run-skill-eval.sh --changed diffs against origin/main — full
          # history so the ref exists.
          fetch-depth: 0
          persist-credentials: false

      # LOUD SKIP — not a pass. Surfaces in the run log (notice annotation)
      # AND the job summary so a reviewer can see the changed skills were
      # never evaluated.
      - name: 'SKIPPED: no Claude auth in this run context'
        if: env.CLAUDE_CODE_OAUTH_TOKEN == ''
        run: |
          echo "::notice title=Skill eval SKIPPED — NOT a pass::CLAUDE_CODE_OAUTH_TOKEN is unavailable in this run context (fork PR, or repo secret unset). The changed skills in this PR were NOT evaluated. Maintainers: 'claude setup-token' then 'gh secret set CLAUDE_CODE_OAUTH_TOKEN -R ${GITHUB_REPOSITORY}', or re-run from a branch on this repo."
          {
            echo "## Skill eval SKIPPED (no Claude auth)"
            echo ""
            echo "CLAUDE_CODE_OAUTH_TOKEN is unavailable in this run context (fork PR, or the repo secret is unset)."
            echo "**The changed skills in this PR were NOT evaluated — this is a skip, not a pass.**"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Node
        if: env.CLAUDE_CODE_OAUTH_TOKEN != ''
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v6
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        if: env.CLAUDE_CODE_OAUTH_TOKEN != ''
        # Scorecard pinned-deps (npmCommand): accepted risk — npm has no
        # SHA-pin; --ignore-scripts mitigates the postinstall, then the native
        # binary install is re-run explicitly (same as orchestkit-eval.yml).
        # Pinned to the supported floor (shared/cc-support.json). The previous
        # pin was 58 releases BELOW the 2.1.206 floor and produced
        # systematically degraded `claude -p` eval generations on runners
        # (9-45% scores for content that scores 100% on a floor-compliant CLI).
        run: |
          set -euo pipefail
          npm install -g @anthropic-ai/claude-code@2.1.206 --ignore-scripts
          node "$(npm root -g)/@anthropic-ai/claude-code/install.cjs"
          claude --version

      # Telemetry fixture: .claude/logs/ is gitignored, so runners have no
      # spawn telemetry. Skills whose evals audit that stream (audit-activation)
      # would otherwise be evaluated in an environment their assertions
      # presuppose cannot exist — the generation degrades to static grep and
      # the eval measures the degraded path, not the contract. Seed a pinned
      # synthetic stream ONLY when the real one is absent (never overwrites).
      - name: Seed spawn-telemetry fixture (runners have no .claude/logs)
        if: env.CLAUDE_CODE_OAUTH_TOKEN != ''
        run: |
          set -euo pipefail
          if [ ! -f .claude/logs/subagent-spawns.jsonl ]; then
            mkdir -p .claude/logs
            cp tests/evals/fixtures/subagent-spawns.fixture.jsonl .claude/logs/subagent-spawns.jsonl
            echo "Seeded $(wc -l < .claude/logs/subagent-spawns.jsonl) fixture spawn records"
          fi

      # Failures FAIL the job: run-skill-eval.sh exits non-zero when any
      # changed skill fails its trigger or quality eval.
      # Exit 2 (#3032) means a generation produced no gradeable text, so no
      # score exists. That is an eval-infrastructure outage, not a skill
      # regression, and reporting it as a red skill check trains reviewers to
      # ignore a real red. Surfaced the same way as the missing-auth path
      # above: a LOUD SKIP, never a silent fake-pass. Any other non-zero
      # exit still fails the job.
      - name: Run eval:skill for changed skills
        if: env.CLAUDE_CODE_OAUTH_TOKEN != ''
        run: |
          set -uo pipefail
          rc=0
          npm run eval:skill -- --changed || rc=$?
          if [[ "$rc" -eq 2 ]]; then
            echo "::warning::Skill eval INCONCLUSIVE - a generation died (no gradeable text), so no score was published. Not a skill regression."
            {
              echo "### Skill Eval: INCONCLUSIVE"
              echo ""
              echo "A \`claude -p\` generation returned no gradeable text (crash, blank, or"
              echo "turn/budget exhaustion), so the harness refused to publish a score."
              echo "The changed skills were **not evaluated**. This is an infrastructure"
              echo "outage, not evidence about the skills. See #3032."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          exit "$rc"

      # On failure, surface the per-assertion grader reasons — without this
      # the job log shows only PASS/FAIL names, making CI-vs-local eval gaps
      # undiagnosable (the transcripts themselves are temp files, already gone).
      - name: Dump grader reasons on failure
        if: failure() && env.CLAUDE_CODE_OAUTH_TOKEN != ''
        run: |
          set -euo pipefail
          for f in tests/evals/results/skills/*.quality.json; do
            [ -f "$f" ] || continue
            echo "=== $f ==="
            cat "$f"
          done
