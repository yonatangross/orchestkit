# Generated by OrchestKit — #1554 (Closes-N drift, fix 3)
#
# Non-blocking hint: when a PR title references an issue number (#NNN) but the
# body carries no close keyword (closes/fixes/resolves #NNN), emit a ::warning::
# so the author can add it before merge. Catches the silent-drift class at the
# source without ever failing the build (impact 2, intentionally advisory).
#
# It deliberately does NOT fail: false positives (a PR that references an issue
# for context, not closure) are common, so this only nudges.

name: PR Body Lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  closes-hint:
    name: Closes-N Hint (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Warn when title references an issue but body has no close keyword
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          # Skip bots + automated branches (they manage their own bodies).
          if [[ "$PR_AUTHOR" == *"[bot]" \
             || "$HEAD_REF" =~ ^(release-please|chore/cc-snapshot-|dependabot/|renovate/) ]]; then
            echo "::notice::Skipping Closes-N hint for automated PR ($PR_AUTHOR / $HEAD_REF)"
            exit 0
          fi

          # Does the TITLE reference an issue number?
          if ! grep -qE '#[0-9]+' <<<"$PR_TITLE"; then
            echo "::notice::Title references no issue number — nothing to hint."
            exit 0
          fi

          # Does the BODY carry a close keyword + number? (GitHub's set, case-insensitive.)
          if grep -qiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)[[:space:]]+#[0-9]+' <<<"$PR_BODY"; then
            echo "::notice::Body has a close keyword — looks good."
            exit 0
          fi

          echo "::warning::PR title references an issue (#NNN) but the body has no \`Closes #N\`."
          echo "::warning::If this PR ships that issue's work, add \`Closes #N\` so it auto-closes on merge."
          echo "::warning::Multiple issues: repeat the keyword — \`Closes #1, closes #2\` (a bare list closes only #1)."
          # Advisory only — never fail the build.
          exit 0
