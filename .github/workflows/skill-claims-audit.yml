# Generated by OrchestKit Claude Plugin
# Created: 2026-07-18

# Weekly sweep for stale forward-looking claims in skill/agent prose.
# Finds "see #N for ..." / "pending #N" style references whose issues are
# already CLOSED, and maintains a single rolling report issue.
# Companion to check-docs-facts (counts) — this one covers narrative claims.
name: Skill Claims Audit

on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22

      - name: Run audit
        id: audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          node scripts/audit-skill-claims.mjs --json > /tmp/claims.json
          echo "stale=$(jq '.stale | length' /tmp/claims.json)" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Update or create report issue
        if: ${{ steps.audit.outputs.stale != '0' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="skill-claims audit: stale forward-looking issue references"
          BODY_FILE=/tmp/report.md
          {
            printf 'Weekly sweep found skill/agent prose describing CLOSED issues as pending. Fix the prose (state what shipped) rather than deleting the reference.\n\n'
            printf '```\n'
            jq -r '.stale[] | "\(.file):\(.line) -> #\(.refs | join(", #")): \(.excerpt)"' /tmp/claims.json
            printf '```\n\nGenerated by skill-claims-audit workflow.\n'
          } > "$BODY_FILE"
          EXISTING=$(gh issue list --state open --search "in:title skill-claims audit" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body-file "$BODY_FILE"
          else
            gh issue create --title "$TITLE" --label docs --body-file "$BODY_FILE"
          fi

      - name: Mark report issue clean
        if: ${{ steps.audit.outputs.stale == '0' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Repo convention: issues close via PR merge, never gh issue close.
          # A clean sweep just gets noted on the rolling report issue.
          EXISTING=$(gh issue list --state open --search "in:title skill-claims audit" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "Sweep is clean as of this run; safe to close via the next docs PR."
          fi
