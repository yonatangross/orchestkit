# Generated by OrchestKit Claude Plugin
# Created: 2026-02-14

name: Docs Site

on:
  push:
    branches: [main, dev]
    paths:
      - "src/skills/**"
      - "src/agents/**"
      - "src/hooks/hooks.json"
      - "docs/site/**"
  pull_request:
    branches: [main, dev]
    paths:
      - "src/skills/**"
      - "src/agents/**"
      - "src/hooks/hooks.json"
      - "docs/site/**"

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  validate:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/site/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Validate MDX frontmatter
        run: |
          shopt -s globstar
          errors=0
          for f in docs/site/content/docs/**/*.mdx; do
            if ! head -5 "$f" | grep -q "^title:"; then
              echo "Missing title: $f"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "$errors MDX files missing frontmatter"
            exit 1
          fi

  build:
    permissions:
      contents: read
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/site/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Install docs dependencies
        working-directory: docs/site
        # NPM_TOKEN is a repo secret restricted to main/dev branches (it grants
        # access to private @yonatan-hq GitHub Packages). PRs from feature
        # branches don't receive it — swap @yonatan-hq/analytics to the local
        # stub under docs/stubs/analytics-stub/ so the build still succeeds.
        # Production builds on main keep using the real package.
        run: |
          if [[ -z "${NPM_TOKEN:-}" ]]; then
            echo "::notice::NPM_TOKEN unavailable (PR branch) — swapping @yonatan-hq/analytics to local stub"
            npm pkg set 'dependencies.@yonatan-hq/analytics=file:../stubs/analytics-stub'
            rm -f package-lock.json
            npm install --no-audit --no-fund
          else
            npm ci
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Build docs site
        working-directory: docs/site
        run: npm run build
