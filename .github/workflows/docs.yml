# Generated by OrchestKit Claude Plugin
# Created: 2026-02-14

name: Docs Site

on:
  push:
    branches: [main, dev]
    paths:
      - "src/skills/**"
      - "src/agents/**"
      - "src/hooks/hooks.json"
      - "docs/site/**"
  pull_request:
    branches: [main, dev]
    paths:
      - "src/skills/**"
      - "src/agents/**"
      - "src/hooks/hooks.json"
      - "docs/site/**"

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  validate:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/site/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Check generated docs drift (reference mdx must match src/)
        run: |
          # npm run build (above) regenerates reference mdx from src/skills + src/agents
          # via scripts/build-docs.sh. If the committed mdx is stale, fail — mirrors the
          # plugins/ drift gate. Scoped to generated docs paths so hooks/dist timestamp
          # churn does not false-positive.
          if ! git diff --quiet -- docs/site/content/docs/reference docs/site/content/docs/skills/by-category; then
            echo "::error::Docs drift detected — generated reference mdx is stale on this branch."
            echo "Fix: run 'npm run build' and commit docs/site/content/docs/reference + docs/site/content/docs/skills/by-category."
            git diff --stat -- docs/site/content/docs/reference docs/site/content/docs/skills/by-category
            exit 1
          fi
          echo "✓ Generated reference docs are in sync with src/."
      - name: Validate MDX frontmatter
        run: |
          shopt -s globstar
          errors=0
          for f in docs/site/content/docs/**/*.mdx; do
            if ! head -5 "$f" | grep -q "^title:"; then
              echo "Missing title: $f"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "$errors MDX files missing frontmatter"
            exit 1
          fi

  build:
    name: Docs Site Build
    permissions:
      contents: read
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/site/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Install docs dependencies
        working-directory: docs/site
        shell: bash
        # NPM_TOKEN grants access to private @yonatan-hq GitHub Packages, so it is
        # gated to `push` events (env below, #2536) — NEVER present on a
        # pull_request run, fork OR same-repo. Previously same-repo PRs ran
        # PR-author code (npm ci + a postinstall) with the token live in env; that
        # exposure is now removed. On push to main/dev the token has full scope and
        # npm ci installs the real package; on every PR the token is '' → npm ci
        # hits 401 Unauthorized, which we detect and fall back to the local stub
        # under docs/stubs/analytics-stub/.
        #
        # Use PIPESTATUS to capture npm's real exit code — `npm ci | tee`
        # would otherwise return tee's exit (always 0), masking npm failures
        # and leaving an incomplete node_modules that breaks the build step.
        run: |
          set +e
          npm ci 2>&1 | tee /tmp/npm-ci.log
          npm_exit=${PIPESTATUS[0]}
          set -e

          if [[ $npm_exit -eq 0 ]]; then
            echo "::notice::@yonatan-hq/analytics installed from private registry"
            exit 0
          fi

          if grep -qE "401 Unauthorized|E401|unauthenticated" /tmp/npm-ci.log; then
            echo "::notice::npm ci hit 401 on @yonatan-hq/analytics (exit $npm_exit) — swapping to local stub and regenerating lockfile"
            # Deterministic fallback: swap the dep to the local file: stub, drop
            # the bumped lockfile, then regenerate with --package-lock-only.
            # Once analytics points at a file: path, no @yonatan-hq registry
            # lookups happen — so the .npmrc auth requirement no longer applies
            # and `npm install` succeeds without NPM_TOKEN. `--ignore-scripts`
            # skips the fumadocs-mdx postinstall (it would fail at the
            # lockfile-only stage with no node_modules yet).
            #
            # Replaces the legacy "cp package-lock.stub.json package-lock.json"
            # pattern, which trapped every dependabot bump because the
            # committed stub diverged whenever a dep version moved (#1630).
            npm pkg set 'dependencies.@yonatan-hq/analytics=file:../stubs/analytics-stub'
            rm -f package-lock.json
            npm install --no-audit --no-fund --package-lock-only --ignore-scripts
            npm ci --no-audit --no-fund
          else
            echo "::error::npm ci failed with exit $npm_exit for a reason other than auth. See log above."
            exit $npm_exit
          fi
        env:
          # Gated to `push` (#2536): NEVER present on a pull_request run, fork OR
          # same-repo. On PRs this resolves to '' → npm ci hits 401 → stub fallback.
          NPM_TOKEN: ${{ github.event_name == 'push' && secrets.NPM_TOKEN || '' }}
      - name: Build docs site
        working-directory: docs/site
        run: npm run build
