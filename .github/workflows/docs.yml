# Generated by OrchestKit Claude Plugin
# Created: 2026-02-14

name: Docs Site

on:
  push:
    branches: [main, dev]
    paths:
      - "src/skills/**"
      - "src/agents/**"
      - "src/hooks/hooks.json"
      - "docs/site/**"
  pull_request:
    branches: [main, dev]
    paths:
      - "src/skills/**"
      - "src/agents/**"
      - "src/hooks/hooks.json"
      - "docs/site/**"

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  validate:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/site/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Validate MDX frontmatter
        run: |
          shopt -s globstar
          errors=0
          for f in docs/site/content/docs/**/*.mdx; do
            if ! head -5 "$f" | grep -q "^title:"; then
              echo "Missing title: $f"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "$errors MDX files missing frontmatter"
            exit 1
          fi

  build:
    permissions:
      contents: read
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/site/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Install docs dependencies
        working-directory: docs/site
        # NPM_TOKEN grants access to private @yonatan-hq GitHub Packages. On
        # push to main/dev the token has full scope. On pull_request from
        # other branches the secret is substituted but with reduced scope —
        # npm ci hits 401 Unauthorized. Detect that specific failure and fall
        # back to the local stub under docs/stubs/analytics-stub/. Production
        # builds on main still use the real package (npm ci succeeds there).
        run: |
          if npm ci 2>&1 | tee /tmp/npm-ci.log; then
            echo "::notice::@yonatan-hq/analytics installed from private registry"
            exit 0
          fi
          if grep -qE "401 Unauthorized|E401|unauthenticated" /tmp/npm-ci.log; then
            echo "::notice::npm ci hit 401 on @yonatan-hq/analytics — swapping to local stub"
            npm pkg set 'dependencies.@yonatan-hq/analytics=file:../stubs/analytics-stub'
            rm -f package-lock.json
            npm install --no-audit --no-fund
          else
            echo "::error::npm ci failed for a reason other than auth. See log above."
            exit 1
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Build docs site
        working-directory: docs/site
        run: npm run build
