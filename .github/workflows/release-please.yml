# Release Please - Automated Versioning and Changelog
#
# This workflow automates:
# - Version bumps based on conventional commits
# - CHANGELOG.md generation
# - GitHub Release creation
#
# How it works:
# 1. On every push to main, release-please analyzes commits
# 2. It creates/updates a "Release PR" with version bump and changelog
# 3. When you merge the Release PR, it creates a GitHub Release + tag
#
# Configuration lives in:
# - .release-please-config.json (changelog sections, extra-files)
# - .release-please-manifest.json (current version)
# - version.txt (simple release type source of truth)
#
# Conventional Commits -> Version Bumps:
# - fix: -> patch (6.0.23 -> 6.0.24)
# - feat: -> minor (6.0.23 -> 6.1.0)
# - feat!: or BREAKING CHANGE -> major (6.0.23 -> 7.0.0)
#
# Reference: https://github.com/googleapis/release-please

name: Release

on:
  push:
    branches:
      - main
  # Weekly cron floor — prevents release drought when feat commits sit on main
  # without triggering a release-please PR update. Runs Mondays 09:00 UTC.
  # Release-please skips when there's nothing to release, so no empty PRs.
  # See #1451 / CONTRIBUTING.md "Release Cadence".
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions: read-all

jobs:
  release-please:
    # GITHUB_TOKEN is never used by this job — release-please-action authenticates
    # via the OrchestKit Release Bot App installation token (see app-token step).
    # An empty permissions block is the honest declaration of that.
    permissions: {}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Mint Release Bot token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}

      # CC 2.1.118 (M122 #1505): validate the plugin manifest hierarchy after
      # release-please opens its release PR. Catches drift between
      # marketplace.json / plugin.json / package.json / version.txt before
      # the release ships. --dry-run runs validation only — the actual tag
      # is created by release-please's GitHub Release step.
      #
      # Skipped if the runner doesn't have the `claude` CLI installed
      # (avoids hard-failing CI for older runner images).
      - name: Validate plugin tag (CC 2.1.118+)
        if: ${{ steps.release.outputs.release_created == 'true' }}
        continue-on-error: true
        run: |
          if command -v claude >/dev/null 2>&1; then
            claude plugin tag "${{ steps.release.outputs.version }}" --dry-run
          else
            echo "::notice::claude CLI not present on runner — skipping plugin tag validation"
          fi

  # NOTE: Version sync to manifests, pyproject.toml, and CLAUDE.md is handled
  # by release-please extra-files in .release-please-config.json.
  # The previous post-release job was removed because it failed on protected
  # branches (GH006: cannot push directly to main).
