# Generated by OrchestKit Claude Plugin
# Created: 2026-06-11

# Docker Smoke — PR-time build check for the Docs MCP image
#
# The image is built + pushed for real only at release time (release.yml
# publish-docker), and publish-mcp-registry fails closed behind it — so a
# broken Dockerfile would otherwise be DISCOVERED at tag time, blocking the
# registry publish. This smoke builds (no push) whenever the image inputs
# change, moving that discovery to the PR.

name: Docker Smoke

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'src/mcp-server/**'

permissions: {}

jobs:
  build:
    permissions:
      contents: read
    name: Docs MCP image builds
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Build image (no push)
        run: docker build -t orchestkit-docs-mcp-smoke .

      - name: Verify MCP ownership label matches server.json
        run: |
          LABEL="$(docker inspect orchestkit-docs-mcp-smoke --format '{{ index .Config.Labels "io.modelcontextprotocol.server.name" }}')"
          NAME="$(jq -r '.name' server.json)"
          if [ "$LABEL" != "$NAME" ]; then
            echo "::error::image label io.modelcontextprotocol.server.name ('$LABEL') != server.json name ('$NAME') — the MCP registry validates this pair at publish."
            exit 1
          fi
