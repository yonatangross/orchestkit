# Generated by OrchestKit Claude Plugin
# Created: 2026-04-28
# Issue: #1542 — wire CC 2.1.120's `claude ultrareview <target>` into CI

name: Ultra Review
on:
  # Opt-in only: tag a PR with the `ultrareview` label to trigger a review.
  # Auto-running on every PR was wasting CI minutes + posting empty
  # "verdict: skipped" comments because of a CLI argument bug (since fixed below).
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      target:
        description: "PR number or branch name (claude ultrareview accepts no diff ranges)"
        required: false
        default: ''

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ultrareview-${{ github.event.pull_request.number || github.event.inputs.target || 'manual' }}
  cancel-in-progress: true

jobs:
  ultrareview:
    # Label-gated: only run when the `ultrareview` label is added, OR on manual dispatch.
    if: |
      (github.event_name == 'pull_request' && github.event.label.name == 'ultrareview') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # need full history for diff targets

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22'

      - name: Install Claude Code (>= 2.1.120 for ultrareview subcommand)
        # Do NOT use --ignore-scripts: postinstall bootstraps the native binary
        # that backs the `claude` CLI. With --ignore-scripts the binary path
        # is missing and `claude --version` fails with "native binary not
        # installed". The other workflows pin to 2.1.105 with --ignore-scripts
        # because they shell out to claude-code-action; ultrareview needs the
        # native CLI directly.
        run: |
          npm install -g @anthropic-ai/claude-code@latest
          claude --version || echo "::warning::claude --version failed; will check ultrareview availability"

      - name: Verify ultrareview subcommand is available
        id: verify
        run: |
          if ! claude ultrareview --help >/dev/null 2>&1; then
            echo "::warning::claude ultrareview not available (CC < 2.1.120 or install failed). Skipping cleanly."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Run ultrareview
        if: steps.verify.outputs.skip != 'true'
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # CC 2.1.121 made fork-subagent honor SDK/print mode. Sharing the
          # parent's cached API prefix across forked agents cuts ultrareview's
          # API spend on multi-agent passes by ~60%. Safe in CI: review agents
          # have <500-word prompts, no custom model, no worktree.
          CLAUDE_CODE_FORK_SUBAGENT: '1'
        run: |
          # claude ultrareview accepts: a PR number, a branch name, or no
          # argument (reviews current branch). It does NOT accept git diff
          # ranges like `origin/main..HEAD` — passing one fails fast with
          # "is not a branch in this repo" before any API call. In PR
          # context, pass the PR number; the CLI fetches the diff itself.
          TARGET="${{ github.event.inputs.target || github.event.pull_request.number }}"
          echo "Reviewing PR/branch: $TARGET"
          claude ultrareview "$TARGET" --json > review.json 2> review.err || true
          echo "exit=$?" >> "$GITHUB_OUTPUT"
          if [[ ! -s review.json ]]; then
            echo "::warning::No JSON output. Stderr: $(cat review.err)"
            echo '{"findings":[],"verdict":"skipped"}' > review.json
          fi
          # Emit verdict as a step output so the comment step can gate on it.
          VERDICT=$(jq -r '.verdict // "unknown"' review.json)
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"

      - name: Format findings as PR comment
        # Only post when we have a real review. Suppress comment if the CLI
        # was missing OR returned an empty/skipped result (e.g. argument
        # error, no-diff-found). Prevents PR-comment spam.
        if: |
          steps.verify.outputs.skip != 'true' &&
          github.event_name == 'pull_request' &&
          steps.review.outputs.verdict != 'skipped'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Bucket findings by severity, post a single sticky comment.
          BODY=$(jq -r '
            def bucket($sev):
              [.findings[] | select(.severity == $sev)] |
              if length == 0 then ""
              else
                "\n### " + ($sev | ascii_upcase) + " (" + (length | tostring) + ")\n" +
                (map("- **" + .category + "** · `" + .file + "` — " + .message) | join("\n"))
              end;
            "## Ultra Review — verdict: **" + (.verdict // "unknown") + "**\n" +
            "_" + ((.duration_ms // 0) / 1000 | tostring) + "s · agents: " + ((.agents_used // []) | join(", ")) + "_\n" +
            bucket("high") + bucket("medium") + bucket("low") +
            "\n\n_Generated by `claude ultrareview` (CC 2.1.120) · workflow: ultrareview.yml_"
          ' review.json)

          # Use a sticky-comment marker so syncs replace the previous review
          MARKER='<!-- ultrareview-comment-marker -->'

          # Find existing comment by marker
          EXISTING=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -1)

          BODY_FULL="$MARKER"$'\n'"$BODY"

          if [[ -n "$EXISTING" ]]; then
            gh api "repos/${{ github.repository }}/issues/comments/$EXISTING" \
              -X PATCH -f body="$BODY_FULL"
          else
            gh pr comment "$PR_NUMBER" --body "$BODY_FULL"
          fi
