# Generated by OrchestKit Claude Plugin
# Created: 2026-05-19

# Publish orchestkit-hook-contract to PyPI (and TestPyPI as a stage).
#
# Triggered by tags matching `hook-contract-py/v<version>`.
# Example: hook-contract-py/v0.1.0
#
# Pipeline shape (M141, #1804 follow-up):
#   1. preflight  → tag-vs-pyproject version match + codegen drift check
#   2. build      → wheel + sdist via `python -m build` (hatchling)
#   3. test       → pytest on the built source tree
#   4. publish-testpypi → pypa/gh-action-pypi-publish to test.pypi.org
#   5. smoke-testpypi → fresh container, pip install from test.pypi.org,
#                       import + assert 19 events
#   6. publish-pypi    → same action to pypi.org (OIDC trusted publishing)
#   7. github-release  → gh release create with wheel + sdist + SHA256
#
# Pattern adapted from Yonatan-HQ/core/.github/workflows/publish-python.yml
# but simplified for a single public PyPI package:
#   • Public PyPI + OIDC trusted publishing (NOT private + basic-auth)
#   • ubuntu-latest runners (NOT self-hosted)
#   • hatchling + `python -m build` (NOT uv workspace)
#   • No SBOM yet (defer to a follow-up — sigstore + CycloneDX add
#     complexity without immediate value for an envelope-only contract pkg)
#
# Manual prerequisite (one-time, on pypi.org):
#   Add a Trusted Publisher entry for `orchestkit-hook-contract` pointing
#   at this repo + this workflow filename. See packages/hook-contract-py/
#   RELEASING.md for the exact steps.
#
# Recovery lever: `workflow_dispatch` with a `tag` input. If `git push`
# lands the tag on origin but the push event silently no-ops (a real
# bug observed in Yonatan-HQ/core #340), run the workflow manually
# with `tag=hook-contract-py/v0.1.0` to recover.

name: Publish orchestkit-hook-contract

on:
  push:
    tags:
      - "hook-contract-py/v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. hook-contract-py/v0.1.0)"
        required: true
        type: string

# Per-job permissions narrow what each step can do. publish-* need
# id-token: write for OIDC; github-release needs contents: write.
permissions:
  contents: read

concurrency:
  group: publish-hook-contract-py
  cancel-in-progress: false

jobs:
  preflight:
    name: Tag ↔ pyproject version match
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.parse.outputs.version }}
      tag: ${{ steps.parse.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Parse tag + assert pyproject version match
        id: parse
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG_REF="refs/tags/${{ inputs.tag }}"
          else
            TAG_REF="$GITHUB_REF"
          fi
          TAG="${TAG_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^hook-contract-py/v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.+]+)?$ ]]; then
            echo "::error::Tag '$TAG' must match hook-contract-py/v<semver>"
            exit 1
          fi
          VERSION="${TAG#hook-contract-py/v}"
          PY_VERSION=$(grep -E '^version = ' packages/hook-contract-py/pyproject.toml | head -1 | sed -E 's/version = "([^"]+)"/\1/')
          if [[ "$VERSION" != "$PY_VERSION" ]]; then
            echo "::error::Tag version $VERSION doesn't match pyproject.toml version $PY_VERSION"
            echo "::error::Fix: bump pyproject.toml first, then tag."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice::Preflight OK — releasing $TAG as version $VERSION"

      - name: Codegen drift gate
        # Same check the hook-contract-py.yml workflow runs on every PR.
        # Re-run here to refuse releases that contain hand-edited generated
        # files. Cheap insurance.
        working-directory: packages/hook-contract-py
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python scripts/codegen-py.py --check

  build:
    name: Build wheel + sdist
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build distributions
        working-directory: packages/hook-contract-py
        run: python -m build --outdir dist/

      - name: Sha256 + size summary
        working-directory: packages/hook-contract-py
        shell: bash
        run: |
          {
            echo "## Distributions"
            echo ""
            echo "| File | Size | SHA256 |"
            echo "|------|-----:|--------|"
            for f in dist/*; do
              size=$(wc -c < "$f")
              sha=$(shasum -a 256 "$f" | awk '{print $1}')
              echo "| $(basename "$f") | $size | \`$sha\` |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: packages/hook-contract-py/dist/*
          retention-days: 7

  test:
    name: pytest on built source
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install with dev deps
        working-directory: packages/hook-contract-py
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pytest
        working-directory: packages/hook-contract-py
        run: pytest -v --tb=short

  publish-testpypi:
    name: Publish to TestPyPI
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: testpypi
      url: https://test.pypi.org/project/orchestkit-hook-contract/
    permissions:
      id-token: write   # OIDC trusted publishing — no secret needed
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v6.0.0
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.13.0
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  smoke-testpypi:
    name: Smoke install from TestPyPI
    needs: [preflight, publish-testpypi]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Wait for TestPyPI propagation
        # TestPyPI's CDN sometimes lags 30-60s after publish. Poll until the
        # version is queryable rather than sleeping a magic number.
        shell: bash
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          for i in {1..12}; do
            if pip index versions \
                --index-url https://test.pypi.org/simple/ \
                --extra-index-url https://pypi.org/simple/ \
                orchestkit-hook-contract 2>/dev/null | grep -q "$VERSION"; then
              echo "Version $VERSION visible on TestPyPI after ${i}0s"
              exit 0
            fi
            sleep 10
          done
          echo "::warning::Version $VERSION not visible on TestPyPI after 120s — installing anyway, may fail"

      - name: Install from TestPyPI
        shell: bash
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "orchestkit-hook-contract==$VERSION"

      - name: Smoke import
        run: |
          python -c "
          from orchestkit_hook_contract import (
              HOOK_EVENT_NAMES,
              HookEvent,
              PreToolUsePayload,
              validate_hook_event,
              __version__,
          )
          assert len(HOOK_EVENT_NAMES) == 19, f'expected 19 events, got {len(HOOK_EVENT_NAMES)}'
          r = validate_hook_event({'event': 'PreToolUse'})
          assert r.valid, f'validate failed: {r}'
          p = PreToolUsePayload(tool_name='Bash', tool_input={'cmd': 'ls'})
          assert p.tool_name == 'Bash'
          print(f'OK — orchestkit-hook-contract v{__version__}, 19 events, typed payloads work')
          "

  publish-pypi:
    name: Publish to PyPI (production)
    needs: smoke-testpypi
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: pypi
      url: https://pypi.org/project/orchestkit-hook-contract/
    permissions:
      id-token: write   # OIDC trusted publishing — no secret needed
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v6.0.0
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.13.0
        # No repository-url override = default https://upload.pypi.org/legacy/

  github-release:
    name: GitHub Release with assets
    needs: [preflight, publish-pypi]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Required by `gh release create` below. This is the minimum scope;
    # all other jobs in this workflow run under the top-level `contents: read`.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v6.0.0
        with:
          name: dist
          path: dist/

      - name: Sha256 sums
        shell: bash
        run: cd dist && shasum -a 256 -- * > SHA256SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ needs.preflight.outputs.tag }}"
          VERSION="${{ needs.preflight.outputs.version }}"
          gh release create "$TAG" \
            dist/* \
            --title "orchestkit-hook-contract v$VERSION" \
            --notes "Published to [PyPI](https://pypi.org/project/orchestkit-hook-contract/$VERSION/).

          See [CHANGELOG](packages/hook-contract-py/CHANGELOG.md) for changes." \
            --verify-tag
