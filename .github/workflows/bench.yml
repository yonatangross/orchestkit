# Generated by OrchestKit Claude Plugin
# Created: 2026-05-12

name: Hook Benchmarks

# Vitest benchmark runner for hot-path hooks (see
# `src/hooks/src/__bench__/README.md`). Runs separately from the regular
# vitest suite so wall-clock perf noise never gates CI. This workflow is
# advisory by design — runner CPU/thermal jitter would otherwise produce
# false-positive merge blocks. Catastrophic regressions (>10x) remain
# visible in the surfaced Tinybench table for human review.

on:
  pull_request:
    paths:
      - 'src/hooks/**'
      - '.github/workflows/bench.yml'
  push:
    branches:
      - main
    paths:
      - 'src/hooks/**'
      - '.github/workflows/bench.yml'

permissions: {}

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    name: hook-throughput
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # justify: gating-relaxed https://github.com/yonatangross/orchestkit/issues/bench-rationale

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/hooks/package-lock.json

      - name: Install hook deps
        working-directory: src/hooks
        run: npm ci --no-audit --no-fund

      - name: Run benchmarks
        working-directory: src/hooks
        run: npm run bench

      - name: Upload bench results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: bench-results
          path: src/hooks/bench-results.json
          retention-days: 30
          if-no-files-found: ignore
