# Generated by OrchestKit Claude Plugin
# Created: 2026-07-23

# Auto-label sensitive PRs for review
#
# Claude PR Review had never run in the repo's history: its pull_request path
# gated on `needs-claude-review`, a label nobody had created, so the condition
# was permanently false and the workflow showed "skipped" on every PR (#3104).
#
# This adds that label when a PR changes paths where an unreviewed change is most
# dangerous — CI/gates, build and release scripts, security tests — which then
# fires claude-review.yml via its `labeled` trigger. Kept SEPARATE from the
# review workflow on purpose: folding detection into a `detect` job there put it
# under the review's cancel-in-progress concurrency group, and a burst of
# pull_request events (opened + the labeled events from `gh pr create --label`)
# cancelled every run so no review completed. This job is fast and idempotent
# (`gh pr edit --add-label` is a no-op if the label is present).

name: Auto-label sensitive PRs

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: auto-label-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    name: Label sensitive PRs for review
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
      pull-requests: write  # gh pr edit --add-label
    steps:
      - name: Add needs-claude-review when sensitive paths change
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          files=$(gh api "repos/${REPO}/pulls/${PR}/files" --paginate --jq '.[].filename')
          # Here-string, not `printf | grep -q`: under `set -o pipefail` a
          # producer piped into `grep -q` is SIGPIPE'd (exit 141) when grep
          # early-exits on a match, which pipefail then propagates and flips the
          # result non-deterministically. A here-string has no producer process.
          if grep -qE '^(\.github/workflows/|\.github/actions/|scripts/|bin/|tests/security/)' <<<"$files"; then
            echo "::notice::Sensitive paths changed — adding needs-claude-review."
            gh pr edit "$PR" --repo "$REPO" --add-label needs-claude-review
          else
            echo "::notice::No sensitive paths changed — review stays opt-in."
          fi
