# Generated by OrchestKit Claude Plugin
# Created: 2026-07-23

# Auto-label sensitive PRs for review
#
# Claude PR Review had never run in the repo's history: its pull_request path
# gated on `needs-claude-review`, a label nobody had created, so the condition
# was permanently false and the workflow showed "skipped" on every PR (#3104).
#
# This adds that label when a PR changes paths where an unreviewed change is most
# dangerous — CI/gates, build and release scripts, security tests — which then
# fires claude-review.yml via its `labeled` trigger.
#
# The label is applied with the Release Bot APP token, not GITHUB_TOKEN, on
# purpose: GitHub does not let events generated by GITHUB_TOKEN trigger other
# workflows (the anti-recursion rule), so a GITHUB_TOKEN-added label is applied
# but claude-review never fires from it. An App-token-added label does cascade.
#
# Kept SEPARATE from the review workflow: folding detection into a `detect` job
# there put it under the review's cancel-in-progress concurrency group, and a
# burst of pull_request events (opened + the labeled events from
# `gh pr create --label`) cancelled every run so no review completed.

name: Auto-label sensitive PRs

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: auto-label-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    name: Label sensitive PRs for review
    # Skip when the App-token secrets are unreachable:
    #  - fork PRs run with a read-only token and no secret access;
    #  - Dependabot PRs are isolated from repo secrets by GitHub, so the
    #    "Mint Release Bot token" step below cannot run and the job would fail
    #    (red) on every sensitive-path Dependabot PR rather than no-op.
    # These paths stay reviewable via an @claude comment from a maintainer, and
    # Dependabot PRs are already gated by the required checks (incl. Validate
    # Renderer) and the semver-major hold.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
      pull-requests: read  # read changed files with GITHUB_TOKEN
    steps:
      - name: Do sensitive paths change?
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          files=$(gh api "repos/${REPO}/pulls/${PR}/files" --paginate --jq '.[].filename')
          # Here-string, not `printf | grep -q`: under pipefail, grep -q's
          # early-exit SIGPIPEs the producer (exit 141) and flips the result
          # non-deterministically. A here-string has no producer process.
          if grep -qE '^(\.github/workflows/|\.github/actions/|scripts/|bin/|tests/security/)' <<<"$files"; then
            echo "sensitive=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No sensitive paths changed — review stays opt-in."
            echo "sensitive=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mint Release Bot token
        if: steps.detect.outputs.sensitive == 'true'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: orchestkit
          permission-pull-requests: write

      - name: Add needs-claude-review
        if: steps.detect.outputs.sensitive == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        # Idempotent: --add-label is a no-op when the label is already present,
        # so a re-run (or a synchronize after the label exists) adds no new event.
        run: |
          set -euo pipefail
          echo "::notice::Sensitive paths changed — adding needs-claude-review."
          gh pr edit "$PR" --repo "$REPO" --add-label needs-claude-review
