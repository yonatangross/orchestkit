# Generated by OrchestKit Claude Plugin

# Release Announce — draft social posts for a release via the HQ platform.
#
# On a published release (or manual dispatch), POST the release facts to the
# Yonatan-HQ platform marketing intake (POST /api/marketing/release-announce),
# which drafts per-channel posts for the GROWTH channels (Twitter/X, Dev.to,
# Hashnode, Substack, Threads). Drafts are HUMAN-GATED on the platform —
# nothing publishes from here.
#
# LinkedIn is deliberately NOT auto-drafted — it is a curated, hand-written
# channel. Instagram joins ANNOUNCE_CHANNELS once Meta Business Verification
# clears (needs instagram_content_publish).
#
# Cadence: minor/major (X.Y.0) releases only; patch bumps are skipped to keep
# the review queue clean. workflow_dispatch overrides for any version.
#
# Secrets (operator-provisioned; inert until both are set):
#   HQ_API_URL   - platform API base (e.g. https://<platform-api-host>)
#   HQ_API_TOKEN - platform API_STATIC_TOKEN (service-to-service bearer)

name: Release Announce

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to announce (e.g. 8.62.1)'
        required: true
        type: string
      dry_run:
        description: 'Compose the payload without posting'
        required: false
        type: boolean
        default: true

concurrency:
  group: release-announce-${{ github.event.release.tag_name || github.event.inputs.version }}
  cancel-in-progress: false

permissions: {}

env:
  NODE_VERSION: '22'

jobs:
  announce:
    name: Draft release announcement
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          # Full history so changelog-to-props.mjs can find the version section.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6  # zizmor: ignore[cache-poisoning] no deps installed, no cache restored
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Determine version + cadence
        id: meta
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          elif [ -n "$RELEASE_TAG" ]; then
            VERSION="${RELEASE_TAG#v}"
          else
            echo "ERROR: no version available"; exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Minor/major only on real releases; manual dispatch always proceeds.
          PATCH="${VERSION##*.}"
          if [ "$EVENT_NAME" = "release" ] && [ "$PATCH" != "0" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skipped (patch release)
        if: steps.meta.outputs.skip == 'true'
        run: |
          echo "### 📣 Release announce skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "Patch release \`${{ steps.meta.outputs.version }}\` — announcements fire on minor/major (X.Y.0) only." >> "$GITHUB_STEP_SUMMARY"

      - name: Announce (draft via platform marketing)
        if: steps.meta.outputs.skip == 'false'
        id: announce
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
          RELEASE_URL: ${{ github.event.release.html_url || format('https://github.com/{0}/releases/tag/v{1}', github.repository, steps.meta.outputs.version) }}
          RELEASE_NOTES: ${{ github.event.release.body }}
          REPO: ${{ github.repository }}
          # Growth channels only — LinkedIn is curated/hand-written (never auto).
          # Instagram joins once Meta Business Verification clears.
          ANNOUNCE_CHANNELS: twitter,devto,hashnode,substack,threads
          HQ_API_URL: ${{ secrets.HQ_API_URL }}
          HQ_API_TOKEN: ${{ secrets.HQ_API_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/announce-release.mjs
