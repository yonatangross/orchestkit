      #     HQ_API_URL: ${{ secrets.HQ_API_URL }}
      #     HQ_API_TOKEN: ${{ secrets.HQ_API_TOKEN }}
      #   run: |
      #     curl -s -X POST "$HQ_API_URL/ci/report" \
      #       -H "Authorization: Bearer $HQ_API_TOKEN" \
      #       -H "Content-Type: application/json" \
      #       -d @/tmp/health-report.json
