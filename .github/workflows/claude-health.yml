# Generated by OrchestKit Claude Plugin
# Created: 2026-03-06

name: Nightly Health Report
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: claude-health
  cancel-in-progress: false

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@2.1.90 --ignore-scripts

      - name: Run health assessment
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          claude -p "
          Run a comprehensive health assessment of this repository.
          Use the tools available to you (Bash with gh CLI, Read, Grep, Glob).

          Collect and report on:

          1. ISSUES: Count open issues by milestone. Flag milestones that are overdue.
             Command: gh issue list --state open --json milestone,labels --limit 200
          2. STALE PRs: PRs open > 3 days with no review activity.
             Command: gh pr list --state open --json number,title,createdAt,reviews
          3. CI HEALTH: Pass rate of last 10 CI runs on main.
             Command: gh run list --branch main --limit 10 --json conclusion
          4. DEPENDENCIES: Any npm audit vulnerabilities.
             Command: npm audit --json 2>/dev/null
          5. TEST COVERAGE: Count test files and estimate coverage from file structure.
          6. VERSION: Current version, last release date, commits since release.
          7. SKILL/AGENT COUNTS: Verify counts match CLAUDE.md declarations.

          Output as JSON with this schema:
          {
            \"timestamp\": \"ISO-8601\",
            \"version\": \"X.Y.Z\",
            \"overall_score\": 0-10,
            \"sections\": {
              \"issues\": { \"total_open\": N, \"overdue_milestones\": [], \"score\": 0-10 },
              \"pull_requests\": { \"open\": N, \"stale\": N, \"score\": 0-10 },
              \"ci_health\": { \"pass_rate\": \"X%%\", \"last_10\": [], \"score\": 0-10 },
              \"dependencies\": { \"vulnerabilities\": { \"critical\": N, \"high\": N, \"moderate\": N }, \"score\": 0-10 },
              \"tests\": { \"passed\": N, \"failed\": N, \"skipped\": N, \"score\": 0-10 },
              \"codebase\": { \"skills\": N, \"agents\": N, \"hooks\": N, \"counts_match\": true, \"score\": 0-10 }
            },
            \"recommendations\": []
          }
          " \
          --output-format json \
          --max-turns 10 \
          --model claude-sonnet-4-5-20250514 \
          --allowedTools "Read,Grep,Glob,Bash(npm audit:*),Bash(gh issue list:*),Bash(gh pr list:*),Bash(gh run list:*),Bash(cat:*),Bash(wc:*)" \
          > /tmp/health-report.json

      - name: Parse and display report
        run: |
          echo "## Nightly Health Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          node -e "
            const fs = require('fs');
            const raw = JSON.parse(fs.readFileSync('/tmp/health-report.json', 'utf8'));
            const report = JSON.parse(raw.result || '{}');
            if (report.overall_score !== undefined) {
              console.log('| Metric | Score |');
              console.log('|--------|-------|');
              console.log('| Overall | ' + report.overall_score + '/10 |');
              for (const [k, v] of Object.entries(report.sections || {})) {
                console.log('| ' + k + ' | ' + (v.score || 'N/A') + '/10 |');
              }
              if (report.recommendations) {
                console.log('');
                console.log('### Recommendations');
                report.recommendations.forEach(r => console.log('- ' + r));
              }
            } else {
              console.log('Report parsing failed. Raw output saved as artifact.');
            }
          " >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Report parsing failed" >> $GITHUB_STEP_SUMMARY

      - name: Upload raw report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: health-report-${{ github.run_number }}
          path: /tmp/health-report.json
          retention-days: 30

