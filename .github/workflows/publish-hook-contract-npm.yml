# Generated by OrchestKit Claude Plugin — M141 (#1806)
#
# Publish @orchestkit/hook-contract to npm.
#
# Twin of publish-hook-contract-py.yml (the PyPI side). Approach E from the
# brainstorm: the npm and PyPI packages ship in LOCKSTEP off a single
# spec/hook-events.spec.yml — one version number across both registries, so a
# consumer can reason about "@orchestkit/hook-contract@1.2.0 ⇔
# orchestkit-hook-contract==1.2.0 ⇔ spec v1.2.0".
#
# Triggered by tags matching `hook-contract-npm/v<version>`.
# Example: hook-contract-npm/v0.1.0
#
# Pipeline shape:
#   1. preflight  → tag ⇔ package.json ⇔ HOOK_CONTRACT_VERSION ⇔ pyproject
#                   PARITY (lockstep gate) + codegen drift check
#   2. build      → npm run build (esm+cjs+codegen) → npm pack → upload tarball
#   3. test       → vitest on the package
#   4. smoke-pack → install the packed tarball in a clean tree, import + assert
#                   19 events (the npm analog of the PyPI TestPyPI smoke stage;
#                   npm has no free staging registry, so pack+install is the
#                   pre-publish gate)
#   5. publish-npm → npm publish --provenance via OIDC trusted publishing
#   6. github-release → gh release create with the tarball + SHA256
#
# Manual prerequisite (one-time, on npmjs.com):
#   Configure a Trusted Publisher for @orchestkit/hook-contract pointing at this
#   repo + this workflow filename (Settings → Publishing access → Trusted
#   Publisher). OIDC then mints a short-lived token at publish time — no
#   long-lived NPM_TOKEN secret (which also avoids the gh-auth credential
#   shadowing NPM_TOKEN can cause). See packages/hook-contract/RELEASING.md.
#
# Recovery lever: `workflow_dispatch` with a `tag` input, mirroring the PyPI
# workflow — if a `git push --tags` lands the tag but the push event no-ops,
# run manually with tag=hook-contract-npm/v0.1.0.

name: Publish @orchestkit/hook-contract

on:
  push:
    tags:
      - "hook-contract-npm/v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. hook-contract-npm/v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-hook-contract-npm
  cancel-in-progress: false

jobs:
  preflight:
    name: Tag ↔ npm ↔ PyPI version parity (lockstep)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.parse.outputs.version }}
      tag: ${{ steps.parse.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"

      - name: Parse tag + assert lockstep version parity
        id: parse
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG_REF="refs/tags/${{ inputs.tag }}"
          else
            TAG_REF="$GITHUB_REF"
          fi
          TAG="${TAG_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^hook-contract-npm/v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.+]+)?$ ]]; then
            echo "::error::Tag '$TAG' must match hook-contract-npm/v<semver>"
            exit 1
          fi
          VERSION="${TAG#hook-contract-npm/v}"
          PKG_VERSION=$(jq -r .version packages/hook-contract/package.json)
          SRC_VERSION=$(grep -oE "HOOK_CONTRACT_VERSION = '[^']+'" packages/hook-contract/src/index.ts | sed -E "s/.*'([^']+)'.*/\1/")
          PY_VERSION=$(grep -E '^version = ' packages/hook-contract-py/pyproject.toml | head -1 | sed -E 's/version = "([^"]+)"/\1/')
          if [[ "$VERSION" != "$PKG_VERSION" ]]; then
            echo "::error::Tag version $VERSION != package.json version $PKG_VERSION. Fix: bump package.json first, then tag."
            exit 1
          fi
          if [[ "$PKG_VERSION" != "$SRC_VERSION" ]]; then
            echo "::error::package.json $PKG_VERSION != HOOK_CONTRACT_VERSION $SRC_VERSION (src/index.ts). Keep them in sync."
            exit 1
          fi
          if [[ "$PKG_VERSION" != "$PY_VERSION" ]]; then
            echo "::error::LOCKSTEP VIOLATION: npm $PKG_VERSION != PyPI $PY_VERSION (packages/hook-contract-py/pyproject.toml)."
            echo "::error::The contract ships as ONE version across both registries — bump both, then tag both hook-contract-npm/v$PKG_VERSION and hook-contract-py/v$PKG_VERSION."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice::Preflight OK — npm == PyPI == $VERSION; releasing $TAG"

      - name: Codegen drift gate
        # Refuse releases containing hand-edited generated files. Same check the
        # hook-contract.yml PR workflow runs; cheap insurance at release time.
        working-directory: packages/hook-contract
        run: |
          npm ci --workspaces --include-workspace-root --no-audit --no-fund
          npm run codegen:check

  build:
    name: Build + pack tarball
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"

      - name: Install workspace deps
        run: npm ci --workspaces --include-workspace-root --no-audit --no-fund

      - name: Build (esm + cjs + codegen)
        working-directory: packages/hook-contract
        run: npm run build

      - name: Pack tarball
        id: pack
        working-directory: packages/hook-contract
        shell: bash
        run: |
          set -euo pipefail
          TARBALL=$(npm pack --silent)
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          {
            echo "## Package tarball"
            echo ""
            echo "| File | Size | SHA256 |"
            echo "|------|-----:|--------|"
            size=$(wc -c < "$TARBALL")
            sha=$(shasum -a 256 "$TARBALL" | awk '{print $1}')
            echo "| $TARBALL | $size | \`$sha\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: npm-tarball
          path: packages/hook-contract/*.tgz
          retention-days: 7

  test:
    name: vitest
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"

      - name: Install workspace deps
        run: npm ci --workspaces --include-workspace-root --no-audit --no-fund

      - name: Run tests
        working-directory: packages/hook-contract
        run: npm test

  smoke-pack:
    name: Smoke install packed tarball
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v6.0.0
        with:
          name: npm-tarball
          path: tarball/

      - name: Install tarball into a clean project + import
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          tgz_files=(tarball/*.tgz)
          TGZ="${tgz_files[0]}"
          [[ -n "$TGZ" ]] || { echo "::error::no tarball artifact found in tarball/"; exit 1; }
          mkdir -p /tmp/smoke && cd /tmp/smoke
          npm init -y >/dev/null
          npm install "$GITHUB_WORKSPACE/$TGZ" --no-audit --no-fund
          node -e "
          import('@orchestkit/hook-contract').then((m) => {
            const n = m.HOOK_EVENT_NAMES.length;
            if (n !== 19) { console.error('expected 19 events, got ' + n); process.exit(1); }
            if (!m.HOOK_EVENT_NAMES.includes('PreToolUse')) { console.error('PreToolUse missing'); process.exit(1); }
            if (typeof m.validateHookEvent !== 'function') { console.error('validateHookEvent not exported'); process.exit(1); }
            console.log('OK — @orchestkit/hook-contract v' + m.HOOK_CONTRACT_VERSION + ', ' + n + ' events, validate exported');
          }).catch((e) => { console.error(e); process.exit(1); });
          "

  publish-npm:
    name: Publish to npm (production)
    needs: [preflight, test, smoke-pack]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: npm
      url: https://www.npmjs.com/package/@orchestkit/hook-contract
    permissions:
      id-token: write   # OIDC trusted publishing — no NPM_TOKEN secret
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports OIDC trusted publishing
        # Trusted publishing (OIDC) landed in npm 11.5.1; runners bundle npm 10.
        run: npm install -g npm@latest

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v6.0.0
        with:
          name: npm-tarball
          path: tarball/

      - name: Publish tarball with provenance
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          tgz_files=(tarball/*.tgz)
          TGZ="${tgz_files[0]}"
          [[ -n "$TGZ" ]] || { echo "::error::no tarball artifact found in tarball/"; exit 1; }
          # Absolute path: npm parses a bare `tarball/foo.tgz` as a
          # `github:owner/repo` spec (it ran `git ls-remote ssh://git@github.com/
          # tarball/...tgz.git` and failed Permission denied on the 0.1.1 release).
          # The `./`/absolute form forces file interpretation. Matches the smoke step.
          npm publish "$GITHUB_WORKSPACE/$TGZ" --provenance --access public

  github-release:
    name: GitHub Release with assets
    needs: [preflight, publish-npm]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v6.0.0
        with:
          name: npm-tarball
          path: dist/

      - name: Sha256 sums
        shell: bash
        run: cd dist && shasum -a 256 -- *.tgz > SHA256SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ needs.preflight.outputs.tag }}"
          VERSION="${{ needs.preflight.outputs.version }}"
          gh release create "$TAG" \
            dist/*.tgz dist/SHA256SUMS \
            --title "@orchestkit/hook-contract v$VERSION" \
            --notes "Published to [npm](https://www.npmjs.com/package/@orchestkit/hook-contract/v/$VERSION) with provenance.

          See [CHANGELOG](packages/hook-contract/CHANGELOG.md) for changes." \
            --verify-tag
