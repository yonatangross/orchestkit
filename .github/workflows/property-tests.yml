# Generated by OrchestKit Claude Plugin
# Created: 2026-04-25

name: Property Tests

# Property-based hook tests (#1452). Runs separately from the regular vitest
# suite because fast-check generates 200 inputs per assertion across 10 hooks
# — slower than the unit suite, fast enough for every PR.

on:
  pull_request:
    paths:
      - 'src/hooks/**'
      - '.github/workflows/property-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'src/hooks/**'
      - '.github/workflows/property-tests.yml'

permissions: {}

concurrency:
  group: property-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  property-tests:
    name: hook-input properties
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/hooks/package-lock.json

      - name: Install hook deps
        working-directory: src/hooks
        run: npm ci --no-audit --no-fund

      - name: Run property tests
        working-directory: src/hooks
        run: npm run test:property
