# Generated by OrchestKit Claude Plugin
# Created: 2026-07-11

# Prune merged PR-playground dirs off main into the playgrounds-archive branch.
#
# The PR Playground gate (ci.yml: playground-check) mandates a committed
# docs/<branch-slug>/*.html per PR. Those dirs merge to main and accumulate
# forever — 418 dead dirs / ~11MB built up 2026-03..2026-07 before the first
# sweep. This job moves dirs whose PR is already merged onto the orphan
# `playgrounds-archive` branch, then removes them from main.
#
# SAFETY: manual-dispatch only, dry-run by DEFAULT. It never auto-fires on a
# schedule (cross-branch mutation we cannot integration-test pre-merge stays
# operator-gated). Only touches docs/<type>--<slug>/ dirs whose branch is
# gone from origin; the KEEP set below is hard-excluded regardless.
name: Prune Playgrounds

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Actually move+remove (false = dry-run, just report)"
        type: boolean
        default: false
      older_than_days:
        description: "Only prune dirs whose branch was last touched > N days ago"
        type: string
        default: "30"

permissions:
  contents: read

concurrency:
  group: prune-playgrounds
  cancel-in-progress: false

jobs:
  prune:
    name: Prune merged playground dirs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # push archive branch + commit removal to main
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Identify prunable dirs
        id: scan
        env:
          OLDER_THAN_DAYS: ${{ inputs.older_than_days }}
        run: bash scripts/prune-playgrounds.sh scan

      - name: Apply (archive + remove)
        if: ${{ inputs.apply == true && steps.scan.outputs.count != '0' }}
        env:
          OLDER_THAN_DAYS: ${{ inputs.older_than_days }}
        run: bash scripts/prune-playgrounds.sh apply
