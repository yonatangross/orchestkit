# Generated by OrchestKit Claude Plugin
# Created: 2026-03-06

name: Claude Issue Triage
on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to triage"
        required: true
        type: string

permissions:
  contents: read
  issues: write
  id-token: write

concurrency:
  group: claude-triage-${{ github.event.issue.number || github.event.inputs.issue_number }}
  cancel-in-progress: true

jobs:
  triage:
    # Defense in depth. claude-code-action already fails closed for actors without
    # write access (its OIDC-to-app-token exchange 401s before the model runs, as it
    # did on 2026-07-22), but that leaves a red failed run on every outside-contributor
    # issue. This turns that into a clean skip and states the trust boundary in the
    # workflow instead of relying on the action's internal check.
    # workflow_dispatch already requires write access, and github.event.issue is null
    # there, so it needs its own disjunct.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
               github.event.issue.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: anthropics/claude-code-action@af0559ee4f514d1ef21826982bed13f7edc3c35e  # v1
        with:
          # Auth via the Max-plan OAuth token (CLAUDE_CODE_OAUTH_TOKEN) instead of
          # metered console credits — $0 spend. Rotate with `claude setup-token`
          # then `gh secret set CLAUDE_CODE_OAUTH_TOKEN` if a run 401s.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Triage this GitHub issue. Analyze the title and body, then:

            1. **Classify** the issue type: bug, feature, chore, docs, refactor, test, perf
            2. **Suggest labels** from the repo's existing label set (check with gh label list)
            3. **Recommend milestone** from active milestones (check with gh api repos/:owner/:repo/milestones)
               Only suggest a milestone if the issue clearly fits one.
            4. **Estimate complexity**: low (~1 hr), medium (~4 hrs), high (~8+ hrs)
            5. **Suggest priority**: P0 (critical), P1 (high), P2 (medium), P3 (low)
            6. **Draft a brief response** acknowledging the issue and suggesting next steps

            Format your triage as:

            ## Triage Summary

            | Field | Value |
            |-------|-------|
            | Type | bug/feature/chore/... |
            | Labels | `label1`, `label2` |
            | Milestone | M## Name / none |
            | Complexity | low/medium/high |
            | Priority | P0/P1/P2/P3 |

            ### Analysis
            [1-2 sentence analysis of what the issue is about]

            ### Suggested Next Steps
            [Concrete actionable steps]

            ---
            _Triaged by Claude Code CI. Labels and milestone are suggestions -- maintainer review recommended._

            IMPORTANT: Do NOT add labels or assign milestones automatically.
            Only suggest them in the comment. The maintainer will apply them.
          # Tool allowlist matches the convention already used by claude-health.yml.
          # The issue body is attacker-influenceable even when the author is trusted
          # (maintainers routinely paste external stack traces and user reports), and
          # the run carries a GITHUB_TOKEN with issues:write. The "do NOT apply labels"
          # instruction in the prompt above is advisory text that injected content can
          # override; this allowlist is the part that actually enforces it -- the two
          # read-only gh calls the prompt needs, and nothing that can mutate the repo.
          claude_args: >-
            --max-turns 3
            --model claude-haiku-4-5-20251001
            --allowedTools "Read,Grep,Glob,Bash(gh label list:*),Bash(gh api repos/:owner/:repo/milestones:*)"
