# Generated by OrchestKit Claude Plugin
# Created: 2026-03-06

name: Claude Issue Triage
on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to triage"
        required: true
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: claude-triage-${{ github.event.issue.number || github.event.inputs.issue_number }}
  cancel-in-progress: true

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: anthropics/claude-code-action@9469d113c6afd29550c402740f22d1a97dd1209b  # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Triage this GitHub issue. Analyze the title and body, then:

            1. **Classify** the issue type: bug, feature, chore, docs, refactor, test, perf
            2. **Suggest labels** from the repo's existing label set (check with gh label list)
            3. **Recommend milestone** from active milestones (check with gh api repos/:owner/:repo/milestones)
               Only suggest a milestone if the issue clearly fits one.
            4. **Estimate complexity**: low (~1 hr), medium (~4 hrs), high (~8+ hrs)
            5. **Suggest priority**: P0 (critical), P1 (high), P2 (medium), P3 (low)
            6. **Draft a brief response** acknowledging the issue and suggesting next steps

            Format your triage as:

            ## Triage Summary

            | Field | Value |
            |-------|-------|
            | Type | bug/feature/chore/... |
            | Labels | `label1`, `label2` |
            | Milestone | M## Name / none |
            | Complexity | low/medium/high |
            | Priority | P0/P1/P2/P3 |

            ### Analysis
            [1-2 sentence analysis of what the issue is about]

            ### Suggested Next Steps
            [Concrete actionable steps]

            ---
            _Triaged by Claude Code CI. Labels and milestone are suggestions -- maintainer review recommended._

            IMPORTANT: Do NOT add labels or assign milestones automatically.
            Only suggest them in the comment. The maintainer will apply them.
          claude_args: "--max-turns 3 --model claude-haiku-4-5-20251001"
