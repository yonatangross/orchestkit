# Generated by OrchestKit Claude Plugin
# Created: 2026-02-19

# Release — Create GitHub Release on tag push
#
# Triggers when a version tag (v*) is pushed.
# Extracts changelog notes and creates a GitHub Release.
#
# Manual workflow: push a tag via bin/create-release.sh
# Automated workflow: release-please creates tags on merge to main

name: Release (Tag)

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  create-release:
    # contents stays `read` on GITHUB_TOKEN — all release writes go through a
    # short-lived OrchestKit Release Bot installation token (see app-token step).
    # id-token + attestations must stay on GITHUB_TOKEN: the attest-build-
    # provenance action uses the workflow's OIDC identity, not the App.
    permissions:
      contents: read
      id-token: write
      attestations: write
    name: GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Mint Release Bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: orchestkit
          permission-contents: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract changelog notes
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          CHANGELOG_FILE="CHANGELOG.md"

          # Extract section between ## [version] and next ## [
          BODY=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") { found=1; next }
            }
            found && /^---$/ { next }
            found { print }
          ' "$CHANGELOG_FILE")

          # Trim leading/trailing whitespace
          BODY=$(echo "$BODY" | sed -e '/./,$!d' -e :a -e '/^\n*$/{$d;N;ba;}')

          if [ -z "$BODY" ]; then
            echo "::warning::No changelog entry found for $VERSION, using fallback"
            BODY="Release $TAG"
          fi

          # Write to file for multiline support
          echo "$BODY" > /tmp/release-notes.md

      # Only `gh release create` needs to be gated on "does the release already
      # exist" — you can't create a release twice. Everything else (SBOM, upload,
      # provenance) is idempotent (--clobber on upload, attestations are
      # append-only) and MUST run every time so the asset set is complete even
      # when release-please creates the GitHub Release first.
      - name: Check if release exists
        id: check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js for SBOM generation
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6  # zizmor: ignore[cache-poisoning] deps via npm ci, no cache restored
        with:
          node-version: '20'

      - name: Install production dependencies
        run: npm ci --ignore-scripts --production

      - name: Generate SBOM (CycloneDX)
        uses: CycloneDX/gh-node-module-generatebom@27e13c2bf0fae78d66387b35ca9749d8cc853060  # v1
        with:
          output: bom.json

      - name: Upload SBOM to release
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            bom.json#sbom-cyclonedx.json \
            --clobber
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: bom.json

  # Build + push the stdio Docs MCP image to GHCR on every release. The image
  # is the OCI package surface advertised in server.json (packages[0]), so it
  # MUST exist at the version tag before publish-mcp-registry runs — the MCP
  # registry validates the image and its io.modelcontextprotocol.server.name
  # label at publish time. Plain docker CLI on purpose: no third-party actions
  # to pin, GITHUB_TOKEN scoped to packages:write.
  publish-docker:
    permissions:
      contents: read
      packages: write
    name: Docs MCP Image (GHCR)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-tags: true
          persist-credentials: false

      - name: Build and push multi-arch image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER}/orchestkit-docs-mcp"
          echo "$GH_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          # arm64 emulation for cross-build (actionless binfmt; build is just
          # npm ci + esbuild so QEMU cost is trivial)
          docker run --privileged --rm tonistiigi/binfmt --install arm64
          docker buildx create --use
          # :latest only when this tag is the highest — re-running an old tag's
          # workflow (or a backport tag) must not move :latest backwards.
          HIGHEST="$(git tag -l 'v*' | sed 's/^v//' | sort -V | tail -1)"
          TAGS=(-t "$IMAGE:$VERSION")
          if [ "$VERSION" = "$HIGHEST" ]; then
            TAGS+=(-t "$IMAGE:latest")
          else
            echo "::notice::$VERSION is not the highest tag ($HIGHEST) — skipping :latest"
          fi
          docker buildx build --platform linux/amd64,linux/arm64 "${TAGS[@]}" --push .

  # Republish server.json to the official MCP registry on every release so the
  # registry version never drifts from the live site (orank scores the
  # registry<->site version sync). server.json's version field is bumped by
  # release-please (extra-files), so by tag time it always matches the tag.
  # Auth is GitHub OIDC: the io.github.yonatangross/* namespace trusts
  # workflows in yonatangross-owned repos — no long-lived secrets.
  # needs publish-docker: the OCI package in server.json is validated against
  # GHCR at publish time, so the image tag must exist first.
  publish-mcp-registry:
    needs: publish-docker
    permissions:
      contents: read
      id-token: write
    name: MCP Registry Publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Verify server.json matches tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          SERVER_VERSION="$(jq -r '.version' server.json)"
          if [ "$SERVER_VERSION" != "$VERSION" ]; then
            echo "::error::server.json version ($SERVER_VERSION) != tag ($VERSION). release-please should have bumped it — refusing to publish a stale version to the registry."
            exit 1
          fi

      # The registry's OCI validator requires the canonical tagged-reference
      # format: the tag lives INSIDE identifier (ghcr.io/...:X.Y.Z) and the
      # registryBaseUrl/version fields are rejected ("old format"). release-please
      # cannot bump a substring, so the repo keeps identifier untagged and the
      # tag is stamped here from the release tag — single source of truth.
      - name: Stamp OCI identifier with release tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          IDENTIFIER="$(jq -r '.packages[0].identifier // empty' server.json)"
          if [ -z "$IDENTIFIER" ]; then
            echo "::notice::no packages[0] in server.json — publishing remotes only"
            exit 0
          fi
          case "$IDENTIFIER" in
            *:*) echo "::error::packages[0].identifier ($IDENTIFIER) already carries a tag — the repo copy must stay untagged (tests/manifests/test-server-json.sh enforces this)."; exit 1 ;;
          esac
          jq --arg v "$VERSION" '.packages[0].identifier += ":" + $v' server.json > server.json.tmp
          mv server.json.tmp server.json
          echo "stamped: $(jq -r '.packages[0].identifier' server.json)"

      # Fail fast with an actionable message instead of an opaque registry
      # error. The registry validates the OCI image by ANONYMOUS pull — a
      # first-ever push creates the GHCR package PRIVATE (no API exists to
      # flip visibility; it is web-UI only), so this preflight tells the
      # operator exactly what to do, and "re-run failed jobs" recovers
      # without a new tag.
      - name: Preflight - image anonymously pullable
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          IDENTIFIER="$(jq -r '.packages[0].identifier // empty' server.json)"
          [ -z "$IDENTIFIER" ] && exit 0
          REPO_PATH="${IDENTIFIER#ghcr.io/}"; REPO_PATH="${REPO_PATH%%:*}"
          TOKEN="$(curl -fsSL "https://ghcr.io/token?scope=repository:${REPO_PATH}:pull" | jq -r .token)"
          if ! curl -fsSL -o /dev/null \
               -H "Authorization: Bearer $TOKEN" \
               -H "Accept: application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.docker.distribution.manifest.v2+json" \
               "https://ghcr.io/v2/${REPO_PATH}/manifests/${VERSION}"; then
            echo "::error::ghcr.io/${REPO_PATH}:${VERSION} is not anonymously pullable. If this is the first release, the package was created PRIVATE — flip it to Public in the GHCR package settings (web UI; no API exists), then re-run this job. No new tag needed."
            exit 1
          fi

      - name: Install mcp-publisher (pinned)
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz" -o mcp-publisher.tar.gz
          echo "ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac  mcp-publisher.tar.gz" | sha256sum -c -
          tar -xzf mcp-publisher.tar.gz mcp-publisher
          sudo install mcp-publisher /usr/local/bin/mcp-publisher
          rm mcp-publisher.tar.gz mcp-publisher

      - name: Publish to MCP registry
        run: |
          mcp-publisher login github-oidc
          mcp-publisher publish
