# Generated by OrchestKit Claude Plugin
# Created: 2026-04-12

name: CC Release Watch

on:
  schedule:
    # Check every 6 hours for new Claude Code releases
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check-release:
    name: Check for new CC release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: |
            src/hooks/src/lib/cc-version-matrix.ts
            CLAUDE.md

      - name: Get latest CC version from GitHub
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh api repos/anthropics/claude-code/releases/latest --jq '.tag_name' 2>/dev/null | sed 's/^v//')
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest CC release: $LATEST"

      - name: Get our tracked version
        id: tracked
        run: |
          # Last version in the matrix = our latest tracked
          TRACKED=$(grep "minVersion:" src/hooks/src/lib/cc-version-matrix.ts | tail -1 | grep -oE "'[0-9.]+'" | tr -d "'")
          echo "version=$TRACKED" >> "$GITHUB_OUTPUT"
          echo "Our tracked version: $TRACKED"

      - name: Compare versions
        id: compare
        run: |
          LATEST="${{ steps.latest.outputs.version }}"
          TRACKED="${{ steps.tracked.outputs.version }}"

          if [ -z "$LATEST" ] || [ -z "$TRACKED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Could not determine versions"
            exit 0
          fi

          # Compare semver
          IFS='.' read -ra L <<< "$LATEST"
          IFS='.' read -ra T <<< "$TRACKED"

          LATEST_NUM=$((${L[0]:-0} * 10000 + ${L[1]:-0} * 100 + ${L[2]:-0}))
          TRACKED_NUM=$((${T[0]:-0} * 10000 + ${T[1]:-0} * 100 + ${T[2]:-0}))

          if [ "$LATEST_NUM" -gt "$TRACKED_NUM" ]; then
            echo "new=true" >> "$GITHUB_OUTPUT"
            echo "New CC release detected: $LATEST (we track $TRACKED)"
          else
            echo "new=false" >> "$GITHUB_OUTPUT"
            echo "Up to date: $LATEST = $TRACKED"
          fi

      - name: Get release notes
        if: steps.compare.outputs.new == 'true'
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.latest.outputs.version }}"
          BODY=$(gh api "repos/anthropics/claude-code/releases/tags/v${VERSION}" --jq '.body // "No release notes"' 2>/dev/null | head -50)

          # Count features vs fixes
          FEATURES=$(echo "$BODY" | grep -ciE "^- Added|^- Improved" || echo 0)
          FIXES=$(echo "$BODY" | grep -ciE "^- Fixed" || echo 0)
          SECURITY=$(echo "$BODY" | grep -ciE "security|injection|vuln|CVE" || echo 0)

          echo "features=$FEATURES" >> "$GITHUB_OUTPUT"
          echo "fixes=$FIXES" >> "$GITHUB_OUTPUT"
          echo "security=$SECURITY" >> "$GITHUB_OUTPUT"

          # Determine priority
          if [ "$SECURITY" -gt 0 ]; then
            echo "priority=critical" >> "$GITHUB_OUTPUT"
          elif [ "$FEATURES" -gt 5 ]; then
            echo "priority=high" >> "$GITHUB_OUTPUT"
          else
            echo "priority=medium" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if issue already exists
        if: steps.compare.outputs.new == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.latest.outputs.version }}"
          EXISTING=$(gh issue list --search "CC $VERSION adoption" --json number --jq 'length')
          echo "exists=$([[ $EXISTING -gt 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Create adoption issue
        if: steps.compare.outputs.new == 'true' && steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.latest.outputs.version }}
          TRACKED: ${{ steps.tracked.outputs.version }}
          FEATURES: ${{ steps.notes.outputs.features }}
          FIXES: ${{ steps.notes.outputs.fixes }}
          SECURITY: ${{ steps.notes.outputs.security }}
          PRIORITY: ${{ steps.notes.outputs.priority }}
        run: |
          LABEL="enhancement"
          if [ "$PRIORITY" = "critical" ]; then
            LABEL="enhancement,priority:critical,security"
          elif [ "$PRIORITY" = "high" ]; then
            LABEL="enhancement,priority:high"
          fi

          gh issue create \
            --title "feat(compat): CC ${VERSION} adoption — ${FEATURES} features, ${FIXES} fixes" \
            --label "$LABEL" \
            --body "## Auto-detected: Claude Code ${VERSION} released

**Current tracked:** ${TRACKED}
**New release:** ${VERSION}
**Features:** ${FEATURES} | **Fixes:** ${FIXES} | **Security:** ${SECURITY}
**Priority:** ${PRIORITY}

### Checklist

- [ ] Read release notes: \`gh api repos/anthropics/claude-code/releases/tags/v${VERSION} --jq .body\`
- [ ] Add entries to \`src/hooks/src/lib/cc-version-matrix.ts\`
- [ ] Update tests for new matrix entries
- [ ] Update skills that benefit from new features
- [ ] Update CLAUDE.md recommended version
- [ ] Update README badge
- [ ] Update hooks README
- [ ] Update version-compatibility.md
- [ ] Build, test, commit

### How to adopt

\`\`\`bash
/ork:brainstorm CC ${VERSION} adoption
\`\`\`

🤖 Auto-generated by CC Release Watch workflow"
