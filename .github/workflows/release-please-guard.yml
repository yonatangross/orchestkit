# Generated by OrchestKit Claude Plugin
# Created: 2026-05-22

# Release-Please Guard
#
# Blocks PRs from non-bot authors that modify files governed by release-please.
# release-please owns its extra-files exclusively — manual bumps in feature PRs
# desync its state machine and produce wrong major version bumps (e.g. 8.0.0 → 9.0.0
# on what should be a minor bump).
#
# Governance is two-tier: generic extra-files are blocked on ANY edit, while
# json extra-files with a jsonpath (e.g. manifests/ork.json $.version) are only
# blocked when the governed field itself changes — routine content edits like
# the hooks count in the manifest description pass without an override label.
#
# See feedback memory + PR #1946 fix for the incident this guards against.

name: Release-Please Guard

on:
  pull_request:
    # labeled/unlabeled: a `release-please-override` applied AFTER a failing run
    # must re-dispatch the guard so the stale red check clears — otherwise it
    # lingers red on the merge commit and reads like an admin bypass.
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  guard:
    name: Release-Please File Guard
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Allow bot PRs and labeled overrides to proceed
        id: bot-check
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          HEAD_REF: ${{ github.head_ref }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          # Override label: maintainers can apply `release-please-override` for
          # legitimate exceptions (drift fixes, config schema changes, etc.).
          if echo "$PR_LABELS" | grep -q '"release-please-override"'; then
            echo "::notice::PR carries 'release-please-override' label — skipping guard"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$PR_AUTHOR" == "orchestkit-release-bot[bot]" \
             || "$PR_AUTHOR" == "release-please[bot]" \
             || "$PR_AUTHOR" == "github-actions[bot]" \
             || "$HEAD_REF" =~ ^(release-please|chore/cc-snapshot-) ]]; then
            echo "::notice::Bot PR — skipping guard (author=$PR_AUTHOR, head=$HEAD_REF)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract governed file list from config
        if: steps.bot-check.outputs.skip == 'false'
        id: governed
        run: |
          # Two governance tiers:
          #  1. WHOLE-FILE: generic extra-files (inline x-release-please markers)
          #     plus the manifest, CHANGELOG.md, and version.txt — any edit is a
          #     violation because release-please owns arbitrary content in them.
          #  2. FIELD-LEVEL: json extra-files with a jsonpath — release-please
          #     owns ONLY that field (e.g. $.version in manifests/ork.json).
          #     Content edits (description counts, component lists) are routine
          #     and legitimate; only a change to the governed field violates.
          jq -r '
            (.packages[].["extra-files"] // []) | .[]
            | select(.type != "json" or (.jsonpath // "") == "") | .path
          ' .release-please-config.json > /tmp/governed.txt

          # Add release-please's other owned files
          {
            echo ".release-please-manifest.json"
            echo "CHANGELOG.md"
            echo "version.txt"
          } >> /tmp/governed.txt

          # Dedup and emit
          sort -u /tmp/governed.txt > /tmp/governed.sorted
          mv /tmp/governed.sorted /tmp/governed.txt

          # Field-level governed files: TAB-separated "path<TAB>jsonpath"
          jq -r '
            (.packages[].["extra-files"] // []) | .[]
            | select(.type == "json" and (.jsonpath // "") != "")
            | "\(.path)\t\(.jsonpath)"
          ' .release-please-config.json | sort -u > /tmp/governed-fields.txt

          echo "Whole-file governed:"
          cat /tmp/governed.txt
          echo "Field-level governed (path<TAB>jsonpath):"
          cat /tmp/governed-fields.txt

      - name: Diff PR against base
        if: steps.bot-check.outputs.skip == 'false'
        id: diff
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Fetch the FULL base history (not --depth=1): the three-dot diff below
          # needs a merge base, and a shallow single-commit base produces
          # "fatal: origin/<base>...HEAD: no merge base" for any PR forked before
          # that commit (recurring on stale/long-lived branches, e.g. held
          # Dependabot majors). checkout already uses fetch-depth: 0, so the repo
          # is complete and this fetch is cheap.
          git fetch origin "$BASE_REF"
          git diff --name-only "origin/$BASE_REF"...HEAD > /tmp/changed.txt
          echo "Changed files in PR:"
          cat /tmp/changed.txt

      - name: Fail if PR touches governed files
        if: steps.bot-check.outputs.skip == 'false'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Use grep -F -f to find lines from governed.txt present in changed.txt.
          # An empty match list = clean PR; any match = violation.
          violations=$(grep -F -x -f /tmp/governed.txt /tmp/changed.txt || true)

          # Field-level check: for json extra-files, a change is only a
          # violation if the governed jsonpath VALUE differs from the merge
          # base (i.e. the PR hand-bumps a release-please-owned field).
          # Non-version content edits (e.g. the hooks count in the
          # manifests/ork.json description) pass without an override label.
          merge_base=$(git merge-base "origin/$BASE_REF" HEAD)
          while IFS=$'\t' read -r path jsonpath; do
            [[ -z "$path" ]] && continue
            grep -F -x -q "$path" /tmp/changed.txt || continue
            # $.version -> .version (jq filter)
            jq_path="${jsonpath#$}"
            base_val=$(git show "$merge_base:$path" 2>/dev/null | jq -r "$jq_path" 2>/dev/null || echo "__ABSENT__")
            head_val=$(jq -r "$jq_path" "$path" 2>/dev/null || echo "__ABSENT__")
            if [[ "$base_val" != "__ABSENT__" && "$base_val" != "$head_val" ]]; then
              violations+="${violations:+$'\n'}$path (governed field $jsonpath: '$base_val' -> '$head_val')"
            else
              echo "::notice::$path changed but governed field $jsonpath is untouched ('$head_val') — allowed."
            fi
          done < /tmp/governed-fields.txt

          if [[ -n "$violations" ]]; then
            echo "::error::PR modifies files governed by release-please."
            echo "::error::These files are managed exclusively by the release bot;"
            echo "::error::hand-editing them desyncs release-please's state machine"
            echo "::error::and produces wrong version bumps (see PR #1946 incident)."
            echo ""
            echo "Violating files:"
            while IFS= read -r f; do echo "  - $f"; done <<< "$violations"
            echo ""
            echo "If you genuinely need to change one of these, revert the version"
            echo "bump from your branch and let release-please own the bump in its"
            echo "next release PR. For schema or content changes to governed files"
            echo "(not version bumps), open a separate PR labeled 'release-please-override'."
            exit 1
          fi

          echo "::notice::No governed-file violations."
