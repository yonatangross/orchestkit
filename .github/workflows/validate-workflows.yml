# Generated by OrchestKit Claude Plugin
# Created: 2026-05-02

# Lint .github/workflows/*.yml with actionlint to catch GHA-native bugs
# the regular YAML lint + per-workflow CI runs miss:
#   - `secrets` context used in step-level `if:` (not allowed)
#   - `cat <<HEREDOC` with body at column 1 breaking `run: |` block scalar
#   - deprecated action versions / event names / context fields
#   - broken `uses:` references
#
# Both bugs in the M130 cron-pipeline saga (PRs #1591..#1599) would have
# been caught here in 30 seconds.

name: Validate Workflows

on:
  pull_request:
    paths:
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'

permissions:
  contents: read

concurrency:
  group: validate-workflows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Download actionlint
        id: install
        run: |
          set -euo pipefail
          curl -sSfL \
            https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash \
            -o /tmp/download-actionlint.bash
          # Pin to a known release. Bump intentionally during dependency sweeps.
          bash /tmp/download-actionlint.bash 1.7.7
          ./actionlint -version

      - name: Run actionlint
        run: |
          set -euo pipefail
          # `-shellcheck=` (empty) disables shellcheck integration. The repo
          # has 69 info/style shellcheck findings across 12 workflows
          # (mostly SC2086 unquoted vars in GH expressions, harmless in
          # practice). Enabling shellcheck would block every PR until those
          # are hand-fixed. Re-enable later as a hardening step.
          ./actionlint -shellcheck= .github/workflows/*.yml
