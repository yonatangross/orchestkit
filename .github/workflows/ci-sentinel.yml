# Generated by OrchestKit Claude Plugin
# Created: 2026-05-17

name: CI Sentinel

# /ork:ci-sentinel v1 — hourly classifier for failing PRs.
#
# Behaviour (v1 = read-only, propose-don't-apply):
#   1. Hourly cron + manual dispatch
#   2. List own open PRs with at least one failing required check
#   3. For each: invoke `claude -p --bare` against the /ci-debug skill
#   4. Post the verdict as a PR comment (collapsed group, idempotent)
#   5. Append a row to .sentinel/ledger.jsonl (cost + classification)
#   6. Cost-ceiling circuit breaker: stop if daily token spend > budget
#
# v1 NEVER pushes a fix. It only proposes. v2 may earn write privileges
# for a narrow subset of patterns (lockfile drift, billing block, etc.)
# after a quarter of false-positive-free operation.

on:
  schedule:
    # Hourly at :17 to avoid colliding with everyone's :00 cron storm.
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      max_prs:
        description: "Cap on PRs analyzed this run"
        required: false
        default: "10"
      dry_run:
        description: "Skip comment posting"
        type: boolean
        required: false
        default: false

permissions:
  contents: read       # gh pr checks needs read on the repo
  pull-requests: write # gh pr comment needs write
  issues: write        # PR comments are technically issue comments

concurrency:
  group: ci-sentinel-${{ github.repository }}
  cancel-in-progress: false  # let stragglers finish; don't lose ledger writes

env:
  # Daily token ceiling. Sentinel pauses for the calendar day once exceeded.
  # Bumped 500k → 1M on 2026-05-18 after dropping `--bare` (full CC load
  # raises per-PR cost from ~4k to ~10k tokens). Hourly cron × 3 PRs × 10k
  # ≈ 720k/day, so 1M gives headroom for spike days. Cost projection:
  # ~$10-12/month per repo at Sonnet blended rates.
  ORK_SENTINEL_DAILY_TOKEN_BUDGET: "1000000"
  # Per-PR analysis timeout (wall clock). Sentinel skips a PR that times out.
  ORK_SENTINEL_PER_PR_TIMEOUT_S: "300"

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout (for the skill registry only)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code
        run: |
          # First dry-run on 2026-05-18 failed with
          # "claude: No such file or directory" — ubuntu-latest ships
          # without CC. Install once per run; ~5s cold from npm.
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Configure Claude apiKeyHelper
        # Critical (#1857 postmortem): `claude -p` does NOT authenticate
        # via ANTHROPIC_API_KEY env var alone in a fresh-HOME environment.
        # Verified locally on 2026-05-18 (CC 2.1.143) — empty HOME + env
        # var returns "Not logged in" even though --help says it should
        # work. The only documented path that DOES work in headless mode
        # is `apiKeyHelper` in `~/.claude/settings.json` — a shell command
        # whose stdout is the API key. Putting the actual key in a tiny
        # helper script keeps it out of settings.json (which CC may log).
        # See shared/rules/cc-bare-auth-gotcha.md and feedback memory
        # entry for the full reproducer.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set — add it under Settings → Secrets and variables → Actions"
            exit 1
          fi
          mkdir -p ~/.claude
          printf '#!/bin/sh\necho "$ANTHROPIC_API_KEY"\n' > ~/.claude/api-key-helper.sh
          chmod +x ~/.claude/api-key-helper.sh
          printf '{"apiKeyHelper":"%s/.claude/api-key-helper.sh"}\n' "$HOME" > ~/.claude/settings.json
          # Smoke test: confirm auth actually works before we burn budget
          # on N failed PR analyses. Fails the job loudly if auth is broken.
          smoke=$(claude -p --max-turns 1 --output-format json --no-session-persistence \
            "respond with the single word OK" 2>&1)
          if echo "$smoke" | jq -e '.is_error == true' >/dev/null 2>&1; then
            echo "::error::Auth smoke test failed: $(echo "$smoke" | jq -r '.result // "<no result>"' | head -c 200)"
            exit 1
          fi
          echo "Auth smoke test OK ($(echo "$smoke" | jq -r '.usage.total_tokens // 0') tokens)"

      - name: Resolve repo + auth context
        id: ctx
        run: |
          echo "owner=${GITHUB_REPOSITORY%/*}" >> "$GITHUB_OUTPUT"
          echo "repo=${GITHUB_REPOSITORY#*/}"  >> "$GITHUB_OUTPUT"
          echo "today=$(date -u +%Y-%m-%d)"    >> "$GITHUB_OUTPUT"

      - name: Load yesterday's ledger (if any)
        run: |
          mkdir -p .sentinel
          # Idempotent — empty file is fine.
          touch .sentinel/ledger.jsonl
          today_tokens=$(awk -v d="${{ steps.ctx.outputs.today }}" -F'"' '
            $0 ~ d { for (i=1; i<=NF; i++) if ($i == "tokens") { sum += $(i+2) } }
            END { print (sum ? sum : 0) }
          ' .sentinel/ledger.jsonl)
          echo "Today's tokens used so far: ${today_tokens}"
          if [ "${today_tokens}" -gt "${ORK_SENTINEL_DAILY_TOKEN_BUDGET}" ]; then
            echo "::warning::Daily budget exceeded (${today_tokens} > ${ORK_SENTINEL_DAILY_TOKEN_BUDGET}). Skipping sweep."
            exit 0
          fi

      - name: List failing PRs
        id: prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MAX="${{ inputs.max_prs }}"
          MAX="${MAX:-10}"

          # Open PRs that have at least one failing required check.
          # We filter further per-PR in the analyze step (some failures are
          # in non-required checks we don't care about).
          gh pr list \
            --repo "${{ steps.ctx.outputs.owner }}/${{ steps.ctx.outputs.repo }}" \
            --state open \
            --limit 50 \
            --json number,headRefOid,statusCheckRollup,author \
            --jq "
              [ .[]
                | select(.statusCheckRollup
                    | map(.conclusion // \"\")
                    | any(. == \"FAILURE\"))
                | { number, sha: .headRefOid[0:9], login: .author.login }
              ]
              | .[0:${MAX}]
            " > .sentinel/queue.json

          count=$(jq 'length' .sentinel/queue.json)
          echo "queue_count=${count}" >> "$GITHUB_OUTPUT"
          echo "Found ${count} PR(s) with failing checks"

      - name: Analyze each failing PR
        if: steps.prs.outputs.queue_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -uo pipefail

          # Marker the sentinel uses to recognize its own comments (for
          # idempotent updating — never duplicate verdicts on the same SHA).
          MARKER_PREFIX="<!-- ork:ci-sentinel"

          while IFS= read -r row; do
            number=$(echo "$row" | jq -r '.number')
            sha=$(echo "$row" | jq -r '.sha')

            echo "─── PR #${number} (head ${sha}) ─────────────────────────"

            # Skip if we already commented on this exact SHA (idempotent).
            existing=$(gh pr view "$number" \
              --repo "${{ steps.ctx.outputs.owner }}/${{ steps.ctx.outputs.repo }}" \
              --json comments \
              --jq "[ .comments[]
                       | select(.body | startswith(\"${MARKER_PREFIX} sha=${sha}\"))
                     ] | length")
            if [ "$existing" -gt 0 ]; then
              echo "  ↪ already analyzed at this SHA — skipping"
              continue
            fi

            # Run /ci-debug headless.
            #
            # Originally used `--bare` (CC 2.1.81+) for minimal plugin/hook load,
            # but verified locally on 2026-05-18 that `--bare` doesn't actually
            # honor ANTHROPIC_API_KEY (returns "Not logged in" regardless of
            # env var or --settings.apiKey/apiKeyHelper). Dropped --bare;
            # cost goes from ~4k to ~10k tokens per PR but the workflow actually
            # authenticates. Documented the trade-off in SKILL.md.
            #
            # M146-6 (#1849): explicit --permission-mode locks the dispatch
            # envelope. The skill is read-only by design (no edits), so
            # `dontAsk` is the right tradeoff. `--effort` removed alongside
            # --bare — it's a session config that needs the full CC load to
            # take effect and is duplicated by --max-turns 4 for our use case.
            tmpdir="$(mktemp -d)"
            timeout "${ORK_SENTINEL_PER_PR_TIMEOUT_S}s" \
              claude -p \
                --permission-mode dontAsk \
                --max-turns 4 \
                --output-format json \
                --no-session-persistence \
                "Run /ci-debug on PR ${number} in repo ${{ steps.ctx.outputs.owner }}/${{ steps.ctx.outputs.repo }}. Use only the gh CLI. Output the report markdown only — no preamble." \
              > "${tmpdir}/verdict.json" 2> "${tmpdir}/err.log" \
              || { echo "::warning::claude run failed for #${number}, see error log"; cat "${tmpdir}/err.log"; continue; }

            verdict_md=$(jq -r '.content // ""' "${tmpdir}/verdict.json")
            tokens=$(jq -r '.usage.total_tokens // 0' "${tmpdir}/verdict.json")

            if [ -z "$verdict_md" ]; then
              echo "  ↪ empty verdict — skipping comment"
              continue
            fi

            # Wrap in the marker so the next run can detect duplicates.
            body=$(printf '%s sha=%s -->\n\n<details><summary>🛰️ <b>CI Sentinel verdict</b> (sha %s)</summary>\n\n%s\n\n</details>\n' \
              "$MARKER_PREFIX" "$sha" "$sha" "$verdict_md")

            if [ "${DRY_RUN:-false}" = "true" ]; then
              echo "  ↪ DRY_RUN — skipping comment, would post:"
              echo "$body" | sed 's/^/    /'
            else
              echo "$body" | gh pr comment "$number" \
                --repo "${{ steps.ctx.outputs.owner }}/${{ steps.ctx.outputs.repo }}" \
                --body-file -
              echo "  ↪ comment posted"
            fi

            # Ledger row
            jq -n \
              --arg ts "$(date -u -Iseconds)" \
              --arg pr "$number" \
              --arg sha "$sha" \
              --arg tokens "$tokens" \
              '{ts: $ts, pr: ($pr|tonumber), sha: $sha, tokens: ($tokens|tonumber)}' \
              >> .sentinel/ledger.jsonl

          done < <(jq -c '.[]' .sentinel/queue.json)

      - name: Surface daily ledger as job summary
        if: always()
        run: |
          {
            echo "## 🛰️ CI Sentinel — $(date -u +%Y-%m-%d) ${{ steps.ctx.outputs.today }}"
            echo ""
            count=$(jq 'length' .sentinel/queue.json 2>/dev/null || echo 0)
            echo "**PRs scanned this run:** ${count}"
            echo ""
            if [ -s .sentinel/ledger.jsonl ]; then
              today_tokens=$(awk -v d="${{ steps.ctx.outputs.today }}" -F'"' '
                $0 ~ d { for (i=1; i<=NF; i++) if ($i == "tokens") { sum += $(i+2) } }
                END { print (sum ? sum : 0) }
              ' .sentinel/ledger.jsonl)
              echo "**Tokens used today:** ${today_tokens} / ${ORK_SENTINEL_DAILY_TOKEN_BUDGET}"
              echo ""
              echo "### Recent rows"
              echo '```'
              tail -10 .sentinel/ledger.jsonl
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
