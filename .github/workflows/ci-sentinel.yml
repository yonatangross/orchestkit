# Generated by OrchestKit Claude Plugin
# Created: 2026-05-17

name: CI Sentinel

# /ork:ci-sentinel v1 — daily classifier for failing PRs.
#
# Behaviour (v1 = read-only, propose-don't-apply):
#   1. Daily cron + manual dispatch
#   2. List own open PRs with at least one failing required check
#   3. For each: invoke `claude -p --bare` against the /ci-debug skill
#   4. Post the verdict as a PR comment (collapsed group, idempotent)
#   5. Append a row to .sentinel/ledger.jsonl (cost + classification)
#   6. Cost-ceiling circuit breaker: stop if daily token spend > budget
#
# v1 NEVER pushes a fix. It only proposes. v2 may earn write privileges
# for a narrow subset of patterns (lockfile drift, billing block, etc.)
# after a quarter of false-positive-free operation.

on:
  schedule:
    # Daily at 08:17 UTC. Throttled from hourly (2026-07) alongside the
    # OAuth-token migration: the token is billed against the Max plan, and
    # an hourly sweep would draw on the same interactive quota. Daily keeps
    # red-PR diagnosis timely without eating that quota. `:17` minute offset
    # kept to dodge the top-of-hour cron storm.
    - cron: "17 8 * * *"
  workflow_dispatch:
    inputs:
      max_prs:
        description: "Cap on PRs analyzed this run"
        required: false
        default: "10"
      dry_run:
        description: "Skip comment posting"
        type: boolean
        required: false
        default: false

permissions:
  contents: read       # gh pr checks needs read on the repo
  pull-requests: write # gh pr comment needs write
  issues: write        # PR comments are technically issue comments

concurrency:
  group: ci-sentinel-${{ github.repository }}
  cancel-in-progress: false  # let stragglers finish; don't lose ledger writes

env:
  # Daily token ceiling. Sentinel pauses for the calendar day once exceeded.
  # Bumped 500k → 1M on 2026-05-18 after dropping `--bare` (full CC load
  # raises per-PR cost from ~4k to ~10k tokens). Now that auth is the Max-plan
  # OAuth token (not metered credits) this ceiling is a runaway-loop guard,
  # not a dollar cap — a daily sweep of a few PRs sits well under it.
  ORK_SENTINEL_DAILY_TOKEN_BUDGET: "1000000"
  # Per-PR analysis timeout (wall clock). Sentinel skips a PR that times out.
  ORK_SENTINEL_PER_PR_TIMEOUT_S: "300"

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Hoist CLAUDE_CODE_OAUTH_TOKEN to JOB-LEVEL env so every `claude -p`
    # step (auth smoke + per-PR analysis) reads it natively. Migrated off
    # ANTHROPIC_API_KEY (metered credits) → Max-plan OAuth token = $0 spend.
    # Proven on runners by claude-release-watch.yml.
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

    steps:
      - name: Checkout (for the skill registry only)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"

      - name: Install Claude Code
        run: |
          # First dry-run on 2026-05-18 failed with
          # "claude: No such file or directory" — ubuntu-latest ships
          # without CC. Install once per run; ~5s cold from npm.
          # Pinned to the supported floor (2.1.148, shared/cc-support.json) for reproducibility.
          npm install -g @anthropic-ai/claude-code@2.1.148
          claude --version

      - name: Verify Claude auth (OAuth 401 canary)
        # Migrated off ANTHROPIC_API_KEY + the apiKeyHelper file dance to the
        # Max-plan OAuth token. Unlike ANTHROPIC_API_KEY (which `claude -p`
        # would not read from the env in a fresh HOME — #1857), the OAuth
        # token IS read natively from CLAUDE_CODE_OAUTH_TOKEN (job-level env
        # above), so no helper script is needed. Proven on runners by
        # claude-release-watch.yml.
        #
        # 401 canary: an expired/revoked OAuth token surfaces as an auth
        # error HERE, before a sweep burns any quota. Fail loudly with the
        # exact one-copy-paste rotate command so a stale token is a 30-second
        # fix, not a silent daily red run.
        run: |
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is not set. Fix: run 'claude setup-token' locally, then 'gh secret set CLAUDE_CODE_OAUTH_TOKEN -R ${GITHUB_REPOSITORY}'."
            exit 1
          fi

          # bash `-e` would propagate the command-substitution exit code and
          # kill the step before we can classify the failure — disable it
          # around the smoke and capture stdout + exit explicitly.
          set +e
          smoke=$(claude -p --max-turns 1 --output-format json --no-session-persistence \
            "respond with the single word OK" 2>&1)
          smoke_exit=$?
          set -e

          echo "claude smoke exit: $smoke_exit"
          echo "claude smoke output (first 400 chars):"
          printf '%s\n' "$smoke" | head -c 400
          echo

          # claude -p reports auth failures as is_error=true JSON on stdout
          # AND a non-zero exit. Either signals a bad token.
          if [ "$smoke_exit" -ne 0 ] || printf '%s' "$smoke" | jq -e '.is_error == true' >/dev/null 2>&1; then
            msg=$(printf '%s' "$smoke" | jq -r '.result // .error // empty' 2>/dev/null | head -c 300)
            case "${msg}${smoke}" in
              *[Aa]uthentication*|*401*|*"Not logged in"*|*nvalid*bearer*|*OAuth*|*xpired*)
                echo "::error::CLAUDE_CODE_OAUTH_TOKEN invalid or expired (401). Rotate it: run 'claude setup-token', then 'gh secret set CLAUDE_CODE_OAUTH_TOKEN -R ${GITHUB_REPOSITORY}'. Sentinel is skipping this run." ;;
              *)
                echo "::error::Auth smoke test failed (exit ${smoke_exit}): ${msg:-see output above}" ;;
            esac
            exit 1
          fi
          tokens=$(printf '%s' "$smoke" | jq -r '.usage.total_tokens // 0')
          echo "Auth smoke test OK (${tokens} tokens)"

      - name: Resolve repo + auth context
        id: ctx
        run: |
          echo "owner=${GITHUB_REPOSITORY%/*}" >> "$GITHUB_OUTPUT"
          echo "repo=${GITHUB_REPOSITORY#*/}"  >> "$GITHUB_OUTPUT"
          echo "today=$(date -u +%Y-%m-%d)"    >> "$GITHUB_OUTPUT"

      - name: Load yesterday's ledger (if any)
        env:
          TODAY: ${{ steps.ctx.outputs.today }}
        run: |
          mkdir -p .sentinel
          # Idempotent — empty file is fine.
          touch .sentinel/ledger.jsonl
          today_tokens=$(awk -v d="$TODAY" -F'"' '
            $0 ~ d { for (i=1; i<=NF; i++) if ($i == "tokens") { sum += $(i+2) } }
            END { print (sum ? sum : 0) }
          ' .sentinel/ledger.jsonl)
          echo "Today's tokens used so far: ${today_tokens}"
          if [ "${today_tokens}" -gt "${ORK_SENTINEL_DAILY_TOKEN_BUDGET}" ]; then
            echo "::warning::Daily budget exceeded (${today_tokens} > ${ORK_SENTINEL_DAILY_TOKEN_BUDGET}). Skipping sweep."
            exit 0
          fi

      - name: List failing PRs
        id: prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_PRS: ${{ inputs.max_prs }}
          OWNER: ${{ steps.ctx.outputs.owner }}
          REPO: ${{ steps.ctx.outputs.repo }}
        run: |
          MAX="$MAX_PRS"
          MAX="${MAX:-10}"

          # Open PRs that have at least one failing required check.
          # We filter further per-PR in the analyze step (some failures are
          # in non-required checks we don't care about).
          gh pr list \
            --repo "${OWNER}/${REPO}" \
            --state open \
            --limit 50 \
            --json number,headRefOid,statusCheckRollup,author \
            --jq "
              [ .[]
                | select(.statusCheckRollup
                    | map(.conclusion // \"\")
                    | any(. == \"FAILURE\"))
                | { number, sha: .headRefOid[0:9], login: .author.login }
              ]
              | .[0:${MAX}]
            " > .sentinel/queue.json

          count=$(jq 'length' .sentinel/queue.json)
          echo "queue_count=${count}" >> "$GITHUB_OUTPUT"
          echo "Found ${count} PR(s) with failing checks"

      - name: Analyze each failing PR
        if: steps.prs.outputs.queue_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Claude auth comes from the job-level CLAUDE_CODE_OAUTH_TOKEN env.
          DRY_RUN: ${{ inputs.dry_run }}
          OWNER: ${{ steps.ctx.outputs.owner }}
          REPO: ${{ steps.ctx.outputs.repo }}
        run: |
          set -uo pipefail

          # Marker the sentinel uses to recognize its own comments (for
          # idempotent updating — never duplicate verdicts on the same SHA).
          MARKER_PREFIX="<!-- ork:ci-sentinel"

          while IFS= read -r row; do
            number=$(echo "$row" | jq -r '.number')
            sha=$(echo "$row" | jq -r '.sha')

            echo "─── PR #${number} (head ${sha}) ─────────────────────────"

            # Skip if we already commented on this exact SHA (idempotent).
            existing=$(gh pr view "$number" \
              --repo "${OWNER}/${REPO}" \
              --json comments \
              --jq "[ .comments[]
                       | select(.body | startswith(\"${MARKER_PREFIX} sha=${sha}\"))
                     ] | length")
            if [ "$existing" -gt 0 ]; then
              echo "  ↪ already analyzed at this SHA — skipping"
              continue
            fi

            # Run /ci-debug headless.
            #
            # Originally used `--bare` (CC 2.1.81+) for minimal plugin/hook load,
            # but verified locally on 2026-05-18 that `--bare` doesn't actually
            # honor ANTHROPIC_API_KEY (returns "Not logged in" regardless of
            # env var or --settings.apiKey/apiKeyHelper). Dropped --bare;
            # cost goes from ~4k to ~10k tokens per PR but the workflow actually
            # authenticates. Documented the trade-off in SKILL.md.
            #
            # M146-7 (#1862 Bug C): `dontAsk` silently REFUSES permission-requiring
            # tools — and /ci-debug needs Bash for `gh pr checks` / `gh api ...logs`,
            # so every analysis came back empty. `acceptEdits` is the headless
            # "use tools without prompting" mode for this read-only skill.
            # `--effort` removed alongside --bare — it's a session config that
            # needs the full CC load to take effect and is duplicated by
            # --max-turns 4 for our use case.
            tmpdir="$(mktemp -d)"
            # #1862 Bugs A+B: claude -p reports auth/permission errors as JSON on
            # STDOUT (verdict.json), not stderr — so log BOTH on failure. Each cat
            # is `|| true`-guarded: under errexit a cat of an empty/missing file
            # would kill the whole step before `continue` fires, silently skipping
            # every remaining PR in the loop.
            timeout "${ORK_SENTINEL_PER_PR_TIMEOUT_S}s" \
              claude -p \
                --permission-mode acceptEdits \
                --max-turns 4 \
                --output-format json \
                --no-session-persistence \
                "Run /ci-debug on PR ${number} in repo ${OWNER}/${REPO}. Use only the gh CLI. Output the report markdown only — no preamble." \
              > "${tmpdir}/verdict.json" 2> "${tmpdir}/err.log" \
              || {
                echo "::warning::claude run failed for #${number} — error output follows"
                echo "--- stdout (verdict.json) ---"
                cat "${tmpdir}/verdict.json" 2>/dev/null || true
                echo "--- stderr (err.log) ---"
                cat "${tmpdir}/err.log" 2>/dev/null || true
                continue
              }

            verdict_md=$(jq -r '.content // ""' "${tmpdir}/verdict.json")
            tokens=$(jq -r '.usage.total_tokens // 0' "${tmpdir}/verdict.json")

            if [ -z "$verdict_md" ]; then
              echo "  ↪ empty verdict — skipping comment"
              continue
            fi

            # Wrap in the marker so the next run can detect duplicates.
            body=$(printf '%s sha=%s -->\n\n<details><summary>🛰️ <b>CI Sentinel verdict</b> (sha %s)</summary>\n\n%s\n\n</details>\n' \
              "$MARKER_PREFIX" "$sha" "$sha" "$verdict_md")

            if [ "${DRY_RUN:-false}" = "true" ]; then
              echo "  ↪ DRY_RUN — skipping comment, would post:"
              echo "$body" | sed 's/^/    /'
            else
              echo "$body" | gh pr comment "$number" \
                --repo "${OWNER}/${REPO}" \
                --body-file -
              echo "  ↪ comment posted"
            fi

            # Ledger row
            jq -n \
              --arg ts "$(date -u -Iseconds)" \
              --arg pr "$number" \
              --arg sha "$sha" \
              --arg tokens "$tokens" \
              '{ts: $ts, pr: ($pr|tonumber), sha: $sha, tokens: ($tokens|tonumber)}' \
              >> .sentinel/ledger.jsonl

          done < <(jq -c '.[]' .sentinel/queue.json)

      - name: Surface daily ledger as job summary
        if: always()
        env:
          TODAY: ${{ steps.ctx.outputs.today }}
        run: |
          {
            echo "## 🛰️ CI Sentinel — $(date -u +%Y-%m-%d) ${TODAY}"
            echo ""
            count=$(jq 'length' .sentinel/queue.json 2>/dev/null || echo 0)
            echo "**PRs scanned this run:** ${count}"
            echo ""
            if [ -s .sentinel/ledger.jsonl ]; then
              today_tokens=$(awk -v d="$TODAY" -F'"' '
                $0 ~ d { for (i=1; i<=NF; i++) if ($i == "tokens") { sum += $(i+2) } }
                END { print (sum ? sum : 0) }
              ' .sentinel/ledger.jsonl)
              echo "**Tokens used today:** ${today_tokens} / ${ORK_SENTINEL_DAILY_TOKEN_BUDGET}"
              echo ""
              echo "### Recent rows"
              echo '```'
              tail -10 .sentinel/ledger.jsonl
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
