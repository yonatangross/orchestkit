name: "Validate: Version"

on:
  pull_request:
    # reopened included so a required check re-reports on PR reopen — without it,
    # close/reopen (a common CI re-trigger) leaves this required context absent on
    # the new HEAD and the PR stays BLOCKED on a status that never runs.
    branches: [main]
    types: [opened, synchronize, reopened]
  merge_group:

permissions: {}

jobs:
  check-version-and-changelog:
    permissions:
      contents: read
      pull-requests: write
    name: Check Version Bump & Changelog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install workspace deps
        # Required so `npm run build` can resolve devDeps of workspace
        # packages (e.g. packages/hook-contract needs js-yaml at codegen
        # time). Without this step, `npm run build` chains into the
        # workspace and fails with ERR_MODULE_NOT_FOUND. Caught on M141-2
        # step 3 (#1869); same class as the issue worked around in #1863.
        run: npm ci --workspaces --include-workspace-root --no-audit --no-fund

      - name: Build plugins
        run: npm run build

      - name: Check if version bump required
        id: check_required
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          # Skip version check for branches handled by release-please.
          # release-please (release-type: simple) computes next version from
          # conventional-commit types since last tag — manual bumps on these
          # branches create "ghost versions" when the two disagree (see #1457).
          # Must stay in lock-step with bin/git-hooks/pre-push L23.
          # Note: BRANCH_NAME set via env to prevent shell injection from PR branch names

          # Check branch name prefix
          # Includes issue/ and bug/ since they host conventional-commits feature
          # work (see CONTRIBUTING.md "Branch naming" — those prefixes are valid).
          # Must stay in lock-step with bin/git-hooks/pre-push L23.
          if [[ "$BRANCH_NAME" =~ ^(docs|chore|ci|style|test|feat|fix|perf|refactor|issue|bug)/ ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping version check for $BRANCH_NAME (release-please handles versioning)"
            exit 0
          fi

          # Skip release-please PRs (automated versioning)
          if [[ "$BRANCH_NAME" =~ ^release-please ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping version check for release-please PR (automated)"
            exit 0
          fi

          # Skip Dependabot PRs (dependency updates, no version bump needed)
          if [[ "$BRANCH_NAME" =~ ^dependabot/ ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping version check for Dependabot PR (automated dependency update)"
            exit 0
          fi

          # Check if only non-code files changed
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
          CODE_CHANGES=$(echo "$CHANGED_FILES" | grep -vE '\.(md|txt)$|^docs/' || true)

          if [[ -z "$CODE_CHANGES" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping version check (only docs/config changes)"
            exit 0
          fi

          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Version bump required - code changes detected"

      - name: Get version from PR branch
        if: steps.check_required.outputs.skip != 'true'
        id: pr_version
        run: |
          PR_VERSION=$(jq -r '.version' plugins/ork/.claude-plugin/plugin.json)
          echo "version=$PR_VERSION" >> $GITHUB_OUTPUT
          echo "PR branch version: $PR_VERSION"

      - name: Get version from main branch
        if: steps.check_required.outputs.skip != 'true'
        id: main_version
        run: |
          git fetch origin main
          MAIN_VERSION=$(git show origin/main:plugins/ork/.claude-plugin/plugin.json | jq -r '.version')
          echo "version=$MAIN_VERSION" >> $GITHUB_OUTPUT
          echo "Main branch version: $MAIN_VERSION"

      - name: Check version bumped
        if: steps.check_required.outputs.skip != 'true'
        id: version_check
        run: |
          PR_VERSION="${{ steps.pr_version.outputs.version }}"
          MAIN_VERSION="${{ steps.main_version.outputs.version }}"

          if [[ "$PR_VERSION" == "$MAIN_VERSION" ]]; then
            echo "bumped=false" >> $GITHUB_OUTPUT
            echo "::error::Version not bumped! Current: $MAIN_VERSION"
          else
            # Verify branch version is GREATER than main (not just different)
            HIGHER=$(printf '%s\n%s\n' "$MAIN_VERSION" "$PR_VERSION" | sort -V | tail -1)
            if [[ "$HIGHER" != "$PR_VERSION" ]]; then
              echo "bumped=false" >> $GITHUB_OUTPUT
              echo "::error::Version $PR_VERSION is not greater than main ($MAIN_VERSION). Rebase on main and re-bump."
            else
              echo "bumped=true" >> $GITHUB_OUTPUT
              echo "Version bumped: $MAIN_VERSION -> $PR_VERSION"
            fi
          fi

      - name: Check CHANGELOG updated
        if: steps.check_required.outputs.skip != 'true'
        id: changelog_check
        run: |
          if git diff origin/main --name-only | grep -q "CHANGELOG.md"; then
            echo "updated=true" >> $GITHUB_OUTPUT
            echo "CHANGELOG.md has been updated"
          else
            echo "updated=false" >> $GITHUB_OUTPUT
            echo "::error::CHANGELOG.md not updated"
          fi

      - name: Validate CHANGELOG entry matches version
        id: changelog_version_check
        if: steps.check_required.outputs.skip != 'true' && steps.version_check.outputs.bumped == 'true' && steps.changelog_check.outputs.updated == 'true'
        run: |
          PR_VERSION="${{ steps.pr_version.outputs.version }}"

          # Check if CHANGELOG has entry for this version
          if grep -q "^\## \[$PR_VERSION\]" CHANGELOG.md; then
            echo "matches=true" >> $GITHUB_OUTPUT
            echo "CHANGELOG.md has entry for version $PR_VERSION"
          else
            echo "matches=false" >> $GITHUB_OUTPUT
            echo "::error::CHANGELOG.md missing entry for version $PR_VERSION"
          fi

      - name: Comment on PR with issues
        if: steps.check_required.outputs.skip != 'true' && (steps.version_check.outputs.bumped == 'false' || steps.changelog_check.outputs.updated == 'false' || steps.changelog_version_check.outputs.matches == 'false')
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          PR_VERSION: ${{ steps.pr_version.outputs.version }}
          MAIN_VERSION: ${{ steps.main_version.outputs.version }}
          VERSION_BUMPED: ${{ steps.version_check.outputs.bumped }}
          CHANGELOG_UPDATED: ${{ steps.changelog_check.outputs.updated }}
          CHANGELOG_MATCHES: ${{ steps.changelog_version_check.outputs.matches }}
        with:
          script: |
            const prVersion = process.env.PR_VERSION;
            const mainVersion = process.env.MAIN_VERSION;
            const versionBumped = process.env.VERSION_BUMPED === 'true';
            const changelogUpdated = process.env.CHANGELOG_UPDATED === 'true';
            const changelogMatches = process.env.CHANGELOG_MATCHES === 'true';

            let issues = [];
            if (!versionBumped) issues.push('Version not bumped');
            if (!changelogUpdated) issues.push('CHANGELOG.md not updated');
            if (versionBumped && changelogUpdated && !changelogMatches) {
              issues.push('CHANGELOG.md missing entry for new version');
            }

            // Check if we already commented
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Validate: Version')
            );

            const body = `## Validate: Version Failed

            ${issues.join('\n')}

            ---

            **To fix, run:**
            \`\`\`bash
            ./bin/bump-version.sh patch   # For bug fixes
            ./bin/bump-version.sh minor   # For new features
            ./bin/bump-version.sh major   # For breaking changes
            \`\`\`

            This will:
            1. Bump version in all config files
            2. Update CLAUDE.md version reference
            3. Add a template entry to CHANGELOG.md

            Then fill in the CHANGELOG entry with your changes and commit.`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: Fail if checks not passed
        if: steps.check_required.outputs.skip != 'true' && (steps.version_check.outputs.bumped == 'false' || steps.changelog_check.outputs.updated == 'false')
        run: |
          echo "::error::PR blocked: Version must be bumped and CHANGELOG.md must be updated"
          exit 1

      - name: Fail if CHANGELOG entry missing
        if: steps.check_required.outputs.skip != 'true' && steps.version_check.outputs.bumped == 'true' && steps.changelog_check.outputs.updated == 'true' && steps.changelog_version_check.outputs.matches == 'false'
        run: |
          echo "::error::PR blocked: CHANGELOG.md must have entry for version ${{ steps.pr_version.outputs.version }}"
          exit 1

      - name: Check version sync across all files
        if: steps.check_required.outputs.skip != 'true' && steps.version_check.outputs.bumped == 'true'
        env:
          PR_VERSION: ${{ steps.pr_version.outputs.version }}
        run: |
          echo "Checking all version files match $PR_VERSION..."
          MISMATCHED=""

          for f in manifests/ork.json; do
            if [ -f "$f" ]; then
              FILE_VERSION=$(jq -r '.version' "$f")
              if [ "$FILE_VERSION" != "$PR_VERSION" ]; then
                MISMATCHED="$MISMATCHED\n  $f: $FILE_VERSION"
              fi
            fi
          done

          if [ -f "pyproject.toml" ]; then
            PYVER=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\([^"]*\)".*/\1/')
            if [ "$PYVER" != "$PR_VERSION" ]; then
              MISMATCHED="$MISMATCHED\n  pyproject.toml: $PYVER"
            fi
          fi

          if [ -n "$MISMATCHED" ]; then
            echo "::error::Version mismatch! Expected $PR_VERSION but found:$MISMATCHED"
            echo "Run: ./bin/bump-version.sh to sync all version files"
            exit 1
          fi

          echo "All version files in sync at $PR_VERSION"
