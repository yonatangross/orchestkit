name: Windows Smoke Test (PowerShell)

# CC 2.1.111 rolls out a native PowerShell tool on Windows via the
# CLAUDE_CODE_USE_POWERSHELL_TOOL=1 opt-in. OrchestKit had a Windows
# CMD-spam fix in 2.1.105; this smoke test catches regressions under
# PowerShell before they reach users.
#
# Runs only when hook source or this workflow changes — ubuntu CI
# already covers functional correctness, and Windows runner minutes
# are expensive.

on:
  push:
    branches: [main]
    paths:
      - 'src/hooks/**'
      - '.github/workflows/windows-smoke.yml'
  pull_request:
    paths:
      - 'src/hooks/**'
      - '.github/workflows/windows-smoke.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  smoke:
    name: Hook smoke test (PowerShell tool enabled)
    runs-on: windows-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      CLAUDE_CODE_USE_POWERSHELL_TOOL: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install hook dependencies
        working-directory: src/hooks
        run: npm ci --no-audit --no-fund

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Build hook bundles
        working-directory: src/hooks
        run: npm run build

      # Note: vitest runs on Ubuntu (ci.yml). Here we only verify PowerShell-
      # specific behavior. Rerunning the full 1.3k-test suite on Windows would
      # exercise Windows path/env quirks unrelated to the PowerShell tool
      # rollout this workflow is meant to catch.
      - name: Smoke test run-hook.mjs under PowerShell
        shell: pwsh
        run: |
          $payload = '{"tool_name":"Bash","session_id":"winsmoke","tool_input":{"command":"echo hello"}}'
          $result = $payload | node src/hooks/bin/run-hook.mjs pretool/bash/dangerous-command-blocker
          Write-Output "Hook result: $result"
          if ($LASTEXITCODE -ne 0) { throw "Hook invocation failed with exit $LASTEXITCODE" }
