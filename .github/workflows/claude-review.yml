# Generated by OrchestKit Claude Plugin
# Created: 2026-03-06

name: Claude PR Review
on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number || 'manual' }}
  cancel-in-progress: true

jobs:
  # Decide whether a PR should be auto-reviewed. The label path alone was dead
  # for the repo's whole history: it gates on `needs-claude-review`, a label that
  # did not exist, so `contains(...labels...)` was always false and Claude PR
  # Review never ran on any PR. This job auto-requests a review when the PR
  # touches paths where an unreviewed change is most dangerous (CI/gates, build
  # and release scripts, security tests) — exactly the class that merged
  # unreviewed this session. Non-sensitive PRs still opt in via the label.
  detect:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      sensitive: ${{ steps.f.outputs.sensitive }}
    steps:
      - id: f
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          files=$(gh api "repos/${REPO}/pulls/${PR}/files" --paginate --jq '.[].filename')
          if printf '%s\n' "$files" \
               | grep -qE '^(\.github/workflows/|\.github/actions/|scripts/|bin/|tests/security/)'; then
            echo "::notice::Sensitive paths changed — auto-requesting a Claude review."
            echo "sensitive=true" >> "$GITHUB_OUTPUT"
          else
            echo "sensitive=false" >> "$GITHUB_OUTPUT"
          fi

  review:
    needs: [detect]
    # always() because `detect` is skipped for issue_comment / workflow_dispatch;
    # without it this job would inherit detect's skip. The event guards below
    # ensure needs.detect.outputs is only read on pull_request events.
    if: |
      always() && (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'issue_comment' &&
         contains(github.event.comment.body, '@claude') &&
         contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
        (github.event_name == 'pull_request' &&
         (contains(github.event.pull_request.labels.*.name, 'needs-claude-review') ||
          needs.detect.outputs.sensitive == 'true'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: anthropics/claude-code-action@af0559ee4f514d1ef21826982bed13f7edc3c35e  # v1.0.178
        with:
          # Auth via the Max-plan OAuth token (CLAUDE_CODE_OAUTH_TOKEN) instead of
          # metered console credits — $0 spend. Rotate with `claude setup-token`
          # then `gh secret set CLAUDE_CODE_OAUTH_TOKEN` if a run 401s.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this PR thoroughly. Check:
            1. Code quality — SOLID principles, DRY, naming, complexity
            2. Security — OWASP top 10, secrets exposure, input validation
            3. Test coverage — are new code paths tested?
            4. Type safety — proper TypeScript types, no any/unknown escape hatches
            5. Performance — N+1 queries, unnecessary re-renders, bundle size

            Use conventional comment format:
            - praise: for good patterns worth highlighting
            - suggestion: for improvements (non-blocking)
            - issue: for bugs or security problems (blocking)
            - nitpick: for style/formatting (non-blocking)

            End with a summary table:
            | Area | Status | Notes |
            |------|--------|-------|
            | Quality | PASS/WARN/FAIL | ... |
            | Security | PASS/WARN/FAIL | ... |
            | Tests | PASS/WARN/FAIL | ... |
            | Types | PASS/WARN/FAIL | ... |
          # Tool allowlist matches the convention already used by claude-health.yml.
          # This job holds pull-requests:write and issues:write while reviewing a diff
          # that, on the pull_request trigger, is authored by whoever opened the PR.
          # Restrict the model to reading the code and the PR metadata it reviews.
          claude_args: >-
            --max-turns 5
            --model claude-sonnet-4-6
            --allowedTools "Read,Grep,Glob,Bash(git diff:*),Bash(git log:*),Bash(gh pr view:*),Bash(gh pr diff:*)"
