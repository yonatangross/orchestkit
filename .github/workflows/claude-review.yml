# Generated by OrchestKit Claude Plugin
# Created: 2026-03-06

name: Claude PR Review
on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number || 'manual' }}
  cancel-in-progress: true

jobs:
  review:
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: anthropics/claude-code-action@9469d113c6afd29550c402740f22d1a97dd1209b  # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR thoroughly. Check:
            1. Code quality — SOLID principles, DRY, naming, complexity
            2. Security — OWASP top 10, secrets exposure, input validation
            3. Test coverage — are new code paths tested?
            4. Type safety — proper TypeScript types, no any/unknown escape hatches
            5. Performance — N+1 queries, unnecessary re-renders, bundle size

            Use conventional comment format:
            - praise: for good patterns worth highlighting
            - suggestion: for improvements (non-blocking)
            - issue: for bugs or security problems (blocking)
            - nitpick: for style/formatting (non-blocking)

            End with a summary table:
            | Area | Status | Notes |
            |------|--------|-------|
            | Quality | PASS/WARN/FAIL | ... |
            | Security | PASS/WARN/FAIL | ... |
            | Tests | PASS/WARN/FAIL | ... |
            | Types | PASS/WARN/FAIL | ... |
          claude_args: "--max-turns 5 --model claude-sonnet-4-5-20250514"
