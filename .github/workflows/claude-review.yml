# Generated by OrchestKit Claude Plugin
# Created: 2026-03-06

name: Claude PR Review
on:
  pull_request:
    types: [labeled, synchronize]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number || 'manual' }}
  cancel-in-progress: true

jobs:
  # Fires when the `needs-claude-review` label is present (added by a human, or
  # auto-applied to sensitive-path PRs by auto-label.yml), on an @claude comment
  # from a trusted actor, or on manual dispatch. The label path was dead for the
  # repo's whole history because the label did not exist; it does now, and
  # validate-workflows' Dead-gate audit fails CI if it is ever removed.
  #
  # Detection was deliberately split into auto-label.yml rather than a detect
  # job here: co-locating them under one cancel-in-progress concurrency group
  # meant a burst of pull_request events (opened + N labeled from PR creation)
  # cancelled every run and no review ever completed.
  review:
    if: |
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'needs-claude-review')) ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - uses: anthropics/claude-code-action@44423bdec74b97d67543eb16c110546762c110b2  # v1.0.181
        with:
          # The action refuses a run triggered by a bot unless it is allow-listed.
          # auto-label-review.yml applies needs-claude-review with the Release Bot
          # App token (GITHUB_TOKEN-added labels do not cascade), so the labeled
          # event that fires this review has orchestkit-release-bot as its actor.
          # Allow just that bot — not '*' — so a review is still only triggered by
          # our own automation or a trusted human, never an arbitrary bot.
          allowed_bots: "orchestkit-release-bot"
          # Auth via the Max-plan OAuth token (CLAUDE_CODE_OAUTH_TOKEN) instead of
          # metered console credits — $0 spend. Rotate with `claude setup-token`
          # then `gh secret set CLAUDE_CODE_OAUTH_TOKEN` if a run 401s.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this PR thoroughly. Check:
            1. Code quality — SOLID principles, DRY, naming, complexity
            2. Security — OWASP top 10, secrets exposure, input validation
            3. Test coverage — are new code paths tested?
            4. Type safety — proper TypeScript types, no any/unknown escape hatches
            5. Performance — N+1 queries, unnecessary re-renders, bundle size

            Use conventional comment format:
            - praise: for good patterns worth highlighting
            - suggestion: for improvements (non-blocking)
            - issue: for bugs or security problems (blocking)
            - nitpick: for style/formatting (non-blocking)

            End with a summary table:
            | Area | Status | Notes |
            |------|--------|-------|
            | Quality | PASS/WARN/FAIL | ... |
            | Security | PASS/WARN/FAIL | ... |
            | Tests | PASS/WARN/FAIL | ... |
            | Types | PASS/WARN/FAIL | ... |
          # Tool allowlist matches the convention already used by claude-health.yml.
          # This job holds pull-requests:write and issues:write while reviewing a diff
          # that, on the pull_request trigger, is authored by whoever opened the PR.
          # Restrict the model to reading the code and the PR metadata it reviews.
          claude_args: >-
            --max-turns 5
            --model claude-sonnet-4-6
            --allowedTools "Read,Grep,Glob,Bash(git diff:*),Bash(git log:*),Bash(gh pr view:*),Bash(gh pr diff:*)"
