name: hook-contract

on:
  push:
    branches: [main]
    paths:
      - "packages/hook-contract/**"
      - ".github/workflows/hook-contract.yml"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - "packages/hook-contract/**"
      - ".github/workflows/hook-contract.yml"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: read

concurrency:
  group: hook-contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · test · publish-dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install workspace deps
        run: npm ci --workspaces --include-workspace-root --no-audit --no-fund

      - name: Codegen drift gate
        # Fail fast if events.generated.ts / schemas.generated.ts drift from
        # spec/hook-events.spec.yml. Runs the gate explicitly so CI logs name
        # it; same check also fires via prebuild before npm run build below.
        working-directory: packages/hook-contract
        run: npm run codegen:check

      - name: Typecheck
        working-directory: packages/hook-contract
        run: npm run typecheck

      - name: Test
        working-directory: packages/hook-contract
        run: npm test

      - name: Build
        working-directory: packages/hook-contract
        run: npm run build

      - name: Verify package contents (publish dry-run)
        working-directory: packages/hook-contract
        run: npm publish --dry-run

      - name: Verify entrypoints resolve
        working-directory: packages/hook-contract
        run: |
          node --input-type=module -e "import { HOOK_EVENT_NAMES, validateHookEvent } from './dist/esm/index.js'; if (HOOK_EVENT_NAMES.length !== 19) { console.error('event count mismatch:', HOOK_EVENT_NAMES.length); process.exit(1); } const r = validateHookEvent({ event: 'PreToolUse' }); if (!r.valid) { console.error('validate failed:', r); process.exit(1); } console.log('ESM entrypoint OK,', HOOK_EVENT_NAMES.length, 'events');"
          node -e "const { HOOK_EVENT_NAMES, validateHookEvent } = require('./dist/cjs/index.js'); if (HOOK_EVENT_NAMES.length !== 19) { console.error('event count mismatch:', HOOK_EVENT_NAMES.length); process.exit(1); } const r = validateHookEvent({ event: 'PreToolUse' }); if (!r.valid) { console.error('validate failed:', r); process.exit(1); } console.log('CJS entrypoint OK,', HOOK_EVENT_NAMES.length, 'events');"
