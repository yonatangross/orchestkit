# Generated by OrchestKit Claude Plugin
# Created: 2026-05-18

name: hook-contract-py

on:
  push:
    branches: [main]
    paths:
      - "packages/hook-contract-py/**"
      - "spec/hook-events.spec.yml"
      - ".github/workflows/hook-contract-py.yml"
  pull_request:
    paths:
      - "packages/hook-contract-py/**"
      - "spec/hook-events.spec.yml"
      - ".github/workflows/hook-contract-py.yml"
  workflow_dispatch:

# Default-deny: jobs that need writes override at job level.
permissions:
  contents: read

jobs:
  build:
    name: codegen-check · mypy · pytest · build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: packages/hook-contract-py/pyproject.toml

      - name: Install dev deps
        working-directory: packages/hook-contract-py
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Codegen drift gate
        # Re-emit events.py + schemas.py in memory; fail if committed files
        # drift from spec/hook-events.spec.yml. Mirrors hook-contract.yml's
        # codegen-check step on the npm side.
        working-directory: packages/hook-contract-py
        run: python scripts/codegen-py.py --check

      - name: Typecheck (mypy)
        working-directory: packages/hook-contract-py
        run: mypy src/

      - name: Lint (ruff)
        working-directory: packages/hook-contract-py
        run: ruff check src/ tests/

      - name: Test (pytest)
        working-directory: packages/hook-contract-py
        run: pytest -v --tb=short

      - name: Build (sdist + wheel)
        working-directory: packages/hook-contract-py
        run: |
          pip install build
          python -m build --outdir dist/

      - name: Verify importable from built wheel
        working-directory: packages/hook-contract-py
        run: |
          python -m venv /tmp/import-check
          /tmp/import-check/bin/pip install dist/*.whl
          /tmp/import-check/bin/python -c "
          from orchestkit_hook_contract import (
              HOOK_EVENT_NAMES,
              HookEvent,
              PreToolUsePayload,
              validate_hook_event,
          )
          assert len(HOOK_EVENT_NAMES) == 19, 'event count mismatch'
          r = validate_hook_event({'event': 'PreToolUse'})
          assert r.valid, f'validate failed: {r}'
          p = PreToolUsePayload(tool_name='Bash', tool_input={'cmd': 'ls'})
          assert p.tool_name == 'Bash'
          print('wheel install + import OK,', len(HOOK_EVENT_NAMES), 'events')
          "
