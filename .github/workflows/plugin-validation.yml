name: "Validate: Plugins"

on:
  push:
    branches: [main, dev, 'feature/**']
  pull_request:
    branches: [main, dev]
  merge_group:
  workflow_dispatch:

permissions: {}

# Cancel in-progress runs on new commits
concurrency:
  group: plugin-validation-${{ github.ref }}
  cancel-in-progress: true

env:
  CLAUDE_PROJECT_DIR: ${{ github.workspace }}

jobs:
  # ============================================================================
  # STAGE 0: Build once, share artifacts
  # ============================================================================
  build:
    name: Build
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          build-plugins: 'true'
          run-ci-setup: 'false'

      - name: Upload built plugins
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: built-plugins
          path: plugins/
          retention-days: 1

  # Job 1: Syntax and Structure Validation
  syntax-validation:
    name: Syntax & Structure
    permissions:
      contents: read
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Download built plugins
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: built-plugins
          path: plugins/

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          build-plugins: 'false'
          run-ci-setup: 'false'

      - name: Validate Shell Script Syntax
        shell: bash
        run: bash tests/unit/test-shell-syntax.sh --verbose

      - name: Validate JSON Syntax
        shell: bash
        run: bash tests/unit/test-json-validity.sh --verbose

      - name: Check Hook Executability
        shell: bash
        run: bash tests/unit/test-hook-executability.sh

  # Job 2: Schema Validation
  schema-validation:
    name: Schema Validation
    permissions:
      contents: read
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Download built plugins
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: built-plugins
          path: plugins/

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          build-plugins: 'false'
          run-ci-setup: 'false'

      - name: Validate Context Schemas
        shell: bash
        run: bash tests/unit/test-context-schemas.sh --verbose

  # Job 3: Hook Unit Tests
  hook-unit-tests:
    name: Hook Unit Tests
    permissions:
      contents: read
    needs: [build, syntax-validation]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Download built plugins
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: built-plugins
          path: plugins/

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          build-plugins: 'false'

      - name: Run Hook Unit Tests
        shell: bash
        run: bash tests/unit/test-hooks-unit.sh --verbose

  # Job 4: Integration Tests
  integration-tests:
    name: Integration Tests
    permissions:
      contents: read
    needs: [build, syntax-validation, hook-unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Download built plugins
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: built-plugins
          path: plugins/

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          build-plugins: 'false'

      - name: Run Hook Chain Tests
        shell: bash
        run: bash tests/integration/test-hook-chains.sh --verbose

      - name: Run Context System Tests
        shell: bash
        run: bash tests/integration/test-context-system.sh --verbose

  # Job 5: Plugin Manifest Validation
  manifest-validation:
    name: Plugin Manifest
    permissions:
      contents: read
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Download built plugins
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: built-plugins
          path: plugins/

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          build-plugins: 'false'
          run-ci-setup: 'false'

      - name: Validate marketplace.json schema
        shell: bash
        run: bash tests/schemas/test-marketplace-schema.sh

      - name: Validate plugin.json schema
        shell: bash
        run: bash tests/schemas/test-plugin-schema.sh

      - name: Validate plugin.json CC 2.1.19 format (skills/agents)
        shell: bash
        run: bash tests/plugins/test-plugin-json-schema.sh

      - name: Validate plugin.json structure (new location)
        shell: bash
        run: |
          echo "Checking plugins/ork/.claude-plugin/plugin.json..."

          # Check required fields
          for field in name version description; do
            value=$(jq -r ".$field // empty" plugins/ork/.claude-plugin/plugin.json)
            if [[ -z "$value" ]]; then
              echo "ERROR: Missing required field: $field"
              exit 1
            fi
            echo "  $field: $value"
          done

          # Validate version format
          version=$(jq -r '.version' plugins/ork/.claude-plugin/plugin.json)
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid version format: $version"
            exit 1
          fi

          echo "Plugin manifest is valid!"

      - name: Check hooks.json hook paths
        shell: bash
        run: |
          echo "Validating hook paths in hooks.json..."

          HOOKS_JSON="src/hooks/hooks.json"
          if [[ ! -f "$HOOKS_JSON" ]]; then
            echo "ERROR: hooks.json not found at $HOOKS_JSON"
            exit 1
          fi

          # Extract all hook commands from hooks.json.
          # Supports both legacy string form { command: "node ... path" } and
          # CC 2.1.139 args[] exec form { command: "node", args: ["...", "path"] }.
          hooks=$(jq -r '
            .. | objects | select(has("command")) |
            (.command + (if has("args") and (.args|type) == "array" then " " + (.args | join(" ")) else "" end))
          ' "$HOOKS_JSON" | sort -u)

          missing=0
          while IFS= read -r hook; do
            [[ -z "$hook" ]] && continue
            # Replace variable patterns with source directory
            resolved=$(echo "$hook" | sed -e 's|\${CLAUDE_PLUGIN_ROOT}|src|g' -e 's|\${CLAUDE_PROJECT_DIR}|.|g' -e 's|\$CLAUDE_PROJECT_DIR|.|g')

            # Handle command-style hooks
            if [[ "$resolved" == node\ * ]]; then
              script_path=$(echo "$resolved" | awk '{print $2}')
              if [[ ! -f "$script_path" ]]; then
                echo "WARNING: Node script not found: $script_path"
                missing=$((missing + 1))
              fi
            elif [[ ! -f "$resolved" ]]; then
              echo "WARNING: Hook not found: $resolved"
              missing=$((missing + 1))
            fi
          done <<< "$hooks"

          if [[ $missing -gt 0 ]]; then
            echo "Found $missing missing hooks"
            exit 1
          fi

          echo "All hook paths are valid!"

  # Job 6: Claude Code Plugin Validate (CC 2.1.77+)
  cc-plugin-validate:
    name: CC Plugin Validate
    permissions:
      contents: read
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # Advisory — don't block if CC CLI unavailable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Download built plugins
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: built-plugins
          path: plugins/

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          build-plugins: 'false'
          run-ci-setup: 'false'

      - name: Install Claude Code CLI
        id: install-cc
        run: |
          # Pin to exact version + --ignore-scripts (supply chain mitigation — Scorecard #130, #132)
          # Pinned to our supported floor (2.1.148, shared/cc-support.json) — older versions
          # don't recognize the experimental.{monitors,themes} block format introduced in
          # CC 2.1.129 and emit a hard error during plugin validate.
          # Scorecard pinned-deps (npmCommand): accepted risk — npm has no SHA-pin; --ignore-scripts
          # mitigates the postinstall. Dropped from code-scanning by the SARIF filter in scorecard.yml.
          npm install -g @anthropic-ai/claude-code@2.1.148 --ignore-scripts 2>/dev/null || true
          # `--ignore-scripts` skips the package's own postinstall which
          # fetches the native `claude` binary. Without this explicit
          # invocation, the wrapper installs but `command -v claude` finds
          # a script that fast-fails with "claude native binary not
          # installed." — this step would log "CLI not available" and
          # silently skip plugin validation. Run install.cjs to restore
          # the binary.
          INSTALL_CJS="$(npm root -g)/@anthropic-ai/claude-code/install.cjs"
          if [ -f "$INSTALL_CJS" ]; then
            node "$INSTALL_CJS" 2>/dev/null || true
          fi
          if command -v claude &>/dev/null && claude --version &>/dev/null; then
            CC_VERSION=$(claude --version 2>/dev/null || echo "unknown")
            echo "cc_available=true" >> "$GITHUB_OUTPUT"
            echo "Claude Code CLI installed: ${CC_VERSION}"
          else
            echo "cc_available=false" >> "$GITHUB_OUTPUT"
            echo "Claude Code CLI not available — skipping plugin validate"
          fi

      - name: Validate plugin with claude CLI
        if: steps.install-cc.outputs.cc_available == 'true'
        shell: bash
        run: |
          echo "Running: claude plugin validate ./plugins/ork"
          claude plugin validate ./plugins/ork 2>&1 || {
            echo "::warning::claude plugin validate reported issues"
            exit 1
          }
          echo "Plugin validation passed!"

  # Job 7: Component Counts Validation
  counts-validation:
    name: Component Counts
    permissions:
      contents: read
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Download built plugins
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: built-plugins
          path: plugins/

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          build-plugins: 'false'
          run-ci-setup: 'false'

      - name: Validate component counts
        shell: bash
        run: ./bin/validate-counts.sh

  # Job 7: Skills Validation (flat structure)
  skills-validation:
    name: Skills Validation
    permissions:
      contents: read
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Download built plugins
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: built-plugins
          path: plugins/

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          build-plugins: 'false'
          run-ci-setup: 'false'

      - name: Validate skill structure
        shell: bash
        run: |
          echo "Validating skills (flat structure)..."

          if [[ ! -d "skills" ]]; then
            echo "No skills directory found"
            exit 0
          fi

          errors=0
          skill_count=0

          for skill_dir in skills/*/; do
            [[ -d "$skill_dir" ]] || continue
            skill_name=$(basename "$skill_dir")
            skill_count=$((skill_count + 1))

            if [[ ! -f "$skill_dir/SKILL.md" ]]; then
              echo "  ERROR: $skill_name missing SKILL.md"
              errors=$((errors + 1))
            fi
          done

          echo "Validated $skill_count skills"

          if [[ $errors -gt 0 ]]; then
            echo "Found $errors skill errors"
            exit 1
          fi

          echo "All skills are valid!"

  # Job 8: Skill Sync Drift Detection
  skill-sync-validation:
    name: Skill Sync Drift
    permissions:
      contents: read
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Download built plugins
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: built-plugins
          path: plugins/

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          build-plugins: 'false'
          run-ci-setup: 'false'

      - name: Check for skill drift
        shell: bash
        run: |
          echo "Checking for drift between root skills and plugin skills..."
          ./bin/sync-skills.sh validate --quiet
          echo "No skill drift detected!"

      - name: Check for orphan skills
        shell: bash
        run: |
          echo "Checking for orphan skills in plugins..."
          ./bin/sync-skills.sh validate --check-orphans --quiet

  # Summary Job
  validation-summary:
    name: Validation Summary
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [syntax-validation, schema-validation, hook-unit-tests, integration-tests, manifest-validation, cc-plugin-validate, counts-validation, skills-validation, skill-sync-validation]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "========================================"
          echo "  Plugin Validation Summary"
          echo "========================================"
          echo ""
          echo "Syntax Validation:     ${{ needs.syntax-validation.result }}"
          echo "Schema Validation:     ${{ needs.schema-validation.result }}"
          echo "Hook Unit Tests:       ${{ needs.hook-unit-tests.result }}"
          echo "Integration Tests:     ${{ needs.integration-tests.result }}"
          echo "Manifest Validation:   ${{ needs.manifest-validation.result }}"
          echo "CC Plugin Validate:    ${{ needs.cc-plugin-validate.result }} (advisory)"
          echo "Counts Validation:     ${{ needs.counts-validation.result }}"
          echo "Skills Validation:     ${{ needs.skills-validation.result }}"
          echo "Skill Sync Validation: ${{ needs.skill-sync-validation.result }}"
          echo ""

          if [[ "${{ needs.syntax-validation.result }}" != "success" ]] || \
             [[ "${{ needs.schema-validation.result }}" != "success" ]] || \
             [[ "${{ needs.hook-unit-tests.result }}" != "success" ]] || \
             [[ "${{ needs.integration-tests.result }}" != "success" ]] || \
             [[ "${{ needs.manifest-validation.result }}" != "success" ]] || \
             [[ "${{ needs.counts-validation.result }}" != "success" ]] || \
             [[ "${{ needs.skill-sync-validation.result }}" != "success" ]]; then
            echo "Some validations failed!"
            exit 1
          fi

          echo "All validations passed!"
