# Generated by OrchestKit Claude Plugin
# Created: 2026-06-19

# Auto-build heal — regenerate committed build output for src-only PRs.
#
# Problem (#2528): editing a skill via the web UI / `gh api` / a one-line commit
# leaves plugins/{skills,commands} + src/hooks/dist + the docs reference mirror
# stale, so the "Build drift detected" gate fails — a correct source edit is
# rejected purely because the build artifacts weren't regenerated locally.
#
# Fix: on a PR that touches src/**, rebuild and push the regenerated artifacts
# back to the PR branch, so the drift gate self-heals instead of failing.
#
# SECURITY MODEL (read before changing the triggers):
#   - Trigger is `pull_request`, NOT `pull_request_target` — the workflow
#     definition is read from the BASE branch (main), so a PR cannot alter it.
#   - The job additionally runs ONLY for same-repo PRs
#     (`head.repo.full_name == github.repository`). Fork PRs are skipped, so
#     untrusted PR code never executes with a write token, and forks have no
#     access to the App secrets anyway. This deliberately scopes auto-heal to
#     maintainer/bot branches (incl. web / `gh api` edits on this repo — the
#     actual #2528 pain). Fork contributors still build locally.
#
# CI RE-TRIGGER (#2528-A): the heal commit is pushed with a GitHub App token
# (RELEASE_BOT), NOT the default GITHUB_TOKEN. GitHub's recursion guard means a
# GITHUB_TOKEN push does NOT re-trigger required checks — so a bot heal-commit
# on the pre-heal SHA would leave the PR stuck "Expected — waiting for status"
# on the new HEAD (#2528-A). Pushing as the App (a distinct actor) re-fires the
# `pull_request` required checks against the healed commit, so the Build drift
# gate re-runs and passes. Same established pattern as channel-sync / release.
#
#   - No loop: the heal commit touches plugins/ + dist + docs, never src/** or
#     manifests/**, so THIS workflow's `paths:` filter does not re-fire even
#     though the App-token push is re-trigger-capable. It re-fires only the
#     drift-gated checks (ci.yml Build, Docs Site Build), which is the point.

name: Skill Build Autoheal

on:
  pull_request:
    paths:
      - 'src/**'
      - 'manifests/**'

# Default-deny; the single job elevates to contents: write.
permissions:
  contents: read

concurrency:
  group: skill-autobuild-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  autoheal:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # SAME-REPO ONLY — never run (or grant write) for fork PRs.
    if: github.event.pull_request.head.repo.full_name == github.repository
    # GITHUB_TOKEN stays read-only; the heal commit is pushed with the App token
    # (#2528-A) so required checks re-trigger on the healed SHA.
    permissions:
      contents: read
    steps:
      - name: Mint Release Bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: orchestkit
          permission-contents: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.3  # zizmor: ignore[artipacked] git push in this job uses the persisted App token (re-triggers required checks per #2528-A; fork PRs are skipped above)
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          # Persist the App token so `git push` runs as the App (a distinct
          # actor), which re-triggers the drift-gated required checks (#2528-A).
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build (regenerate plugins/ + dist + docs mirrors)
        run: npm run build

      - name: Commit + push regenerated artifacts if drift
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          # Gated paths only (mirrors the Build + Docs Site drift gates); the
          # ungated docs/site/lib/generated churn is intentionally left out.
          GATED=(plugins/ src/hooks/dist/ docs/site/content/docs/reference docs/site/content/docs/skills/by-category)
          if git diff --quiet -- "${GATED[@]}"; then
            echo "::notice::No build drift — source and committed artifacts already in sync."
            exit 0
          fi
          echo "::notice::Build drift detected — committing regenerated artifacts to ${HEAD_REF}."
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "${GATED[@]}"
          git commit -m "chore(build): regenerate skill artifacts [skill-autoheal]

          Auto-regenerated by .github/workflows/skill-autobuild.yml after a
          src-only edit left the committed build output stale (#2528)."
          git push origin "HEAD:${HEAD_REF}"
