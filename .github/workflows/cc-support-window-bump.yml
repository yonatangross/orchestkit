# Generated by OrchestKit M130 — issue #1488
# Recomputes the CC support floor whenever LATEST_KNOWN_CC bumps in cc-version-matrix.ts
# (the #2229 successor to the removed 478-row feature catalogue).
# Policy: latest released CC minor + 3 previous = supported. See shared/rules/cc-support-policy.md.

name: CC Support Window Bump
on:
  push:
    branches: [main]
    paths:
      - 'src/hooks/src/lib/cc-version-matrix.ts'
      - 'shared/cc-support.json'
  workflow_dispatch:

# Default-deny at workflow level; writes scoped to the recompute-floor job.
permissions:
  contents: read

concurrency:
  group: cc-support-window-bump
  cancel-in-progress: false

jobs:
  recompute-floor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write       # push branch
      pull-requests: write  # peter-evans/create-pull-request
    # Skip if the trigger was the bump workflow's own merge. Without this,
    # peter-evans/create-pull-request → squash-merge → push fires this same
    # workflow again. The compute step's `skip=true` branch usually ends it
    # on the first iteration, but we don't want even one wasted run, and we
    # don't want the support-window-bump.yml file edits (e.g. policy tweaks)
    # to confuse triage with self-triggered noise. The bump PR commit
    # message starts with `chore(cc): bump support floor`.
    if: |
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message, 'chore(cc): bump support floor')
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3  # zizmor: ignore[artipacked] peter-evans/create-pull-request pushes via the persisted default GITHUB_TOKEN; no App token is minted
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'

      - name: Compute new floor from matrix
        id: compute
        run: |
          set -euo pipefail
          # Read the LATEST_KNOWN_CC constant (the #2229 successor to the 478-row feature
          # catalogue — the catalogue was removed; this single constant is the latest version
          # ork's adoption covers).
          LATEST=$(grep -oE "LATEST_KNOWN_CC = '[0-9]+\.[0-9]+\.[0-9]+'" src/hooks/src/lib/cc-version-matrix.ts \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' \
            | head -1)
          if [ -z "$LATEST" ]; then
            echo "::error::No LATEST_KNOWN_CC constant found in cc-version-matrix.ts"
            exit 1
          fi
          # latest + 3 previous → floor = latest patch -3 (we use patch granularity since CC is single-minor)
          PATCH=$(echo "$LATEST" | awk -F. '{print $3}')
          FLOOR_PATCH=$((PATCH - 3))
          if [ "$FLOOR_PATCH" -lt 0 ]; then FLOOR_PATCH=0; fi
          PREFIX=$(echo "$LATEST" | awk -F. '{print $1"."$2}')
          NEW_FLOOR="${PREFIX}.${FLOOR_PATCH}"
          NEW_DROP="${PREFIX}.$((FLOOR_PATCH - 1))"

          CURRENT_FLOOR=$(jq -r '.supported_floor' shared/cc-support.json)
          CURRENT_LATEST=$(jq -r '.latest' shared/cc-support.json)

          # Respect manual_override if present and unexpired.
          OVERRIDE=$(jq -r '.manual_override.expires // empty' shared/cc-support.json)
          if [ -n "$OVERRIDE" ]; then
            TODAY=$(date -u +%Y-%m-%d)
            if [ "$OVERRIDE" \> "$TODAY" ] || [ "$OVERRIDE" = "$TODAY" ]; then
              echo "Manual override active until $OVERRIDE — skipping auto-bump."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "latest=$LATEST"          >> "$GITHUB_OUTPUT"
          echo "new_floor=$NEW_FLOOR"    >> "$GITHUB_OUTPUT"
          echo "new_drop=$NEW_DROP"      >> "$GITHUB_OUTPUT"
          echo "current_floor=$CURRENT_FLOOR" >> "$GITHUB_OUTPUT"
          echo "current_latest=$CURRENT_LATEST" >> "$GITHUB_OUTPUT"
          if [ "$NEW_FLOOR" = "$CURRENT_FLOOR" ] && [ "$LATEST" = "$CURRENT_LATEST" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update cc-support.json
        if: steps.compute.outputs.skip != 'true'
        env:
          LATEST: ${{ steps.compute.outputs.latest }}
          NEW_FLOOR: ${{ steps.compute.outputs.new_floor }}
          NEW_DROP: ${{ steps.compute.outputs.new_drop }}
        run: |
          set -euo pipefail
          jq --arg latest "$LATEST" \
             --arg floor  "$NEW_FLOOR" \
             --arg drop   "$NEW_DROP" \
            '.latest = $latest | .latest_known = $latest | .supported_floor = $floor | .drop_after = $drop' \
            shared/cc-support.json > shared/cc-support.json.tmp
          mv shared/cc-support.json.tmp shared/cc-support.json

      - name: Run stamper
        if: steps.compute.outputs.skip != 'true'
        run: node scripts/stamp-cc-support.mjs

      - name: Open bump PR
        if: steps.compute.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          commit-message: "chore(cc): bump support floor to ${{ steps.compute.outputs.new_floor }}"
          branch: chore/cc-support-bump-${{ steps.compute.outputs.new_floor }}
          delete-branch: true
          title: "chore(cc): bump support floor ${{ steps.compute.outputs.current_floor }} → ${{ steps.compute.outputs.new_floor }}"
          body: |
            Auto-generated by `cc-support-window-bump.yml` after a new entry landed in `cc-version-matrix.ts`.

            **Policy:** `latest + 3 previous minors` (see `shared/rules/cc-support-policy.md`).

            | Field | Before | After |
            |---|---|---|
            | `latest` | `${{ steps.compute.outputs.current_latest }}` | `${{ steps.compute.outputs.latest }}` |
            | `supported_floor` | `${{ steps.compute.outputs.current_floor }}` | `${{ steps.compute.outputs.new_floor }}` |
            | `drop_after` | (computed) | `${{ steps.compute.outputs.new_drop }}` |

            ## What this PR contains

            - `shared/cc-support.json` — updated source of truth
            - Stamped derivations: `CLAUDE.md`, `src/hooks/src/lib/cc-version-matrix.ts` (`MIN_CC_VERSION`), `src/skills/doctor/references/version-compatibility.md`

            ## Reviewer checklist

            - [ ] Test suite passes against new floor
            - [ ] No active enterprise customers below `${{ steps.compute.outputs.new_floor }}` (else add `manual_override` to cc-support.json before merging)
            - [ ] Open a follow-up "M{n} migration" issue if this drops a feature still in use
          labels: |
            chore
            automation
            cc-adoption
