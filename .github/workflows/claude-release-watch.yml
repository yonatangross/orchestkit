# Generated by OrchestKit M130 — issue #1486
# Daily watcher for anthropics/claude-code CHANGELOG.md
# Snapshots upstream changes, scores adoption gaps, files triage issues.

name: Claude Release Watch
on:
  workflow_dispatch:
    inputs:
      reissue_existing:
        description: 'Comma-separated CC versions to re-emit gap entries for (e.g. "2.1.133,2.1.134"). Existing snapshot bodies are kept; the gaps file is re-populated with empty features[] so triage re-runs.'
        required: false
        default: ''
  schedule:
    - cron: '0 14 * * *'

# Serialize so two cron fires (or cron + manual) can't race on the snapshot commit.
concurrency:
  group: cc-release-watch
  cancel-in-progress: false

# Least privilege: write issues + commit snapshots; PRs only if scripts open dedupe PRs.
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Hoist CLAUDE_CODE_OAUTH_TOKEN to JOB-LEVEL env so it's readable in
    # step-level `if:` expressions (the `secrets` context is NOT allowed
    # in `if:`, and step-level env is applied AFTER `if:` evaluates).
    #
    # GH_TOKEN is intentionally NOT here — peter-evans/create-pull-request
    # configures its own git auth via `http.https://github.com/.extraheader`,
    # and a job-level GH_TOKEN collides, producing
    # `remote: Duplicate header: "Authorization"` (HTTP 400). GH_TOKEN is
    # set per-step for the steps that need it (Step 3, Step 4).
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          # `persist-credentials: false` is REQUIRED here. With true,
          # checkout leaves an `http.https://github.com/.extraheader`
          # AUTHORIZATION config behind for subsequent git operations.
          # peter-evans/create-pull-request adds its OWN extraheader,
          # producing a "Duplicate header: Authorization" 400 from
          # GitHub. We don't need persisted creds — Step 1 uses `gh`
          # (auth via per-step GH_TOKEN env), Step 7 is peter-evans
          # (manages its own auth).
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'

      # Install the Claude Code CLI used by cc-triage.mjs (`claude -p --bare`).
      # Pinned to MIN_CC_VERSION from src/hooks/src/lib/cc-version-matrix.ts so
      # the cron is reproducible regardless of latest @anthropic-ai/claude-code.
      #
      # `--ignore-scripts` blocks transitive postinstall hooks (security
      # mitigation), but ALSO skips the package's own postinstall which
      # fetches the native `claude` binary. Without the explicit install.cjs
      # invocation below, every `claude` call exits with:
      #   Error: claude native binary not installed.
      # That silently broke cc-triage in run 25443026871 (PR #1620): all
      # 3 versions logged `parse_failed=true` after 5ms-apart fast-fails.
      # The official package's postinstall is `node install.cjs` — running
      # that one trusted script after the install restores the binary
      # without re-enabling arbitrary transitive scripts.
      - name: Install Claude Code CLI
        run: |
          set -euo pipefail
          npm install -g @anthropic-ai/claude-code@2.1.122 --ignore-scripts
          node "$(npm root -g)/@anthropic-ai/claude-code/install.cjs"
          claude --version

      # Step 1 — fetch upstream CHANGELOG, diff, write new snapshots, emit gaps JSON.
      # Hard fail here aborts the run (no commit, no issues). Stale snapshots are worse
      # than missing one cycle.
      # Needs GH_TOKEN because cc-release-watch.mjs calls
      # `gh api repos/anthropics/claude-code/contents/CHANGELOG.md`.
      #
      # `reissue_existing` (workflow_dispatch only) forwards a comma-separated
      # list of versions whose gap entries should be re-emitted even when their
      # snapshot file already exists on disk. Recovery hatch for stuck states
      # like M134 where versions slipped past the floor without a triage pass.
      - name: Snapshot CC CHANGELOG and score gaps
        id: watch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REISSUE_EXISTING: ${{ github.event.inputs.reissue_existing }}
        run: |
          set -euo pipefail
          if [ -n "${REISSUE_EXISTING:-}" ]; then
            node scripts/cc-release-watch.mjs --reissue-existing "$REISSUE_EXISTING"
          else
            node scripts/cc-release-watch.mjs
          fi

      # Step 2 — soft LLM dependency. If no token, skip extraction; the fallback
      # below still files something so the human triage step is visible.
      # Auth env is hoisted to job-level (see top of `watch:` job).
      - name: LLM-assisted feature extraction (optional)
        id: triage
        if: ${{ env.CLAUDE_CODE_OAUTH_TOKEN != '' }}
        run: node scripts/cc-triage.mjs

      # Step 3 — file issues for gaps with score >= 10, dedup against open `cc-adoption` issues.
      - name: File adoption issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          GAPS=shared/cc-adoption-gaps.json
          ISSUE_ARGS=shared/gh-issue-args.json
          if [ ! -s "$GAPS" ] || [ "$(jq 'length' "$GAPS")" = "0" ]; then
            echo "No gaps to triage."
            exit 0
          fi
          if [ ! -s "$ISSUE_ARGS" ]; then
            echo "No gh-issue-args.json — watch step did not emit milestone title."
            exit 0
          fi

          MILESTONE_TITLE=$(jq -r '.milestone' "$ISSUE_ARGS")
          MILESTONE_NUM=$(gh api repos/${{ github.repository }}/milestones \
            --jq ".[] | select(.title==\"$MILESTONE_TITLE\") | .number" || true)
          if [ -z "$MILESTONE_NUM" ]; then
            MILESTONE_NUM=$(gh api -X POST repos/${{ github.repository }}/milestones \
              -f title="$MILESTONE_TITLE" --jq .number)
            echo "Created milestone $MILESTONE_TITLE (#$MILESTONE_NUM)"
          fi

          # Iterate features across all gap entries.
          jq -c '.[] | .version as $v | .features[]? | select(.gap_score >= 10) | . + {version: $v}' "$GAPS" \
            | while read -r feat; do
                SLUG=$(echo "$feat" | jq -r '.feature_slug')
                VERSION=$(echo "$feat" | jq -r '.version')
                DESC=$(echo "$feat" | jq -r '.description')
                CAT=$(echo "$feat" | jq -r '.category')
                SCORE=$(echo "$feat" | jq -r '.gap_score')
                REF=$(echo "$feat" | jq -r '.reference_changelog_line')
                AFFECTED=$(echo "$feat" | jq -r '.affected_skills | join(", ")')
                KEY="${SLUG}+${VERSION}"

                # Dedup via exact body marker. The earlier full-text search
                # `\"$KEY\"` was lossy — GH's `+` operator inside a quoted
                # phrase can tokenize unpredictably and slug substrings collide.
                # We embed `**Key:** \`<KEY>\`` in the body and grep that line
                # in `in:body`, which is exact and label-scoped.
                EXISTING=$(gh issue list --label cc-adoption --state open \
                  --search "\"Key: \\\`$KEY\\\`\" in:body" \
                  --json number --jq 'length')
                if [ "$EXISTING" -gt 0 ]; then
                  echo "Skip (exists): $KEY"
                  continue
                fi

                TITLE="adopt CC $VERSION feature: $SLUG ($CAT)"
                # NOTE: do NOT use a `cat <<BODY` heredoc here. A heredoc
                # body at column 1 breaks YAML's block-scalar indentation,
                # which causes GHA to silently fail to register this
                # workflow's `name:` and `workflow_dispatch` trigger
                # (404/422 from gh workflow run). Use printf with each
                # line as a separate quoted argument — that keeps every
                # line indented inside the YAML block.
                BODY=$(printf '%s\n' \
                  "**Auto-filed by cc-release-watch** — see [shared/cc-adoption-gaps.json](../blob/main/shared/cc-adoption-gaps.json) for the source data." \
                  "" \
                  "**Key:** \`${KEY}\`" \
                  "**Category:** \`${CAT}\` (gap_score=${SCORE})" \
                  "**Affected skills:** ${AFFECTED:-(none detected)}" \
                  "" \
                  "## Changelog reference" \
                  "" \
                  "> ${REF}" \
                  "" \
                  "## What to do" \
                  "" \
                  "${DESC}" \
                  "" \
                  "See \`shared/cc-snapshots/${VERSION}.md\` for the full version notes. When closing this issue, link the PR with \`Closes #N\` so release-please picks it up." \
                  "" \
                  "## Policy" \
                  "" \
                  "Per \`shared/rules/cc-support-policy.md\`, the support floor will auto-bump after this version's matrix entry lands in \`src/hooks/src/lib/cc-version-matrix.ts\`. The follow-up bump PR is opened by \`.github/workflows/cc-support-window-bump.yml\`.")
                gh issue create \
                  --title "$TITLE" \
                  --body "$BODY" \
                  --label cc-adoption,automation \
                  --milestone "$MILESTONE_TITLE"
                echo "Filed: $KEY"
              done

      # Step 4 — fallback issue when LLM extraction was skipped AND there are unfiled gaps.
      #
      # NOTE: gate on `jq 'length > 0'` not `hashFiles != ''`. cc-release-watch.mjs
      # always writes `[]\n` (or content) before exiting, so `hashFiles` is
      # permanently truthy after the first run — that would file a fallback
      # issue every day forever once the LLM is skipped.
      - name: Fallback manual-triage issue
        if: ${{ steps.triage.outcome == 'skipped' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          GAPS=shared/cc-adoption-gaps.json
          if [ ! -s "$GAPS" ] || [ "$(jq 'length' "$GAPS")" = "0" ]; then
            echo "No gaps to triage — skipping fallback issue."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          KEY="manual-triage+$DATE"
          # Dedup via exact body marker (label-scoped + in:body).
          EXISTING=$(gh issue list --label cc-adoption --state open \
            --search "\"Key: \\\`$KEY\\\`\" in:body" \
            --json number --jq 'length')
          if [ "$EXISTING" -eq 0 ]; then
            VERSIONS=$(jq -r 'map(.version) | join(", ")' "$GAPS")
            gh issue create \
              --title "CC adoption: manual triage needed for $VERSIONS" \
              --body "LLM extraction skipped (CLAUDE_CODE_OAUTH_TOKEN unset). Key: \`$KEY\`. See \`shared/cc-snapshots/\` and \`shared/cc-adoption-gaps.json\` on main for raw diff." \
              --label cc-adoption,automation
          else
            echo "Fallback issue already exists for $KEY."
          fi

      # Step 5 — open PR with new snapshot files. Earlier version pushed
      # directly to main, which is rejected by branch protection (exit 1
      # with "GH006: Protected branch update failed"). Switching to the
      # same peter-evans/create-pull-request pattern used by
      # cc-support-window-bump.yml. The PR contains only data files
      # (snapshots + gaps + issue-args), so it's safe to auto-merge once
      # required CI checks pass.
      #
      # Detect whether there's anything to commit first; the action would
      # otherwise create an empty PR.
      - name: Check for snapshot changes
        id: changes
        if: success()
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain shared/cc-snapshots/ shared/cc-adoption-gaps.json shared/gh-issue-args.json)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No snapshot changes — skipping PR."
          fi

      # Read latest_new_version from gh-issue-args.json so the snapshot PR
      # title is unique per release. Without this the title was a constant
      # "chore(cc-watch): snapshot upstream CHANGELOG" — when auto-merge
      # broke (W1a: github-actions[bot] PRs can't trigger required checks),
      # stale PRs accumulated under the same title and were hard to triage.
      # Per #1697, including the version in the title makes each PR
      # individually identifiable. Multi-version cron runs use only the
      # latest; the run-id branch suffix preserves uniqueness.
      - name: Read latest version for PR title
        id: read_args
        if: success() && steps.changes.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          LATEST=$(jq -r '.latest_new_version // empty' shared/gh-issue-args.json)
          if [ -z "$LATEST" ]; then
            LATEST="unknown"
          fi
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Open snapshot PR
        id: cpr
        if: success() && steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          # TODO(#1685): Replace `secrets.GITHUB_TOKEN` with
          # `secrets.SNAPSHOT_PR_TOKEN` (a fine-grained PAT with
          # `Contents: write` + `Pull requests: write` on this repo only)
          # once a repo admin creates the secret. Required because PRs
          # opened by the default GITHUB_TOKEN run AS github-actions[bot],
          # whose pushes do NOT trigger required CI checks — so auto-merge
          # never fires and snapshot PRs stall. A PAT pushes as a real
          # user, which DOES trigger CI. Until the secret exists, this
          # falls back to GITHUB_TOKEN and PRs require a manual rebase
          # (push from a human) to kick CI.
          token: ${{ secrets.SNAPSHOT_PR_TOKEN || secrets.GITHUB_TOKEN }}
          add-paths: |
            shared/cc-snapshots/
            shared/cc-adoption-gaps.json
            shared/gh-issue-args.json
          commit-message: "chore(cc-watch): snapshot upstream CHANGELOG (${{ steps.read_args.outputs.latest }})"
          branch: chore/cc-snapshot-${{ github.run_id }}
          delete-branch: true
          title: "chore(cc-watch): snapshot upstream CHANGELOG (${{ steps.read_args.outputs.latest }})"
          body: |
            Auto-generated by `claude-release-watch.yml` daily cron run
            ${{ github.run_id }}.

            Contains:
            - `shared/cc-snapshots/<version>.md` — new version notes from
              upstream `anthropics/claude-code` CHANGELOG
            - `shared/cc-adoption-gaps.json` — gap report for triage
            - `shared/gh-issue-args.json` — milestone title used by the
              issue-filing step

            Safe to auto-merge once CI is green; this is data-only
            (no code changes).
          labels: |
            automation
            cc-adoption

      # Enable auto-merge on the snapshot PR so it doesn't get stuck behind
      # a stale base. Branch protection has `strict: true` (PRs must be
      # up-to-date), so a PR opened from a now-old main will be BEHIND once
      # any other PR merges. `--auto` queues the merge for when required
      # checks pass and triggers an automatic rebase if needed.
      #
      # The repo must have "Allow auto-merge" enabled in Settings → General
      # (it is — used by cc-support-window-bump.yml's bump PRs already).
      #
      # NOTE: this step uses the gh CLI, which needs GH_TOKEN. Don't reuse
      # peter-evans's auth context from the previous step (different env).
      - name: Enable auto-merge on snapshot PR
        if: success() && steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" \
            --repo "${{ github.repository }}" \
            --auto \
            --squash \
            --delete-branch
