# Generated by OrchestKit M130 — issue #1486
# Daily watcher for anthropics/claude-code CHANGELOG.md
# Snapshots upstream changes, scores adoption gaps, files triage issues.

name: Claude Release Watch
on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * *'

# Serialize so two cron fires (or cron + manual) can't race on the snapshot commit.
concurrency:
  group: cc-release-watch
  cancel-in-progress: false

# Least privilege: write issues + commit snapshots; PRs only if scripts open dedupe PRs.
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'

      # Step 1 — fetch upstream CHANGELOG, diff, write new snapshots, emit gaps JSON.
      # Hard fail here aborts the run (no commit, no issues). Stale snapshots are worse
      # than missing one cycle.
      - name: Snapshot CC CHANGELOG and score gaps
        id: watch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/cc-release-watch.mjs

      # Step 2 — soft LLM dependency. If no token, skip extraction; the fallback
      # below still files something so the human triage step is visible.
      #
      # NOTE: gating on `secrets.CLAUDE_CODE_OAUTH_TOKEN != ''` directly. Earlier
      # version used `env.CLAUDE_CODE_OAUTH_TOKEN`, but the `env` context inside
      # `if:` only reads workflow/job-level env — step-level `env:` is applied
      # AFTER `if:` evaluates. That made the step always-skipped regardless of
      # secret presence. The `secrets` context IS available in `if:`.
      - name: LLM-assisted feature extraction (optional)
        id: triage
        if: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/cc-triage.mjs

      # Step 3 — file issues for gaps with score >= 10, dedup against open `cc-adoption` issues.
      - name: File adoption issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          GAPS=shared/cc-adoption-gaps.json
          ISSUE_ARGS=shared/gh-issue-args.json
          if [ ! -s "$GAPS" ] || [ "$(jq 'length' "$GAPS")" = "0" ]; then
            echo "No gaps to triage."
            exit 0
          fi
          if [ ! -s "$ISSUE_ARGS" ]; then
            echo "No gh-issue-args.json — watch step did not emit milestone title."
            exit 0
          fi

          MILESTONE_TITLE=$(jq -r '.milestone' "$ISSUE_ARGS")
          MILESTONE_NUM=$(gh api repos/${{ github.repository }}/milestones \
            --jq ".[] | select(.title==\"$MILESTONE_TITLE\") | .number" || true)
          if [ -z "$MILESTONE_NUM" ]; then
            MILESTONE_NUM=$(gh api -X POST repos/${{ github.repository }}/milestones \
              -f title="$MILESTONE_TITLE" --jq .number)
            echo "Created milestone $MILESTONE_TITLE (#$MILESTONE_NUM)"
          fi

          # Iterate features across all gap entries.
          jq -c '.[] | .version as $v | .features[]? | select(.gap_score >= 10) | . + {version: $v}' "$GAPS" \
            | while read -r feat; do
                SLUG=$(echo "$feat" | jq -r '.feature_slug')
                VERSION=$(echo "$feat" | jq -r '.version')
                DESC=$(echo "$feat" | jq -r '.description')
                CAT=$(echo "$feat" | jq -r '.category')
                SCORE=$(echo "$feat" | jq -r '.gap_score')
                REF=$(echo "$feat" | jq -r '.reference_changelog_line')
                AFFECTED=$(echo "$feat" | jq -r '.affected_skills | join(", ")')
                KEY="${SLUG}+${VERSION}"

                # Dedup via exact body marker. The earlier full-text search
                # `\"$KEY\"` was lossy — GH's `+` operator inside a quoted
                # phrase can tokenize unpredictably and slug substrings collide.
                # We embed `**Key:** \`<KEY>\`` in the body and grep that line
                # in `in:body`, which is exact and label-scoped.
                EXISTING=$(gh issue list --label cc-adoption --state open \
                  --search "\"Key: \\\`$KEY\\\`\" in:body" \
                  --json number --jq 'length')
                if [ "$EXISTING" -gt 0 ]; then
                  echo "Skip (exists): $KEY"
                  continue
                fi

                TITLE="adopt CC $VERSION feature: $SLUG ($CAT)"
                BODY=$(cat <<BODY
**Auto-filed by cc-release-watch** — see [shared/cc-adoption-gaps.json](../blob/main/shared/cc-adoption-gaps.json) for the source data.

**Key:** \`${KEY}\`
**Category:** \`${CAT}\` (gap_score=${SCORE})
**Affected skills:** ${AFFECTED:-(none detected)}

## Changelog reference

> ${REF}

## What to do

${DESC}

See \`shared/cc-snapshots/${VERSION}.md\` for the full version notes. When closing this issue, link the PR with \`Closes #N\` so release-please picks it up.

## Policy

Per \`shared/rules/cc-support-policy.md\`, the support floor will auto-bump after this version's matrix entry lands in \`src/hooks/src/lib/cc-version-matrix.ts\`. The follow-up bump PR is opened by \`.github/workflows/cc-support-window-bump.yml\`.
BODY
)
                gh issue create \
                  --title "$TITLE" \
                  --body "$BODY" \
                  --label cc-adoption,automation \
                  --milestone "$MILESTONE_TITLE"
                echo "Filed: $KEY"
              done

      # Step 4 — fallback issue when LLM extraction was skipped AND there are unfiled gaps.
      #
      # NOTE: gate on `jq 'length > 0'` not `hashFiles != ''`. cc-release-watch.mjs
      # always writes `[]\n` (or content) before exiting, so `hashFiles` is
      # permanently truthy after the first run — that would file a fallback
      # issue every day forever once the LLM is skipped.
      - name: Fallback manual-triage issue
        if: ${{ steps.triage.outcome == 'skipped' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          GAPS=shared/cc-adoption-gaps.json
          if [ ! -s "$GAPS" ] || [ "$(jq 'length' "$GAPS")" = "0" ]; then
            echo "No gaps to triage — skipping fallback issue."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          KEY="manual-triage+$DATE"
          # Dedup via exact body marker (label-scoped + in:body).
          EXISTING=$(gh issue list --label cc-adoption --state open \
            --search "\"Key: \\\`$KEY\\\`\" in:body" \
            --json number --jq 'length')
          if [ "$EXISTING" -eq 0 ]; then
            VERSIONS=$(jq -r 'map(.version) | join(", ")' "$GAPS")
            gh issue create \
              --title "CC adoption: manual triage needed for $VERSIONS" \
              --body "LLM extraction skipped (CLAUDE_CODE_OAUTH_TOKEN unset). Key: \`$KEY\`. See \`shared/cc-snapshots/\` and \`shared/cc-adoption-gaps.json\` on main for raw diff." \
              --label cc-adoption,automation
          else
            echo "Fallback issue already exists for $KEY."
          fi

      # Step 5 — commit snapshots ONLY if all prior steps succeeded.
      - name: Commit new snapshots
        if: success()
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if [ -n "$(git status --porcelain shared/cc-snapshots/ shared/cc-adoption-gaps.json shared/gh-issue-args.json)" ]; then
            git add shared/cc-snapshots/ shared/cc-adoption-gaps.json shared/gh-issue-args.json
            git commit -m "chore(cc-watch): snapshot upstream CHANGELOG [skip ci]"
            git push
          else
            echo "No snapshot changes to commit."
          fi
