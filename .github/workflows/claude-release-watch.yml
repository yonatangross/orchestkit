# Generated by OrchestKit M130 — issue #1486
# Daily watcher for anthropics/claude-code CHANGELOG.md
# Snapshots upstream changes, scores adoption gaps, files triage issues.

name: Claude Release Watch
on:
  workflow_dispatch:
    inputs:
      reissue_existing:
        description: 'Comma-separated CC versions to re-emit gap entries for (e.g. "2.1.133,2.1.134"). Existing snapshot bodies are kept; the gaps file is re-populated with empty features[] so triage re-runs.'
        required: false
        default: ''
  schedule:
    - cron: '0 14 * * *'

# Serialize so two cron fires (or cron + manual) can't race on the snapshot commit.
concurrency:
  group: cc-release-watch
  cancel-in-progress: false

# Default-deny at workflow level; writes scoped to the watch job below.
permissions:
  contents: read

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Least privilege at job level: write issues + commit snapshots;
    # PRs only because scripts open dedupe PRs via peter-evans.
    permissions:
      contents: write
      issues: write
      pull-requests: write
    # Hoist CLAUDE_CODE_OAUTH_TOKEN to JOB-LEVEL env so it's readable in
    # step-level `if:` expressions (the `secrets` context is NOT allowed
    # in `if:`, and step-level env is applied AFTER `if:` evaluates).
    #
    # GH_TOKEN is intentionally NOT here — peter-evans/create-pull-request
    # configures its own git auth via `http.https://github.com/.extraheader`,
    # and a job-level GH_TOKEN collides, producing
    # `remote: Duplicate header: "Authorization"` (HTTP 400). GH_TOKEN is
    # set per-step for the steps that need it (Step 3, Step 4).
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          # `persist-credentials: false` is REQUIRED here. With true,
          # checkout leaves an `http.https://github.com/.extraheader`
          # AUTHORIZATION config behind for subsequent git operations.
          # peter-evans/create-pull-request adds its OWN extraheader,
          # producing a "Duplicate header: Authorization" 400 from
          # GitHub. We don't need persisted creds — Step 1 uses `gh`
          # (auth via per-step GH_TOKEN env), Step 7 is peter-evans
          # (manages its own auth).
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'

      # Install the Claude Code CLI used by cc-triage.mjs (`claude -p --bare`).
      # Pinned to MIN_CC_VERSION from src/hooks/src/lib/cc-version-matrix.ts so
      # the cron is reproducible regardless of latest @anthropic-ai/claude-code.
      #
      # `--ignore-scripts` blocks transitive postinstall hooks (security
      # mitigation), but ALSO skips the package's own postinstall which
      # fetches the native `claude` binary. Without the explicit install.cjs
      # invocation below, every `claude` call exits with:
      #   Error: claude native binary not installed.
      # That silently broke cc-triage in run 25443026871 (PR #1620): all
      # 3 versions logged `parse_failed=true` after 5ms-apart fast-fails.
      # The official package's postinstall is `node install.cjs` — running
      # that one trusted script after the install restores the binary
      # without re-enabling arbitrary transitive scripts.
      - name: Install Claude Code CLI
        run: |
          set -euo pipefail
          npm install -g @anthropic-ai/claude-code@2.1.148 --ignore-scripts
          node "$(npm root -g)/@anthropic-ai/claude-code/install.cjs"
          claude --version

      # Step 1 — fetch upstream CHANGELOG, diff, write new snapshots, emit gaps JSON.
      # Hard fail here aborts the run (no commit, no issues). Stale snapshots are worse
      # than missing one cycle.
      # Needs GH_TOKEN because cc-release-watch.mjs calls
      # `gh api repos/anthropics/claude-code/contents/CHANGELOG.md`.
      #
      # `reissue_existing` (workflow_dispatch only) forwards a comma-separated
      # list of versions whose gap entries should be re-emitted even when their
      # snapshot file already exists on disk. Recovery hatch for stuck states
      # like M134 where versions slipped past the floor without a triage pass.
      - name: Snapshot CC CHANGELOG and score gaps
        id: watch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REISSUE_EXISTING: ${{ github.event.inputs.reissue_existing }}
        run: |
          set -euo pipefail
          if [ -n "${REISSUE_EXISTING:-}" ]; then
            node scripts/cc-release-watch.mjs --reissue-existing "$REISSUE_EXISTING"
          else
            node scripts/cc-release-watch.mjs
          fi

      # Step 2 — soft LLM dependency. If no token, skip extraction; the fallback
      # below still files something so the human triage step is visible.
      # Auth env is hoisted to job-level (see top of `watch:` job).
      #
      # --retry-failed (#1985): the flag is idempotent — only re-attempts entries
      # already marked parse_failed, leaving healthy entries untouched. Without
      # it, a single transient LLM blip during a previous run leaves the version
      # permanently stuck (no retry, no issue, no fallback — see #1985). Running
      # the flag on every cron tick costs at most 2 attempts per stuck version,
      # which is the desired self-heal.
      - name: LLM-assisted feature extraction (optional)
        id: triage
        if: ${{ env.CLAUDE_CODE_OAUTH_TOKEN != '' }}
        run: node scripts/cc-triage.mjs --retry-failed

      # Step 2.9 — backfill the stable `Changelog-Ref:` dedup marker onto any
      # open cc-adoption issue that predates it (#2041). MUST run before the filer:
      # the filer now dedups on the changelog-line hash, and without the marker the
      # pre-existing issues would look "new" → duplicate storm. Idempotent no-op
      # once all issues are marked.
      # FAIL-CLOSED (intentional): a transient gh error here aborts the job (set -e)
      # BEFORE the filer runs — better to file nothing this tick than to dedup against
      # un-backfilled issues and storm. The next tick retries.
      - name: Backfill Changelog-Ref markers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: bash scripts/cc-backfill-changelog-ref.sh

      # Step 3 — file issues for gaps with score >= 10, dedup against open `cc-adoption` issues.
      # Extracted to scripts/cc-file-adoption-issues.sh so the loop is testable in
      # isolation (#1696, W1e). Tests live in tests/integration/test-cc-release-watch-step3.sh.
      - name: File adoption issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: bash scripts/cc-file-adoption-issues.sh

      # Step 3b — consolidate stray per-version "CC X.Y.Z adoption" milestones
      # into the single "CC adoption" umbrella and close the emptied ones.
      # Idempotent self-heal: a steady state is a no-op, so it's safe on every
      # tick. Migrates pre-existing per-version milestones on first run and
      # collapses any that reappear. Extracted to a script so it's testable in
      # isolation (tests/integration/test-cc-consolidate-milestones.sh).
      - name: Consolidate CC milestones
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: bash scripts/cc-consolidate-milestones.sh

      # Step 3c — flag below-floor cc-adoption issues `cc-stale` so the rolling
      # umbrella stays bounded (moot items become queryable/separable). Labels
      # only — never closes (issues close via PR per policy). Idempotent: a
      # steady state is a no-op, safe on every tick.
      - name: Flag below-floor CC issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: bash scripts/cc-stale-belowfloor.sh

      # Step 4 — fallback issue when LLM extraction was skipped AND there are unfiled gaps.
      #
      # NOTE: gate on `jq 'length > 0'` not `hashFiles != ''`. cc-release-watch.mjs
      # always writes `[]\n` (or content) before exiting, so `hashFiles` is
      # permanently truthy after the first run — that would file a fallback
      # issue every day forever once the LLM is skipped.
      # #1985: also fire when triage ran but left entries parse_failed (sentinel).
      # Before this fix, a transient LLM blip → parse_failed → outcome=='success'
      # (script exits 0 after writing the sentinel) → fallback never fired →
      # the version vanished silently. Now any stuck sentinel surfaces an issue
      # so the human triage step is visible. `outputs.parse_failed` is emitted
      # by cc-triage.mjs when gaps contain any parse_failed entry.
      - name: Fallback manual-triage issue
        if: ${{ (steps.triage.outcome == 'skipped' || steps.triage.outputs.parse_failed == 'true') && steps.triage.outputs.auth_failed != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          GAPS=shared/cc-adoption-gaps.json
          if [ ! -s "$GAPS" ] || [ "$(jq 'length' "$GAPS")" = "0" ]; then
            echo "No gaps to triage — skipping fallback issue."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          KEY="manual-triage+$DATE"
          # Dedup via exact body marker (label-scoped + in:body).
          EXISTING=$(gh issue list --label cc-adoption --state open \
            --search "\"Key: \\\`$KEY\\\`\" in:body" \
            --json number --jq 'length')
          if [ "$EXISTING" -eq 0 ]; then
            VERSIONS=$(jq -r 'map(.version) | join(", ")' "$GAPS")
            # Land the fallback in the rolling umbrella too. Without --milestone
            # it was milestone-less and escaped "CC adoption" (unlike the main
            # filer, which assigns it). Default when the watch step didn't emit
            # gh-issue-args.json (e.g. a carried-failed-only run with no new versions).
            MS="CC adoption"
            if [ -s shared/gh-issue-args.json ]; then
              MS=$(jq -r '.milestone // "CC adoption"' shared/gh-issue-args.json)
            fi
            gh issue create \
              --title "CC adoption: manual triage needed for $VERSIONS" \
              --body "LLM feature extraction was skipped or failed (no/expired CLAUDE_CODE_OAUTH_TOKEN, or a parse failure). Key: \`$KEY\`. Check the triage step log for the exact reason; see \`shared/cc-snapshots/\` and \`shared/cc-adoption-gaps.json\` on main for the raw diff." \
              --label cc-adoption,automation \
              --milestone "$MS"
          else
            echo "Fallback issue already exists for $KEY."
          fi

      # Step 4b — LOUD token-rotation issue when triage hit an AUTH failure
      # (expired/invalid CLAUDE_CODE_OAUTH_TOKEN → 401), distinct from the
      # generic manual-triage fallback above (suppressed when auth_failed fires)
      # so the operator gets ONE accurate, actionable issue. This is the signal
      # that would have collapsed the multi-hour 2.1.152 misdiagnosis (a 401
      # masquerading as parse_failed) into a one-glance CI error.
      - name: Token rotation needed
        if: ${{ steps.triage.outputs.auth_failed == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          KEY="token-rotation+$DATE"
          # Dedup via exact body marker (label-scoped + in:body), same as Step 4.
          EXISTING=$(gh issue list --label cc-adoption --state open \
            --search "\"Key: \\\`$KEY\\\`\" in:body" \
            --json number --jq 'length')
          if [ "$EXISTING" -eq 0 ]; then
            MS="CC adoption"
            if [ -s shared/gh-issue-args.json ]; then
              MS=$(jq -r '.milestone // "CC adoption"' shared/gh-issue-args.json)
            fi
            gh issue create \
              --title "🚨 CLAUDE_CODE_OAUTH_TOKEN invalid/expired — rotate to unblock CC triage" \
              --body "cc-triage hit an authentication failure (401 / invalid bearer token), so CC feature extraction is blocked until the token is rotated. Key: \`$KEY\`. Fix: run \`claude setup-token\`, then \`gh secret set CLAUDE_CODE_OAUTH_TOKEN -R ${{ github.repository }}\`. Stuck versions are carried forward (parse_failed) and retry automatically on the next cron tick once the token is valid." \
              --label cc-adoption,automation \
              --milestone "$MS"
            echo "Filed token-rotation issue for $KEY."
          else
            echo "Token-rotation issue already exists for $KEY."
          fi

      # Step 4c — staleness alarm (#2412). cc-release-watch.mjs emits
      # stale=true when the upstream CHANGELOG head is >2 releases ahead of
      # cc-support.json latest_known — the gap that let 2.1.174/175 sit
      # uncaptured. Keyed on the upstream head (not the date) so a persisting
      # lag files ONE issue per stuck head instead of one per cron tick.
      - name: Staleness alarm
        if: ${{ steps.watch.outputs.stale == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          UPSTREAM="${{ steps.watch.outputs.stale_upstream }}"
          BEHIND="${{ steps.watch.outputs.stale_latest_known }}"
          COUNT="${{ steps.watch.outputs.stale_count }}"
          KEY="staleness+$UPSTREAM"
          # Dedup via exact body marker (label-scoped + in:body), same as Step 4.
          EXISTING=$(gh issue list --label cc-adoption --state open \
            --search "\"Key: \\\`$KEY\\\`\" in:body" \
            --json number --jq 'length')
          if [ "$EXISTING" -eq 0 ]; then
            MS="CC adoption"
            if [ -s shared/gh-issue-args.json ]; then
              MS=$(jq -r '.milestone // "CC adoption"' shared/gh-issue-args.json)
            fi
            gh issue create \
              --title "cc-watch: adoption lag — upstream $UPSTREAM is $COUNT releases past latest_known $BEHIND" \
              --body "The cc-watch pipeline's adoption coverage (\`latest_known\` in \`shared/cc-support.json\`) trails the upstream CC CHANGELOG head by more than 2 releases. Key: \`$KEY\`. Usually self-heals on the next cron snapshot+triage; if it persists, check the watch/triage step logs and advance \`latest_known\` once the trailing versions are triaged (floor policy unaffected)." \
              --label cc-adoption,automation \
              --milestone "$MS"
            echo "Filed staleness issue for $KEY."
          else
            echo "Staleness issue already exists for $KEY."
          fi

      # Step 5 — open PR with new snapshot files. Earlier version pushed
      # directly to main, which is rejected by branch protection (exit 1
      # with "GH006: Protected branch update failed"). Switching to the
      # same peter-evans/create-pull-request pattern used by
      # cc-support-window-bump.yml. The PR contains only data files
      # (snapshots + gaps + issue-args), so it's safe to auto-merge once
      # required CI checks pass.
      #
      # Detect whether there's anything to commit first; the action would
      # otherwise create an empty PR.
      - name: Check for snapshot changes
        id: changes
        if: success()
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain shared/cc-snapshots/ shared/cc-adoption-gaps.json shared/gh-issue-args.json)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No snapshot changes — skipping PR."
          fi

      # Read latest_new_version from gh-issue-args.json so the snapshot PR
      # title is unique per release. Without this the title was a constant
      # "chore(cc-watch): snapshot upstream CHANGELOG" — when auto-merge
      # broke (W1a: github-actions[bot] PRs can't trigger required checks),
      # stale PRs accumulated under the same title and were hard to triage.
      # Per #1697, including the version in the title makes each PR
      # individually identifiable. Multi-version cron runs use only the
      # latest; the run-id branch suffix preserves uniqueness.
      - name: Read latest version for PR title
        id: read_args
        if: success() && steps.changes.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          LATEST=$(jq -r '.latest_new_version // empty' shared/gh-issue-args.json)
          if [ -z "$LATEST" ]; then
            LATEST="unknown"
          fi
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      # Mint a Release Bot App installation token so the snapshot PR is opened
      # by the App identity (not github-actions[bot]). PRs from
      # github-actions[bot] do NOT trigger required CI checks, so auto-merge
      # would stall indefinitely. App-issued tokens DO trigger CI. Mirrors
      # the pattern already used by `.github/workflows/release-please.yml`.
      - name: Mint Release Bot token for snapshot PR
        id: app_token
        if: success() && steps.changes.outputs.has_changes == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Open snapshot PR
        id: cpr
        if: success() && steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ steps.app_token.outputs.token }}
          add-paths: |
            shared/cc-snapshots/
            shared/cc-adoption-gaps.json
            shared/gh-issue-args.json
          commit-message: "chore(cc-watch): snapshot upstream CHANGELOG (${{ steps.read_args.outputs.latest }})"
          branch: chore/cc-snapshot-${{ github.run_id }}
          delete-branch: true
          title: "chore(cc-watch): snapshot upstream CHANGELOG (${{ steps.read_args.outputs.latest }})"
          body: |
            Auto-generated by `claude-release-watch.yml` daily cron run
            ${{ github.run_id }}.

            Contains:
            - `shared/cc-snapshots/<version>.md` — new version notes from
              upstream `anthropics/claude-code` CHANGELOG
            - `shared/cc-adoption-gaps.json` — gap report for triage
            - `shared/gh-issue-args.json` — milestone title used by the
              issue-filing step

            Safe to auto-merge once CI is green; this is data-only
            (no code changes).
          labels: |
            automation
            cc-adoption

      # Enable auto-merge on the snapshot PR so it doesn't get stuck behind
      # a stale base. Branch protection has `strict: true` (PRs must be
      # up-to-date), so a PR opened from a now-old main will be BEHIND once
      # any other PR merges. `--auto` queues the merge for when required
      # checks pass and triggers an automatic rebase if needed.
      #
      # The repo must have "Allow auto-merge" enabled in Settings → General
      # (it is — used by cc-support-window-bump.yml's bump PRs already).
      #
      # NOTE: this step uses the gh CLI, which needs GH_TOKEN. Don't reuse
      # peter-evans's auth context from the previous step (different env).
      - name: Enable auto-merge on snapshot PR
        if: success() && steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" \
            --repo "${{ github.repository }}" \
            --auto \
            --squash \
            --delete-branch
